<svg xmlns="http://www.w3.org/2000/svg" width="1760" height="980" viewBox="0 0 1760 980">
  <defs>
    <style>
      .title { font: 700 28px "DejaVu Sans", sans-serif; fill: #1f2d1f; }
      .subtitle { font: 400 14px "DejaVu Sans", sans-serif; fill: #49624c; }
      .panel-title { font: 700 16px "DejaVu Sans", sans-serif; fill: #2a3b2c; }
      .lane-title { font: 700 13px "DejaVu Sans", sans-serif; fill: #5a6f5b; letter-spacing: 1.2px; }
      .box-title { font: 700 18px "DejaVu Sans", sans-serif; fill: #203126; }
      .box-text { font: 400 13px "DejaVu Sans", sans-serif; fill: #2d4735; }
      .small { font: 400 12px "DejaVu Sans", sans-serif; fill: #55715b; }
      .legend-title { font: 700 13px "DejaVu Sans", sans-serif; fill: #2a3b2c; }
      .legend-text { font: 400 12px "DejaVu Sans", sans-serif; fill: #49624c; }
      .label { font: 400 12px "DejaVu Sans", sans-serif; fill: #4d6151; }
      .worker-bg { fill: #f4f7f1; stroke: #8eb69b; stroke-width: 3; }
      .divider { stroke: #c8d9cb; stroke-width: 2; stroke-dasharray: 8 8; }
      .edge-call { stroke: #45624b; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-call); }
      .edge-db { stroke: #8a2f3b; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-db); }
      .edge-ros { stroke: #2d5ea8; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-ros); }
      .edge-delegate { stroke: #8b5e34; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 8 6; marker-end: url(#arrow-delegate); }
    </style>
    <marker id="arrow-call" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <path d="M0,0 L0,8 L11,4 z" fill="#45624b"/>
    </marker>
    <marker id="arrow-db" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <path d="M0,0 L0,8 L11,4 z" fill="#8a2f3b"/>
    </marker>
    <marker id="arrow-ros" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <path d="M0,0 L0,8 L11,4 z" fill="#2d5ea8"/>
    </marker>
    <marker id="arrow-delegate" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <path d="M0,0 L0,8 L11,4 z" fill="#8b5e34"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1760" height="980" fill="rgb(245, 244, 237)"/>

  <text x="60" y="64" class="title">MFMS Server Data Platform Topology</text>
  <text x="60" y="92" class="subtitle">Facade entry on top, worker internals grouped by state/event lane and command/control lane</text>

  <rect x="1260" y="28" rx="18" ry="18" width="440" height="82" fill="#f7faf4" stroke="#b9cdbb" stroke-width="2"/>
  <text x="1288" y="55" class="legend-title">Legend</text>
  <line x1="1288" y1="74" x2="1350" y2="74" class="edge-call"/>
  <text x="1364" y="78" class="legend-text">public API / worker dispatch</text>
  <line x1="1498" y1="74" x2="1560" y2="74" class="edge-db"/>
  <text x="1574" y="78" class="legend-text">MySQL event bus / persistence</text>
  <line x1="1288" y1="95" x2="1350" y2="95" class="edge-ros"/>
  <text x="1364" y="99" class="legend-text">ROS topic / service channel</text>
  <line x1="1498" y1="95" x2="1560" y2="95" class="edge-delegate"/>
  <text x="1574" y="99" class="legend-text">adapter delegation</text>

  <rect x="60" y="160" rx="18" ry="18" width="220" height="110" fill="#dcefd8" stroke="#5d8b69" stroke-width="2.5"/>
  <text x="86" y="196" class="box-title">Qt / Client</text>
  <text x="86" y="222" class="box-text">qt_file or any caller</text>
  <text x="86" y="242" class="box-text">invoke public API</text>

  <rect x="340" y="145" rx="20" ry="20" width="300" height="130" fill="#c7e4c6" stroke="#4e7a59" stroke-width="3"/>
  <text x="370" y="183" class="box-title">CommunicationInterface</text>
  <text x="370" y="209" class="box-text">public facade</text>
  <text x="370" y="229" class="box-text">singleton entry</text>
  <text x="370" y="249" class="box-text">only installed public header</text>

  <rect x="60" y="355" rx="20" ry="20" width="260" height="240" fill="#fff1f1" stroke="#b44b59" stroke-width="2.5"/>
  <text x="88" y="393" class="box-title">MySQL: MFMS_BASE</text>
  <text x="88" y="419" class="box-text">device / device_state</text>
  <text x="88" y="439" class="box-text">device_state_event / device_ui_event</text>
  <text x="88" y="459" class="box-text">lua_state / lua_*_event</text>
  <text x="88" y="479" class="box-text">agv_path / agv_path_station</text>
  <text x="88" y="499" class="box-text">persistent control-plane store</text>
  <text x="88" y="533" class="small">State machine + UI event mailbox</text>

  <rect x="95" y="725" rx="18" ry="18" width="225" height="110" fill="#fff7e7" stroke="#b78640" stroke-width="2.5"/>
  <text x="123" y="763" class="box-title">Lower Controller</text>
  <text x="123" y="789" class="box-text">poll event tables</text>
  <text x="123" y="809" class="box-text">write back online / offline</text>

  <rect x="700" y="125" rx="28" ry="28" width="770" height="780" class="worker-bg"/>
  <text x="736" y="164" class="box-title">Worker Thread</text>
  <text x="736" y="186" class="small">CommunicationInterfaceImpl and CommunicationWorker own backend coordination here</text>
  <line x1="730" y1="555" x2="1440" y2="555" class="divider"/>
  <text x="736" y="344" class="lane-title">STATE / EVENT LANE</text>
  <text x="736" y="586" class="lane-title">COMMAND / CONTROL LANE</text>

  <rect x="945" y="190" rx="18" ry="18" width="280" height="110" fill="#d9eb9c" stroke="#6b8a35" stroke-width="2.5"/>
  <text x="973" y="225" class="box-title">CommunicationWorker</text>
  <text x="973" y="250" class="box-text">queued slot dispatcher</text>
  <text x="973" y="270" class="box-text">device cache and current selection</text>

  <rect x="760" y="380" rx="18" ry="18" width="280" height="150" fill="#f6ddc8" stroke="#bd7c34" stroke-width="2.5"/>
  <text x="788" y="416" class="box-title">MfmsDbService</text>
  <text x="788" y="442" class="box-text">write load / unload and lua state</text>
  <text x="788" y="462" class="box-text">poll device_ui_event</text>
  <text x="788" y="482" class="box-text">poll lua_ui_event</text>
  <text x="788" y="502" class="box-text">emit Qt state transitions</text>

  <rect x="1100" y="380" rx="18" ry="18" width="280" height="150" fill="#dbe7fb" stroke="#4f79b8" stroke-width="2.5"/>
  <text x="1128" y="416" class="box-title">MfmsRosBridge</text>
  <text x="1128" y="442" class="box-text">query device list from DB</text>
  <text x="1128" y="462" class="box-text">subscribe ROS topics</text>
  <text x="1128" y="482" class="box-text">convert status to Qt signals</text>

  <rect x="845" y="610" rx="18" ry="18" width="450" height="150" fill="#f8dde4" stroke="#b24161" stroke-width="2.5"/>
  <text x="873" y="646" class="box-title">MfmsCommandService</text>
  <text x="873" y="672" class="box-text">connect / disconnect device</text>
  <text x="873" y="692" class="box-text">robot motion and mode</text>
  <text x="873" y="712" class="box-text">AGV station query / go station / go path</text>
  <text x="873" y="732" class="box-text">AGV path CRUD in MySQL and adapter dispatch</text>

  <rect x="845" y="790" rx="16" ry="16" width="190" height="85" fill="#fce9d3" stroke="#a56e3c" stroke-width="2.5"/>
  <text x="872" y="823" class="box-title">RobotProxyAdapter</text>
  <text x="872" y="848" class="box-text">hyrms_export proxy</text>
  <text x="872" y="866" class="box-text">robot service bridge</text>

  <rect x="1105" y="790" rx="16" ry="16" width="190" height="85" fill="#dfeafb" stroke="#3f6fc0" stroke-width="2.5"/>
  <text x="1132" y="823" class="box-title">AgvProxyAdapter</text>
  <text x="1132" y="848" class="box-text">/{device}_cmd_interface</text>
  <text x="1132" y="866" class="box-text">AGV ROS service client</text>

  <rect x="1510" y="380" rx="18" ry="18" width="190" height="120" fill="#e8f0fe" stroke="#5a82be" stroke-width="2.5"/>
  <text x="1538" y="416" class="box-title">ROS Topics</text>
  <text x="1538" y="442" class="box-text">FrRobotState / HsRobotState</text>
  <text x="1538" y="462" class="box-text">SeerCtrlState</text>

  <rect x="1510" y="620" rx="18" ry="18" width="190" height="150" fill="#edf2fb" stroke="#4b72c8" stroke-width="2.5"/>
  <text x="1538" y="656" class="box-title">ROS Services</text>
  <text x="1538" y="682" class="box-text">/{deviceId}_cmd_interface</text>
  <text x="1538" y="702" class="box-text">robot proxy service chain</text>
  <text x="1538" y="722" class="box-text">station query / go station / path</text>

  <path d="M280 215 L340 215" class="edge-call"/>
  <path d="M640 210 L800 210 L800 245 L945 245" class="edge-call"/>

  <path d="M1015 300 L1015 340 L900 340 L900 380" class="edge-call"/>
  <path d="M1155 300 L1155 340 L1240 340 L1240 380" class="edge-call"/>
  <path d="M1085 300 L1085 610" class="edge-call"/>

  <path d="M760 435 L320 435" class="edge-db"/>
  <path d="M320 475 L760 475" class="edge-db"/>
  <path d="M1100 420 L690 420 L690 340 L320 340 L320 355" class="edge-db"/>
  <path d="M845 685 L680 685 L680 545 L320 545" class="edge-db"/>

  <path d="M1380 435 L1510 435" class="edge-ros"/>
  <path d="M1510 470 L1380 470" class="edge-ros"/>
  <path d="M1295 675 L1510 675" class="edge-ros"/>

  <path d="M940 760 L940 790" class="edge-delegate"/>
  <path d="M1200 760 L1200 790" class="edge-delegate"/>

  <path d="M200 725 L200 595" class="edge-db"/>
  <path d="M255 595 L255 725" class="edge-db"/>

  <text x="416" y="194" class="label">public API</text>
  <text x="700" y="198" class="label">queued signal / slot</text>
  <text x="855" y="332" class="label">state polling and routing</text>
  <text x="320" y="426" class="label">write state / load / unload</text>
  <text x="420" y="495" class="label">poll *_ui_event</text>
  <text x="675" y="332" class="label">device list query</text>
  <text x="560" y="537" class="label">path CRUD</text>
  <text x="1420" y="426" class="label">subscribe</text>
  <text x="1410" y="490" class="label">status backflow</text>
  <text x="1390" y="666" class="label">command channel</text>
  <text x="864" y="782" class="label">robot delegation</text>
  <text x="1142" y="782" class="label">AGV delegation</text>
  <text x="82" y="690" class="label">online / offline writeback</text>
  <text x="272" y="690" class="label">device_state_event poll</text>
</svg>
