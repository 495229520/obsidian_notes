<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 260" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <style>
      .step-num { font-size: 14px; font-weight: 800; fill: #fff; }
      .step-title { font-size: 14px; font-weight: 700; fill: #1a1a2e; }
      .step-label { font-size: 12px; fill: #2d3748; font-weight: 600; }
      .step-detail { font-size: 11px; fill: #555; }
      .step-cmd { font-size: 10px; fill: #2563eb; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; }
      .step-expect { font-size: 11px; fill: #059669; font-weight: 600; }
      .arrow-label { font-size: 12px; fill: #4a5568; font-weight: 500; }
    </style>
    <filter id="shadow" x="-5%" y="-5%" width="112%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.06"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f9fb"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <rect width="960" height="260" rx="8" fill="url(#bg)"/>

  <!-- ============ STEP 1 ============ -->
  <g filter="url(#shadow)">
    <rect x="30" y="20" width="260" height="200" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
    <!-- Step badge -->
    <circle cx="160" cy="44" r="16" fill="url(#g1)"/>
    <text x="160" y="49" text-anchor="middle" class="step-num">1</text>
    <!-- Title -->
    <text x="160" y="82" text-anchor="middle" class="step-title">落地机本地验证</text>
    <text x="160" y="100" text-anchor="middle" class="step-detail">绕过域名解析，直接测试服务</text>
    <!-- Content -->
    <rect x="48" y="112" width="224" height="26" rx="4" fill="#eff6ff"/>
    <text x="55" y="129" class="step-cmd">curl vk https://127.0.0.1:5443/dns-query</text>
    <!-- Expected -->
    <text x="55" y="162" class="step-label">预期结果:</text>
    <rect x="48" y="168" width="224" height="26" rx="4" fill="#ecfdf5"/>
    <text x="55" y="185" class="step-expect">HTTP/1.1 400 Bad Request</text>
    <!-- Description -->
    <text x="55" y="212" class="step-detail">DoH 服务已正常启动</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="300" y1="120" x2="350" y2="120" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#aw1)"/>
  <defs>
    <marker id="aw1" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M 0 0 L 8 3 L 0 6 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <text x="310" y="110" class="arrow-label">IP 直连验证</text>

  <!-- ============ STEP 2 ============ -->
  <g filter="url(#shadow)">
    <rect x="360" y="20" width="260" height="200" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="490" cy="44" r="16" fill="url(#g2)"/>
    <text x="490" y="49" text-anchor="middle" class="step-num">2</text>
    <text x="490" y="82" text-anchor="middle" class="step-title">中转机 → 落地机</text>
    <text x="490" y="100" text-anchor="middle" class="step-detail">验证端口转发链路</text>
    <rect x="378" y="112" width="224" height="26" rx="4" fill="#f5f3ff"/>
    <text x="385" y="129" class="step-cmd">curl -vk https://49.128.x.x:5443/dns-query</text>
    <text x="385" y="162" class="step-label">预期结果:</text>
    <rect x="378" y="168" width="224" height="26" rx="4" fill="#ecfdf5"/>
    <text x="385" y="185" class="step-expect">HTTP/1.1 400 Bad Request</text>
    <text x="385" y="212" class="step-detail">端口转发链路通畅</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="630" y1="120" x2="680" y2="120" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#aw2)"/>
  <defs>
    <marker id="aw2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M 0 0 L 8 3 L 0 6 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <text x="645" y="110" class="arrow-label">域名链路验证</text>

  <!-- ============ STEP 3 ============ -->
  <g filter="url(#shadow)">
    <rect x="690" y="20" width="260" height="200" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="820" cy="44" r="16" fill="url(#g3)"/>
    <text x="820" y="49" text-anchor="middle" class="step-num">3</text>
    <text x="820" y="82" text-anchor="middle" class="step-title">完整域名链路</text>
    <text x="820" y="100" text-anchor="middle" class="step-detail">验证端到端全链路</text>
    <rect x="708" y="112" width="224" height="26" rx="4" fill="#ecfdf5"/>
    <text x="715" y="129" class="step-cmd">curl -vk https://dns.xxx.uk:10012/dns-query</text>
    <text x="715" y="162" class="step-label">预期结果:</text>
    <rect x="708" y="168" width="224" height="26" rx="4" fill="#ecfdf5"/>
    <text x="715" y="185" class="step-expect">HTTP/1.1 400 Bad Request</text>
    <text x="715" y="212" class="step-detail">域名 + 中转 + 落地 全链路正常</text>
  </g>
</svg>
