<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; }
    </style>
  </defs>

  <!-- Title Bar -->
  <rect x="0" y="0" width="1100" height="55" rx="10" fill="#1a202c"/>
  <text x="550" y="35" text-anchor="middle" font-size="21" font-weight="bold" fill="white">C++ Thread Data Synchronization Mechanisms</text>

  <!-- Connector lines -->
  <line x1="185" y1="55" x2="185" y2="80" stroke="#718096" stroke-width="2"/>
  <line x1="550" y1="55" x2="550" y2="80" stroke="#718096" stroke-width="2"/>
  <line x1="910" y1="55" x2="910" y2="80" stroke="#718096" stroke-width="2"/>
  <line x1="185" y1="55" x2="910" y2="55" stroke="#718096" stroke-width="2" stroke-dasharray="0"/>

  <!-- ==================== Column 1: Blocking ==================== -->
  <rect x="10" y="80" width="350" height="35" rx="8" fill="#c53030"/>
  <text x="185" y="103" text-anchor="middle" font-size="15" font-weight="bold" fill="white">Blocking / Kernel-Level</text>
  <rect x="10" y="115" width="350" height="590" rx="0 0 8 8" fill="#fff5f5" stroke="#feb2b2" stroke-width="1.5"/>

  <!-- Mutex Family -->
  <rect x="20" y="125" width="330" height="140" rx="6" fill="white" stroke="#fecaca" stroke-width="1" filter="url(#shadow)"/>
  <text x="30" y="145" font-size="13" font-weight="bold" fill="#c53030">Mutex Family</text>
  <text x="30" y="165" font-size="12" fill="#555" font-family="Consolas, monospace">std::mutex</text>
  <text x="30" y="183" font-size="12" fill="#555" font-family="Consolas, monospace">std::recursive_mutex</text>
  <text x="30" y="201" font-size="12" fill="#555" font-family="Consolas, monospace">std::timed_mutex</text>
  <text x="30" y="219" font-size="12" fill="#555" font-family="Consolas, monospace">std::shared_mutex</text>
  <text x="230" y="219" font-size="10" fill="#888" font-style="italic">C++17</text>
  <text x="30" y="237" font-size="12" fill="#555" font-family="Consolas, monospace">std::shared_timed_mutex</text>
  <text x="270" y="237" font-size="10" fill="#888" font-style="italic">C++14</text>
  <text x="30" y="255" font-size="10" fill="#999">Exclusive / shared mutual exclusion</text>

  <!-- Condition Variables -->
  <rect x="20" y="275" width="330" height="90" rx="6" fill="white" stroke="#fecaca" stroke-width="1" filter="url(#shadow)"/>
  <text x="30" y="295" font-size="13" font-weight="bold" fill="#c53030">Condition Variables</text>
  <text x="30" y="315" font-size="12" fill="#555" font-family="Consolas, monospace">std::condition_variable</text>
  <text x="30" y="333" font-size="12" fill="#555" font-family="Consolas, monospace">std::condition_variable_any</text>
  <text x="30" y="353" font-size="10" fill="#999">Wait / notify thread coordination</text>

  <!-- Semaphores -->
  <rect x="20" y="375" width="330" height="90" rx="6" fill="white" stroke="#fecaca" stroke-width="1" filter="url(#shadow)"/>
  <text x="30" y="395" font-size="13" font-weight="bold" fill="#c53030">Semaphores</text>
  <text x="128" y="395" font-size="10" fill="#888" font-style="italic">C++20</text>
  <text x="30" y="415" font-size="12" fill="#555" font-family="Consolas, monospace">std::counting_semaphore&lt;N&gt;</text>
  <text x="30" y="433" font-size="12" fill="#555" font-family="Consolas, monospace">std::binary_semaphore</text>
  <text x="30" y="453" font-size="10" fill="#999">Count-based resource access control</text>

  <!-- Barriers & Latches -->
  <rect x="20" y="475" width="330" height="90" rx="6" fill="white" stroke="#fecaca" stroke-width="1" filter="url(#shadow)"/>
  <text x="30" y="495" font-size="13" font-weight="bold" fill="#c53030">Barriers &amp; Latches</text>
  <text x="175" y="495" font-size="10" fill="#888" font-style="italic">C++20</text>
  <text x="30" y="515" font-size="12" fill="#555" font-family="Consolas, monospace">std::latch</text>
  <text x="140" y="515" font-size="10" fill="#999">— one-shot countdown</text>
  <text x="30" y="533" font-size="12" fill="#555" font-family="Consolas, monospace">std::barrier</text>
  <text x="140" y="533" font-size="10" fill="#999">— reusable phase sync</text>
  <text x="30" y="553" font-size="10" fill="#999">Multi-thread phase synchronization</text>

  <!-- RAII Lock Wrappers -->
  <rect x="20" y="575" width="330" height="120" rx="6" fill="white" stroke="#fecaca" stroke-width="1" filter="url(#shadow)"/>
  <text x="30" y="595" font-size="13" font-weight="bold" fill="#c53030">RAII Lock Wrappers</text>
  <text x="30" y="615" font-size="12" fill="#555" font-family="Consolas, monospace">std::lock_guard&lt;M&gt;</text>
  <text x="230" y="615" font-size="10" fill="#999">simple scope</text>
  <text x="30" y="633" font-size="12" fill="#555" font-family="Consolas, monospace">std::unique_lock&lt;M&gt;</text>
  <text x="230" y="633" font-size="10" fill="#999">deferred/timed</text>
  <text x="30" y="651" font-size="12" fill="#555" font-family="Consolas, monospace">std::shared_lock&lt;M&gt;</text>
  <text x="230" y="651" font-size="10" fill="#888" font-style="italic">C++14</text>
  <text x="30" y="669" font-size="12" fill="#555" font-family="Consolas, monospace">std::scoped_lock&lt;M...&gt;</text>
  <text x="250" y="669" font-size="10" fill="#888" font-style="italic">C++17 deadlock-free</text>
  <text x="30" y="687" font-size="10" fill="#999">Exception-safe lock management</text>

  <!-- ==================== Column 2: Lock-Free ==================== -->
  <rect x="375" y="80" width="340" height="35" rx="8" fill="#2b6cb0"/>
  <text x="545" y="103" text-anchor="middle" font-size="15" font-weight="bold" fill="white">Lock-Free / User-Level</text>
  <rect x="375" y="115" width="340" height="590" rx="0 0 8 8" fill="#ebf8ff" stroke="#90cdf4" stroke-width="1.5"/>

  <!-- Atomic Operations -->
  <rect x="385" y="125" width="320" height="120" rx="6" fill="white" stroke="#bee3f8" stroke-width="1" filter="url(#shadow)"/>
  <text x="395" y="145" font-size="13" font-weight="bold" fill="#2b6cb0">Atomic Operations</text>
  <text x="395" y="165" font-size="12" fill="#555" font-family="Consolas, monospace">std::atomic&lt;T&gt;</text>
  <text x="395" y="183" font-size="12" fill="#555" font-family="Consolas, monospace">std::atomic_flag</text>
  <text x="530" y="183" font-size="10" fill="#999">— guaranteed lock-free</text>
  <text x="395" y="201" font-size="12" fill="#555" font-family="Consolas, monospace">std::atomic_ref&lt;T&gt;</text>
  <text x="550" y="201" font-size="10" fill="#888" font-style="italic">C++20</text>
  <text x="395" y="221" font-size="12" fill="#555" font-family="Consolas, monospace">std::atomic&lt;shared_ptr&gt;</text>
  <text x="605" y="221" font-size="10" fill="#888" font-style="italic">C++20</text>
  <text x="395" y="237" font-size="10" fill="#999">Hardware-level atomic read/modify/write</text>

  <!-- Memory Ordering -->
  <rect x="385" y="255" width="320" height="155" rx="6" fill="white" stroke="#bee3f8" stroke-width="1" filter="url(#shadow)"/>
  <text x="395" y="275" font-size="13" font-weight="bold" fill="#2b6cb0">Memory Ordering</text>
  <text x="395" y="295" font-size="12" fill="#555" font-family="Consolas, monospace">memory_order_relaxed</text>
  <text x="395" y="313" font-size="12" fill="#555" font-family="Consolas, monospace">memory_order_consume</text>
  <text x="590" y="313" font-size="10" fill="#aaa" font-style="italic">deprecated</text>
  <text x="395" y="331" font-size="12" fill="#555" font-family="Consolas, monospace">memory_order_acquire</text>
  <text x="395" y="349" font-size="12" fill="#555" font-family="Consolas, monospace">memory_order_release</text>
  <text x="395" y="367" font-size="12" fill="#555" font-family="Consolas, monospace">memory_order_acq_rel</text>
  <text x="395" y="385" font-size="12" fill="#555" font-family="Consolas, monospace">memory_order_seq_cst</text>
  <text x="560" y="385" font-size="10" fill="#999">— default</text>
  <text x="395" y="402" font-size="10" fill="#999">Controls instruction reordering &amp; visibility</text>

  <!-- CAS & Spinlock -->
  <rect x="385" y="420" width="320" height="110" rx="6" fill="white" stroke="#bee3f8" stroke-width="1" filter="url(#shadow)"/>
  <text x="395" y="440" font-size="13" font-weight="bold" fill="#2b6cb0">CAS &amp; Spinlock</text>
  <text x="395" y="460" font-size="12" fill="#555" font-family="Consolas, monospace">compare_exchange_strong</text>
  <text x="395" y="478" font-size="12" fill="#555" font-family="Consolas, monospace">compare_exchange_weak</text>
  <text x="395" y="496" font-size="12" fill="#555" font-family="Consolas, monospace">fetch_add / fetch_sub / ...</text>
  <text x="395" y="514" font-size="12" fill="#555" font-family="Consolas, monospace">Custom spinlock</text>
  <text x="530" y="514" font-size="10" fill="#999">via atomic_flag</text>
  <text x="395" y="523" font-size="10" fill="#999"></text>

  <!-- ==================== Column 3: High-Level ==================== -->
  <rect x="730" y="80" width="360" height="35" rx="8" fill="#276749"/>
  <text x="910" y="103" text-anchor="middle" font-size="15" font-weight="bold" fill="white">High-Level Abstractions</text>
  <rect x="730" y="115" width="360" height="590" rx="0 0 8 8" fill="#f0fff4" stroke="#9ae6b4" stroke-width="1.5"/>

  <!-- Future / Promise / Async -->
  <rect x="740" y="125" width="340" height="140" rx="6" fill="white" stroke="#c6f6d5" stroke-width="1" filter="url(#shadow)"/>
  <text x="750" y="145" font-size="13" font-weight="bold" fill="#276749">Future / Promise / Async</text>
  <text x="750" y="165" font-size="12" fill="#555" font-family="Consolas, monospace">std::future&lt;T&gt;</text>
  <text x="750" y="183" font-size="12" fill="#555" font-family="Consolas, monospace">std::shared_future&lt;T&gt;</text>
  <text x="750" y="201" font-size="12" fill="#555" font-family="Consolas, monospace">std::promise&lt;T&gt;</text>
  <text x="750" y="219" font-size="12" fill="#555" font-family="Consolas, monospace">std::async(policy, fn, args...)</text>
  <text x="750" y="237" font-size="12" fill="#555" font-family="Consolas, monospace">std::packaged_task&lt;F&gt;</text>
  <text x="750" y="257" font-size="10" fill="#999">One-time async result passing</text>

  <!-- One-Time Initialization -->
  <rect x="740" y="275" width="340" height="85" rx="6" fill="white" stroke="#c6f6d5" stroke-width="1" filter="url(#shadow)"/>
  <text x="750" y="295" font-size="13" font-weight="bold" fill="#276749">One-Time Initialization</text>
  <text x="750" y="315" font-size="12" fill="#555" font-family="Consolas, monospace">std::call_once(flag, fn)</text>
  <text x="750" y="333" font-size="12" fill="#555" font-family="Consolas, monospace">std::once_flag</text>
  <text x="750" y="350" font-size="10" fill="#999">Thread-safe lazy / singleton init</text>

  <!-- Thread-Local Storage -->
  <rect x="740" y="370" width="340" height="70" rx="6" fill="white" stroke="#c6f6d5" stroke-width="1" filter="url(#shadow)"/>
  <text x="750" y="390" font-size="13" font-weight="bold" fill="#276749">Thread-Local Storage</text>
  <text x="750" y="410" font-size="12" fill="#555" font-family="Consolas, monospace">thread_local T variable;</text>
  <text x="750" y="430" font-size="10" fill="#999">Per-thread data isolation — no sharing</text>

  <!-- Legend / Notes -->
  <rect x="740" y="460" width="340" height="95" rx="6" fill="#e2e8f0" stroke="#a0aec0" stroke-width="1"/>
  <text x="750" y="480" font-size="12" font-weight="bold" fill="#4a5568">Standard Coverage:</text>
  <circle cx="758" cy="498" r="5" fill="#c53030"/> <text x="770" y="502" font-size="11" fill="#555">C++11 — mutex, atomic, future, CV</text>
  <circle cx="758" cy="518" r="5" fill="#d69e2e"/> <text x="770" y="522" font-size="11" fill="#555">C++14/17 — shared_mutex, scoped_lock</text>
  <circle cx="758" cy="538" r="5" fill="#2b6cb0"/> <text x="770" y="542" font-size="11" fill="#555">C++20 — semaphore, latch, barrier</text>

  <!-- Bottom Performance Spectrum Bar -->
  <rect x="0" y="715" width="1100" height="5" rx="2" fill="url(#spectrumGrad)"/>
  <defs>
    <linearGradient id="spectrumGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c53030;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#d69e2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2b6cb0;stop-opacity:1"/>
    </linearGradient>
  </defs>
</svg>