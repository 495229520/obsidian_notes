<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 1100" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <style>
      .title { font-size: 16px; font-weight: 700; fill: #1a1a2e; }
      .node-text { font-size: 12px; fill: #1a1a2e; font-weight: 600; }
      .node-sub { font-size: 10px; fill: #555; }
      .arrow-text { font-size: 10px; fill: #4a5568; }
      .branch-yes { font-size: 11px; fill: #059669; font-weight: 600; }
      .branch-no { font-size: 11px; fill: #dc2626; font-weight: 600; }
    </style>
    <filter id="shadow" x="-5%" y="-3%" width="115%" height="110%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="3" flood-opacity="0.07"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <path d="M 0 0 L 8 3.5 L 0 7 Z" fill="#64748b"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <path d="M 0 0 L 8 3.5 L 0 7 Z" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="640" height="1100" rx="8" fill="#f8f9fb"/>
  <text x="320" y="32" text-anchor="middle" class="title">DoH 请求完整流程图</text>

  <!-- Step 1: 客户端发起 DNS 查询 -->
  <g filter="url(#shadow)">
    <rect x="180" y="50" width="280" height="48" rx="8" fill="#e1f5fe" stroke="#81d4fa" stroke-width="1.5"/>
  </g>
  <text x="320" y="70" text-anchor="middle" class="node-text">客户端发起 DNS 查询</text>
  <text x="320" y="86" text-anchor="middle" class="node-sub">用户访问网页, 系统需要解析域名</text>
  <line x1="320" y1="98" x2="320" y2="122" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: v2rayN 构造 DoH 请求 -->
  <g filter="url(#shadow)">
    <rect x="180" y="125" width="280" height="48" rx="8" fill="#e1f5fe" stroke="#81d4fa" stroke-width="1.5"/>
  </g>
  <text x="320" y="145" text-anchor="middle" class="node-text">v2rayN 构造 DoH 请求</text>
  <text x="320" y="161" text-anchor="middle" class="node-sub">DNS 查询编码为 HTTPS 格式</text>
  <line x1="320" y1="173" x2="320" y2="197" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3: HTTPS 加密 -->
  <g filter="url(#shadow)">
    <rect x="180" y="200" width="280" height="48" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="1.5"/>
  </g>
  <text x="320" y="220" text-anchor="middle" class="node-text">HTTPS 加密封装</text>
  <text x="320" y="236" text-anchor="middle" class="node-sub">目标: dns.httpcyiwenapi.uk:10012</text>
  <line x1="320" y1="248" x2="320" y2="272" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4: 域名解析 -->
  <g filter="url(#shadow)">
    <rect x="180" y="275" width="280" height="48" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="1.5"/>
  </g>
  <text x="320" y="295" text-anchor="middle" class="node-text">域名解析</text>
  <text x="320" y="311" text-anchor="middle" class="node-sub">dns.httpcyiwenapi.uk → 80.66.196.57</text>
  <line x1="320" y1="323" x2="320" y2="347" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 5: 中转机 S-UI 接收 -->
  <g filter="url(#shadow)">
    <rect x="180" y="350" width="280" height="48" rx="8" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1.5"/>
  </g>
  <text x="320" y="370" text-anchor="middle" class="node-text">中转机 S-UI 接收 TCP 连接</text>
  <text x="320" y="386" text-anchor="middle" class="node-sub">监听端口 10012, TCP 透明转发</text>
  <line x1="320" y1="398" x2="320" y2="422" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 6: 端口转发 -->
  <g filter="url(#shadow)">
    <rect x="180" y="425" width="280" height="48" rx="8" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1.5"/>
  </g>
  <text x="320" y="445" text-anchor="middle" class="node-text">端口转发</text>
  <text x="320" y="461" text-anchor="middle" class="node-sub">80.66.196.57:10012 → 49.128.204.246:5443</text>
  <line x1="320" y1="473" x2="320" y2="497" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 7: 落地机 Docker 转发 -->
  <g filter="url(#shadow)">
    <rect x="180" y="500" width="280" height="48" rx="8" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5"/>
  </g>
  <text x="320" y="520" text-anchor="middle" class="node-text">落地机 Docker 转发到容器 443</text>
  <text x="320" y="536" text-anchor="middle" class="node-sub">宿主机 :5443 → 容器 :443</text>
  <line x1="320" y1="548" x2="320" y2="572" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 8: TLS 握手 (Decision) -->
  <g filter="url(#shadow)">
    <rect x="180" y="575" width="280" height="48" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="1.5"/>
  </g>
  <text x="320" y="595" text-anchor="middle" class="node-text">AdGuard Home TLS 握手</text>
  <text x="320" y="611" text-anchor="middle" class="node-sub">验证证书: dns.httpcyiwenapi.uk</text>
  <line x1="320" y1="623" x2="320" y2="647" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 9: Bootstrap DNS 决策 -->
  <g filter="url(#shadow)">
    <rect x="180" y="650" width="280" height="60" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5"/>
  </g>
  <text x="320" y="673" text-anchor="middle" class="node-text">Bootstrap DNS 解析域名?</text>
  <text x="320" y="690" text-anchor="middle" class="node-sub">是否需要先解析 upstream DNS 域名</text>

  <!-- Branch: 已缓存 (right) -->
  <line x1="460" y1="680" x2="530" y2="680" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="545" y="675" class="branch-yes">已缓存</text>

  <!-- Branch: 未缓存 (left) -->
  <line x1="180" y1="680" x2="110" y2="680" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="25" y="675" class="branch-no">未缓存</text>

  <!-- Right branch: skip -->
  <g filter="url(#shadow)">
    <rect x="530" y="656" width="90" height="48" rx="8" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5"/>
  </g>
  <text x="575" y="676" text-anchor="middle" style="font-size:12px;fill:#059669;font-weight:600">跳过</text>
  <text x="575" y="692" text-anchor="middle" style="font-size:9px;fill:#666">直接用 IP</text>
  <!-- Right branch curves down to merge -->
  <path d="M 575 704 L 575 740 L 320 740" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>

  <!-- Left branch: 1.1.1.1 IP 直连 -->
  <g filter="url(#shadow)">
    <rect x="15" y="656" width="90" height="48" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  </g>
  <text x="60" y="676" text-anchor="middle" style="font-size:12px;fill:#2563eb;font-weight:600">1.1.1.1</text>
  <text x="60" y="692" text-anchor="middle" style="font-size:9px;fill:#666">IP 直连</text>
  <!-- Left branch curves down to merge -->
  <path d="M 60 704 L 60 740 L 320 740" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- Merge point at 320, 745 -->

  <!-- Step 10: 上游 DoH 转发 -->
  <g filter="url(#shadow)">
    <rect x="180" y="750" width="280" height="48" rx="8" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1.5"/>
  </g>
  <text x="320" y="770" text-anchor="middle" class="node-text">上游 DoH 转发</text>
  <text x="320" y="786" text-anchor="middle" class="node-sub">https://1.1.1.1/dns-query 递归查询</text>
  <line x1="320" y1="798" x2="320" y2="822" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 11: 获取 DNS 响应 -->
  <g filter="url(#shadow)">
    <rect x="180" y="825" width="280" height="48" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1.5"/>
  </g>
  <text x="320" y="845" text-anchor="middle" class="node-text">获取 DNS 响应</text>
  <text x="320" y="861" text-anchor="middle" class="node-sub">1.1.1.1 返回真实解析结果</text>
  <line x1="320" y1="873" x2="320" y2="897" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 12: 缓存结果 -->
  <g filter="url(#shadow)">
    <rect x="180" y="900" width="280" height="48" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5"/>
  </g>
  <text x="320" y="920" text-anchor="middle" class="node-text">AdGuard Home 缓存结果</text>
  <text x="320" y="936" text-anchor="middle" class="node-sub">TTL 内命中则不再查询上游</text>
  <line x1="320" y1="948" x2="320" y2="972" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 13: TLS 加密返回 -->
  <g filter="url(#shadow)">
    <rect x="180" y="975" width="280" height="48" rx="8" fill="#fce4ec" stroke="#f48fb1" stroke-width="1.5"/>
  </g>
  <text x="320" y="995" text-anchor="middle" class="node-text">TLS 加密返回给客户端</text>
  <text x="320" y="1011" text-anchor="middle" class="node-sub">沿原链路反向返回 DNS 响应</text>
  <line x1="320" y1="1023" x2="320" y2="1047" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 14: 客户端解析域名 -->
  <g filter="url(#shadow)">
    <rect x="180" y="1050" width="280" height="48" rx="8" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="2"/>
  </g>
  <text x="320" y="1070" text-anchor="middle" class="node-text">客户端解析域名完成</text>
  <text x="320" y="1086" text-anchor="middle" class="node-sub" fill="#059669">获取到目标域名 IP 地址</text>

  <!-- Return arrow: from cache back up -->
  <text x="470" y="920" style="font-size:9px;fill:#10b981;font-weight:500" transform="rotate(-90, 470, 920)">下次查询命中缓存则跳过上游</text>
</svg>
