<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" width="100%" height="100%">
  <defs>
    <style>
      text {
        font-family: system-ui, -apple-system, sans-serif;
      }
    </style>
  </defs>

  <rect x="20" y="20" width="860" height="500" rx="16" fill="#F1F1FB" stroke="#AEACE0" stroke-width="1.5" />
  
  <text x="50" y="65" font-size="22" font-weight="600" fill="#3D327B">系统提示词</text>
  <text x="50" y="90" font-size="16" fill="#6961CD">在任何用户消息之前发送一次</text>

  <g>
    <rect x="50" y="115" width="800" height="80" rx="8" fill="#F1EFEB" stroke="#B3AFA5" stroke-width="1.5" />
    
    <text x="80" y="150" font-size="20" font-weight="600" fill="#444444">角色设定 + 行为边界</text>
    <text x="80" y="178" font-size="16" fill="#666666">Agent 是谁，绝对不能做什么，语气，语言</text>
    
    <text x="825" y="152" text-anchor="end" font-size="16" fill="#888888">第 1 层</text>
  </g>

  <g>
    <rect x="50" y="210" width="800" height="95" rx="8" fill="#E4F5ED" stroke="#85BEA1" stroke-width="1.5" />
    
    <text x="80" y="245" font-size="20" font-weight="600" fill="#114F33">工具清单</text>
    <text x="80" y="273" font-size="16" fill="#177D51">名称、描述、输入模式 —— 模型可以调用什么</text>
    <text x="80" y="295" font-size="16" fill="#177D51">糟糕的描述 = 错误的工具调用或幻觉化的工具名称</text>
    
    <text x="825" y="258" text-anchor="end" font-size="16" fill="#508269">第 2 层</text>
  </g>

  <g>
    <rect x="50" y="320" width="800" height="95" rx="8" fill="#FBF0E1" stroke="#CCA373" stroke-width="1.5" />
    
    <text x="80" y="355" font-size="20" font-weight="600" fill="#5A3105">循环终止条件</text>
    <text x="80" y="383" font-size="16" fill="#9A601B">何时输出 final_answer (最终答案) vs. 继续调用工具</text>
    <text x="80" y="405" font-size="16" fill="#9A601B">最大步数、置信度阈值、明确的停止信号</text>
    
    <text x="825" y="368" text-anchor="end" font-size="16" fill="#7C5F3F">第 3 层</text>
  </g>

  <g>
    <rect x="50" y="430" width="800" height="75" rx="8" fill="#FCEEEB" stroke="#D49D94" stroke-width="1.5" />
    
    <text x="80" y="465" font-size="20" font-weight="600" fill="#632115">安全 + 信任边界</text>
    <text x="80" y="491" font-size="16" fill="#A84230">Agent 可以读/写什么数据，哪些工具需要确认</text>
    
    <text x="825" y="468" text-anchor="end" font-size="16" fill="#8E574F">第 4 层</text>
  </g>

</svg>
