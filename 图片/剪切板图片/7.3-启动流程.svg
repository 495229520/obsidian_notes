<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 520" width="500" height="520">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="500" height="520" fill="#fafafa"/>

  <!-- 开始节点 -->
  <ellipse cx="250" cy="50" rx="70" ry="25" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="250" y="55" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#2f5e2f">程序启动</text>

  <!-- 箭头到判断 -->
  <line x1="250" y1="75" x2="250" y2="100" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 判断节点（菱形）-->
  <polygon points="250,115 320,155 250,195 180,155" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="250" y="150" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#744c00">CEdoyunTool::</text>
  <text x="250" y="165" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#744c00">IsAdmin</text>

  <!-- 是分支 -->
  <line x1="215" y1="135" x2="120" y2="100" stroke="#666" stroke-width="1.5"/>
  <line x1="120" y1="100" x2="120" y2="220" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="140" y="115" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#38a169" font-weight="bold">是</text>

  <!-- 否分支 -->
  <line x1="285" y1="135" x2="380" y2="100" stroke="#666" stroke-width="1.5"/>
  <line x1="380" y1="100" x2="380" y2="400" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="360" y="115" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#e53e3e" font-weight="bold">否</text>

  <!-- 是分支节点 -->
  <rect x="35" y="220" width="170" height="45" rx="4" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="120" y="240" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#1a365d">CEdoyunTool::Init</text>
  <text x="120" y="255" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#4a5568">(MFC初始化)</text>

  <line x1="120" y1="265" x2="120" y2="290" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="35" y="290" width="170" height="45" rx="4" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="120" y="315" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#1a365d">ChooseAutoInvoke</text>
  <text x="120" y="330" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#4a5568">(自启动策略)</text>

  <line x1="120" y1="335" x2="120" y2="360" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="20" y="360" width="200" height="50" rx="4" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
  <text x="120" y="380" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#553c5c">CServerSocket::Run</text>
  <text x="120" y="398" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#553c5c">(启动网络服务)</text>

  <!-- 否分支节点 -->
  <rect x="295" y="400" width="170" height="45" rx="4" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="380" y="420" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#742a2a">CEdoyunTool::</text>
  <text x="380" y="435" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#742a2a">RunAsAdmin</text>

  <line x1="380" y1="445" x2="380" y2="470" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 结束节点（否分支）-->
  <ellipse cx="380" cy="495" rx="80" ry="25" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="380" y="500" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" fill="#742a2a">当前进程退出</text>

  <!-- 合并回主流程的说明 -->
  <text x="250" y="475" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#666" font-style="italic">管理员进程继续运行</text>
</svg>