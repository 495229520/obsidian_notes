<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <style>
      .title { font-size: 16px; font-weight: 700; fill: #1a1a2e; }
      .phase-num { font-size: 11px; font-weight: 700; fill: #fff; }
      .phase-title { font-size: 13px; font-weight: 700; fill: #1a1a2e; }
      .phase-desc { font-size: 10px; fill: #555; }
      .conn { font-size: 11px; fill: #64748b; font-weight: 500; }
    </style>
    <filter id="shadow" x="-3%" y="-3%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="3" flood-opacity="0.06"/>
    </filter>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e1f5fe"/>
      <stop offset="100%" stop-color="#b3e5fc"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#ffe0b2"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3e5f5"/>
      <stop offset="100%" stop-color="#e1bee7"/>
    </linearGradient>
    <linearGradient id="g5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0288d1"/>
      <stop offset="100%" stop-color="#01579b"/>
    </linearGradient>
    <marker id="arrow-r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M 0 0 L 8 3 L 0 6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="420" rx="8" fill="#f8f9fb"/>
  <text x="500" y="30" text-anchor="middle" class="title">DoH 基础设施演进路线图</text>

  <!-- Main arrow line -->
  <line x1="160" y1="180" x2="960" y2="180" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="160" y1="180" x2="960" y2="180" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="0" marker-end="url(#arrow-r)"/>

  <!-- ============ PHASE 1 ============ -->
  <g filter="url(#shadow)">
    <rect x="30" y="55" width="170" height="220" rx="10" fill="url(#g1)" stroke="#81d4fa" stroke-width="1.5"/>
  </g>
  <circle cx="115" cy="80" r="14" fill="#81d4fa"/>
  <text x="115" y="85" text-anchor="middle" class="phase-num">1</text>
  <text x="115" y="115" text-anchor="middle" class="phase-title">基础 DoH</text>

  <rect x="44" y="125" width="142" height="130" rx="6" fill="#fff"/>
  <text x="52" y="145" class="phase-desc" font-weight="600">核心能力：</text>
  <text x="52" y="165" class="phase-desc">• AdGuard Home 部署</text>
  <text x="52" y="183" class="phase-desc">• Let's Encrypt TLS</text>
  <text x="52" y="201" class="phase-desc">• 多跳链路(中转+落地)</text>
  <text x="52" y="219" class="phase-desc">• 客户端接入(v2rayN)</text>
  <text x="52" y="237" class="phase-desc">• 上游 DoH 转发</text>

  <!-- Arrow -->
  <line x1="200" y1="165" x2="225" y2="165" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-r)"/>

  <!-- ============ PHASE 2 ============ -->
  <g filter="url(#shadow)">
    <rect x="225" y="55" width="170" height="220" rx="10" fill="url(#g2)" stroke="#66bb6a" stroke-width="1.5"/>
  </g>
  <circle cx="310" cy="80" r="14" fill="#66bb6a"/>
  <text x="310" y="85" text-anchor="middle" class="phase-num">2</text>
  <text x="310" y="115" text-anchor="middle" class="phase-title">DNS 分流</text>

  <rect x="239" y="125" width="142" height="130" rx="6" fill="#fff"/>
  <text x="247" y="145" class="phase-desc" font-weight="600">核心能力：</text>
  <text x="247" y="165" class="phase-desc">• 国内 → 223.5.5.5</text>
  <text x="247" y="183" class="phase-desc">• 国外 → DoH 上游</text>
  <text x="247" y="201" class="phase-desc">• ECS 子网优化</text>
  <text x="247" y="219" class="phase-desc">• CDN 就近解析</text>
  <text x="247" y="237" class="phase-desc">• 智能路由策略</text>

  <!-- Arrow -->
  <line x1="395" y1="165" x2="420" y2="165" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-r)"/>

  <!-- ============ PHASE 3 ============ -->
  <g filter="url(#shadow)">
    <rect x="420" y="55" width="170" height="220" rx="10" fill="url(#g3)" stroke="#ffa726" stroke-width="1.5"/>
  </g>
  <circle cx="505" cy="80" r="14" fill="#ffa726"/>
  <text x="505" y="85" text-anchor="middle" class="phase-num">3</text>
  <text x="505" y="115" text-anchor="middle" class="phase-title">代理 DNS 一体化</text>

  <rect x="434" y="125" width="142" height="130" rx="6" fill="#fff"/>
  <text x="442" y="145" class="phase-desc" font-weight="600">核心能力：</text>
  <text x="442" y="165" class="phase-desc">• sing-box + DoH 整合</text>
  <text x="442" y="183" class="phase-desc">• FakeIP + TUN 模式</text>
  <text x="442" y="201" class="phase-desc">• 透明代理</text>
  <text x="442" y="219" class="phase-desc">• DNS 泄漏防护</text>
  <text x="442" y="237" class="phase-desc">• 路由策略统一管理</text>

  <!-- Arrow -->
  <line x1="590" y1="165" x2="615" y2="165" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-r)"/>

  <!-- ============ PHASE 4 ============ -->
  <g filter="url(#shadow)">
    <rect x="615" y="55" width="170" height="220" rx="10" fill="url(#g4)" stroke="#ab47bc" stroke-width="1.5"/>
  </g>
  <circle cx="700" cy="80" r="14" fill="#ab47bc"/>
  <text x="700" y="85" text-anchor="middle" class="phase-num">4</text>
  <text x="700" y="115" text-anchor="middle" class="phase-title">企业 DNS 网关</text>

  <rect x="629" y="125" width="142" height="130" rx="6" fill="#fff"/>
  <text x="637" y="145" class="phase-desc" font-weight="600">核心能力：</text>
  <text x="637" y="165" class="phase-desc">• 黑名单 / 白名单</text>
  <text x="637" y="183" class="phase-desc">• 审计日志</text>
  <text x="637" y="201" class="phase-desc">• 访问控制 &amp; 权限</text>
  <text x="637" y="219" class="phase-desc">• C2 / 恶意域名阻断</text>
  <text x="637" y="237" class="phase-desc">• 内网私有解析</text>

  <!-- Arrow -->
  <line x1="785" y1="165" x2="810" y2="165" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-r)"/>

  <!-- ============ PHASE 5 ============ -->
  <g filter="url(#shadow)">
    <rect x="810" y="55" width="170" height="220" rx="10" fill="url(#g5)" stroke="#0277bd" stroke-width="1.5"/>
  </g>
  <circle cx="895" cy="80" r="14" fill="#fff"/>
  <text x="895" y="85" text-anchor="middle" style="font-size:11px;font-weight:700;fill:#01579b">5</text>
  <text x="895" y="115" text-anchor="middle" style="font-size:13px;font-weight:700;fill:#fff">AI Agent 网络层</text>

  <rect x="824" y="125" width="142" height="130" rx="6" fill="#e3f2fd"/>
  <text x="832" y="145" class="phase-desc" font-weight="600">核心能力：</text>
  <text x="832" y="165" class="phase-desc">• Agent → DNS → Proxy</text>
  <text x="832" y="183" class="phase-desc">• 全局网络入口控制</text>
  <text x="832" y="201" class="phase-desc">• 多节点 GeoDNS</text>
  <text x="832" y="219" class="phase-desc">• 策略路由 &amp; 重写</text>
  <text x="832" y="237" class="phase-desc">• 安全监控</text>

  <!-- ============ Capability summary below ============ -->
  <rect x="30" y="300" width="940" height="90" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="50" y="322" font-size="12" font-weight="700" fill="#1a1a2e">技术栈定位</text>

  <rect x="50" y="332" width="80" height="18" rx="4" fill="#e1f5fe"/>
  <text x="90" y="345" text-anchor="middle" style="font-size:10px;fill:#0288d1;font-weight:500">DNS Infra</text>

  <rect x="140" y="332" width="90" height="18" rx="4" fill="#e8f5e9"/>
  <text x="185" y="345" text-anchor="middle" style="font-size:10px;fill:#059669;font-weight:500">Secure DNS</text>

  <rect x="240" y="332" width="80" height="18" rx="4" fill="#fff3e0"/>
  <text x="280" y="345" text-anchor="middle" style="font-size:10px;fill:#e65100;font-weight:500">Proxy</text>

  <rect x="330" y="332" width="90" height="18" rx="4" fill="#f3e5f5"/>
  <text x="375" y="345" text-anchor="middle" style="font-size:10px;fill:#7b1fa2;font-weight:500">Edge Routing</text>

  <rect x="430" y="332" width="100" height="18" rx="4" fill="#e0e7ff"/>
  <text x="480" y="345" text-anchor="middle" style="font-size:10px;fill:#283593;font-weight:500">Security Infra</text>

  <rect x="540" y="332" width="90" height="18" rx="4" fill="#fce4ec"/>
  <text x="585" y="345" text-anchor="middle" style="font-size:10px;fill:#c62828;font-weight:500">Agent Infra</text>

  <text x="50" y="375" style="font-size:10px;fill:#666">对标产品: Cloudflare DNS (1.1.1.1) · NextDNS · AdGuard DNS · Google Public DNS · Enterprise Secure Web Gateway</text>
</svg>
