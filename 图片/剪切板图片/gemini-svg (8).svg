<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="currentColor" stroke-opacity="0.6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="40" y="30" fill="currentColor" opacity="0.8" font-size="13" font-weight="500">1 · 分词输入 (Tokenize input)</text>
  
  <g transform="translate(40, 45)">
    <rect x="0" y="0" width="52" height="32" rx="6" fill="#F4F4F5" stroke="#D4D4D8" stroke-width="1"/>
    <text x="26" y="16" text-anchor="middle" dominant-baseline="central" fill="#27272A" font-size="14">The</text>
    
    <rect x="60" y="0" width="52" height="32" rx="6" fill="#F4F4F5" stroke="#D4D4D8" stroke-width="1"/>
    <text x="86" y="16" text-anchor="middle" dominant-baseline="central" fill="#27272A" font-size="14">cat</text>
    
    <rect x="120" y="0" width="52" height="32" rx="6" fill="#F4F4F5" stroke="#D4D4D8" stroke-width="1"/>
    <text x="146" y="16" text-anchor="middle" dominant-baseline="central" fill="#27272A" font-size="14">sat</text>
    
    <rect x="180" y="0" width="52" height="32" rx="6" fill="#F4F4F5" stroke="#D4D4D8" stroke-width="1"/>
    <text x="206" y="16" text-anchor="middle" dominant-baseline="central" fill="#27272A" font-size="14">on</text>
    
    <rect x="240" y="0" width="52" height="32" rx="6" fill="#F4F4F5" stroke="#D4D4D8" stroke-width="1"/>
    <text x="266" y="16" text-anchor="middle" dominant-baseline="central" fill="#27272A" font-size="14">the</text>
  </g>

  <line x1="340" y1="61" x2="390" y2="61" marker-end="url(#arrow)" stroke="currentColor" stroke-opacity="0.6" stroke-width="1.5"/>

  <rect x="400" y="41" width="240" height="40" rx="8" fill="#EEEDFE" stroke="#6366F1" stroke-width="1"/>
  <text x="520" y="61" text-anchor="middle" dominant-baseline="central" fill="#4338CA" font-size="14" font-weight="600">Transformer 层 (Attention + FFN)</text>

  <line x1="520" y1="86" x2="520" y2="125" marker-end="url(#arrow)" stroke="currentColor" stroke-opacity="0.6" stroke-width="1.5"/>

  <text x="40" y="145" fill="currentColor" opacity="0.8" font-size="13" font-weight="500">2 · 计算 Logits — 词表中每个词对应一个分数 (约 100k tokens)</text>
  
  <rect x="40" y="160" width="600" height="20" rx="4" fill="none" stroke="currentColor" stroke-opacity="0.2" stroke-width="1"/>
  
  <rect x="40" y="160" width="3" height="20" rx="1" fill="#A78BFA" opacity="0.4"/>
  <rect x="44" y="160" width="2" height="20" rx="1" fill="#A78BFA" opacity="0.3"/>
  <rect x="120" y="160" width="4" height="20" rx="1" fill="#A78BFA" opacity="0.5"/>
  <rect x="210" y="160" width="6" height="20" rx="1" fill="#A78BFA" opacity="0.6"/>
  <rect x="300" y="160" width="12" height="20" rx="1" fill="#8B5CF6" opacity="0.8"/>
  <rect x="330" y="160" width="20" height="20" rx="1" fill="#6D28D9" opacity="0.9"/>
  <rect x="370" y="160" width="8" height="20" rx="1" fill="#8B5CF6" opacity="0.7"/>
  <rect x="450" y="160" width="3" height="20" rx="1" fill="#A78BFA" opacity="0.4"/>
  <rect x="530" y="160" width="5" height="20" rx="1" fill="#A78BFA" opacity="0.5"/>
  <rect x="580" y="160" width="4" height="20" rx="1" fill="#A78BFA" opacity="0.3"/>
  
  <text x="340" y="198" text-anchor="middle" fill="currentColor" opacity="0.6" font-size="12">← 每个可能的下一个 token 的原始分数 (raw score) →</text>

  <line x1="340" y1="210" x2="340" y2="240" marker-end="url(#arrow)" stroke="currentColor" stroke-opacity="0.6" stroke-width="1.5"/>

  <text x="40" y="260" fill="currentColor" opacity="0.8" font-size="13" font-weight="500">3 · Softmax → 概率分布 (Probability distribution)</text>
  
  <g transform="translate(40, 275)">
    <rect x="0" y="0" width="180" height="40" rx="6" fill="#EEEDFE" stroke="#6366F1" stroke-width="1"/>
    <rect x="0" y="0" width="75" height="40" rx="6" fill="#6366F1" opacity="0.2"/>
    <text x="15" y="20" dominant-baseline="central" fill="#4338CA" font-size="15" font-weight="600">"mat"</text>
    <text x="165" y="20" text-anchor="end" dominant-baseline="central" fill="#4338CA" font-size="13" font-weight="500">42%</text>

    <rect x="195" y="0" width="130" height="40" rx="6" fill="#EEEDFE" stroke="#818CF8" stroke-width="1"/>
    <rect x="195" y="0" width="36" height="40" rx="6" fill="#6366F1" opacity="0.12"/>
    <text x="210" y="20" dominant-baseline="central" fill="#4F46E5" font-size="14" font-weight="500">"floor"</text>
    <text x="310" y="20" text-anchor="end" dominant-baseline="central" fill="#4F46E5" font-size="13">28%</text>

    <rect x="340" y="0" width="90" height="40" rx="6" fill="#F4F4F5" stroke="#D4D4D8" stroke-width="1"/>
    <text x="355" y="20" dominant-baseline="central" fill="#3F3F46" font-size="14" font-weight="500">"roof"</text>
    <text x="415" y="20" text-anchor="end" dominant-baseline="central" fill="#52525B" font-size="13">11%</text>

    <rect x="445" y="0" width="80" height="40" rx="6" fill="#F4F4F5" stroke="#D4D4D8" stroke-width="1"/>
    <text x="460" y="20" dominant-baseline="central" fill="#3F3F46" font-size="14" font-weight="500">"a"</text>
    <text x="510" y="20" text-anchor="end" dominant-baseline="central" fill="#52525B" font-size="13">7%</text>

    <text x="540" y="20" dominant-baseline="central" fill="currentColor" opacity="0.6" font-size="13">… +99k</text>
  </g>

  <line x1="340" y1="325" x2="340" y2="355" marker-end="url(#arrow)" stroke="currentColor" stroke-opacity="0.6" stroke-width="1.5"/>

  <text x="40" y="375" fill="currentColor" opacity="0.8" font-size="13" font-weight="500">4 · 采样一个 token (Temperature / Top-p 控制随机性)</text>
  
  <rect x="280" y="390" width="120" height="40" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="340" y="410" text-anchor="middle" dominant-baseline="central" fill="#92400E" font-size="16" font-weight="600">"mat" ✓</text>

  <line x1="340" y1="440" x2="340" y2="470" marker-end="url(#arrow)" stroke="currentColor" stroke-opacity="0.6" stroke-width="1.5"/>

  <text x="40" y="490" fill="currentColor" opacity="0.8" font-size="13" font-weight="500">5 · 追加到上下文 → 重复生成下一个 token</text>
  
  <g transform="translate(40, 505)">
    <rect x="0" y="0" width="52" height="32" rx="6" fill="#F4F4F5" stroke="#D4D4D8" stroke-width="1"/>
    <text x="26" y="16" text-anchor="middle" dominant-baseline="central" fill="#27272A" font-size="14">The</text>
    
    <rect x="60" y="0" width="52" height="32" rx="6" fill="#F4F4F5" stroke="#D4D4D8" stroke-width="1"/>
    <text x="86" y="16" text-anchor="middle" dominant-baseline="central" fill="#27272A" font-size="14">cat</text>
    
    <rect x="120" y="0" width="52" height="32" rx="6" fill="#F4F4F5" stroke="#D4D4D8" stroke-width="1"/>
    <text x="146" y="16" text-anchor="middle" dominant-baseline="central" fill="#27272A" font-size="14">sat</text>
    
    <rect x="180" y="0" width="52" height="32" rx="6" fill="#F4F4F5" stroke="#D4D4D8" stroke-width="1"/>
    <text x="206" y="16" text-anchor="middle" dominant-baseline="central" fill="#27272A" font-size="14">on</text>
    
    <rect x="240" y="0" width="52" height="32" rx="6" fill="#F4F4F5" stroke="#D4D4D8" stroke-width="1"/>
    <text x="266" y="16" text-anchor="middle" dominant-baseline="central" fill="#27272A" font-size="14">the</text>

    <rect x="300" y="0" width="52" height="32" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="326" y="16" text-anchor="middle" dominant-baseline="central" fill="#92400E" font-size="14" font-weight="600">mat</text>

    <rect x="360" y="0" width="52" height="32" rx="6" fill="#EEEDFE" stroke="#6366F1" stroke-width="1"/>
    <text x="386" y="16" text-anchor="middle" dominant-baseline="central" fill="#4338CA" font-size="14" font-weight="600">???</text>
  </g>

  <path d="M 426 542 C 426 600, 240 600, 240 480 C 240 440, 260 415, 275 410" fill="none" stroke="currentColor" stroke-opacity="0.6" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  
  <text x="460" y="565" fill="currentColor" opacity="0.6" font-size="13" font-style="italic">循环直至 &lt;EOS&gt;</text>

</svg>
