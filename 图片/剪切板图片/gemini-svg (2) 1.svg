<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 560" width="100%" height="100%">
  <defs>
    <style>
      /* 基础字体设置 */
      text {
        font-family: system-ui, -apple-system, sans-serif;
      }
      
      /* 针对浅色模式（默认）的颜色变量 */
      .text-main { fill: #333333; }
      .line-main { stroke: #CCCCCC; }
      .tab-bg { fill: transparent; stroke: #CCCCCC; }
      .tab-active { fill: rgba(0,0,0,0.05); stroke: #555555; }

      /* 针对深色模式（如 Obsidian 的 Dark Mode）自动适配 */
      @media (prefers-color-scheme: dark) {
        .text-main { fill: #E8E8E8; }
        .line-main { stroke: #666666; }
        .tab-bg { fill: transparent; stroke: #555555; }
        .tab-active { fill: rgba(255,255,255,0.1); stroke: #CCCCCC; }
      }
    </style>
  </defs>

  <g font-size="16">
    <rect x="20" y="20" width="150" height="40" rx="8" stroke-width="1" class="tab-bg" />
    <text x="95" y="46" text-anchor="middle" class="text-main">服务栈</text>

    <rect x="190" y="20" width="180" height="40" rx="8" stroke-width="1.5" class="tab-active" />
    <text x="280" y="46" text-anchor="middle" font-weight="600" class="text-main">GPU 显存限制</text>

    <rect x="390" y="20" width="220" height="40" rx="8" stroke-width="1" class="tab-bg" />
    <text x="500" y="46" text-anchor="middle" class="text-main">静态与连续批处理</text>
  </g>

  <g>
    
    <text x="475" y="130" text-anchor="middle" font-size="18" font-weight="600" class="text-main">80 GB GPU (以 H100 为例)</text>

    <rect x="90" y="160" width="770" height="95" rx="12" fill="#FCEEEB" stroke="#D49D94" stroke-width="1" />
    <text x="475" y="202" text-anchor="middle" font-size="20" font-weight="600" fill="#752C22">模型权重 — 约 40 GB (7B 参数 × 2 字节 fp16)</text>
    <text x="475" y="232" text-anchor="middle" font-size="16" fill="#A04030">固定。在启动时加载一次。从不移动。</text>

    <rect x="90" y="275" width="510" height="85" rx="12" fill="#FAF0E1" stroke="#C6A477" stroke-width="1" />
    <text x="345" y="313" text-anchor="middle" font-size="20" font-weight="600" fill="#8A5A20">KV 缓存 — 最高约 30 GB</text>
    <text x="345" y="341" text-anchor="middle" font-size="16" fill="#986426">随 上下文长度 × 批次大小 增长</text>

    <rect x="620" y="275" width="240" height="85" rx="12" fill="#F0F0F0" stroke="#C0C0C0" stroke-width="1" />
    <text x="740" y="313" text-anchor="middle" font-size="20" font-weight="600" fill="#444444">激活值</text>
    <text x="740" y="341" text-anchor="middle" font-size="16" fill="#666666">约几 GB，瞬态</text>
    
  </g>

  <g font-size="16" text-anchor="middle">
    
    <text x="475" y="405" class="text-main">KV 缓存是核心约束 —— 它决定了服务器能处理多少并发请求，</text>
    <text x="475" y="430" class="text-main">以及每个上下文能有多长。</text>

    <line x1="120" y1="465" x2="830" y2="465" stroke-width="1.5" class="line-main" />

    <text x="475" y="505" class="text-main">较长的 Agent 上下文（大量的工具调用循环）会导致每个请求消耗更多 KV 缓存。</text>
    <text x="475" y="530" class="text-main">这就是长时间运行的 Agent 服务成本高的原因 —— 并非受限于算力，而是受限于显存。</text>
    
  </g>
</svg>
