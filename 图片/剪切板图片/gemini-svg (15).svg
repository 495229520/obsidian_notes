<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 1100" width="100%" height="100%">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
        </marker>
        
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/>
        </filter>

        <style>
            .bg-box { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; stroke-dasharray: 8 4; rx: 16; ry: 16; }
            .box { stroke-width: 2; rx: 8; ry: 8; filter: url(#shadow); }
            .attn { fill: #ede9fe; stroke: #8b5cf6; }
            .addnorm { fill: #fef9c3; stroke: #eab308; }
            .ffn { fill: #e0f2fe; stroke: #0ea5e9; }
            .io { fill: #f1f5f9; stroke: #94a3b8; }
            .circle { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; filter: url(#shadow); }
            
            /* 加入了中文字体适配：PingFang SC, Microsoft YaHei */
            .text { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 600; text-anchor: middle; dominant-baseline: middle; fill: #334155; }
            .title { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", Roboto, sans-serif; font-size: 16px; font-weight: bold; fill: #64748b; text-anchor: start; }
            .math { font-size: 20px; font-weight: bold; fill: #475569; text-anchor: middle; dominant-baseline: middle; }
            
            .line { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); stroke-linejoin: round; }
        </style>
    </defs>

    <rect width="100%" height="100%" fill="#ffffff"/>

    <rect class="bg-box" x="490" y="180" width="220" height="340" />
    <text x="510" y="205" class="title">Encoder 模块 (N×)</text>

    <rect class="box io" x="415" y="60" width="180" height="44" />
    <text x="505" y="82" class="text">Input Embedding</text>

    <rect class="box io" x="605" y="60" width="180" height="44" />
    <text x="695" y="82" class="text">Positional Encoding</text>

    <circle class="circle" cx="600" cy="150" r="20"/>
    <text x="600" y="152" class="math">+</text>

    <rect class="box attn" x="510" y="228" width="180" height="44" />
    <text x="600" y="250" class="text">Multi-Head Attention</text>

    <rect class="box addnorm" x="510" y="308" width="180" height="44" />
    <text x="600" y="330" class="text">Add &amp; Norm</text>

    <rect class="box ffn" x="510" y="388" width="180" height="44" />
    <text x="600" y="410" class="text">Feed Forward</text>

    <rect class="box addnorm" x="510" y="468" width="180" height="44" />
    <text x="600" y="490" class="text">Add &amp; Norm</text>


    <rect class="bg-box" x="140" y="300" width="220" height="535" />
    <text x="160" y="325" class="title">Decoder 模块 (N×)</text>

    <rect class="box attn" x="160" y="348" width="180" height="44" />
    <text x="250" y="370" class="text">Masked Multi-Head Attn</text>

    <rect class="box addnorm" x="160" y="428" width="180" height="44" />
    <text x="250" y="450" class="text">Add &amp; Norm</text>

    <rect class="box attn" x="160" y="548" width="180" height="44" />
    <text x="250" y="570" class="text">Multi-Head Attention</text>

    <rect class="box addnorm" x="160" y="628" width="180" height="44" />
    <text x="250" y="650" class="text">Add &amp; Norm</text>

    <rect class="box ffn" x="160" y="708" width="180" height="44" />
    <text x="250" y="730" class="text">Feed Forward</text>

    <rect class="box addnorm" x="160" y="788" width="180" height="44" />
    <text x="250" y="810" class="text">Add &amp; Norm</text


    <rect class="box io" x="160" y="888" width="180" height="44" />
    <text x="250" y="910" class="text">Linear</text>

    <rect class="box io" x="160" y="968" width="180" height="44" />
    <text x="250" y="990" class="text">Softmax</text>

    <rect class="box io" x="160" y="1048" width="180" height="44" />
    <text x="250" y="1070" class="text">输出概率</text>


    <path class="line" d="M 505 104 L 583 140" />
    <path class="line" d="M 695 104 L 617 140" />

    <path class="line" d="M 600 170 L 600 224" />
    <path class="line" d="M 600 272 L 600 304" />
    <path class="line" d="M 600 352 L 600 384" />
    <path class="line" d="M 600 432 L 600 464" />

    <path class="line" d="M 250 392 L 250 424" />
    <path class="line" d="M 250 472 L 250 544" />
    <path class="line" d="M 250 592 L 250 624" />
    <path class="line" d="M 250 672 L 250 704" />
    <path class="line" d="M 250 752 L 250 784" />

    <path class="line" d="M 250 832 L 250 884" />
    <path class="line" d="M 250 932 L 250 964" />
    <path class="line" d="M 250 1012 L 250 1044" />

    <path class="line" d="M 600 512 L 600 522 Q 600 534 588 534 L 287 534 Q 275 534 275 544" />

</svg>
