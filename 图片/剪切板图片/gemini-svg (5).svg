<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 700" width="100%" height="100%">
  <defs>
    <style>
      /* 基础字体设置 */
      text {
        font-family: system-ui, -apple-system, sans-serif;
      }
      
      /* 针对浅色模式（默认）的自适应颜色 */
      .text-main { fill: #222222; }
      .text-sub { fill: #555555; }
      .line-main { stroke: #CCCCCC; }

      /* 针对深色模式（如 Obsidian 的 Dark Mode）自动适配 */
      @media (prefers-color-scheme: dark) {
        .text-main { fill: #EEEEEE; }
        .text-sub { fill: #BBBBBB; }
        .line-main { stroke: #666666; }
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10" fill="#888888" />
    </marker>
  </defs>

  <text x="510" y="40" font-size="22" font-weight="600" text-anchor="middle" class="text-main">工具调用失败分类</text>

  <rect x="360" y="70" width="300" height="60" rx="8" fill="#F4F4F4" stroke="#BBBBBB" stroke-width="1.5" />
  <text x="510" y="96" font-size="18" font-weight="600" fill="#444444" text-anchor="middle">LLM 生成文本</text>
  <text x="510" y="118" font-size="14" fill="#777777" text-anchor="middle">工具调用只是一种文本输出</text>

  <line x1="510" y1="130" x2="510" y2="160" stroke="#888888" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="310" y="170" width="400" height="55" rx="8" fill="#EBF5FF" stroke="#8CB4E2" stroke-width="1.5" />
  <text x="510" y="204" font-size="20" font-weight="600" fill="#1E5084" text-anchor="middle">基础设施解析 + 分发</text>

  <line x1="360" y1="225" x2="135" y2="280" class="line-main" stroke-width="1.5" />
  <line x1="460" y1="225" x2="385" y2="280" class="line-main" stroke-width="1.5" />
  <line x1="560" y1="225" x2="635" y2="280" class="line-main" stroke-width="1.5" />
  <line x1="660" y1="225" x2="885" y2="280" class="line-main" stroke-width="1.5" />

  <rect x="20" y="280" width="230" height="85" rx="8" fill="#FCEEEB" stroke="#D49D94" stroke-width="1.5" />
  <text x="135" y="310" font-size="18" font-weight="600" fill="#8C3325" text-anchor="middle">JSON 格式错误</text>
  <text x="135" y="335" font-size="14" fill="#A04535" text-anchor="middle">未闭合的大括号、多余的</text>
  <text x="135" y="355" font-size="14" fill="#A04535" text-anchor="middle">逗号、截断的输出</text>
  <text x="135" y="405" font-size="16" text-anchor="middle" class="text-sub">可检测：解析错误</text>

  <rect x="270" y="280" width="230" height="85" rx="8" fill="#FDF2E9" stroke="#DDAA88" stroke-width="1.5" />
  <text x="385" y="310" font-size="18" font-weight="600" fill="#8A4A20" text-anchor="middle">类型不匹配</text>
  <text x="385" y="335" font-size="14" fill="#A66133" text-anchor="middle">期望整数却得到字符串，</text>
  <text x="385" y="355" font-size="14" fill="#A66133" text-anchor="middle">缺失必填字段</text>
  <text x="385" y="405" font-size="16" text-anchor="middle" class="text-sub">可检测：Schema 验证</text>

  <rect x="520" y="280" width="230" height="85" rx="8" fill="#FBF3E4" stroke="#C6A477" stroke-width="1.5" />
  <text x="635" y="310" font-size="18" font-weight="600" fill="#6B4A20" text-anchor="middle">幻觉工具</text>
  <text x="635" y="335" font-size="14" fill="#8F6A3B" text-anchor="middle">Schema 中不存在</text>
  <text x="635" y="355" font-size="14" fill="#8F6A3B" text-anchor="middle">该工具名称</text>
  <text x="635" y="405" font-size="16" text-anchor="middle" class="text-sub">可检测：名称查找</text>

  <rect x="770" y="280" width="230" height="85" rx="8" fill="#F0EEFD" stroke="#A599E8" stroke-width="1.5" />
  <text x="885" y="310" font-size="18" font-weight="600" fill="#3D2C8D" text-anchor="middle">语义错误</text>
  <text x="885" y="335" font-size="14" fill="#5848A8" text-anchor="middle">有效的 JSON，有效的类型</text>
  <text x="885" y="355" font-size="14" fill="#5848A8" text-anchor="middle">—— 错误的逻辑</text>
  <text x="885" y="405" font-size="16" text-anchor="middle" class="text-sub">Schema 无法检测</text>

  <line x1="20" y1="440" x2="1000" y2="440" stroke-dasharray="4 4" class="line-main" stroke-width="1" />

  <text x="510" y="475" font-size="20" font-weight="600" text-anchor="middle" class="text-main">每一层防御机制能拦截哪些失败</text>

  <rect x="40" y="500" width="290" height="150" rx="8" fill="#E4F5ED" stroke="#85BEA1" stroke-width="1.5" />
  <text x="185" y="535" font-size="18" font-weight="600" fill="#114F33" text-anchor="middle">JSON Schema 验证</text>
  <text x="185" y="565" font-size="15" fill="#177D51" text-anchor="middle">捕获：JSON 格式错误、</text>
  <text x="185" y="585" font-size="15" fill="#177D51" text-anchor="middle">类型错误、缺失字段、</text>
  <text x="185" y="605" font-size="15" fill="#177D51" text-anchor="middle">未知的工具名称。</text>
  <text x="185" y="630" font-size="15" fill="#177D51" text-anchor="middle">漏掉：语义错误。</text>

  <rect x="365" y="500" width="290" height="150" rx="8" fill="#E4F5ED" stroke="#85BEA1" stroke-width="1.5" />
  <text x="510" y="535" font-size="18" font-weight="600" fill="#114F33" text-anchor="middle">约束解码</text>
  <text x="510" y="565" font-size="15" fill="#177D51" text-anchor="middle">防止：JSON 格式错误、</text>
  <text x="510" y="585" font-size="15" fill="#177D51" text-anchor="middle">无效的枚举值、类型错误</text>
  <text x="510" y="605" font-size="15" fill="#177D51" text-anchor="middle">—— 在生成时发挥作用。</text>
  <text x="510" y="630" font-size="15" fill="#177D51" text-anchor="middle">漏掉：语义错误。</text>

  <rect x="690" y="500" width="290" height="150" rx="8" fill="#E4F5ED" stroke="#85BEA1" stroke-width="1.5" />
  <text x="835" y="535" font-size="18" font-weight="600" fill="#114F33" text-anchor="middle">重试逻辑设计</text>
  <text x="835" y="565" font-size="15" fill="#177D51" text-anchor="middle">恢复：瞬时解析失败、</text>
  <text x="835" y="585" font-size="15" fill="#177D51" text-anchor="middle">类型错误（将错误反馈</text>
  <text x="835" y="605" font-size="15" fill="#177D51" text-anchor="middle">给模型继续重试）。</text>
  <text x="835" y="630" font-size="15" fill="#177D51" text-anchor="middle">无法修复语义错误。</text>

</svg>
