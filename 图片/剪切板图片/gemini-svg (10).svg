<svg width="100%" viewBox="0 0 850 540" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#8B5CF6" />
    </marker>
    <marker id="arrow-grey" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#A1A1AA" />
    </marker>
  </defs>

  <text x="40" y="40" font-size="12" font-weight="600" fill="currentColor" opacity="0.5" letter-spacing="1">第 1 步，共 5 步</text>
  <text x="40" y="75" font-size="24" font-weight="bold" fill="currentColor">接收任务</text>
  
  <rect x="40" y="95" width="56" height="24" rx="12" fill="#EEEDFE" />
  <text x="68" y="112" text-anchor="middle" font-size="12" font-weight="600" fill="#4338CA">计划</text>

  <g>
    <rect x="40" y="180" width="140" height="60" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5" />
    <text x="110" y="215" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="bold" fill="#3F3F46">用户 / 系统</text>

    <line x1="180" y1="210" x2="230" y2="210" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrow-purple)" />

    <rect x="240" y="170" width="160" height="80" rx="8" fill="#EEEDFE" stroke="#8B5CF6" stroke-width="1.5" />
    <text x="320" y="200" text-anchor="middle" dominant-baseline="central" font-size="18" font-weight="bold" fill="#3730A3">LLM</text>
    <text x="320" y="225" text-anchor="middle" dominant-baseline="central" font-size="14" fill="#4F46E5">思考 + 计划</text>
  </g>

  <g opacity="0.35">
    <line x1="400" y1="190" x2="470" y2="190" stroke="#A1A1AA" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow-grey)" />

    <line x1="480" y1="210" x2="410" y2="210" stroke="#A1A1AA" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow-grey)" />
    
    <line x1="400" y1="230" x2="470" y2="265" stroke="#A1A1AA" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow-grey)" />

    <rect x="480" y="150" width="160" height="80" rx="8" fill="#F4F4F5" stroke="#D4D4D8" stroke-width="1.5" />
    <text x="560" y="180" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="bold" fill="#27272A">工具</text>
    <text x="560" y="205" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#52525B">web, 代码, APIs...</text>

    <line x1="640" y1="190" x2="690" y2="190" stroke="#A1A1AA" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow-grey)" />

    <rect x="480" y="250" width="160" height="50" rx="8" fill="#F4F4F5" stroke="#D4D4D8" stroke-width="1.5" />
    <text x="560" y="275" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="bold" fill="#27272A">上下文窗口</text>

    <rect x="700" y="165" width="110" height="50" rx="8" fill="#F4F4F5" stroke="#D4D4D8" stroke-width="1.5" />
    <text x="755" y="190" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="bold" fill="#27272A">答案</text>
  </g>

  <text x="40" y="360" font-size="16" fill="currentColor" opacity="0.85">Agent 接收到一个目标 —— 来自用户、系统提示词或其他 Agent。这个任务被放置在上下文窗口的</text>
  <text x="40" y="388" font-size="16" fill="currentColor" opacity="0.85">起始位置。与普通的 LLM 调用不同，Agent 需要执行多步工作，而不仅仅是生成单一的回复。</text>

  <rect x="40" y="430" width="770" height="85" rx="8" fill="none" stroke="currentColor" stroke-opacity="0.2" stroke-width="1.5" />
  <text x="60" y="460" font-size="12" font-weight="bold" fill="currentColor" opacity="0.5" letter-spacing="1">示例 (EXAMPLE)</text>
  <text x="60" y="488" font-size="16" font-weight="500" fill="currentColor" opacity="0.8">“找出下个月从首尔到东京最便宜的 3 趟航班并进行总结。”</text>

</svg>
