<svg width="100%" viewBox="0 0 900 650" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  
  <defs>
    <marker id="arrow-grey" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="currentColor" opacity="0.5" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#059669" />
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#D97706" />
    </marker>
  </defs>

  <line x1="190" y1="80" x2="235" y2="80" stroke="currentColor" stroke-opacity="0.5" stroke-width="2" marker-end="url(#arrow-grey)" />
  
  <line x1="470" y1="65" x2="545" y2="65" stroke="currentColor" stroke-opacity="0.5" stroke-width="2" marker-end="url(#arrow-grey)" />
  <text x="510" y="55" text-anchor="middle" font-size="14" fill="currentColor" opacity="0.7">工具调用</text>

  <line x1="360" y1="120" x2="360" y2="185" stroke="currentColor" stroke-opacity="0.5" stroke-width="2" marker-end="url(#arrow-grey)" />

  <line x1="360" y1="290" x2="360" y2="345" stroke="currentColor" stroke-opacity="0.5" stroke-width="2" marker-end="url(#arrow-grey)" />

  <line x1="360" y1="450" x2="360" y2="505" stroke="currentColor" stroke-opacity="0.5" stroke-width="2" marker-end="url(#arrow-grey)" />
  <text x="380" y="485" text-anchor="start" font-size="14" fill="currentColor" opacity="0.7">是</text>

  <path d="M 110 380 L 110 245 L 235 245" fill="none" stroke="currentColor" stroke-opacity="0.3" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow-grey)" />

  <path d="M 700 120 L 700 175 L 410 175 L 410 135" fill="none" stroke="#059669" stroke-width="2" stroke-dasharray="6,5" marker-end="url(#arrow-green)" />
  <text x="555" y="165" text-anchor="middle" font-size="14" fill="#059669">结果追加到上下文</text>

  <path d="M 490 405 L 525 405 L 525 100 L 485 100" fill="none" stroke="#D97706" stroke-width="2" marker-end="url(#arrow-orange)" />
  <text x="535" y="255" text-anchor="start" font-size="14" fill="#D97706">否 -> 循环</text>

  <g transform="translate(30, 45)">
    <rect width="160" height="70" rx="8" fill="#F4F4F5" stroke="#D4D4D8" stroke-width="2" />
    <text x="80" y="35" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="600" fill="#3F3F46">任务 / 目标</text>
  </g>

  <g transform="translate(250, 30)">
    <rect width="220" height="90" rx="12" fill="#EEEDFE" stroke="#A5B4FC" stroke-width="2" />
    <text x="110" y="35" text-anchor="middle" dominant-baseline="central" font-size="18" font-weight="bold" fill="#3730A3">LLM</text>
    <text x="110" y="60" text-anchor="middle" dominant-baseline="central" font-size="14" fill="#4F46E5">推理、计划、决策</text>
  </g>

  <g transform="translate(560, 30)">
    <rect width="280" height="90" rx="12" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="2" />
    <text x="140" y="35" text-anchor="middle" dominant-baseline="central" font-size="18" font-weight="bold" fill="#065F46">工具 / 环境</text>
    <text x="140" y="60" text-anchor="middle" dominant-baseline="central" font-size="14" fill="#047857">搜索 · 代码 · APIs · 文件</text>
  </g>

  <g transform="translate(250, 200)">
    <rect width="220" height="90" rx="12" fill="#EEEDFE" stroke="#A5B4FC" stroke-width="2" />
    <text x="110" y="35" text-anchor="middle" dominant-baseline="central" font-size="18" font-weight="bold" fill="#3730A3">LLM (再次调用)</text>
    <text x="110" y="60" text-anchor="middle" dominant-baseline="central" font-size="14" fill="#4F46E5">更新后的上下文</text>
  </g>

  <g transform="translate(230, 360)">
    <rect width="260" height="90" rx="12" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2" />
    <text x="130" y="35" text-anchor="middle" dominant-baseline="central" font-size="18" font-weight="bold" fill="#9A3412">完成？</text>
    <text x="130" y="60" text-anchor="middle" dominant-baseline="central" font-size="14" fill="#C2410C">任务完成 / 达到最大步数</text>
  </g>

  <g transform="translate(230, 520)">
    <rect width="260" height="70" rx="12" fill="#F4F4F5" stroke="#D4D4D8" stroke-width="2" />
    <text x="130" y="35" text-anchor="middle" dominant-baseline="central" font-size="18" font-weight="bold" fill="#3F3F46">最终答案 / 输出</text>
  </g>

  <g transform="translate(20, 380)">
    <rect width="180" height="80" rx="12" fill="none" stroke="currentColor" stroke-opacity="0.25" stroke-width="2" stroke-dasharray="6,6" />
    <text x="90" y="32" text-anchor="middle" dominant-baseline="central" font-size="14" fill="currentColor" opacity="0.8">上下文窗口</text>
    <text x="90" y="52" text-anchor="middle" dominant-baseline="central" font-size="14" fill="currentColor" opacity="0.8">每次循环都会增长</text>
  </g>

  <text x="450" y="630" text-anchor="middle" font-size="14" fill="currentColor" opacity="0.5">点击任意节点进行探索</text>

</svg>
