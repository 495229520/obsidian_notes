<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 560" width="100%" height="100%">
  <defs>
    <style>
      /* 基础字体设置 */
      text {
        font-family: system-ui, -apple-system, sans-serif;
      }
      
      /* 针对浅色模式（默认）的颜色变量 */
      .text-main { fill: #333333; }
      .line-main { stroke: #CCCCCC; }
      .tab-bg { fill: transparent; stroke: #CCCCCC; }
      .tab-active { fill: rgba(0,0,0,0.05); stroke: #999999; }
      .box-idle { fill: transparent; stroke: #CCCCCC; }
      .text-idle { fill: #888888; }

      /* 针对深色模式（如 Obsidian 的 Dark Mode）自动适配 */
      @media (prefers-color-scheme: dark) {
        .text-main { fill: #E8E8E8; }
        .line-main { stroke: #555555; }
        .tab-bg { fill: transparent; stroke: #555555; }
        .tab-active { fill: rgba(255,255,255,0.1); stroke: #888888; }
        .box-idle { fill: transparent; stroke: #666666; }
        .text-idle { fill: #AAAAAA; }
      }
    </style>
  </defs>

  <g font-size="16">
    <rect x="20" y="20" width="150" height="40" rx="8" stroke-width="1" class="tab-bg" />
    <text x="95" y="46" text-anchor="middle" class="text-main">服务栈</text>

    <rect x="190" y="20" width="180" height="40" rx="8" stroke-width="1" class="tab-bg" />
    <text x="280" y="46" text-anchor="middle" class="text-main">GPU 显存限制</text>

    <rect x="390" y="20" width="220" height="40" rx="8" stroke-width="1.5" class="tab-active" />
    <text x="500" y="46" text-anchor="middle" font-weight="600" class="text-main">静态与连续批处理</text>
  </g>

  <line x1="475" y1="110" x2="475" y2="520" stroke-width="1.5" stroke-dasharray="4 4" class="line-main" />

  <g>
    <text x="240" y="120" font-size="20" font-weight="600" text-anchor="middle" class="text-main">静态批处理</text>

    <rect x="70" y="160" width="340" height="40" rx="6" fill="#EAEAEA" stroke="#A3A3A3" stroke-width="1" />
    <text x="240" y="186" fill="#555555" font-size="16" text-anchor="middle">请求 A (短)</text>

    <rect x="70" y="215" width="340" height="40" rx="6" fill="#EAEAEA" stroke="#A3A3A3" stroke-width="1" />
    <text x="240" y="241" fill="#555555" font-size="16" text-anchor="middle">请求 B (短)</text>

    <rect x="70" y="270" width="340" height="40" rx="6" fill="#EAEAEA" stroke="#A3A3A3" stroke-width="1" />
    <text x="240" y="296" fill="#555555" font-size="16" text-anchor="middle">请求 C (长 — 仍在运行)</text>

    <rect x="70" y="325" width="340" height="40" rx="6" stroke-dasharray="6 4" class="box-idle" />
    <text x="240" y="351" font-size="16" text-anchor="middle" class="text-idle">GPU 空闲 — 等待 C</text>

    <rect x="70" y="380" width="340" height="40" rx="6" stroke-dasharray="6 4" class="box-idle" />
    <text x="240" y="406" font-size="16" text-anchor="middle" class="text-idle">GPU 空闲 — 等待 C</text>

    <text x="240" y="465" font-size="16" text-anchor="middle" class="text-main">批处理中的所有请求必须完成后</text>
    <text x="240" y="490" font-size="16" text-anchor="middle" class="text-main">才能开始下一个批次。</text>
    <text x="240" y="525" font-size="16" text-anchor="middle" class="text-main">一个缓慢的请求会拖慢所有人。</text>
  </g>

  <g>
    <text x="710" y="120" font-size="20" font-weight="600" text-anchor="middle" class="text-main">连续批处理</text>

    <rect x="540" y="160" width="180" height="40" rx="6" fill="#E2F5EC" stroke="#5A9D7E" stroke-width="1" />
    <text x="630" y="186" fill="#134D31" font-size="16" text-anchor="middle">请求 A (短)</text>

    <rect x="730" y="160" width="150" height="40" rx="6" fill="#EAE6FF" stroke="#8A76D9" stroke-width="1" />
    <text x="805" y="186" fill="#4A3B9A" font-size="16" text-anchor="middle">请求 D 加入</text>

    <rect x="540" y="215" width="230" height="40" rx="6" fill="#E2F5EC" stroke="#5A9D7E" stroke-width="1" />
    <text x="635" y="241" fill="#134D31" font-size="16" text-anchor="middle">请求 B (中)</text>

    <rect x="730" y="215" width="150" height="40" rx="6" fill="#EAE6FF" stroke="#8A76D9" stroke-width="1" />
    <text x="805" y="241" fill="#4A3B9A" font-size="16" text-anchor="middle">请求 E 加入</text>

    <rect x="540" y="270" width="340" height="40" rx="6" fill="#E2F5EC" stroke="#5A9D7E" stroke-width="1" />
    <text x="710" y="296" fill="#134D31" font-size="16" text-anchor="middle">请求 C (长)</text>

    <text x="710" y="365" font-size="16" text-anchor="middle" class="text-main">当 A 完成时，D 会立即</text>
    <text x="710" y="390" font-size="16" text-anchor="middle" class="text-main">填补该空缺。GPU 从不空闲。</text>
    
    <text x="710" y="440" font-size="16" text-anchor="middle" class="text-main">新请求可以在任何 token</text>
    <text x="710" y="465" font-size="16" text-anchor="middle" class="text-main">边界处插入。吞吐量大大提高。</text>
  </g>
</svg>
