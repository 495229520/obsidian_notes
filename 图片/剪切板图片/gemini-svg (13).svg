<svg width="100%" viewBox="0 0 850 540" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#10B981" />
    </marker>
    <marker id="arrow-grey" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#A1A1AA" />
    </marker>
  </defs>

  <text x="40" y="40" font-size="12" font-weight="600" fill="currentColor" opacity="0.5" letter-spacing="1">第 4 步，共 5 步</text>
  <text x="40" y="75" font-size="24" font-weight="bold" fill="currentColor">观察 — 将结果追加到上下文 (Observe — append result to context)</text>
  
  <rect x="40" y="95" width="80" height="24" rx="12" fill="#ECFDF5" />
  <text x="80" y="112" text-anchor="middle" font-size="12" font-weight="600" fill="#047857">观察</text>

  <g opacity="0.35">
    <rect x="40" y="160" width="140" height="60" rx="8" fill="#F4F4F5" stroke="#D4D4D8" stroke-width="1.5" />
    <text x="110" y="195" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="bold" fill="#27272A">用户 / 系统</text>

    <line x1="180" y1="190" x2="230" y2="190" stroke="#A1A1AA" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow-grey)" />
  </g>

  <g>
    <rect x="240" y="150" width="160" height="80" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="2" />
    <text x="320" y="180" text-anchor="middle" dominant-baseline="central" font-size="18" font-weight="bold" fill="#064E3B">LLM</text>
    <text x="320" y="205" text-anchor="middle" dominant-baseline="central" font-size="14" fill="#047857">思考 + 计划</text>

    <line x1="400" y1="175" x2="470" y2="175" stroke="#A1A1AA" stroke-width="1.5" stroke-opacity="0.35" marker-end="url(#arrow-grey)" />

    <line x1="480" y1="205" x2="410" y2="205" stroke="#10B981" stroke-width="2.5" marker-end="url(#arrow-green)" />

    <rect x="480" y="150" width="160" height="80" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="2" />
    <text x="560" y="180" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="bold" fill="#064E3B">工具</text>
    <text x="560" y="205" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#047857">web, 代码, APIs...</text>

    <line x1="400" y1="220" x2="470" y2="275" stroke="#10B981" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrow-green)" />

    <rect x="480" y="260" width="160" height="50" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="2" />
    <text x="560" y="285" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="bold" fill="#064E3B">上下文窗口</text>
  </g>

  <g opacity="0.35">
    <line x1="640" y1="190" x2="690" y2="190" stroke="#A1A1AA" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow-grey)" />

    <rect x="700" y="165" width="110" height="50" rx="8" fill="#F4F4F5" stroke="#D4D4D8" stroke-width="1.5" />
    <text x="755" y="190" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="bold" fill="#27272A">答案</text>
  </g>

  <text x="40" y="370" font-size="16" fill="currentColor" opacity="0.85">工具的结果作为一个新消息（通常是 tool_result 块）追加到上下文窗口中。LLM</text>
  <text x="40" y="398" font-size="16" fill="currentColor" opacity="0.85">现在可以看到：原始任务 → 它自己的推理 → 它发出的 tool_call → 结果。这个不断增长</text>
  <text x="40" y="426" font-size="16" fill="currentColor" opacity="0.85">的记录就是 Agent 的工作记忆。</text>

  <rect x="40" y="470" width="770" height="65" rx="8" fill="none" stroke="currentColor" stroke-opacity="0.2" stroke-width="1.5" />
  <text x="60" y="495" font-size="12" font-weight="bold" fill="currentColor" opacity="0.5" letter-spacing="1">示例 (EXAMPLE)</text>
  <text x="60" y="520" font-size="16" font-weight="500" fill="currentColor" opacity="0.8">上下文现在包含：[任务] → [LLM 计划] → [tool_call] → [JSON 格式的 3 个航班选项]</text>

</svg>
