<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="320" fill="#fafafa"/>

  <!-- 旧机制容器 -->
  <rect x="20" y="40" width="360" height="240" rx="8" fill="#fff5f5" stroke="#e53e3e" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="200" y="70" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" font-weight="bold" fill="#c53030">旧机制</text>

  <!-- 旧机制节点 -->
  <rect x="50" y="100" width="140" height="40" rx="4" fill="#fed7d7" stroke="#e53e3e" stroke-width="1.5"/>
  <text x="120" y="125" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#742a2a">main() 嵌套判断</text>

  <rect x="50" y="160" width="140" height="40" rx="4" fill="#fed7d7" stroke="#e53e3e" stroke-width="1.5"/>
  <text x="120" y="185" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#742a2a">全局 IsAdmin</text>

  <rect x="50" y="220" width="140" height="40" rx="4" fill="#fed7d7" stroke="#e53e3e" stroke-width="1.5"/>
  <text x="120" y="245" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#742a2a">全局 RunAsAdmin</text>

  <rect x="230" y="220" width="130" height="40" rx="4" fill="#fed7d7" stroke="#e53e3e" stroke-width="1.5"/>
  <text x="295" y="240" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#742a2a">GetCurrentDirectory</text>
  <text x="295" y="253" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#742a2a">拼路径</text>

  <!-- 旧机制箭头 -->
  <line x1="120" y1="140" x2="120" y2="160" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="120" y1="200" x2="120" y2="220" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="190" y1="240" x2="230" y2="240" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 新机制容器 -->
  <rect x="420" y="40" width="360" height="240" rx="8" fill="#f0fff4" stroke="#38a169" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="600" y="70" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" font-weight="bold" fill="#276749">新机制</text>

  <!-- 新机制节点 -->
  <rect x="450" y="100" width="140" height="40" rx="4" fill="#c6f6d5" stroke="#38a169" stroke-width="1.5"/>
  <text x="520" y="125" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#22543d">main() 扁平分支</text>

  <rect x="450" y="160" width="140" height="40" rx="4" fill="#c6f6d5" stroke="#38a169" stroke-width="1.5"/>
  <text x="520" y="185" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="12" fill="#22543d">CEdoyunTool::IsAdmin</text>

  <rect x="450" y="220" width="140" height="40" rx="4" fill="#c6f6d5" stroke="#38a169" stroke-width="1.5"/>
  <text x="520" y="240" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#22543d">CEdoyunTool::</text>
  <text x="520" y="253" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#22543d">RunAsAdmin</text>

  <rect x="630" y="220" width="130" height="40" rx="4" fill="#c6f6d5" stroke="#38a169" stroke-width="1.5"/>
  <text x="695" y="240" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#22543d">GetModuleFileName</text>
  <text x="695" y="253" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="11" fill="#22543d">取真实路径</text>

  <!-- 新机制箭头 -->
  <line x1="520" y1="140" x2="520" y2="160" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="520" y1="200" x2="520" y2="220" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="590" y1="240" x2="630" y2="240" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
</svg>