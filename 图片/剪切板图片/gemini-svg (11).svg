<svg width="100%" viewBox="0 0 850 560" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <marker id="arrow-grey" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#A1A1AA" />
    </marker>
  </defs>

  <text x="40" y="40" font-size="12" font-weight="600" fill="currentColor" opacity="0.5" letter-spacing="1">第 2 步，共 5 步</text>
  <text x="40" y="75" font-size="24" font-weight="bold" fill="currentColor">思考 + 计划 (LLM 调用)</text>
  
  <rect x="40" y="95" width="95" height="24" rx="12" fill="#EEEDFE" />
  <text x="87.5" y="112" text-anchor="middle" font-size="12" font-weight="600" fill="#4338CA">LLM 推理</text>

  <g opacity="0.35">
    <rect x="40" y="170" width="140" height="60" rx="8" fill="#F4F4F5" stroke="#D4D4D8" stroke-width="1.5" />
    <text x="110" y="205" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="bold" fill="#27272A">用户 / 系统</text>

    <line x1="180" y1="200" x2="230" y2="200" stroke="#A1A1AA" stroke-width="1.5" marker-end="url(#arrow-grey)" />
  </g>

  <g>
    <rect x="240" y="160" width="160" height="80" rx="8" fill="#EEEDFE" stroke="#8B5CF6" stroke-width="1.5" />
    <text x="320" y="190" text-anchor="middle" dominant-baseline="central" font-size="18" font-weight="bold" fill="#3730A3">LLM</text>
    <text x="320" y="215" text-anchor="middle" dominant-baseline="central" font-size="14" fill="#4F46E5">思考 + 计划</text>
  </g>

  <g opacity="0.35">
    <line x1="400" y1="180" x2="470" y2="180" stroke="#A1A1AA" stroke-width="1.5" marker-end="url(#arrow-grey)" />

    <line x1="480" y1="200" x2="410" y2="200" stroke="#A1A1AA" stroke-width="1.5" marker-end="url(#arrow-grey)" />
    
    <line x1="400" y1="220" x2="470" y2="255" stroke="#A1A1AA" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow-grey)" />

    <rect x="480" y="140" width="160" height="80" rx="8" fill="#F4F4F5" stroke="#D4D4D8" stroke-width="1.5" />
    <text x="560" y="170" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="bold" fill="#27272A">工具</text>
    <text x="560" y="195" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#52525B">web, 代码, APIs...</text>

    <line x1="640" y1="180" x2="690" y2="180" stroke="#A1A1AA" stroke-width="1.5" marker-end="url(#arrow-grey)" />

    <rect x="480" y="240" width="160" height="50" rx="8" fill="#F4F4F5" stroke="#D4D4D8" stroke-width="1.5" />
    <text x="560" y="265" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="bold" fill="#27272A">上下文窗口</text>

    <rect x="700" y="155" width="110" height="50" rx="8" fill="#F4F4F5" stroke="#D4D4D8" stroke-width="1.5" />
    <text x="755" y="180" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="bold" fill="#27272A">答案</text>
  </g>

  <text x="40" y="350" font-size="16" fill="currentColor" opacity="0.85">LLM 读取完整的上下文并决定下一步做什么。它可能会生成一条思维链 (推理)，</text>
  <text x="40" y="378" font-size="16" fill="currentColor" opacity="0.85">然后输出一个结构化的工具调用 —— 或者决定任务已经完成。这正是之前提到的</text>
  <text x="40" y="406" font-size="16" fill="currentColor" opacity="0.85">token 生成过程，但现在的输出可以是一个动作 (action)，而不仅仅是文本。</text>

  <rect x="40" y="450" width="770" height="85" rx="8" fill="none" stroke="currentColor" stroke-opacity="0.2" stroke-width="1.5" />
  <text x="60" y="480" font-size="12" font-weight="bold" fill="currentColor" opacity="0.5" letter-spacing="1">示例 (EXAMPLE)</text>
  <text x="60" y="508" font-size="16" font-weight="500" fill="currentColor" opacity="0.8">LLM 思考：“我需要使用下个月的日期调用航班搜索 API。” → 输出一个 tool_call 块。</text>

</svg>
