<svg width="100%" viewBox="0 0 850 560" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#10B981" />
    </marker>
    <marker id="arrow-grey" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#A1A1AA" />
    </marker>
  </defs>

  <text x="40" y="40" font-size="12" font-weight="600" fill="currentColor" opacity="0.5" letter-spacing="1">第 3 步，共 5 步</text>
  <text x="40" y="75" font-size="24" font-weight="bold" fill="currentColor">行动 — 调用工具 (Act — invoke a tool)</text>
  
  <rect x="40" y="95" width="56" height="24" rx="12" fill="#ECFDF5" />
  <text x="68" y="112" text-anchor="middle" font-size="12" font-weight="600" fill="#047857">动作</text>

  <g opacity="0.35">
    <rect x="40" y="170" width="140" height="60" rx="8" fill="#F4F4F5" stroke="#D4D4D8" stroke-width="1.5" />
    <text x="110" y="205" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="bold" fill="#27272A">用户 / 系统</text>

    <line x1="180" y1="200" x2="230" y2="200" stroke="#A1A1AA" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow-grey)" />
  </g>

  <g>
    <rect x="240" y="160" width="160" height="80" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="2" />
    <text x="320" y="190" text-anchor="middle" dominant-baseline="central" font-size="18" font-weight="bold" fill="#064E3B">LLM</text>
    <text x="320" y="215" text-anchor="middle" dominant-baseline="central" font-size="14" fill="#047857">思考 + 计划</text>

    <line x1="400" y1="200" x2="470" y2="200" stroke="#10B981" stroke-width="2.5" marker-end="url(#arrow-green)" />

    <line x1="480" y1="220" x2="410" y2="220" stroke="#10B981" stroke-width="2.5" marker-end="url(#arrow-green)" />

    <rect x="480" y="160" width="160" height="80" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="2" />
    <text x="560" y="190" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="bold" fill="#064E3B">工具</text>
    <text x="560" y="215" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#047857">web, 代码, APIs...</text>
  </g>

  <g opacity="0.35">
    <line x1="400" y1="230" x2="470" y2="265" stroke="#A1A1AA" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow-grey)" />

    <line x1="640" y1="200" x2="690" y2="200" stroke="#A1A1AA" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow-grey)" />

    <rect x="480" y="250" width="160" height="50" rx="8" fill="#F4F4F5" stroke="#D4D4D8" stroke-width="1.5" />
    <text x="560" y="275" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="bold" fill="#27272A">上下文窗口</text>

    <rect x="700" y="175" width="110" height="50" rx="8" fill="#F4F4F5" stroke="#D4D4D8" stroke-width="1.5" />
    <text x="755" y="200" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="bold" fill="#27272A">答案</text>
  </g>

  <text x="40" y="360" font-size="16" fill="currentColor" opacity="0.85">如果 LLM 决定使用某个工具，Agent 框架会拦截该结构化输出并实际执行调用 ——</text>
  <text x="40" y="388" font-size="16" fill="currentColor" opacity="0.85">无论是网络搜索、代码解释器、数据库查询还是 API。LLM 本身无法直接访问互联网；</text>
  <text x="40" y="416" font-size="16" fill="currentColor" opacity="0.85">框架会代为执行这些操作。</text>

  <rect x="40" y="460" width="770" height="85" rx="8" fill="none" stroke="currentColor" stroke-opacity="0.2" stroke-width="1.5" />
  <text x="60" y="490" font-size="12" font-weight="bold" fill="currentColor" opacity="0.5" letter-spacing="1">示例 (EXAMPLE)</text>
  <text x="60" y="518" font-size="16" font-weight="500" fill="currentColor" opacity="0.8">框架调用：flight_search(origin="ICN", dest="TYO", dates="May 2026") → 获取返回的原始 JSON 数据。</text>

</svg>
