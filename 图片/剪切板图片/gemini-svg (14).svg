<svg width="100%" viewBox="0 0 850 560" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#F59E0B" />
    </marker>
    <marker id="arrow-grey" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#A1A1AA" />
    </marker>
  </defs>

  <text x="40" y="40" font-size="12" font-weight="600" fill="currentColor" opacity="0.5" letter-spacing="1">第 5 步，共 5 步</text>
  <text x="40" y="75" font-size="24" font-weight="bold" fill="currentColor">循环或结束 (Loop or finish)</text>
  
  <rect x="40" y="95" width="56" height="24" rx="12" fill="#FEF3C7" />
  <text x="68" y="112" text-anchor="middle" font-size="12" font-weight="600" fill="#92400E">决策</text>

  <g opacity="0.35">
    <rect x="40" y="170" width="140" height="60" rx="8" fill="#F4F4F5" stroke="#D4D4D8" stroke-width="1.5" />
    <text x="110" y="205" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="bold" fill="#27272A">用户 / 系统</text>

    <line x1="180" y1="200" x2="230" y2="200" stroke="#A1A1AA" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow-grey)" />
  </g>

  <g>
    <rect x="240" y="160" width="160" height="80" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" />
    <text x="320" y="190" text-anchor="middle" dominant-baseline="central" font-size="18" font-weight="bold" fill="#92400E">LLM</text>
    <text x="320" y="215" text-anchor="middle" dominant-baseline="central" font-size="14" fill="#B45309">思考 + 计划</text>
  </g>

  <g opacity="0.35">
    <line x1="400" y1="200" x2="470" y2="200" stroke="#A1A1AA" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow-grey)" />

    <line x1="480" y1="220" x2="410" y2="220" stroke="#A1A1AA" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow-grey)" />

    <line x1="400" y1="230" x2="470" y2="265" stroke="#A1A1AA" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow-grey)" />

    <rect x="480" y="160" width="160" height="80" rx="8" fill="#F4F4F5" stroke="#D4D4D8" stroke-width="1.5" />
    <text x="560" y="190" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="bold" fill="#27272A">工具</text>
    <text x="560" y="215" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#52525B">web, 代码, APIs...</text>

    <rect x="480" y="250" width="160" height="50" rx="8" fill="#F4F4F5" stroke="#D4D4D8" stroke-width="1.5" />
    <text x="560" y="275" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="bold" fill="#27272A">上下文窗口</text>
  </g>

  <g>
    <line x1="640" y1="200" x2="690" y2="200" stroke="#F59E0B" stroke-width="2.5" marker-end="url(#arrow-orange)" />

    <rect x="700" y="175" width="110" height="50" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" />
    <text x="755" y="200" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="bold" fill="#92400E">答案</text>
  </g>

  <text x="40" y="370" font-size="16" fill="currentColor" opacity="0.85">LLM 会带着更新后的上下文被再次调用。它将决定：任务完成了吗，还是需要执行另一个动作？如果已完成，</text>
  <text x="40" y="398" font-size="16" fill="currentColor" opacity="0.85">它会生成最终答案。如果未完成，它会计划下一次工具调用。这个循环会一直运行，直到满足停止条件 ——</text>
  <text x="40" y="426" font-size="16" fill="currentColor" opacity="0.85">任务完成、达到最大步数，或者 LLM 发出停止信号。</text>

  <rect x="40" y="470" width="770" height="65" rx="8" fill="none" stroke="currentColor" stroke-opacity="0.2" stroke-width="1.5" />
  <text x="60" y="495" font-size="12" font-weight="bold" fill="currentColor" opacity="0.5" letter-spacing="1">示例 (EXAMPLE)</text>
  <text x="60" y="520" font-size="16" font-weight="500" fill="currentColor" opacity="0.8">LLM 读取航班 JSON 数据并写道：“最便宜的 3 条航线是……” → 循环结束，返回答案。</text>

</svg>
