<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="100%" height="100%">
  <defs>
    <style>
      /* 基础字体设置 */
      text {
        font-family: system-ui, -apple-system, sans-serif;
      }
      
      /* 浅色模式（默认）的自适应颜色 */
      .text-adaptive { fill: #222222; }
      .line-adapt { stroke: #888888; }
      
      /* 深色模式（如 Obsidian 的 Dark Mode）自动适配 */
      @media (prefers-color-scheme: dark) {
        .text-adaptive { fill: #EEEEEE; }
        .line-adapt { stroke: #AAAAAA; }
      }
    </style>

    <marker id="arrow-grey" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 2 L 10 6 L 0 10" fill="none" class="line-adapt" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 2 L 10 6 L 0 10" fill="none" stroke="#DBA5A0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 2 L 10 6 L 0 10" fill="none" stroke="#88C096" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="500" y="40" font-size="20" font-weight="600" text-anchor="middle" class="text-adaptive">重试逻辑：反馈什么以及何时停止</text>

  <path d="M 500 120 L 500 160" fill="none" class="line-adapt" stroke-width="2" marker-end="url(#arrow-grey)" />
  <path d="M 500 230 L 500 270" fill="none" class="line-adapt" stroke-width="2" marker-end="url(#arrow-grey)" />
  <path d="M 500 340 L 500 380" fill="none" class="line-adapt" stroke-width="2" marker-end="url(#arrow-grey)" />

  <rect x="340" y="60" width="320" height="60" rx="10" fill="#F4F4F4" stroke="#BBBBBB" stroke-width="1.5" />
  <text x="500" y="96" font-size="20" font-weight="600" fill="#444444" text-anchor="middle">模型调用 (尝试 N)</text>

  <rect x="340" y="170" width="320" height="60" rx="10" fill="#E7F0FC" stroke="#A6C5EA" stroke-width="1.5" />
  <text x="500" y="206" font-size="20" font-weight="600" fill="#0C457D" text-anchor="middle">解析 JSON 输出</text>

  <rect x="340" y="280" width="320" height="60" rx="10" fill="#E7F0FC" stroke="#A6C5EA" stroke-width="1.5" />
  <text x="500" y="316" font-size="20" font-weight="600" fill="#0C457D" text-anchor="middle">根据 schema 验证</text>

  <rect x="350" y="390" width="300" height="60" rx="10" fill="#EAF2E4" stroke="#9BB88B" stroke-width="1.5" />
  <text x="500" y="426" font-size="20" font-weight="600" fill="#1F4A0F" text-anchor="middle">分发工具调用</text>

  <rect x="50" y="175" width="120" height="50" rx="8" fill="#FDF0EE" stroke="#E0A7A1" stroke-width="1.5" />
  <text x="110" y="206" font-size="16" fill="#9A3B36" text-anchor="middle">解析失败</text>

  <rect x="50" y="285" width="120" height="50" rx="8" fill="#FDF0EE" stroke="#E0A7A1" stroke-width="1.5" />
  <text x="110" y="316" font-size="16" fill="#9A3B36" text-anchor="middle">Schema 失败</text>

  <path d="M 340 200 L 170 200" fill="none" stroke="#DBA5A0" stroke-width="1.5" />
  <path d="M 340 310 L 170 310" fill="none" stroke="#DBA5A0" stroke-width="1.5" />

  <path d="M 170 200 L 170 480" fill="none" stroke="#DBA5A0" stroke-width="1.5" />
  <path d="M 170 310 L 170 480" fill="none" stroke="#DBA5A0" stroke-width="1.5" />

  <path d="M 170 480 L 170 512" fill="none" stroke="#DBA5A0" stroke-width="1.5" marker-end="url(#arrow-red)" />

  <rect x="60" y="520" width="300" height="85" rx="10" fill="#FAEEEB" stroke="#C4928A" stroke-width="1.5" />
  <text x="210" y="552" font-size="18" font-weight="600" fill="#6E2215" text-anchor="middle">构建错误消息</text>
  <text x="210" y="575" font-size="15" fill="#6E2215" text-anchor="middle">包含确切的错误、错误的输出、</text>
  <text x="210" y="596" font-size="15" fill="#6E2215" text-anchor="middle">失败的 schema 字段</text>

  <rect x="600" y="520" width="300" height="85" rx="10" fill="#FDF4E6" stroke="#D3B186" stroke-width="1.5" />
  <text x="750" y="552" font-size="18" font-weight="600" fill="#5E3A11" text-anchor="middle">尝试计数器检查</text>
  <text x="750" y="575" font-size="16" fill="#5E3A11" text-anchor="middle">N >= max_retries?</text>
  <text x="750" y="596" font-size="16" fill="#5E3A11" text-anchor="middle">→ 抛出硬故障</text>

  <path d="M 360 562.5 L 590 562.5" fill="none" stroke="#DBA5A0" stroke-width="1.5" marker-end="url(#arrow-red)" />

  <rect x="640" y="620" width="220" height="60" rx="10" fill="#FDF0EE" stroke="#C48D8A" stroke-width="1.5" />
  <text x="750" y="656" font-size="20" font-weight="600" fill="#6E1F21" text-anchor="middle">硬故障 / 升级</text>
  
  <path d="M 750 605 L 750 620" fill="none" stroke="#DBA5A0" stroke-width="1.5" marker-end="url(#arrow-red)" />

  <path d="M 120 520 L 120 480 L 850 480 L 850 140" fill="none" stroke="#88C096" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-green)" />
  
  <text x="515" y="470" font-size="15" text-anchor="middle" class="text-adaptive">将错误 + 错误的输出作为 tool_result 反馈回去</text>

</svg>
