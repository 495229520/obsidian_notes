<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 580" width="100%" height="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 1 1 L 8 5 L 1 9" fill="none" stroke="#777" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#FCF6EC" />

  <g font-family="system-ui, -apple-system, sans-serif" font-size="15">
    <rect x="20" y="25" width="120" height="40" rx="8" fill="#FCF6EC" stroke="#666" stroke-width="1" />
    <text x="80" y="50" text-anchor="middle" dominant-baseline="middle" font-weight="600" fill="#222">服务栈</text>

    <rect x="150" y="25" width="140" height="40" rx="8" fill="#FCF6EC" stroke="#CCC" stroke-width="1" />
    <text x="220" y="50" text-anchor="middle" dominant-baseline="middle" fill="#444">GPU 显存限制</text>

    <rect x="300" y="25" width="180" height="40" rx="8" fill="#FCF6EC" stroke="#CCC" stroke-width="1" />
    <text x="390" y="50" text-anchor="middle" dominant-baseline="middle" fill="#444">静态与连续批处理</text>
  </g>

  <g font-family="system-ui, -apple-system, sans-serif">
    
    <rect x="50" y="130" width="180" height="55" rx="8" fill="#F0F0F0" stroke="#B0B0B0" stroke-width="1" />
    <text x="140" y="162" text-anchor="middle" dominant-baseline="middle" font-size="16" font-weight="600" fill="#444">你的 Agent 代码</text>

    <path d="M 230 157.5 L 265 157.5 L 292 157.5" stroke="#777" stroke-width="1.5" marker-end="url(#arrow)" />
    <text x="263" y="148" text-anchor="middle" font-size="13" fill="#666">HTTP</text>

    <rect x="300" y="115" width="240" height="85" rx="8" fill="#ECEEFE" stroke="#A9A1E0" stroke-width="1" />
    <text x="420" y="148" text-anchor="middle" dominant-baseline="middle" font-size="17" font-weight="600" fill="#42398C">推理服务器</text>
    <text x="420" y="175" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#6961CD">vLLM, TGI, Triton...</text>

    <path d="M 420 200 L 420 232" stroke="#777" stroke-width="1.5" marker-end="url(#arrow)" />

    <rect x="300" y="240" width="240" height="75" rx="8" fill="#E2F5EC" stroke="#8BC1A5" stroke-width="1" />
    <text x="420" y="272" text-anchor="middle" dominant-baseline="middle" font-size="17" font-weight="600" fill="#134D31">调度器 / 批处理器</text>
    <text x="420" y="298" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#24885E">为 GPU 对请求进行分组</text>

    <path d="M 420 315 L 420 347" stroke="#777" stroke-width="1.5" marker-end="url(#arrow)" />

    <rect x="300" y="355" width="240" height="75" rx="8" fill="#FAF0E1" stroke="#C6A477" stroke-width="1" />
    <text x="420" y="387" text-anchor="middle" dominant-baseline="middle" font-size="17" font-weight="600" fill="#5F3A15">KV 缓存</text>
    <text x="420" y="413" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#986426">显存中的注意力键+值</text>

    <path d="M 420 430 L 420 462" stroke="#777" stroke-width="1.5" marker-end="url(#arrow)" />

    <rect x="300" y="470" width="240" height="55" rx="8" fill="#FCEEEB" stroke="#D49D94" stroke-width="1" />
    <text x="420" y="502" text-anchor="middle" dominant-baseline="middle" font-size="17" font-weight="600" fill="#752C22">GPU (模型权重)</text>
  </g>

  <g font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#555">
    
    <text x="560" y="162" dominant-baseline="middle">你的代码发送提示词 (prompt)。</text>

    <text x="560" y="265" dominant-baseline="middle">服务器对传入的请求</text>
    <text x="560" y="287" dominant-baseline="middle">进行排队和批处理。</text>

    <text x="560" y="380" dominant-baseline="middle">缓存的注意力状态存在于此</text>
    <text x="560" y="402" dominant-baseline="middle">—— 显存 (VRAM) 非常稀缺。</text>

    <text x="560" y="490" dominant-baseline="middle">权重固定在内存中。</text>
    <text x="560" y="512" dominant-baseline="middle">只有激活值 (activations) 会移动。</text>
    
  </g>
</svg>
