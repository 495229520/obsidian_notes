<title>1.2 函数栈帧建立与销毁原理 - 栈帧结构示意图</title><desc>展示函数栈的栈顶、栈底，以及 esp 和 ebp 的相对位置。</desc><rect x="0" y="0" width="1140" height="450" fill="rgb(245, 244, 237)" /><defs><marker id="arrowOpen" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M1 1 L7 4 L1 7" fill="none" stroke="#3f627e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" /></marker></defs><rect fill="#fffdf8" stroke="#253443" stroke-width="2.4" x="120" y="60" width="240" height="320" rx="6" ry="6" /><line stroke="#ded8cb" stroke-width="1" x1="120" y1="124" x2="360" y2="124" /><line stroke="#ded8cb" stroke-width="1" x1="120" y1="188" x2="360" y2="188" /><line stroke="#ded8cb" stroke-width="1" x1="120" y1="252" x2="360" y2="252" /><line stroke="#ded8cb" stroke-width="1" x1="120" y1="316" x2="360" y2="316" /><text fill="#16222d" font-size="30" font-weight="700" font-family="Microsoft YaHei, Segoe UI, sans-serif" x="240" y="95" text-anchor="middle" dominant-baseline="middle">栈顶</text><text fill="#7b776d" font-size="20" font-weight="500" font-family="Microsoft YaHei, Segoe UI, sans-serif" x="240" y="220" text-anchor="middle" dominant-baseline="middle">函数栈空间</text><text fill="#16222d" font-size="30" font-weight="700" font-family="Microsoft YaHei, Segoe UI, sans-serif" x="240" y="345" text-anchor="middle" dominant-baseline="middle">栈底</text><line fill="none" stroke="#3f627e" stroke-width="2" stroke-linecap="round" marker-end="url(#arrowOpen)" x1="690" y1="105" x2="362" y2="105" /><line fill="none" stroke="#3f627e" stroke-width="2" stroke-linecap="round" marker-end="url(#arrowOpen)" x1="690" y1="335" x2="362" y2="335" /><text fill="#223142" font-size="23" font-weight="600" font-family="Microsoft YaHei, Segoe UI, sans-serif" x="710" y="86" text-anchor="start" dominant-baseline="middle">esp (栈指针 Stack Pointer)</text><text fill="#5f6f7d" font-size="18" font-weight="500" font-family="Microsoft YaHei, Segoe UI, sans-serif" x="710" y="118" text-anchor="start" dominant-baseline="middle">指向小地址 / 低地址</text><text fill="#223142" font-size="21" font-weight="600" font-family="Microsoft YaHei, Segoe UI, sans-serif" x="710" y="316" text-anchor="start" dominant-baseline="middle">ebp (基址/帧指针 Base Pointer)</text><text fill="#5f6f7d" font-size="18" font-weight="500" font-family="Microsoft YaHei, Segoe UI, sans-serif" x="710" y="348" text-anchor="start" dominant-baseline="middle">指向大地址 / 高地址</text></svg>
