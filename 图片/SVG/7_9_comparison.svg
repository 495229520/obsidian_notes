<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560">
  <rect x="0" y="0" width="1200" height="560" fill="rgb(245, 244, 237)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="600" y="38" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="14" font-weight="500"
        fill="#444441">7.9 的重心变化：从 IOCP 队列实验转向 IOCP 网络骨架</text>

  <g>
    <rect x="80" y="100" width="300" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text x="230" y="122" text-anchor="middle" dominant-baseline="central"
          font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#3C3489">7.5 ~ 7.8</text>
    <text x="230" y="142" text-anchor="middle" dominant-baseline="central"
          font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#3C3489">围绕 CEdoyunQueue&lt;T&gt; 的队列实验</text>
  </g>

  <g>
    <rect x="450" y="100" width="300" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
    <text x="600" y="122" text-anchor="middle" dominant-baseline="central"
          font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#444441">方向切换</text>
    <text x="600" y="142" text-anchor="middle" dominant-baseline="central"
          font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#444441">从“线程安全队列”走向“异步网络骨架”</text>
  </g>

  <g>
    <rect x="820" y="100" width="300" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="970" y="122" text-anchor="middle" dominant-baseline="central"
          font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#0C447C">7.9</text>
    <text x="970" y="142" text-anchor="middle" dominant-baseline="central"
          font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#0C447C">EdoyunThread + iocp() 起步</text>
  </g>

  <line x1="380" y1="128" x2="450" y2="128" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="750" y1="128" x2="820" y2="128" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="80" y="250" width="300" height="88" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
    <text x="230" y="278" text-anchor="middle" dominant-baseline="central"
          font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#633806">上一阶段的主线问题</text>
    <text x="230" y="302" text-anchor="middle" dominant-baseline="central"
          font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#633806">_beginthread 参数契约</text>
    <text x="230" y="322" text-anchor="middle" dominant-baseline="central"
          font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#633806">队列退出、句柄关闭与对象生命周期</text>
  </g>

  <g>
    <rect x="780" y="250" width="380" height="88" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="970" y="274" text-anchor="middle" dominant-baseline="central"
          font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#085041">这一阶段的主线问题</text>
    <text x="970" y="300" text-anchor="middle" dominant-baseline="central"
          font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#085041">WSASocket(OVERLAPPED) + AcceptEx</text>
    <text x="970" y="320" text-anchor="middle" dominant-baseline="central"
          font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#085041">CreateIoCompletionPort / GQCS</text>
  </g>

  <line x1="230" y1="156" x2="230" y2="250" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="970" y1="156" x2="970" y2="250" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="430" y="430" width="340" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
    <text x="600" y="452" text-anchor="middle" dominant-baseline="central"
          font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#444441">当前准确结论</text>
    <text x="600" y="472" text-anchor="middle" dominant-baseline="central"
          font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#444441">骨架已搭起，但网络收发和完成处理还没有真正闭环</text>
  </g>

  <line x1="380" y1="294" x2="430" y2="458" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="820" y1="294" x2="770" y2="458" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
