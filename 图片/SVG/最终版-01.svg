<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" width="960" height="560" shape-rendering="geometricPrecision" font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" font-size="13">
  <rect width="100%" height="100%" fill="rgb(245, 244, 237)"/>
  <defs>
    <marker id="arr" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M1 1 L7 4 L1 7" fill="none" stroke="#334155" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <linearGradient id="clientBg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/><stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <linearGradient id="serverBg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/><stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
  </defs>

  <rect x="20" y="20" width="410" height="520" rx="10" fill="url(#clientBg)" stroke="#4338ca" stroke-width="1.5"/>
  <text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="225" y="45" text-anchor="middle" font-weight="bold" fill="#312e81">RemoteClient（控制端）</text>

  <rect x="40" y="70" width="170" height="60" rx="6" fill="#fff" stroke="#4338ca"/>
  <text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="125" y="92" text-anchor="middle" font-weight="bold">CRemoteClientDlg</text>
  <text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="125" y="110" text-anchor="middle" font-size="11">树 / 列表 UI、菜单、下载</text>

  <rect x="240" y="70" width="170" height="60" rx="6" fill="#fff" stroke="#4338ca"/>
  <text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="325" y="92" text-anchor="middle" font-weight="bold">CWatchDialog</text>
  <text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="325" y="110" text-anchor="middle" font-size="11">远程桌面 + 鼠标输入</text>

  <rect x="40" y="150" width="170" height="55" rx="6" fill="#fff" stroke="#4338ca"/>
  <text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="125" y="170" text-anchor="middle" font-weight="bold">CStatusDlg</text>
  <text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="125" y="188" text-anchor="middle" font-size="11">进度 / 状态遮罩</text>

  <rect x="240" y="150" width="170" height="55" rx="6" fill="#fff" stroke="#4338ca"/>
  <text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="325" y="170" text-anchor="middle" font-weight="bold">CClientController</text>
  <text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="325" y="188" text-anchor="middle" font-size="11">协调器（单例）</text>

  <rect x="90" y="225" width="270" height="70" rx="6" fill="#e0e7ff" stroke="#4338ca"/>
  <text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="225" y="248" text-anchor="middle" font-weight="bold">CClientSocket（单例）</text>
  <text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="225" y="268" text-anchor="middle" font-size="11">专用 socket 工作线程，</text>
  <text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="225" y="284" text-anchor="middle" font-size="11">PostThreadMessage(WM_SEND_PACK)</text>

  <rect x="90" y="315" width="270" height="55" rx="6" fill="#fff" stroke="#4338ca"/>
  <text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="225" y="336" text-anchor="middle" font-weight="bold">CPacket（0xFEFF 帧）</text>
  <text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="225" y="354" text-anchor="middle" font-size="11">二进制协议，头部定义重复</text>

  <rect x="90" y="390" width="270" height="70" rx="6" fill="#fff" stroke="#4338ca"/>
  <text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="225" y="415" text-anchor="middle" font-weight="bold">监视线程 + 下载线程</text>
  <text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="225" y="432" text-anchor="middle" font-size="11">每约 200 ms 轮询一次 Cmd 6；</text>
  <text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="225" y="448" text-anchor="middle" font-size="11">文件分块写入 → fwrite</text>

  <rect x="530" y="20" width="410" height="520" rx="10" fill="url(#serverBg)" stroke="#92400e" stroke-width="1.5"/>
  <text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="735" y="45" text-anchor="middle" font-weight="bold" fill="#78350f">RemoteCtrl（被控服务端）</text>

  <rect x="570" y="70" width="330" height="60" rx="6" fill="#fff" stroke="#92400e"/>
  <text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="735" y="92" text-anchor="middle" font-weight="bold">CServerSocket（单例）</text>
  <text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="735" y="110" text-anchor="middle" font-size="11">listen(9527)、accept、recv 循环（阻塞）</text>

  <rect x="570" y="150" width="330" height="60" rx="6" fill="#fff" stroke="#92400e"/>
  <text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="735" y="172" text-anchor="middle" font-weight="bold">CCommand::ExcuteCommand()</text>
  <text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="735" y="190" text-anchor="middle" font-size="11">std::map&lt;int, 成员函数指针&gt; 分发器</text>

  <g font-size="11">
    <rect x="570" y="230" width="100" height="40" rx="4" fill="#fff" stroke="#92400e"/><text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="620" y="255" text-anchor="middle">1 盘符</text>
    <rect x="675" y="230" width="100" height="40" rx="4" fill="#fff" stroke="#92400e"/><text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="725" y="255" text-anchor="middle">2 目录</text>
    <rect x="780" y="230" width="120" height="40" rx="4" fill="#fff" stroke="#92400e"/><text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="840" y="255" text-anchor="middle">3 运行（Shell）</text>

    <rect x="570" y="275" width="100" height="40" rx="4" fill="#fff" stroke="#92400e"/><text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="620" y="300" text-anchor="middle">4 下载</text>
    <rect x="675" y="275" width="100" height="40" rx="4" fill="#fff" stroke="#92400e"/><text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="725" y="300" text-anchor="middle">5 鼠标</text>
    <rect x="780" y="275" width="120" height="40" rx="4" fill="#fff" stroke="#92400e"/><text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="840" y="300" text-anchor="middle">6 屏幕（PNG）</text>

    <rect x="570" y="320" width="100" height="40" rx="4" fill="#fff" stroke="#92400e"/><text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="620" y="345" text-anchor="middle">7 锁屏</text>
    <rect x="675" y="320" width="100" height="40" rx="4" fill="#fff" stroke="#92400e"/><text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="725" y="345" text-anchor="middle">8 解锁</text>
    <rect x="780" y="320" width="120" height="40" rx="4" fill="#fff" stroke="#92400e"/><text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="840" y="345" text-anchor="middle">9 删除</text>

    <rect x="675" y="365" width="100" height="40" rx="4" fill="#fff" stroke="#92400e"/><text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="725" y="390" text-anchor="middle">1981 Ping</text>
  </g>

  <rect x="570" y="425" width="330" height="40" rx="4" fill="#fff" stroke="#92400e"/>
  <text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="735" y="450" text-anchor="middle" font-size="11">LockMachine → _beginthreadex → CLockInfoDialog</text>

  <rect x="570" y="475" width="330" height="50" rx="4" fill="#fff" stroke="#92400e"/>
  <text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="735" y="495" text-anchor="middle" font-size="11" font-weight="bold">实验性（未接入）：</text>
  <text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="735" y="512" text-anchor="middle" font-size="11">EdoyunServer（IOCP）· ENetWork / ESocket / EdoyunThread</text>

  <line x1="430" y1="260" x2="530" y2="260" stroke="#334155" stroke-width="2" marker-end="url(#arr)" marker-start="url(#arr)"/>
  <text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="480" y="250" text-anchor="middle" font-size="12" font-weight="bold">TCP 9527</text>
  <text font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" x="480" y="280" text-anchor="middle" font-size="11" fill="#475569">每条命令一条短连接</text>
</svg>
