<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%" style="background-color: #fafafa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  <rect x="360" y="40" width="80" height="300" fill="#f7f7f7" />
  <text x="400" y="60" font-size="14" font-weight="600" fill="#555" text-anchor="middle">互联网</text>

  <rect x="50" y="130" width="120" height="60" rx="6" fill="#e4f4ec" stroke="#a3d1c0" stroke-width="1.5"/>
  <text x="110" y="155" font-size="15" font-weight="bold" fill="#185c45" text-anchor="middle">节点 A</text>
  <text x="110" y="175" font-size="13" fill="#185c45" text-anchor="middle">192.168.1.5</text>

  <rect x="210" y="110" width="140" height="120" rx="8" fill="#edeaff" stroke="#bcb3f0" stroke-width="1.5"/>
  <text x="280" y="135" font-size="15" font-weight="bold" fill="#3a2f78" text-anchor="middle">NAT A</text>
  <text x="280" y="155" font-size="13" fill="#3a2f78" text-anchor="middle">1.2.3.4</text>
  <text x="280" y="175" font-size="13" fill="#3a2f78" text-anchor="middle">:50001 ➔ 192.168.1.5</text>
  <text x="280" y="195" font-size="13" fill="#3a2f78" text-anchor="middle">洞已打开 ✓</text>

  <rect x="450" y="110" width="140" height="120" rx="8" fill="#edeaff" stroke="#bcb3f0" stroke-width="1.5"/>
  <text x="520" y="135" font-size="15" font-weight="bold" fill="#3a2f78" text-anchor="middle">NAT B</text>
  <text x="520" y="155" font-size="13" fill="#3a2f78" text-anchor="middle">5.6.7.8</text>
  <text x="520" y="175" font-size="13" fill="#3a2f78" text-anchor="middle">:50002 ➔ 192.168.2.7</text>
  <text x="520" y="195" font-size="13" fill="#3a2f78" text-anchor="middle">洞已打开 ✓</text>

  <rect x="630" y="130" width="120" height="60" rx="6" fill="#e4f4ec" stroke="#a3d1c0" stroke-width="1.5"/>
  <text x="690" y="155" font-size="15" font-weight="bold" fill="#185c45" text-anchor="middle">节点 B</text>
  <text x="690" y="175" font-size="13" fill="#185c45" text-anchor="middle">192.168.2.7</text>

  <rect x="40" y="340" width="720" height="65" rx="8" fill="#fdfdfd" stroke="#e0e0e0" stroke-width="1"/>
  <text x="400" y="370" font-size="14" fill="#444" text-anchor="middle">步骤 3：B 的数据包到达 NAT A。NAT A 现在有了这对 源:目标 的映射 —— 它通过了！</text>
  <text x="400" y="392" font-size="14" fill="#444" text-anchor="middle">A 随后的数据包也通过了 NAT B（B 的映射现在激活了）。两个洞都已打开。</text>
</svg>
