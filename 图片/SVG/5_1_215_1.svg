<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="650" viewBox="0 0 1100 650" version="1.1">
  <title>nth_element 定位第 K 大元素</title>
  <desc>把第 K 大元素转换成升序下标 n-k，再用 nth_element 只定位目标位置。</desc>
  <rect x="0" y="0" width="1100" height="650" fill="rgb(245, 244, 237)"/>

  <defs>
    <marker id="arrow-main" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" viewBox="0 0 12 12">
      <path d="M1 1 L11 6 L1 11 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-soft" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" viewBox="0 0 10 10">
      <path d="M1 1 L9 5 L1 9" fill="none" stroke="#7c3aed" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="48" y="58" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="700" fill="#1f2937">nth_element：只把目标下标放正确</text>
  <text x="48" y="94" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#4b5563">示例 nums = [3,2,1,5,6,4]，k = 2，n = 6，所以 target = n - k = 4。</text>

  <g font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="70" y="162" font-size="18" font-weight="700" fill="#334155">原数组</text>
    <g transform="translate(190 125)">
      <rect x="0" y="0" width="78" height="58" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
      <rect x="88" y="0" width="78" height="58" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
      <rect x="176" y="0" width="78" height="58" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
      <rect x="264" y="0" width="78" height="58" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
      <rect x="352" y="0" width="78" height="58" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
      <rect x="440" y="0" width="78" height="58" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="39" y="37" text-anchor="middle" font-size="24" font-weight="700" fill="#334155">3</text>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="127" y="37" text-anchor="middle" font-size="24" font-weight="700" fill="#334155">2</text>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="215" y="37" text-anchor="middle" font-size="24" font-weight="700" fill="#334155">1</text>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="303" y="37" text-anchor="middle" font-size="24" font-weight="700" fill="#334155">5</text>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="391" y="37" text-anchor="middle" font-size="24" font-weight="700" fill="#334155">6</text>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="479" y="37" text-anchor="middle" font-size="24" font-weight="700" fill="#334155">4</text>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="39" y="84" text-anchor="middle" font-size="13" fill="#64748b">0</text>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="127" y="84" text-anchor="middle" font-size="13" fill="#64748b">1</text>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="215" y="84" text-anchor="middle" font-size="13" fill="#64748b">2</text>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="303" y="84" text-anchor="middle" font-size="13" fill="#64748b">3</text>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="391" y="84" text-anchor="middle" font-size="13" fill="#64748b">4</text>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="479" y="84" text-anchor="middle" font-size="13" fill="#64748b">5</text>
    </g>

    <path d="M 450 240 L 450 300" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-main)"/>
    <rect x="320" y="232" width="260" height="40" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="450" y="258" text-anchor="middle" font-family="'SFMono-Regular', Consolas, monospace" font-size="15" fill="#1d4ed8">nth_element(begin, begin + 4, end)</text>

    <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="70" y="362" font-size="18" font-weight="700" fill="#334155">分区后</text>
    <g transform="translate(190 325)">
      <rect x="0" y="0" width="78" height="58" rx="8" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
      <rect x="88" y="0" width="78" height="58" rx="8" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
      <rect x="176" y="0" width="78" height="58" rx="8" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
      <rect x="264" y="0" width="78" height="58" rx="8" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
      <rect x="352" y="0" width="78" height="58" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/>
      <rect x="440" y="0" width="78" height="58" rx="8" fill="#f3e8ff" stroke="#c084fc" stroke-width="2"/>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="39" y="37" text-anchor="middle" font-size="24" font-weight="700" fill="#166534">3</text>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="127" y="37" text-anchor="middle" font-size="24" font-weight="700" fill="#166534">1</text>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="215" y="37" text-anchor="middle" font-size="24" font-weight="700" fill="#166534">4</text>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="303" y="37" text-anchor="middle" font-size="24" font-weight="700" fill="#166534">2</text>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="391" y="37" text-anchor="middle" font-size="24" font-weight="700" fill="#92400e">5</text>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="479" y="37" text-anchor="middle" font-size="24" font-weight="700" fill="#6b21a8">6</text>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="39" y="84" text-anchor="middle" font-size="13" fill="#64748b">0</text>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="127" y="84" text-anchor="middle" font-size="13" fill="#64748b">1</text>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="215" y="84" text-anchor="middle" font-size="13" fill="#64748b">2</text>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="303" y="84" text-anchor="middle" font-size="13" fill="#64748b">3</text>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="391" y="84" text-anchor="middle" font-size="13" fill="#92400e" font-weight="700">target = 4</text>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="479" y="84" text-anchor="middle" font-size="13" fill="#64748b">5</text>
    </g>

    <path d="M 192 415 C 250 465, 425 465, 515 415" fill="none" stroke="#16a34a" stroke-width="2" stroke-dasharray="7 7" marker-end="url(#arrow-soft)"/>
    <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="350" y="474" text-anchor="middle" font-size="15" fill="#166534" font-weight="700">左侧都 ≤ 5，但内部不保证有序</text>

    <path d="M 637 415 C 680 458, 735 458, 708 415" fill="none" stroke="#7c3aed" stroke-width="2" stroke-dasharray="7 7" marker-end="url(#arrow-soft)"/>
    <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="704" y="474" text-anchor="middle" font-size="15" fill="#6b21a8" font-weight="700">右侧都 ≥ 5</text>

    <g transform="translate(760 172)">
      <rect x="0" y="0" width="286" height="236" rx="12" fill="#ffffff" stroke="#d6d3d1" stroke-width="2"/>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="24" y="38" font-size="18" font-weight="700" fill="#1f2937">为什么 target = n - k？</text>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="24" y="76" font-size="15" fill="#4b5563">升序排序后：</text>
      <text x="24" y="112" font-family="'SFMono-Regular', Consolas, monospace" font-size="15" fill="#334155">[1, 2, 3, 4, 5, 6]</text>
      <line x1="196" y1="122" x2="196" y2="155" stroke="#f59e0b" stroke-width="3"/>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="196" y="177" text-anchor="middle" font-size="14" fill="#92400e" font-weight="700">下标 4</text>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="24" y="212" font-size="15" fill="#4b5563">第 2 大就是升序第 4 位。</text>
    </g>

    <rect x="320" y="535" width="460" height="58" rx="12" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
    <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="550" y="571" text-anchor="middle" font-size="20" font-weight="700" fill="#92400e">返回 nums[target] = nums[4] = 5</text>
  </g>
</svg>
