<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="980px" height="460px" viewBox="0 0 980 460" version="1.1"><title>C++ value categories</title><desc>Expression to glvalue/rvalue to lvalue/xvalue/prvalue relationship</desc><rect x="0" y="0" width="980" height="460" fill="rgb(245, 244, 237)" /><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#475569" /></marker></defs><rect fill="rgb(245, 244, 237)" x="0" y="0" width="980" height="460" /><text fill="#1f2937" font-size="28" font-weight="700" font-family="Arial, PingFang SC, sans-serif" x="490" y="36" text-anchor="middle" dominant-baseline="middle">值类别体系（Value Categories）</text><rect fill="#dbeafe" stroke="#3b82f6" stroke-width="2.5" x="370" y="72" width="240" height="60" rx="16" ry="16" /><text fill="#1e3a8a" font-size="20" font-weight="700" font-family="Arial, PingFang SC, sans-serif" x="490" y="102" text-anchor="middle" dominant-baseline="middle">表达式（expression）</text><rect fill="#ecfeff" stroke="#06b6d4" stroke-width="2" opacity="0.95" x="86" y="184" width="504" height="188" rx="20" ry="20" /><rect fill="#fff7ed" stroke="#f59e0b" stroke-width="2" opacity="0.95" x="390" y="184" width="504" height="188" rx="20" ry="20" /><rect fill="#cffafe" stroke="#0891b2" stroke-width="2.5" x="210" y="176" width="180" height="58" rx="14" ry="14" /><rect fill="#ffedd5" stroke="#ea580c" stroke-width="2.5" x="590" y="176" width="180" height="58" rx="14" ry="14" /><text fill="#164e63" font-size="22" font-weight="700" font-family="Arial, PingFang SC, sans-serif" x="300" y="206" text-anchor="middle" dominant-baseline="middle">glvalue</text><text fill="#9a3412" font-size="22" font-weight="700" font-family="Arial, PingFang SC, sans-serif" x="680" y="206" text-anchor="middle" dominant-baseline="middle">rvalue</text><text fill="#155e75" font-size="15" font-family="Arial, PingFang SC, sans-serif" x="300" y="256" text-anchor="middle" dominant-baseline="middle">广义左值<tspan x="300" dy="18.75">lvalue + xvalue</tspan></text><text fill="#c2410c" font-size="15" font-family="Arial, PingFang SC, sans-serif" x="680" y="256" text-anchor="middle" dominant-baseline="middle">右值<tspan x="680" dy="18.75">prvalue + xvalue</tspan></text><rect fill="#dcfce7" stroke="#22c55e" stroke-width="2.2" x="112" y="312" width="180" height="54" rx="12" ry="12" /><rect fill="#ede9fe" stroke="#8b5cf6" stroke-width="2.2" x="400" y="312" width="180" height="54" rx="12" ry="12" /><rect fill="#fee2e2" stroke="#ef4444" stroke-width="2.2" x="688" y="312" width="180" height="54" rx="12" ry="12" /><text fill="#166534" font-size="22" font-weight="700" font-family="Arial, PingFang SC, sans-serif" x="202" y="339" text-anchor="middle" dominant-baseline="middle">lvalue</text><text fill="#6d28d9" font-size="22" font-weight="700" font-family="Arial, PingFang SC, sans-serif" x="490" y="339" text-anchor="middle" dominant-baseline="middle">xvalue</text><text fill="#b91c1c" font-size="22" font-weight="700" font-family="Arial, PingFang SC, sans-serif" x="778" y="339" text-anchor="middle" dominant-baseline="middle">prvalue</text><text fill="#4b5563" font-size="13" font-family="Arial, PingFang SC, sans-serif" x="202" y="392" text-anchor="middle" dominant-baseline="middle">持久身份</text><text fill="#4b5563" font-size="13" font-family="Arial, PingFang SC, sans-serif" x="490" y="392" text-anchor="middle" dominant-baseline="middle">将亡值</text><text fill="#4b5563" font-size="13" font-family="Arial, PingFang SC, sans-serif" x="778" y="392" text-anchor="middle" dominant-baseline="middle">纯右值 / 临时值</text><line stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)" x1="430" y1="132" x2="330" y2="176" /><line stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)" x1="550" y1="132" x2="650" y2="176" /><line stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)" x1="255" y1="234" x2="214" y2="312" /><line stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)" x1="345" y1="234" x2="466" y2="312" /><line stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)" x1="635" y1="234" x2="514" y2="312" /><line stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)" x1="725" y1="234" x2="766" y2="312" /></svg>
