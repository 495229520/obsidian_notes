<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 380" role="img" aria-label="UDP 在网络栈中的位置">
  <defs>
    <marker id="arrow-a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#34495e"/>
    </marker>
  </defs>
  <rect width="980" height="380" fill="rgb(245, 244, 238)"/>

  <text x="490" y="32" text-anchor="middle" font-size="24" font-family="Arial, PingFang SC, sans-serif" fill="#1f2933">UDP 在网络通信中的位置</text>

  <text x="180" y="65" text-anchor="middle" font-size="18" font-family="Arial, PingFang SC, sans-serif" fill="#334e68">客户端</text>
  <text x="800" y="65" text-anchor="middle" font-size="18" font-family="Arial, PingFang SC, sans-serif" fill="#334e68">服务器</text>

  <rect x="80" y="80" width="200" height="48" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <rect x="80" y="142" width="200" height="56" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <rect x="80" y="212" width="200" height="48" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <rect x="80" y="274" width="200" height="48" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>

  <rect x="700" y="80" width="200" height="48" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <rect x="700" y="142" width="200" height="56" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <rect x="700" y="212" width="200" height="48" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <rect x="700" y="274" width="200" height="48" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>

  <text x="180" y="109" text-anchor="middle" font-size="16" font-family="Arial, PingFang SC, sans-serif" fill="#102a43">应用进程</text>
  <text x="180" y="165" text-anchor="middle" font-size="16" font-family="Arial, PingFang SC, sans-serif" fill="#102a43">UDP</text>
  <text x="180" y="185" text-anchor="middle" font-size="13" font-family="Arial, PingFang SC, sans-serif" fill="#486581">socket + 端口号</text>
  <text x="180" y="241" text-anchor="middle" font-size="16" font-family="Arial, PingFang SC, sans-serif" fill="#102a43">IP</text>
  <text x="180" y="303" text-anchor="middle" font-size="16" font-family="Arial, PingFang SC, sans-serif" fill="#102a43">网卡 / 链路层</text>

  <text x="800" y="109" text-anchor="middle" font-size="16" font-family="Arial, PingFang SC, sans-serif" fill="#102a43">应用进程</text>
  <text x="800" y="165" text-anchor="middle" font-size="16" font-family="Arial, PingFang SC, sans-serif" fill="#102a43">UDP</text>
  <text x="800" y="185" text-anchor="middle" font-size="13" font-family="Arial, PingFang SC, sans-serif" fill="#486581">socket + 监听端口</text>
  <text x="800" y="241" text-anchor="middle" font-size="16" font-family="Arial, PingFang SC, sans-serif" fill="#102a43">IP</text>
  <text x="800" y="303" text-anchor="middle" font-size="16" font-family="Arial, PingFang SC, sans-serif" fill="#102a43">网卡 / 链路层</text>

  <line x1="180" y1="128" x2="180" y2="142" stroke="#34495e" stroke-width="2" marker-end="url(#arrow-a)"/>
  <line x1="180" y1="198" x2="180" y2="212" stroke="#34495e" stroke-width="2" marker-end="url(#arrow-a)"/>
  <line x1="180" y1="260" x2="180" y2="274" stroke="#34495e" stroke-width="2" marker-end="url(#arrow-a)"/>
  <line x1="800" y1="128" x2="800" y2="142" stroke="#34495e" stroke-width="2" marker-end="url(#arrow-a)"/>
  <line x1="800" y1="198" x2="800" y2="212" stroke="#34495e" stroke-width="2" marker-end="url(#arrow-a)"/>
  <line x1="800" y1="260" x2="800" y2="274" stroke="#34495e" stroke-width="2" marker-end="url(#arrow-a)"/>

  <ellipse cx="490" cy="298" rx="135" ry="44" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="490" y="292" text-anchor="middle" font-size="18" font-family="Arial, PingFang SC, sans-serif" fill="#102a43">网络</text>
  <text x="490" y="314" text-anchor="middle" font-size="13" font-family="Arial, PingFang SC, sans-serif" fill="#486581">IP 负责转发，UDP 负责按端口分用</text>

  <line x1="280" y1="298" x2="355" y2="298" stroke="#34495e" stroke-width="2.5" marker-end="url(#arrow-a)"/>
  <line x1="625" y1="298" x2="700" y2="298" stroke="#34495e" stroke-width="2.5" marker-end="url(#arrow-a)"/>

  <rect x="330" y="82" width="320" height="102" rx="12" fill="#fffdf8" stroke="#cbd5e1" stroke-width="2"/>
  <text x="490" y="110" text-anchor="middle" font-size="16" font-family="Arial, PingFang SC, sans-serif" fill="#102a43">通信的真正定位方式</text>
  <text x="490" y="138" text-anchor="middle" font-size="14" font-family="Arial, PingFang SC, sans-serif" fill="#334e68">源 IP : 源端口</text>
  <text x="490" y="160" text-anchor="middle" font-size="14" font-family="Arial, PingFang SC, sans-serif" fill="#334e68">目标 IP : 目标端口</text>
  <text x="490" y="182" text-anchor="middle" font-size="13" font-family="Arial, PingFang SC, sans-serif" fill="#486581">内核收到数据报后，按目标端口投递给对应 socket</text>
</svg>
