<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1480px" height="1054px" viewBox="0 0 1480 1054" version="1.1">
  <title>8.4 note architecture</title>
  <desc>对比 b5dc1dc 之前与之后的 IOCP 服务端首次收包结构变化，突出首次收包闭环与仍未完成的边界。</desc>
  <rect x="0" y="0" width="1480" height="1054" fill="rgb(245, 244, 237)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse" viewBox="0 0 10 10">
      <path d="M0 0 L10 5 L0 10 Z" fill="#185FA5"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse" viewBox="0 0 10 10">
      <path d="M0 0 L10 5 L0 10 Z" fill="#534AB7"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse" viewBox="0 0 10 10">
      <path d="M0 0 L10 5 L0 10 Z" fill="#0F6E56"/>
    </marker>
    <marker id="arrowWarn" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse" viewBox="0 0 10 10">
      <path d="M0 0 L10 5 L0 10 Z" fill="#854F0B"/>
    </marker>
    <marker id="arrowNeutral" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse" viewBox="0 0 10 10">
      <path d="M0 0 L10 5 L0 10 Z" fill="#5F5E5A"/>
    </marker>
    <marker id="arrowWarnOpen" markerWidth="8" markerHeight="8" refX="7" refY="5" orient="auto-start-reverse" viewBox="0 0 8 10">
      <path d="M1 1 L7 5 L1 9" fill="none" stroke="#854F0B" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowNeutralOpen" markerWidth="8" markerHeight="8" refX="7" refY="5" orient="auto-start-reverse" viewBox="0 0 8 10">
      <path d="M1 1 L7 5 L1 9" fill="none" stroke="#5F5E5A" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowGreenOpen" markerWidth="8" markerHeight="8" refX="7" refY="5" orient="auto-start-reverse" viewBox="0 0 8 10">
      <path d="M1 1 L7 5 L1 9" fill="none" stroke="#0F6E56" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <text fill="#2E2A23" font-size="24" font-weight="700" font-family="system-ui,sans-serif" x="740" y="34" text-anchor="middle" dominant-baseline="middle">b5dc1dc：IOCP 服务端首次收包闭环修正</text>
  <text fill="#6C665A" font-size="13" font-weight="400" font-family="system-ui,sans-serif" x="740" y="62" text-anchor="middle" dominant-baseline="middle">左侧说明 08e2ca6 之前为什么“首包能挂但不扎实”；右侧说明这次把 Accept -&gt; 首次 WSARecv -&gt; ERecv 第一次连起来</text>
  <rect fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.2" x="36" y="96" width="680" height="844" rx="16" ry="16"/>
  <rect fill="#EEF6F1" stroke="#0F6E56" stroke-width="1.2" x="764" y="96" width="680" height="844" rx="16" ry="16"/>
  <rect fill="#FAEEDA" stroke="#854F0B" stroke-width="1" x="68" y="116" width="616" height="42" rx="12" ry="12"/>
  <text fill="#633806" font-size="17" font-weight="700" font-family="system-ui,sans-serif" x="376" y="137" text-anchor="middle" dominant-baseline="middle">08e2ca6 之前：Accept 完了，但首包收包链还不够稳</text>
  <rect fill="#E1F5EE" stroke="#0F6E56" stroke-width="1" x="796" y="116" width="616" height="42" rx="12" ry="12"/>
  <text fill="#085041" font-size="16" font-weight="700" font-family="system-ui,sans-serif" x="1104" y="137" text-anchor="middle" dominant-baseline="middle">b5dc1dc 之后：Accept -&gt; BindNewSocket -&gt; WSARecv -&gt; ERecv 首次连起来</text>
  <rect fill="#E6F1FB" stroke="#185FA5" stroke-width="1" x="92" y="204" width="336" height="62" rx="10" ry="10"/>
  <text fill="#0C447C" font-size="14" font-weight="600" font-family="system-ui,sans-serif" x="260" y="224" text-anchor="middle">监听 socket<tspan x="260" dy="18.9">AcceptEx(listen, client, acceptBuf)</tspan></text>
  <line stroke="#185FA5" stroke-width="2" marker-end="url(#arrowBlue)" x1="260" y1="266" x2="260" y2="314"/>
  <rect fill="#EEEDFE" stroke="#534AB7" stroke-width="1" x="92" y="314" width="336" height="62" rx="10" ry="10"/>
  <text fill="#3C3489" font-size="14" font-weight="600" font-family="system-ui,sans-serif" x="260" y="334" text-anchor="middle">IOCP -&gt; EAccept -&gt; AcceptWorker<tspan x="260" dy="18.9">accept 完成后进入业务 worker</tspan></text>
  <line stroke="#534AB7" stroke-width="2" marker-end="url(#arrowPurple)" x1="260" y1="376" x2="260" y2="424"/>
  <rect fill="#EEEDFE" stroke="#534AB7" stroke-width="1" x="92" y="424" width="336" height="62" rx="10" ry="10"/>
  <text fill="#3C3489" font-size="14" font-weight="600" font-family="system-ui,sans-serif" x="260" y="444" text-anchor="middle">GetAcceptExSockaddrs()<tspan x="260" dy="18.9">地址还停留在 accept 缓冲区解释阶段</tspan></text>
  <line stroke="#534AB7" stroke-width="2" marker-end="url(#arrowPurple)" x1="260" y1="486" x2="260" y2="540"/>
  <rect fill="#FAEEDA" stroke="#854F0B" stroke-width="1" x="82" y="540" width="356" height="74" rx="10" ry="10"/>
  <text fill="#633806" font-size="14" font-weight="600" font-family="system-ui,sans-serif" x="260" y="560" text-anchor="middle">WSARecv(..., *m_client, ..., *m_client)<tspan x="260" dy="18.9">第一次包能挂上，但仍借用 accept OVERLAPPED</tspan></text>
  <rect fill="#FAEEDA" stroke="#854F0B" stroke-width="1" x="448" y="202" width="238" height="76" rx="10" ry="10"/>
  <text fill="#633806" font-size="13" font-weight="600" font-family="system-ui,sans-serif" x="567" y="222" text-anchor="middle">问题 1<tspan x="567" dy="16.64">未显式 BindNewSocket</tspan><tspan x="567" dy="16.64">(client -&gt; m_hIOCP)</tspan></text>
  <rect fill="#FAEEDA" stroke="#854F0B" stroke-width="1" x="448" y="368" width="238" height="76" rx="10" ry="10"/>
  <text fill="#633806" font-size="13" font-weight="600" font-family="system-ui,sans-serif" x="567" y="388" text-anchor="middle">问题 2<tspan x="567" dy="16.64">recv 仍复用 accept 上下文</tspan><tspan x="567" dy="16.64">ERecv 身份不清</tspan></text>
  <rect fill="#FAEEDA" stroke="#854F0B" stroke-width="1" x="448" y="534" width="238" height="76" rx="10" ry="10"/>
  <text fill="#633806" font-size="13" font-weight="600" font-family="system-ui,sans-serif" x="567" y="554" text-anchor="middle">问题 3<tspan x="567" dy="16.64">ret &lt; 0 时旧 ThreadWorker</tspan><tspan x="567" dy="16.64">只置空未释放</tspan></text>
  <path fill="none" stroke="#854F0B" stroke-width="1.6" stroke-dasharray="6 5" marker-end="url(#arrowWarnOpen)" d="M428 346 L440 346 L440 240 L444 240"/>
  <path fill="none" stroke="#854F0B" stroke-width="1.6" stroke-dasharray="6 5" marker-end="url(#arrowWarnOpen)" d="M428 456 L440 456 L440 406 L444 406"/>
  <path fill="none" stroke="#854F0B" stroke-width="1.6" stroke-dasharray="6 5" marker-end="url(#arrowWarnOpen)" d="M438 577 L444 577 L444 572 L444 572"/>
  <rect fill="#F6F1E6" stroke="#854F0B" stroke-width="1" x="90" y="676" width="592" height="112" rx="12" ry="12"/>
  <text fill="#633806" font-size="15" font-weight="600" font-family="system-ui,sans-serif" x="386" y="704" text-anchor="middle">结果：Accept 后确实已经会尝试挂第一次 WSARecv。<tspan x="386" dy="21.75">但新 socket 归属、recv 的独立 OVERLAPPED 身份、以及失败任务释放都还不扎实。</tspan></text>
  <rect fill="#FAEEDA" stroke="#854F0B" stroke-width="1" x="112" y="814" width="548" height="88" rx="12" ry="12"/>
  <text fill="#633806" font-size="14" font-weight="600" font-family="system-ui,sans-serif" x="386" y="838" text-anchor="middle">左侧重点不是“之前完全不能用”，<tspan x="386" dy="18.9">而是“首包尝试已存在，但闭环的关键中继链还不可靠”。</tspan></text>
  <rect fill="#E6F1FB" stroke="#185FA5" stroke-width="1" x="822" y="186" width="356" height="62" rx="10" ry="10"/>
  <text fill="#0C447C" font-size="14" font-weight="600" font-family="system-ui,sans-serif" x="1000" y="206" text-anchor="middle">监听 socket<tspan x="1000" dy="18.9">AcceptEx(listen, client, acceptBuf)</tspan></text>
  <line stroke="#185FA5" stroke-width="2" marker-end="url(#arrowBlue)" x1="1000" y1="248" x2="1000" y2="292"/>
  <rect fill="#EEEDFE" stroke="#534AB7" stroke-width="1" x="822" y="292" width="356" height="62" rx="10" ry="10"/>
  <text fill="#3C3489" font-size="14" font-weight="600" font-family="system-ui,sans-serif" x="1000" y="312" text-anchor="middle">IOCP -&gt; EAccept -&gt; AcceptWorker<tspan x="1000" dy="18.9">accept 完成后进入业务 worker</tspan></text>
  <line stroke="#534AB7" stroke-width="2" marker-end="url(#arrowPurple)" x1="1000" y1="354" x2="1000" y2="398"/>
  <rect fill="#E1F5EE" stroke="#0F6E56" stroke-width="1" x="822" y="398" width="356" height="70" rx="10" ry="10"/>
  <text fill="#085041" font-size="14" font-weight="600" font-family="system-ui,sans-serif" x="1000" y="418" text-anchor="middle">GetAcceptExSockaddrs() + memcpy<tspan x="1000" dy="18.9">local / remote 地址正式写回 EdoyunClient</tspan></text>
  <line stroke="#0F6E56" stroke-width="2" marker-end="url(#arrowGreen)" x1="1000" y1="468" x2="1000" y2="514"/>
  <rect fill="#E1F5EE" stroke="#0F6E56" stroke-width="1" x="822" y="514" width="356" height="62" rx="10" ry="10"/>
  <text fill="#085041" font-size="14" font-weight="600" font-family="system-ui,sans-serif" x="1000" y="534" text-anchor="middle">BindNewSocket(client -&gt; m_hIOCP)<tspan x="1000" dy="18.9">accepted socket 正式纳入业务 IOCP</tspan></text>
  <line stroke="#0F6E56" stroke-width="2" marker-end="url(#arrowGreen)" x1="1000" y1="576" x2="1000" y2="624"/>
  <rect fill="#E6F1FB" stroke="#185FA5" stroke-width="1" x="822" y="624" width="356" height="70" rx="10" ry="10"/>
  <text fill="#0C447C" font-size="14" font-weight="600" font-family="system-ui,sans-serif" x="1000" y="644" text-anchor="middle">WSARecv(..., RecvWSABuffer(), RecvOverlapped())<tspan x="1000" dy="18.9">第一次 recv 改用专用 OVERLAPPED</tspan></text>
  <line stroke="#185FA5" stroke-width="2" marker-end="url(#arrowBlue)" x1="1000" y1="694" x2="1000" y2="742"/>
  <rect fill="#E1F5EE" stroke="#0F6E56" stroke-width="1" x="822" y="742" width="356" height="62" rx="10" ry="10"/>
  <text fill="#085041" font-size="14" font-weight="700" font-family="system-ui,sans-serif" x="1000" y="762" text-anchor="middle">IOCP -&gt; ERecv -&gt; RecvWorker<tspan x="1000" dy="18.9">首次收包主链第一次真正连起来</tspan></text>
  <rect fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1" x="1194" y="284" width="220" height="76" rx="10" ry="10"/>
  <text fill="#444441" font-size="13" font-weight="600" font-family="system-ui,sans-serif" x="1304" y="304" text-anchor="middle">并行动作<tspan x="1304" dy="16.64">NewAccept()</tspan><tspan x="1304" dy="16.64">再挂一个 AcceptEx</tspan></text>
  <path fill="none" stroke="#5F5E5A" stroke-width="1.6" stroke-dasharray="6 5" marker-end="url(#arrowNeutralOpen)" d="M1178 323 L1188 323 L1188 323 L1190 323"/>
  <path fill="none" stroke="#5F5E5A" stroke-width="1.6" stroke-dasharray="6 5" marker-end="url(#arrowNeutralOpen)" d="M1304 284 L1304 176 L1184 176"/>
  <rect fill="#E1F5EE" stroke="#0F6E56" stroke-width="1" x="1188" y="506" width="226" height="76" rx="10" ry="10"/>
  <text fill="#085041" font-size="13" font-weight="600" font-family="system-ui,sans-serif" x="1301" y="526" text-anchor="middle">修正 1<tspan x="1301" dy="16.64">BindNewSocket 让新 socket</tspan><tspan x="1301" dy="16.64">真正归属业务 IOCP</tspan></text>
  <path fill="none" stroke="#0F6E56" stroke-width="1.6" stroke-dasharray="6 5" marker-end="url(#arrowGreenOpen)" d="M1178 545 L1182 545 L1182 544 L1184 544"/>
  <rect fill="#E1F5EE" stroke="#0F6E56" stroke-width="1" x="1188" y="628" width="226" height="76" rx="10" ry="10"/>
  <text fill="#085041" font-size="13" font-weight="600" font-family="system-ui,sans-serif" x="1301" y="648" text-anchor="middle">修正 2<tspan x="1301" dy="16.64">RecvOverlapped 让 ERecv</tspan><tspan x="1301" dy="16.64">有独立身份</tspan></text>
  <path fill="none" stroke="#0F6E56" stroke-width="1.6" stroke-dasharray="6 5" marker-end="url(#arrowGreenOpen)" d="M1178 659 L1182 659 L1182 666 L1184 666"/>
  <rect fill="#E1F5EE" stroke="#0F6E56" stroke-width="1" x="792" y="828" width="620" height="112" rx="12" ry="12"/>
  <text fill="#085041" font-size="14" font-weight="600" font-family="system-ui,sans-serif" x="1102" y="852" text-anchor="middle">本次真正补上的不是业务解析本身，<tspan x="1102" dy="19.32">而是 Accept -&gt; BindNewSocket -&gt; WSARecv -&gt; ERecv -&gt; RecvWorker 这段首次收包中继链。</tspan><tspan x="1102" dy="19.32">所以右侧表示“第一段闭环接上了”，不是“整个收发系统已经稳定完成”。</tspan></text>
  <rect fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1" x="36" y="964" width="1408" height="66" rx="14" ry="14"/>
  <text fill="#444441" font-size="14" font-weight="600" font-family="system-ui,sans-serif" x="92" y="986" text-anchor="start">仍未完成：WSABUF 初始化 / m_used 初始化 / 发送闭环 / 优雅关闭。<tspan x="92" dy="18.9">8.4 修的是“首次收包中继链”，不是完整稳定版收发系统。</tspan></text>
</svg>
