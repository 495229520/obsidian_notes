<?xml version="1.0" encoding="utf-8"?>
<svg
    xmlns="http://www.w3.org/2000/svg"
    xmlns:xlink="http://www.w3.org/1999/xlink"
    width="1120px"
    height="460px"
    viewBox="0 0 1120 460"
    version="1.1"
    shape-rendering="geometricPrecision"
>
    <title>拷贝语义 vs 移动语义</title>
    <desc>Neatly aligned comparison of copy semantics and move semantics for an object owning dynamic memory.</desc>

    <rect x="0" y="0" width="1120" height="460" fill="rgb(245, 244, 237)" />

    <defs>
        <marker id="arrowDark" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
            <path d="M0 0 L10 5 L0 10 Z" fill="#475569" />
        </marker>
        <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
            <path d="M0 0 L10 5 L0 10 Z" fill="#ea580c" />
        </marker>
    </defs>

    <text
        x="560"
        y="34"
        text-anchor="middle"
        dominant-baseline="middle"
        fill="#1f2937"
        font-size="28"
        font-weight="700"
        font-family="Arial, PingFang SC, sans-serif"
    >拷贝语义 vs 移动语义</text>

    <g id="copy-panel">
        <rect
            x="40"
            y="76"
            width="490"
            height="336"
            rx="24"
            ry="24"
            fill="#ecfeff"
            stroke="#06b6d4"
            stroke-width="2.2"
        />
        <rect
            x="176"
            y="94"
            width="228"
            height="54"
            rx="16"
            ry="16"
            fill="#cffafe"
            stroke="#0891b2"
            stroke-width="2.4"
        />
        <text
            x="290"
            y="121"
            text-anchor="middle"
            dominant-baseline="middle"
            fill="#164e63"
            font-size="20"
            font-weight="700"
            font-family="Arial, PingFang SC, sans-serif"
        >拷贝语义（Copy）</text>

        <rect
            x="92"
            y="162"
            width="128"
            height="82"
            rx="16"
            ry="16"
            fill="#ffffff"
            stroke="#475569"
            stroke-width="2.2"
        />
        <text
            x="156"
            y="191"
            text-anchor="middle"
            dominant-baseline="middle"
            fill="#1f2937"
            font-size="17"
            font-weight="700"
            font-family="Arial, PingFang SC, sans-serif"
        >源对象</text>
        <text
            x="156"
            y="223"
            text-anchor="middle"
            dominant-baseline="middle"
            fill="#334155"
            font-size="15"
            font-family="Arial, PingFang SC, sans-serif"
        >data</text>

        <rect
            x="92"
            y="288"
            width="128"
            height="82"
            rx="16"
            ry="16"
            fill="#ffffff"
            stroke="#475569"
            stroke-width="2.2"
        />
        <text
            x="156"
            y="317"
            text-anchor="middle"
            dominant-baseline="middle"
            fill="#1f2937"
            font-size="17"
            font-weight="700"
            font-family="Arial, PingFang SC, sans-serif"
        >目标对象</text>
        <text
            x="156"
            y="349"
            text-anchor="middle"
            dominant-baseline="middle"
            fill="#334155"
            font-size="15"
            font-family="Arial, PingFang SC, sans-serif"
        >data</text>

        <rect
            x="286"
            y="184"
            width="132"
            height="38"
            rx="14"
            ry="14"
            fill="#dcfce7"
            stroke="#22c55e"
            stroke-width="2"
        />
        <text
            x="352"
            y="203"
            text-anchor="middle"
            dominant-baseline="middle"
            fill="#166534"
            font-size="15"
            font-weight="700"
            font-family="Arial, PingFang SC, sans-serif"
        >[1, 2, 3, 4, 5]</text>

        <rect
            x="286"
            y="310"
            width="132"
            height="38"
            rx="14"
            ry="14"
            fill="#dcfce7"
            stroke="#22c55e"
            stroke-width="2"
        />
        <text
            x="352"
            y="329"
            text-anchor="middle"
            dominant-baseline="middle"
            fill="#166534"
            font-size="15"
            font-weight="700"
            font-family="Arial, PingFang SC, sans-serif"
        >[1, 2, 3, 4, 5]</text>

        <line
            x1="220"
            y1="203"
            x2="272"
            y2="203"
            stroke="#475569"
            stroke-width="2.4"
            marker-end="url(#arrowDark)"
        />
        <line
            x1="220"
            y1="329"
            x2="272"
            y2="329"
            stroke="#475569"
            stroke-width="2.4"
            marker-end="url(#arrowDark)"
        />
        <line
            x1="352"
            y1="226"
            x2="352"
            y2="298"
            stroke="#475569"
            stroke-width="2.4"
            marker-end="url(#arrowDark)"
        />

        <rect
            x="430"
            y="234"
            width="78"
            height="62"
            rx="12"
            ry="12"
            fill="#d9f99d"
            stroke="#22c55e"
            stroke-width="1.8"
        />
        <text
            x="469"
            y="249"
            text-anchor="middle"
            dominant-baseline="middle"
            fill="#166534"
            font-size="12.5"
            font-weight="700"
            font-family="Arial, PingFang SC, sans-serif"
        >
            深拷贝
            <tspan x="469" dy="15">复制数据</tspan>
            <tspan x="469" dy="15">新分配内存</tspan>
        </text>

        <text
            x="285"
            y="388"
            text-anchor="middle"
            dominant-baseline="middle"
            fill="#4b5563"
            font-size="13"
            font-family="Arial, PingFang SC, sans-serif"
        >源对象和目标对象各自拥有一份独立资源</text>
    </g>

    <g id="move-panel">
        <rect
            x="590"
            y="76"
            width="490"
            height="336"
            rx="24"
            ry="24"
            fill="#fff7ed"
            stroke="#f59e0b"
            stroke-width="2.2"
        />
        <rect
            x="726"
            y="94"
            width="228"
            height="54"
            rx="16"
            ry="16"
            fill="#ffedd5"
            stroke="#ea580c"
            stroke-width="2.4"
        />
        <text
            x="840"
            y="121"
            text-anchor="middle"
            dominant-baseline="middle"
            fill="#9a3412"
            font-size="20"
            font-weight="700"
            font-family="Arial, PingFang SC, sans-serif"
        >移动语义（Move）</text>

        <rect
            x="642"
            y="162"
            width="128"
            height="82"
            rx="16"
            ry="16"
            fill="#ffffff"
            stroke="#475569"
            stroke-width="2.2"
        />
        <text
            x="706"
            y="191"
            text-anchor="middle"
            dominant-baseline="middle"
            fill="#1f2937"
            font-size="17"
            font-weight="700"
            font-family="Arial, PingFang SC, sans-serif"
        >源对象</text>
        <text
            x="706"
            y="223"
            text-anchor="middle"
            dominant-baseline="middle"
            fill="#334155"
            font-size="15"
            font-family="Arial, PingFang SC, sans-serif"
        >data</text>

        <rect
            x="642"
            y="288"
            width="128"
            height="82"
            rx="16"
            ry="16"
            fill="#ffffff"
            stroke="#475569"
            stroke-width="2.2"
        />
        <text
            x="706"
            y="317"
            text-anchor="middle"
            dominant-baseline="middle"
            fill="#1f2937"
            font-size="17"
            font-weight="700"
            font-family="Arial, PingFang SC, sans-serif"
        >目标对象</text>
        <text
            x="706"
            y="349"
            text-anchor="middle"
            dominant-baseline="middle"
            fill="#334155"
            font-size="15"
            font-family="Arial, PingFang SC, sans-serif"
        >data</text>

        <rect
            x="836"
            y="184"
            width="120"
            height="36"
            rx="18"
            ry="18"
            fill="#e5e7eb"
            stroke="#94a3b8"
            stroke-width="1.8"
        />
        <text
            x="896"
            y="202"
            text-anchor="middle"
            dominant-baseline="middle"
            fill="#475569"
            font-size="15"
            font-weight="700"
            font-family="Arial, PingFang SC, sans-serif"
        >nullptr</text>

        <rect
            x="830"
            y="310"
            width="132"
            height="38"
            rx="14"
            ry="14"
            fill="#dcfce7"
            stroke="#22c55e"
            stroke-width="2"
        />
        <text
            x="896"
            y="329"
            text-anchor="middle"
            dominant-baseline="middle"
            fill="#166534"
            font-size="15"
            font-weight="700"
            font-family="Arial, PingFang SC, sans-serif"
        >[1, 2, 3, 4, 5]</text>

        <line
            x1="770"
            y1="203"
            x2="822"
            y2="203"
            stroke="#64748b"
            stroke-width="2.4"
            marker-end="url(#arrowDark)"
        />
        <line
            x1="770"
            y1="329"
            x2="816"
            y2="329"
            stroke="#475569"
            stroke-width="2.4"
            marker-end="url(#arrowDark)"
        />
        <line
            x1="896"
            y1="224"
            x2="896"
            y2="298"
            stroke="#ea580c"
            stroke-width="2.4"
            marker-end="url(#arrowOrange)"
        />

        <rect
            x="972"
            y="234"
            width="82"
            height="62"
            rx="12"
            ry="12"
            fill="#fed7aa"
            stroke="#f97316"
            stroke-width="1.8"
        />
        <text
            x="1013"
            y="249"
            text-anchor="middle"
            dominant-baseline="middle"
            fill="#9a3412"
            font-size="12.5"
            font-weight="700"
            font-family="Arial, PingFang SC, sans-serif"
        >
            所有权
            <tspan x="1013" dy="15">直接转移</tspan>
            <tspan x="1013" dy="15">不新分配</tspan>
        </text>

        <text
            x="835"
            y="388"
            text-anchor="middle"
            dominant-baseline="middle"
            fill="#4b5563"
            font-size="13"
            font-family="Arial, PingFang SC, sans-serif"
        >目标对象接管原资源，源对象被置空</text>
    </g>
</svg>
