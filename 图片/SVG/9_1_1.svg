<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1320px" height="560px" viewBox="0 0 1320 560" version="1.1">
  <title>单个 UDP socket 穿过 NAT 的映射示意</title>
  <desc>展示本地 UDP socket 经 NAT 建立公网映射，并被公网服务器或 STUN 观察到的过程。</desc>
  <rect x="0" y="0" width="1320" height="560" fill="rgb(245, 244, 237)"/>
  <defs>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="7.2" refY="4" orient="auto-start-reverse" viewBox="0 0 8 8">
      <path d="M0 0 L8 4 L0 8 Z" fill="#C27A18"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="7.2" refY="4" orient="auto-start-reverse" viewBox="0 0 8 8">
      <path d="M0 0 L8 4 L0 8 Z" fill="#0E7490"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="7.2" refY="4" orient="auto-start-reverse" viewBox="0 0 8 8">
      <path d="M0 0 L8 4 L0 8 Z" fill="#5B47B7"/>
    </marker>
  </defs>
  <text fill="#2E2A23" font-size="26" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="660" y="48" text-anchor="middle" dominant-baseline="middle">同一个本地 UDP socket 穿过 NAT 后发生什么</text>
  <text fill="#6C665A" font-size="15" font-weight="500" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="660" y="82" text-anchor="middle" dominant-baseline="middle">先建立映射，再让公网服务器 / STUN 观察到外部端点</text>
  <rect fill="#F4F8FC" stroke="#185FA5" stroke-width="2" x="40" y="132" width="320" height="308" rx="24" ry="24"/>
  <text fill="#0C447C" font-size="24" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="200" y="184" text-anchor="middle" dominant-baseline="middle">局域网内 Peer A</text>
  <rect fill="#E6F1FB" stroke="#185FA5" stroke-width="1.8" x="84" y="224" width="232" height="140" rx="20" ry="20"/>
  <text fill="#123A62" font-size="20" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="200" y="258" text-anchor="middle" dominant-baseline="middle">本地 UDP socket<tspan x="200" dy="28">192.168.1.10:50000</tspan><tspan x="200" dy="28">后续必须持续复用</tspan></text>
  <rect fill="#FFFFFF" stroke="#C27A18" stroke-width="1.4" x="106" y="384" width="188" height="34" rx="17" ry="17"/>
  <text fill="#7C4A03" font-size="15" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="200" y="401" text-anchor="middle" dominant-baseline="middle">同一个内部 IP:port</text>
  <rect fill="#F4F0FF" stroke="#5B47B7" stroke-width="2" x="430" y="110" width="460" height="350" rx="26" ry="26"/>
  <text fill="#31275F" font-size="27" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="660" y="160" text-anchor="middle" dominant-baseline="middle">NAT / 路由器</text>
  <text fill="#5E5584" font-size="15" font-weight="500" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="660" y="194" text-anchor="middle" dominant-baseline="middle">为内部端点建立 UDP 映射</text>
  <rect fill="#FFF4E6" stroke="#D89B3A" stroke-width="1.4" x="456" y="214" width="188" height="36" rx="18" ry="18"/>
  <text fill="#7C4A03" font-size="12.5" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="550" y="228" text-anchor="middle" dominant-baseline="middle">1. 先用同一个 socket<tspan x="550" dy="14.5">发 REG / UDP</tspan></text>
  <rect fill="#EAF8FC" stroke="#64BCD1" stroke-width="1.4" x="676" y="214" width="188" height="36" rx="18" ry="18"/>
  <text fill="#0F5367" font-size="12.5" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="770" y="228" text-anchor="middle" dominant-baseline="middle">2. STUN / 服务器看到<tspan x="770" dy="14.5">公网映射源地址</tspan></text>
  <rect fill="#FFFFFF" stroke="#7A68D6" stroke-width="1.8" x="486" y="258" width="156" height="118" rx="18" ry="18"/>
  <text fill="#4A3A8B" font-size="16" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="564" y="294" text-anchor="middle" dominant-baseline="middle">内部端点 X:x</text>
  <text fill="#221C45" font-size="18" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="564" y="334" text-anchor="middle" dominant-baseline="middle">192.168.1.10:50000</text>
  <rect fill="#FFFFFF" stroke="#7A68D6" stroke-width="1.8" x="678" y="258" width="156" height="118" rx="18" ry="18"/>
  <text fill="#4A3A8B" font-size="16" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="756" y="294" text-anchor="middle" dominant-baseline="middle">公网映射 X':x'</text>
  <text fill="#221C45" font-size="18" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="756" y="334" text-anchor="middle" dominant-baseline="middle">198.51.100.8:62000</text>
  <line fill="none" stroke="#5B47B7" stroke-width="2.4" stroke-linecap="round" marker-end="url(#arrowPurple)" x1="642" y1="317" x2="678" y2="317"/>
  <rect fill="#EDE9FE" stroke="#B4A4FB" stroke-width="1.4" x="500" y="394" width="320" height="36" rx="18" ry="18"/>
  <text fill="#4A3A8B" font-size="15" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="660" y="412" text-anchor="middle" dominant-baseline="middle">映射绑定在同一个内部 IP:port 上</text>
  <rect fill="#EAF6FC" stroke="#0E7490" stroke-width="2" x="960" y="132" width="320" height="308" rx="24" ry="24"/>
  <text fill="#0F5367" font-size="24" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="1120" y="184" text-anchor="middle" dominant-baseline="middle">公网服务器 / STUN</text>
  <rect fill="#ECFEFF" stroke="#06B6D4" stroke-width="1.8" x="1004" y="224" width="232" height="140" rx="20" ry="20"/>
  <text fill="#0E4E61" font-size="20" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="1120" y="258" text-anchor="middle" dominant-baseline="middle">观察到的源地址<tspan x="1120" dy="28">198.51.100.8:62000</tspan><tspan x="1120" dy="28">而不是私网地址</tspan></text>
  <path fill="none" stroke="#C27A18" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowOrange)" d="M316 294 L378 294 L378 317 L486 317"/>
  <path fill="none" stroke="#0E7490" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowBlue)" d="M834 317 L914 317 L914 294 L1004 294"/>
  <rect fill="#FAEEDA" stroke="#C27A18" stroke-width="2" x="40" y="476" width="1240" height="58" rx="18" ry="18"/>
  <text fill="#6C4207" font-size="16" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="76" y="499" text-anchor="start" dominant-baseline="middle">关键点：后续联系服务器和对端，都应复用同一个本地 UDP socket。<tspan x="76" dy="21.6">换本地端口，本质上就是换内部端点，公网映射也可能随之变化。</tspan></text>
</svg>
