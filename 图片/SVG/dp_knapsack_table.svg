<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" font-family="'Segoe UI', 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2d3436;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#636e72;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="fillGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0984e3;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#74b9ff;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="highlightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdcb6e;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#f39c12;stop-opacity:0.3"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#0984e3"/>
    </marker>
  </defs>

  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">0-1 背包 DP 表格填充过程</text>
  <text x="360" y="48" text-anchor="middle" font-size="12" fill="#7f8c8d">物品: A(w=1,v=1) B(w=2,v=6) C(w=3,v=10) D(w=2,v=4) | 容量 W=5</text>

  <!-- Column headers (capacity) -->
  <rect x="110" y="65" width="590" height="30" rx="4" fill="url(#headerGrad)"/>
  <text x="130" y="85" text-anchor="middle" font-size="12" fill="white" font-weight="bold">j→</text>
  <text x="200" y="85" text-anchor="middle" font-size="12" fill="white" font-weight="bold">0</text>
  <text x="290" y="85" text-anchor="middle" font-size="12" fill="white" font-weight="bold">1</text>
  <text x="380" y="85" text-anchor="middle" font-size="12" fill="white" font-weight="bold">2</text>
  <text x="470" y="85" text-anchor="middle" font-size="12" fill="white" font-weight="bold">3</text>
  <text x="560" y="85" text-anchor="middle" font-size="12" fill="white" font-weight="bold">4</text>
  <text x="650" y="85" text-anchor="middle" font-size="12" fill="white" font-weight="bold">5</text>

  <!-- Row headers -->
  <rect x="30" y="95" width="80" height="280" rx="4" fill="url(#headerGrad)"/>
  <text x="70" y="115" text-anchor="middle" font-size="11" fill="white">i↓</text>
  <text x="70" y="145" text-anchor="middle" font-size="11" fill="white">0 (无)</text>
  <text x="70" y="200" text-anchor="middle" font-size="11" fill="white">1 (A)</text>
  <text x="70" y="255" text-anchor="middle" font-size="11" fill="white">2 (B)</text>
  <text x="70" y="310" text-anchor="middle" font-size="11" fill="white">3 (C)</text>
  <text x="70" y="365" text-anchor="middle" font-size="11" fill="white">4 (D)</text>

  <!-- Grid lines -->
  <g stroke="#dfe6e9" stroke-width="0.8">
    <line x1="110" y1="95" x2="700" y2="95"/>
    <line x1="110" y1="150" x2="700" y2="150"/>
    <line x1="110" y1="170" x2="700" y2="170"/>
    <line x1="110" y1="225" x2="700" y2="225"/>
    <line x1="110" y1="280" x2="700" y2="280"/>
    <line x1="110" y1="335" x2="700" y2="335"/>
    <line x1="110" y1="375" x2="700" y2="375"/>
    <line x1="155" y1="65" x2="155" y2="375"/>
    <line x1="245" y1="65" x2="245" y2="375"/>
    <line x1="335" y1="65" x2="335" y2="375"/>
    <line x1="425" y1="65" x2="425" y2="375"/>
    <line x1="515" y1="65" x2="515" y2="375"/>
    <line x1="605" y1="65" x2="605" y2="375"/>
  </g>

  <!-- Row 0 (no items) -->
  <g font-size="14" fill="#636e72" text-anchor="middle">
    <text x="200" y="145">0</text>
    <text x="290" y="145">0</text>
    <text x="380" y="145">0</text>
    <text x="470" y="145">0</text>
    <text x="560" y="145">0</text>
    <text x="650" y="145">0</text>
  </g>

  <!-- Row 1 (item A: w=1, v=1) -->
  <g font-size="14" text-anchor="middle">
    <text x="200" y="200" fill="#636e72">0</text>
    <text x="290" y="200" fill="#2c3e50" font-weight="bold">1</text>
    <text x="380" y="200" fill="#2c3e50" font-weight="bold">1</text>
    <text x="470" y="200" fill="#2c3e50" font-weight="bold">1</text>
    <text x="560" y="200" fill="#2c3e50" font-weight="bold">1</text>
    <text x="650" y="200" fill="#2c3e50" font-weight="bold">1</text>
  </g>

  <!-- Row 2 (item B: w=2, v=6) -->
  <g font-size="14" text-anchor="middle">
    <text x="200" y="255" fill="#636e72">0</text>
    <text x="290" y="255" fill="#2c3e50">1</text>
    <text x="380" y="255" fill="#0984e3" font-weight="bold">6</text>
    <text x="470" y="255" fill="#0984e3" font-weight="bold">7</text>
    <text x="560" y="255" fill="#0984e3" font-weight="bold">7</text>
    <text x="650" y="255" fill="#0984e3" font-weight="bold">7</text>
  </g>

  <!-- Row 3 (item C: w=3, v=10) -->
  <g font-size="14" text-anchor="middle">
    <text x="200" y="310" fill="#636e72">0</text>
    <text x="290" y="310" fill="#2c3e50">1</text>
    <text x="380" y="310" fill="#2c3e50">6</text>
    <text x="470" y="310" fill="#0984e3" font-weight="bold">10</text>
    <text x="560" y="310" fill="#0984e3" font-weight="bold">11</text>
    <text x="650" y="310" fill="#0984e3" font-weight="bold">16</text>
  </g>

  <!-- Row 4 (item D: w=2, v=4) - highlight answer -->
  <rect x="605" y="335" width="95" height="40" fill="url(#highlightGrad)" rx="4"/>
  <g font-size="14" text-anchor="middle">
    <text x="200" y="365" fill="#636e72">0</text>
    <text x="290" y="365" fill="#2c3e50">1</text>
    <text x="380" y="365" fill="#2c3e50">6</text>
    <text x="470" y="365" fill="#2c3e50">10</text>
    <text x="560" y="365" fill="#2c3e50">11</text>
    <text x="650" y="365" fill="#e17055" font-weight="bold" font-size="16">16</text>
  </g>

  <!-- Annotation: how dp[3][5]=16 is computed -->
  <rect x="30" y="395" width="660" height="72" rx="8" fill="#ffeaa7" fill-opacity="0.3" stroke="#fdcb6e" stroke-width="1"/>
  <text x="50" y="418" font-size="13" fill="#2c3e50" font-weight="bold">dp[3][5] = 16 的计算过程：</text>
  <text x="50" y="438" font-size="12" fill="#636e72">j=5 >= w[3]=3，可以放物品C → max(dp[2][5], dp[2][5-3] + v[3]) = max(7, dp[2][2]+10) = max(7, 6+10) = 16</text>
  <text x="50" y="458" font-size="12" fill="#636e72">状态转移：dp[i][j] = max(dp[i-1][j], dp[i-1][j-w[i]] + v[i])</text>
</svg>