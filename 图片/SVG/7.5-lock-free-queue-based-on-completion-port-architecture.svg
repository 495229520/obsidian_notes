<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" fill="none">
  <rect width="100%" height="100%" fill="rgb(245, 244, 237)"/>

  <!-- 无背景矩形 — 透明背景以兼容 Obsidian 主题 -->

  <!-- 标题 -->
  <text x="450" y="30" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="18" font-weight="bold" fill="currentColor">CEdoyunQueue&lt;T&gt; 内部架构</text>

  <!-- 调用者线程框 -->
  <rect x="30" y="60" width="250" height="200" rx="10" stroke="currentColor" stroke-width="2" fill="none"/>
  <text x="155" y="85" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="currentColor">调用者线程</text>
  <text x="45" y="115" font-family="Consolas, monospace" font-size="11" fill="currentColor">PushBack(data)</text>
  <text x="55" y="135" font-family="Consolas, monospace" font-size="10" fill="#888">→ new IocpParam(EQPush)</text>
  <text x="55" y="155" font-family="Consolas, monospace" font-size="10" fill="#888">→ PostQueuedCompletionStatus</text>
  <line x1="45" y1="168" x2="265" y2="168" stroke="currentColor" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="45" y="188" font-family="Consolas, monospace" font-size="11" fill="currentColor">PopFront(data)</text>
  <text x="55" y="208" font-family="Consolas, monospace" font-size="10" fill="#888">→ 栈上 IocpParam + hEvent</text>
  <text x="55" y="228" font-family="Consolas, monospace" font-size="10" fill="#888">→ Post + WaitForSingleObject</text>
  <text x="55" y="248" font-family="Consolas, monospace" font-size="10" fill="#888">→ data = Param.Data</text>

  <!-- 箭头: 调用者 -> IOCP -->
  <line x1="280" y1="140" x2="370" y2="140" stroke="currentColor" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="325" y="132" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="currentColor">Post</text>

  <!-- 箭头: 调用者 <- 工作线程 (事件信号) -->
  <line x1="370" y1="220" x2="280" y2="220" stroke="#E67E22" stroke-width="2" stroke-dasharray="6" marker-end="url(#arrowOrange)"/>
  <text x="325" y="240" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#E67E22">SetEvent</text>

  <!-- 内核 IOCP 框 -->
  <rect x="370" y="80" width="180" height="180" rx="10" stroke="#3498DB" stroke-width="2.5" fill="none"/>
  <text x="460" y="105" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#3498DB">内核 IOCP</text>
  <text x="460" y="125" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="currentColor">FIFO 队列</text>

  <!-- IOCP 内的队列项 -->
  <rect x="395" y="140" width="130" height="22" rx="4" stroke="currentColor" stroke-width="1" fill="none"/>
  <text x="460" y="156" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="currentColor">IocpParam (EQPush)</text>
  <rect x="395" y="168" width="130" height="22" rx="4" stroke="currentColor" stroke-width="1" fill="none"/>
  <text x="460" y="184" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="currentColor">IocpParam (EQPop)</text>
  <rect x="395" y="196" width="130" height="22" rx="4" stroke="currentColor" stroke-width="1" fill="none"/>
  <text x="460" y="212" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="currentColor">IocpParam (EQPush)</text>
  <text x="460" y="248" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#888">由内核自旋锁序列化</text>

  <!-- 箭头: IOCP -> 工作线程 -->
  <line x1="550" y1="160" x2="620" y2="160" stroke="currentColor" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="585" y="152" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="currentColor">Get</text>

  <!-- 工作线程框 -->
  <rect x="620" y="60" width="250" height="240" rx="10" stroke="#27AE60" stroke-width="2" fill="none"/>
  <text x="745" y="85" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#27AE60">工作线程</text>
  <text x="635" y="115" font-family="Consolas, monospace" font-size="11" fill="currentColor">threadMain()</text>
  <text x="645" y="140" font-family="Consolas, monospace" font-size="10" fill="#888">GetQueuedCompletionStatus</text>
  <text x="645" y="160" font-family="Consolas, monospace" font-size="10" fill="#888">→ DealParam(pParam)</text>
  <line x1="635" y1="175" x2="855" y2="175" stroke="currentColor" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="635" y="195" font-family="Consolas, monospace" font-size="11" fill="currentColor">DealParam() switch:</text>
  <text x="645" y="215" font-family="Consolas, monospace" font-size="10" fill="#888">EQPush → list.push_back + delete</text>
  <text x="645" y="235" font-family="Consolas, monospace" font-size="10" fill="#888">EQPop  → list.front + SetEvent</text>
  <text x="645" y="255" font-family="Consolas, monospace" font-size="10" fill="#888">EQSize → 读取 size + SetEvent</text>
  <text x="645" y="275" font-family="Consolas, monospace" font-size="10" fill="#888">EQClear→ list.clear + delete</text>

  <!-- m_lstData 框 -->
  <rect x="620" y="320" width="250" height="70" rx="10" stroke="#9B59B6" stroke-width="2" fill="none"/>
  <text x="745" y="345" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#9B59B6">m_lstData (std::list&lt;T&gt;)</text>
  <text x="745" y="370" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="currentColor">[item₁] ↔ [item₂] ↔ [item₃] ↔ ...</text>

  <!-- 箭头: 工作线程 -> m_lstData -->
  <line x1="745" y1="300" x2="745" y2="320" stroke="#9B59B6" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- 类成员框 -->
  <rect x="30" y="320" width="520" height="170" rx="10" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <text x="290" y="345" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="currentColor">CEdoyunQueue&lt;T&gt; 成员</text>

  <text x="50" y="375" font-family="Consolas, monospace" font-size="11" fill="currentColor">HANDLE m_hCompletionPort</text>
  <text x="320" y="375" font-family="Segoe UI, sans-serif" font-size="10" fill="#888">— 内核 IOCP 队列句柄</text>

  <text x="50" y="400" font-family="Consolas, monospace" font-size="11" fill="currentColor">HANDLE m_hThread</text>
  <text x="320" y="400" font-family="Segoe UI, sans-serif" font-size="10" fill="#888">— 工作线程句柄 (用于关闭时 WaitForSingleObject)</text>

  <text x="50" y="425" font-family="Consolas, monospace" font-size="11" fill="currentColor">std::atomic&lt;bool&gt; m_lock</text>
  <text x="320" y="425" font-family="Segoe UI, sans-serif" font-size="10" fill="#888">— 析构守卫 (true = 拒绝新操作)</text>

  <text x="50" y="450" font-family="Consolas, monospace" font-size="11" fill="currentColor">std::list&lt;T&gt; m_lstData</text>
  <text x="320" y="450" font-family="Segoe UI, sans-serif" font-size="10" fill="#888">— 实际数据存储 (仅由工作线程访问)</text>

  <text x="50" y="475" font-family="Consolas, monospace" font-size="11" fill="currentColor">enum { EQNone, EQPush, EQPop, EQSize, EQClear }</text>
  <text x="450" y="475" font-family="Segoe UI, sans-serif" font-size="10" fill="#888">— 操作码</text>

  <!-- 箭头定义 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="currentColor"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E67E22"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9B59B6"/>
    </marker>
  </defs>
</svg>