<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1240px" height="780px" viewBox="0 0 1240 780" version="1.1"><title>三数之和最终代码流程</title><desc>对应代码：排序、枚举 i、提前结束、跳过重复 i、双指针比较 sum、记录答案并跳过重复 left/right。</desc><rect x="0" y="0" width="1240" height="780" fill="rgb(245, 244, 237)" /><defs><marker id="arrow-main" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" viewBox="0 0 12 12"><path d="M1 1 L11 6 L1 11 Z" fill="#2563eb" /></marker><marker id="arrow-soft" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" viewBox="0 0 10 10"><path d="M1 1 L9 5 L1 9" fill="none" stroke="#64748b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" /></marker></defs><text font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="700" fill="#1f2937" x="48" y="55">15. 三数之和：你的最终代码执行流程</text><text font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#4b5563" x="48" y="91">核心：排序后固定 nums[i]，在右侧区间用 left / right 找 -nums[i]，并在两个位置完成去重。</text><g font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"><rect fill="#ffffff" stroke="#cbd5e1" stroke-width="2" x="48" y="126" width="520" height="86" rx="14" /><text font-size="18" font-weight="700" fill="#334155" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" x="72" y="158">1. 初始化</text><text font-family="'SFMono-Regular', Consolas, monospace" font-size="15" fill="#334155" x="72" y="187">vector&lt;vector&lt;int&gt;&gt; res; sort(nums.begin(), nums.end());</text><line stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-main)" x1="308" y1="217" x2="308" y2="254" /><rect fill="#eff6ff" stroke="#93c5fd" stroke-width="2" x="48" y="260" width="520" height="86" rx="14" /><text font-size="18" font-weight="700" fill="#1d4ed8" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" x="72" y="292">2. 枚举第一个数 i</text><text font-family="'SFMono-Regular', Consolas, monospace" font-size="15" fill="#1d4ed8" x="72" y="321">for (int i = 0; i &lt; n; i++)</text><line stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-main)" x1="308" y1="351" x2="308" y2="388" /><rect fill="#fef3c7" stroke="#f59e0b" stroke-width="2" x="48" y="394" width="245" height="100" rx="14" /><text font-size="18" font-weight="700" fill="#92400e" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" x="70" y="425">提前结束</text><text font-family="'SFMono-Regular', Consolas, monospace" font-size="14" fill="#92400e" x="70" y="454">if (nums[i] &gt; 0)</text><text font-family="'SFMono-Regular', Consolas, monospace" font-size="14" font-weight="700" fill="#92400e" x="70" y="477">break;</text><rect fill="#fee2e2" stroke="#f87171" stroke-width="2" x="323" y="394" width="245" height="100" rx="14" /><text font-size="18" font-weight="700" fill="#991b1b" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" x="345" y="425">第一个数去重</text><text font-family="'SFMono-Regular', Consolas, monospace" font-size="14" fill="#991b1b" x="345" y="454">i &gt; 0 &amp;&amp;</text><text font-family="'SFMono-Regular', Consolas, monospace" font-size="14" fill="#991b1b" x="345" y="477">nums[i] == nums[i - 1]</text><path fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-main)" d="M 568 444 C 625 444, 655 444, 690 444" /><rect fill="#ffffff" stroke="#d6d3d1" stroke-width="2" x="692" y="126" width="500" height="368" rx="16" /><text font-size="20" font-weight="700" fill="#1f2937" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" x="718" y="162">3. 双指针查找</text><text font-family="'SFMono-Regular', Consolas, monospace" font-size="15" fill="#334155" x="718" y="193">left = i + 1; right = n - 1;</text><rect fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" x="732" y="225" width="418" height="64" rx="12" /><text font-family="'SFMono-Regular', Consolas, monospace" font-size="15" font-weight="700" fill="#334155" x="756" y="251">while (left &lt; right)</text><text font-family="'SFMono-Regular', Consolas, monospace" font-size="14" fill="#334155" x="756" y="274">sum = nums[i] + nums[left] + nums[right]</text><line stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-main)" x1="941" y1="294" x2="941" y2="325" /><rect fill="#fee2e2" stroke="#fecaca" stroke-width="2" x="718" y="332" width="135" height="86" rx="12" /><text font-size="16" font-weight="700" fill="#991b1b" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" x="785" y="363" text-anchor="middle">sum &lt; 0</text><text font-family="'SFMono-Regular', Consolas, monospace" font-size="16" font-weight="700" fill="#991b1b" x="785" y="393" text-anchor="middle">left++</text><rect fill="#dcfce7" stroke="#bbf7d0" stroke-width="2" x="873" y="332" width="135" height="86" rx="12" /><text font-size="16" font-weight="700" fill="#166534" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" x="940" y="363" text-anchor="middle">sum &gt; 0</text><text font-family="'SFMono-Regular', Consolas, monospace" font-size="16" font-weight="700" fill="#166534" x="940" y="393" text-anchor="middle">right--</text><rect fill="#dbeafe" stroke="#bfdbfe" stroke-width="2" x="1028" y="332" width="135" height="86" rx="12" /><text font-size="16" font-weight="700" fill="#1d4ed8" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" x="1095" y="363" text-anchor="middle">sum == 0</text><text font-family="'SFMono-Regular', Consolas, monospace" font-size="15" font-weight="700" fill="#1d4ed8" x="1095" y="393" text-anchor="middle">push_back</text><line stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-main)" x1="1095" y1="422" x2="1095" y2="450" /><rect fill="#eff6ff" stroke="#93c5fd" stroke-width="2" x="936" y="456" width="227" height="72" rx="12" /><text font-size="16" font-weight="700" fill="#1d4ed8" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" x="956" y="486">跳过重复 left / right</text><text font-family="'SFMono-Regular', Consolas, monospace" font-size="14" fill="#1d4ed8" x="956" y="510">然后 left++; right--;</text></g><text font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="19" font-weight="700" fill="#334155" x="70" y="572">示例指针状态</text><g font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" transform="translate(70 596)"><rect fill="#ffffff" stroke="#cbd5e1" stroke-width="2" x="0" y="0" width="78" height="58" rx="8" /><rect fill="#fee2e2" stroke="#ef4444" stroke-width="3" x="88" y="0" width="78" height="58" rx="8" /><rect fill="#dbeafe" stroke="#2563eb" stroke-width="3" x="176" y="0" width="78" height="58" rx="8" /><rect fill="#ffffff" stroke="#cbd5e1" stroke-width="2" x="264" y="0" width="78" height="58" rx="8" /><rect fill="#ffffff" stroke="#cbd5e1" stroke-width="2" x="352" y="0" width="78" height="58" rx="8" /><rect fill="#dcfce7" stroke="#16a34a" stroke-width="3" x="440" y="0" width="78" height="58" rx="8" /><text font-size="24" font-weight="700" fill="#334155" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" x="39" y="37" text-anchor="middle">-4</text><text font-size="24" font-weight="700" fill="#991b1b" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" x="127" y="37" text-anchor="middle">-1</text><text font-size="24" font-weight="700" fill="#1d4ed8" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" x="215" y="37" text-anchor="middle">-1</text><text font-size="24" font-weight="700" fill="#334155" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" x="303" y="37" text-anchor="middle">0</text><text font-size="24" font-weight="700" fill="#334155" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" x="391" y="37" text-anchor="middle">1</text><text font-size="24" font-weight="700" fill="#166534" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" x="479" y="37" text-anchor="middle">2</text><text font-size="14" font-weight="700" fill="#991b1b" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" x="127" y="84" text-anchor="middle">i</text><text font-size="14" font-weight="700" fill="#1d4ed8" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" x="215" y="84" text-anchor="middle">left</text><text font-size="14" font-weight="700" fill="#166534" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" x="479" y="84" text-anchor="middle">right</text></g><rect fill="#f0fdf4" stroke="#86efac" stroke-width="2" x="650" y="596" width="488" height="92" rx="12" /><text font-family="'SFMono-Regular', Consolas, monospace" font-size="15" fill="#166534" x="674" y="630">nums[i] + nums[left] + nums[right] = -1 + (-1) + 2 = 0</text><text font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#166534" x="674" y="660">记录 [-1, -1, 2]，随后去重并继续收缩区间。</text></svg>