<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 710" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <style>
      .title { font-size: 16px; font-weight: 700; fill: #1a1a2e; }
      .node-title { font-size: 13px; font-weight: 700; fill: #1a1a2e; }
      .node-desc { font-size: 11px; fill: #555; }
      .arrow-text { font-size: 10px; fill: #4a5568; }
      .label { font-size: 11px; fill: #2d3748; }
    </style>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="520" height="710" rx="8" fill="#f8f9fb"/>

  <!-- Title -->
  <text x="260" y="32" text-anchor="middle" class="title">DoH 全链路节点拓扑</text>

  <!-- Node 1: Client -->
  <g filter="url(#shadow)">
    <rect x="110" y="50" width="300" height="60" rx="8" fill="#e1f5fe" stroke="#81d4fa" stroke-width="1.5"/>
  </g>
  <text x="260" y="72" text-anchor="middle" class="node-title">客户端 (v2rayN / sing-box)</text>
  <text x="260" y="90" text-anchor="middle" class="node-desc">Remote DNS: https://dns.httpcyiwenapi.uk:10012/dns-query</text>

  <!-- Arrow 1-2 -->
  <line x1="260" y1="110" x2="260" y2="140" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M 0 0 L 10 4 L 0 8 Z" fill="#4a5568"/>
    </marker>
  </defs>
  <text x="270" y="130" class="arrow-text">HTTPS 请求</text>

  <!-- Node 2: DNS Domain -->
  <g filter="url(#shadow)">
    <rect x="110" y="145" width="300" height="60" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="1.5"/>
  </g>
  <text x="260" y="167" text-anchor="middle" class="node-title">DNS 域名解析</text>
  <text x="260" y="185" text-anchor="middle" class="node-desc">dns.httpcyiwenapi.uk → 80.66.196.57 (中转机 IP)</text>

  <!-- Arrow 2-3 -->
  <line x1="260" y1="205" x2="260" y2="235" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="270" y="225" class="arrow-text">端口 :10012</text>

  <!-- Node 3: Relay -->
  <g filter="url(#shadow)">
    <rect x="110" y="240" width="300" height="65" rx="8" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1.5"/>
  </g>
  <text x="260" y="262" text-anchor="middle" class="node-title">中转机 (S-UI 端口转发)</text>
  <text x="260" y="280" text-anchor="middle" class="node-desc">监听: 80.66.196.57:10012</text>
  <text x="260" y="296" text-anchor="middle" class="node-desc">转发: 49.128.204.246:5443</text>

  <!-- Arrow 3-4 -->
  <line x1="260" y1="305" x2="260" y2="335" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="270" y="325" class="arrow-text">TCP 转发 (不解密)</text>

  <!-- Node 4: Landing Machine -->
  <g filter="url(#shadow)">
    <rect x="110" y="340" width="300" height="60" rx="8" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5"/>
  </g>
  <text x="260" y="362" text-anchor="middle" class="node-title">落地机 (Docker 宿主机)</text>
  <text x="260" y="380" text-anchor="middle" class="node-desc">IP: 49.128.204.246 | 宿主机端口: 5443 → 容器端口: 443</text>

  <!-- Arrow 4-5 -->
  <line x1="260" y1="400" x2="260" y2="430" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="270" y="420" class="arrow-text">容器内 443 端口</text>

  <!-- Node 5: AdGuard Home -->
  <g filter="url(#shadow)">
    <rect x="110" y="435" width="300" height="65" rx="8" fill="#fce4ec" stroke="#f48fb1" stroke-width="1.5"/>
  </g>
  <text x="260" y="457" text-anchor="middle" class="node-title">AdGuard Home (Docker 容器)</text>
  <text x="260" y="475" text-anchor="middle" class="node-desc">TLS 加密 · DoH 端点 · 广告过滤</text>
  <text x="260" y="491" text-anchor="middle" class="node-desc">证书: dns.httpcyiwenapi.uk</text>

  <!-- Arrow 5-6 -->
  <line x1="260" y1="500" x2="260" y2="530" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="270" y="520" class="arrow-text">上游 DoH 查询</text>

  <!-- Node 6: Upstream DNS -->
  <g filter="url(#shadow)">
    <rect x="110" y="535" width="300" height="60" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1.5"/>
  </g>
  <text x="260" y="557" text-anchor="middle" class="node-title">上游 DNS 服务器</text>
  <text x="260" y="575" text-anchor="middle" class="node-desc">https://1.1.1.1/dns-query · https://dns.google/dns-query</text>

  <!-- Response arrow -->
  <g opacity="0.5">
    <line x1="420" y1="570" x2="420" y2="80" stroke="#66bb6a" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow-green)"/>
  </g>
  <defs>
    <marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M 0 0 L 10 4 L 0 8 Z" fill="#66bb6a"/>
    </marker>
  </defs>
  <text x="425" y="330" class="arrow-text" fill="#66bb6a" font-weight="600" transform="rotate(-90, 460, 330)" text-anchor="middle">DNS 响应 ← 加密返回</text>

  <!-- Legend -->
  <rect x="15" y="620" width="490" height="80" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="25" y="640" font-size="11" font-weight="700" fill="#1a1a2e">图例</text>

  <rect x="25" y="650" width="14" height="14" rx="3" fill="#e1f5fe" stroke="#81d4fa"/>
  <text x="45" y="661" font-size="10" fill="#555">客户端</text>

  <rect x="120" y="650" width="14" height="14" rx="3" fill="#fff3e0" stroke="#ffcc80"/>
  <text x="140" y="661" font-size="10" fill="#555">域名</text>

  <rect x="215" y="650" width="14" height="14" rx="3" fill="#f3e5f5" stroke="#ce93d8"/>
  <text x="235" y="661" font-size="10" fill="#555">中转机</text>

  <rect x="310" y="650" width="14" height="14" rx="3" fill="#e8f5e9" stroke="#a5d6a7"/>
  <text x="330" y="661" font-size="10" fill="#555">落地机</text>

  <rect x="405" y="650" width="14" height="14" rx="3" fill="#fce4ec" stroke="#f48fb1"/>
  <text x="425" y="661" font-size="10" fill="#555">AdGuard</text>

  <rect x="25" y="670" width="14" height="14" rx="3" fill="#e0e7ff" stroke="#a5b4fc"/>
  <text x="45" y="681" font-size="10" fill="#555">上游 DNS</text>

  <line x1="130" y1="677" x2="160" y2="677" stroke="#4a5568" stroke-width="1.5"/>
  <text x="165" y="681" font-size="10" fill="#555">请求链路</text>

  <line x1="260" y1="677" x2="290" y2="677" stroke="#66bb6a" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="295" y="681" font-size="10" fill="#555">响应返回</text>
</svg>
