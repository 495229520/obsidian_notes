<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 260" role="img" aria-label="UDP 报文格式">
  <rect width="980" height="260" fill="rgb(245, 244, 238)"/>

  <text x="490" y="34" text-anchor="middle" font-size="24" font-family="Arial, PingFang SC, sans-serif" fill="#1f2933">UDP 报文格式</text>

  <rect x="80" y="70" width="200" height="56" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <rect x="280" y="70" width="200" height="56" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <rect x="480" y="70" width="200" height="56" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <rect x="680" y="70" width="220" height="56" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <rect x="80" y="146" width="820" height="68" rx="12" fill="#fffdf8" stroke="#94a3b8" stroke-width="2"/>

  <text x="180" y="93" text-anchor="middle" font-size="16" font-family="Arial, PingFang SC, sans-serif" fill="#102a43">源端口</text>
  <text x="180" y="113" text-anchor="middle" font-size="13" font-family="Arial, PingFang SC, sans-serif" fill="#486581">16 bit</text>

  <text x="380" y="93" text-anchor="middle" font-size="16" font-family="Arial, PingFang SC, sans-serif" fill="#102a43">目标端口</text>
  <text x="380" y="113" text-anchor="middle" font-size="13" font-family="Arial, PingFang SC, sans-serif" fill="#486581">16 bit</text>

  <text x="580" y="93" text-anchor="middle" font-size="16" font-family="Arial, PingFang SC, sans-serif" fill="#102a43">长度</text>
  <text x="580" y="113" text-anchor="middle" font-size="13" font-family="Arial, PingFang SC, sans-serif" fill="#486581">16 bit</text>

  <text x="790" y="93" text-anchor="middle" font-size="16" font-family="Arial, PingFang SC, sans-serif" fill="#102a43">校验和</text>
  <text x="790" y="113" text-anchor="middle" font-size="13" font-family="Arial, PingFang SC, sans-serif" fill="#486581">16 bit</text>

  <text x="490" y="186" text-anchor="middle" font-size="18" font-family="Arial, PingFang SC, sans-serif" fill="#102a43">Payload（应用层数据）</text>
  <text x="490" y="206" text-anchor="middle" font-size="13" font-family="Arial, PingFang SC, sans-serif" fill="#486581">一次 sendto() 发送的内容会作为一个独立数据报交给 UDP</text>

  <text x="80" y="238" font-size="14" font-family="Arial, PingFang SC, sans-serif" fill="#334e68">说明：UDP 头固定只有 8 字节，长度字段包含“UDP 头 + 数据”。</text>
</svg>
