  <text x="400" y="171" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#bf360c">记录 A → 1.2.3.4:50001</text>

  <line x1="650" y1="210" x2="412" y2="210" stroke="#757575" stroke-width="1.5" marker-end="url(#arrowLeft)" />
  <text x="640" y="200" text-anchor="end" font-family="sans-serif" font-size="14" fill="#616161">② 注册 + STUN 绑定请求</text>

  <rect x="310" y="230" width="180" height="32" rx="5" fill="#fbe9e7" stroke="#e57373" stroke-width="1" />
  <text x="400" y="251" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#bf360c">记录 B → 5.6.7.8:50002</text>

  <line x1="400" y1="300" x2="162" y2="300" stroke="#757575" stroke-width="1.5" marker-end="url(#arrowLeft)" />
