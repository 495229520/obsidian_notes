  <text x="150" y="42" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="16" fill="#1b5e20">节点 A</text>
  <text x="150" y="64" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#2e7d32">1.2.3.4:50001</text>

