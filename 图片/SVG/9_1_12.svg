  <text x="400" y="42" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="16" fill="#bf360c">信令服务器</text>
  <text x="400" y="64" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#d84315">9.9.9.9:3478</text>

  <rect x="550" y="20" width="200" height="60" rx="10" fill="#e8f5e9" stroke="#81c784" stroke-width="1.5" />
  <text x="650" y="42" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="16" fill="#1b5e20">节点 B</text>
  <text x="650" y="64" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#2e7d32">5.6.7.8:50002</text>

  <line x1="150" y1="130" x2="388" y2="130" stroke="#757575" stroke-width="1.5" marker-end="url(#arrowRight)" />
  <text x="160" y="120" font-family="sans-serif" font-size="14" fill="#616161">① 注册 + STUN 绑定请求</text>

