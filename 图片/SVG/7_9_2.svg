  <rect x="500" y="60" width="320" height="80" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="660" y="88" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#3C3489">ThreadWorker</text>
  <text x="660" y="108" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="11" font-weight="400" fill="#534AB7">thiz : ThreadFuncBase*</text>
  <text x="660" y="126" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="11" font-weight="400" fill="#534AB7">func : FUNCTYPE</text>

  <path d="M500,100 L302,110" stroke="#185FA5" stroke-width="1.5" fill="none" marker-end="url(#arrow2)"/>
  <text x="405" y="89" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="10" fill="#185FA5">持有统一基类指针</text>

  <rect x="500" y="220" width="320" height="88" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="660" y="248" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#085041">EdoyunThread</text>
  <text x="660" y="268" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="11" font-weight="400" fill="#0F6E56">m_hThread : HANDLE</text>
  <text x="660" y="286" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="11" font-weight="400" fill="#0F6E56">m_worker : atomic&lt;ThreadWorker&gt;</text>

  <path d="M660,220 L660,140" stroke="#534AB7" stroke-width="1.5" fill="none" marker-end="url(#arrow2)"/>
  <text x="675" y="178" text-anchor="start" dominant-baseline="central"
