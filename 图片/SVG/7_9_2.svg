  <rect x="500" y="385" width="320" height="60" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="660" y="407" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#633806">EdoyunThreadPool</text>
  <text x="660" y="426" text-anchor="middle" dominant-baseline="central"
