<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="900" height="500" fill="rgb(245, 244, 237)"/>

  <text x="450" y="28" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#444441">EdoyunThread 家族结构</text>

  <rect x="40" y="80" width="260" height="60" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="170" y="102" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#0C447C">ThreadFuncBase</text>
  <text x="170" y="121" text-anchor="middle" dominant-baseline="central"
