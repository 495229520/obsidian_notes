<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1500px" height="920px" viewBox="0 0 1500 920" version="1.1"><title>NAT 过滤行为对比</title><desc>用三条横向泳道对比 EIF、ADF、APDF 的 UDP NAT 过滤行为，突出不同外部来源是否会被允许回包。</desc><rect x="0" y="0" width="1500" height="920" fill="rgb(245, 244, 237)" /><defs><marker id="arrowGray" markerWidth="9" markerHeight="9" refX="8.2" refY="4.5" orient="auto" viewBox="0 0 9 9"><path d="M0 0 L9 4.5 L0 9 Z" fill="#5A574F" /></marker></defs><text fill="#2E2A23" font-size="28" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="750" y="56" text-anchor="middle" dominant-baseline="middle">过滤：别人拿着这个公网号码牌回来时，NAT 放不放行</text><text fill="#6C665A" font-size="16" font-weight="500" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="750" y="94" text-anchor="middle" dominant-baseline="middle">这里看的不是“我像谁”，而是“外部哪些来源有资格回到这个公网映射”</text><rect fill="#F7F4EC" stroke="#D8D1C2" stroke-width="1.6" x="390" y="130" width="1010" height="76" rx="22" ry="22" /><text fill="#5B5548" font-size="16" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="426" y="168" text-anchor="start" dominant-baseline="middle">来源样本</text><rect fill="#ECFEFF" stroke="#81CFE0" stroke-width="1.4" x="548" y="144" width="228" height="48" rx="24" ry="24" /><text fill="#155C70" font-size="14" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="662" y="168.5" text-anchor="middle" dominant-baseline="middle">Z1 = 203.0.113.10:3478</text><rect fill="#ECFEFF" stroke="#81CFE0" stroke-width="1.4" x="796" y="144" width="228" height="48" rx="24" ry="24" /><text fill="#155C70" font-size="14" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="910" y="168.5" text-anchor="middle" dominant-baseline="middle">Z2 = 203.0.113.10:50000</text><rect fill="#ECFEFF" stroke="#81CFE0" stroke-width="1.4" x="1044" y="144" width="264" height="48" rx="24" ry="24" /><text fill="#155C70" font-size="14" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="1176" y="168.5" text-anchor="middle" dominant-baseline="middle">Z3 = 198.51.100.20:9000</text><rect fill="#E6F1FB" stroke="#185FA5" stroke-width="2" x="80" y="235" width="250" height="470" rx="28" ry="28" /><text fill="#0C447C" font-size="26" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="205" y="315" text-anchor="middle" dominant-baseline="middle">内部 socket X:x</text><text fill="#1E517F" font-size="18.5" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="205" y="365" text-anchor="middle" dominant-baseline="middle">已经先向 Z1 发过包<tspan x="205" dy="26.27">当前公网映射是 X':62000</tspan></text><text fill="#4A6D89" font-size="16" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="205" y="515" text-anchor="middle" dominant-baseline="middle">观察点不再是映射变没变<tspan x="205" dy="23.2">而是谁还能顺着这个号码牌回来</tspan></text><line fill="none" stroke="#5A574F" stroke-width="2.3" stroke-linecap="round" marker-end="url(#arrowGray)" x1="330" y1="302" x2="382" y2="302" /><rect fill="#E9F7EC" stroke="#23824A" stroke-width="2" x="390" y="238" width="470" height="128" rx="24" ry="24" /><text fill="#145C33" font-size="27" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="438" y="268" text-anchor="start" dominant-baseline="hanging">EIF</text><rect fill="#FFFFFF" stroke="#23824A" stroke-width="1.3" x="686" y="256" width="150" height="30" rx="15" ry="15" /><text fill="#145C33" font-size="13.5" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="761" y="271" text-anchor="middle" dominant-baseline="middle">最宽松</text><text fill="#376A49" font-size="15.2" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="438" y="326" text-anchor="start" dominant-baseline="middle">只要内部端点已经向外发过包</text><text fill="#376A49" font-size="15.2" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="438" y="350" text-anchor="start" dominant-baseline="middle">几乎任何来源都可能被放行</text><line fill="none" stroke="#5A574F" stroke-width="2.3" stroke-linecap="round" marker-end="url(#arrowGray)" x1="860" y1="302" x2="912" y2="302" /><rect fill="#F7FCF8" stroke="#23824A" stroke-width="1.8" x="920" y="238" width="480" height="128" rx="24" ry="24" /><text fill="#145C33" font-size="15" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="948" y="256" text-anchor="start" dominant-baseline="hanging">放行结果</text><rect fill="#FFFFFF" stroke="#DDD7CA" stroke-width="1.2" x="948" y="280" width="410" height="22" rx="11" ry="11" /><text fill="#2E2A23" font-size="14.5" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="962" y="291" text-anchor="start" dominant-baseline="middle">Z1</text><rect fill="#EAF7EF" stroke="#A7D0B7" stroke-width="1.1" x="1258" y="282" width="86" height="18" rx="9" ry="9" /><text fill="#206A43" font-size="13" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="1301" y="291" text-anchor="middle" dominant-baseline="middle">可回包</text><rect fill="#FFFFFF" stroke="#DDD7CA" stroke-width="1.2" x="948" y="308" width="410" height="22" rx="11" ry="11" /><text fill="#2E2A23" font-size="14.5" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="962" y="319" text-anchor="start" dominant-baseline="middle">Z2</text><rect fill="#EAF7EF" stroke="#A7D0B7" stroke-width="1.1" x="1258" y="310" width="86" height="18" rx="9" ry="9" /><text fill="#206A43" font-size="13" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="1301" y="319" text-anchor="middle" dominant-baseline="middle">可回包</text><rect fill="#FFFFFF" stroke="#DDD7CA" stroke-width="1.2" x="948" y="336" width="410" height="22" rx="11" ry="11" /><text fill="#2E2A23" font-size="14.5" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="962" y="347" text-anchor="start" dominant-baseline="middle">Z3</text><rect fill="#EAF7EF" stroke="#A7D0B7" stroke-width="1.1" x="1258" y="338" width="86" height="18" rx="9" ry="9" /><text fill="#206A43" font-size="13" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="1301" y="347" text-anchor="middle" dominant-baseline="middle">可回包</text><line fill="none" stroke="#5A574F" stroke-width="2.3" stroke-linecap="round" marker-end="url(#arrowGray)" x1="330" y1="470" x2="382" y2="470" /><rect fill="#FFF4D8" stroke="#D89B3A" stroke-width="2" x="390" y="406" width="470" height="128" rx="24" ry="24" /><text fill="#7C4A03" font-size="27" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="438" y="436" text-anchor="start" dominant-baseline="hanging">ADF</text><rect fill="#FFFFFF" stroke="#D89B3A" stroke-width="1.3" x="686" y="424" width="150" height="30" rx="15" ry="15" /><text fill="#7C4A03" font-size="13.5" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="761" y="439" text-anchor="middle" dominant-baseline="middle">按来源 IP 过滤</text><text fill="#8B642B" font-size="15.2" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="438" y="494" text-anchor="start" dominant-baseline="middle">只要来源 IP 和 Z1 一样就能回来</text><text fill="#8B642B" font-size="15.2" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="438" y="518" text-anchor="start" dominant-baseline="middle">端口换了也可能放行</text><line fill="none" stroke="#5A574F" stroke-width="2.3" stroke-linecap="round" marker-end="url(#arrowGray)" x1="860" y1="470" x2="912" y2="470" /><rect fill="#FFF9EC" stroke="#D89B3A" stroke-width="1.8" x="920" y="406" width="480" height="128" rx="24" ry="24" /><text fill="#7C4A03" font-size="15" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="948" y="424" text-anchor="start" dominant-baseline="hanging">放行结果</text><rect fill="#FFFFFF" stroke="#DDD7CA" stroke-width="1.2" x="948" y="448" width="410" height="22" rx="11" ry="11" /><text fill="#2E2A23" font-size="14.5" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="962" y="459" text-anchor="start" dominant-baseline="middle">Z1</text><rect fill="#EAF7EF" stroke="#A7D0B7" stroke-width="1.1" x="1258" y="450" width="86" height="18" rx="9" ry="9" /><text fill="#206A43" font-size="13" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="1301" y="459" text-anchor="middle" dominant-baseline="middle">可回包</text><rect fill="#FFFFFF" stroke="#DDD7CA" stroke-width="1.2" x="948" y="476" width="410" height="22" rx="11" ry="11" /><text fill="#2E2A23" font-size="14.5" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="962" y="487" text-anchor="start" dominant-baseline="middle">Z2</text><rect fill="#EAF7EF" stroke="#A7D0B7" stroke-width="1.1" x="1258" y="478" width="86" height="18" rx="9" ry="9" /><text fill="#206A43" font-size="13" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="1301" y="487" text-anchor="middle" dominant-baseline="middle">可回包</text><rect fill="#FFFFFF" stroke="#DDD7CA" stroke-width="1.2" x="948" y="504" width="410" height="22" rx="11" ry="11" /><text fill="#2E2A23" font-size="14.5" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="962" y="515" text-anchor="start" dominant-baseline="middle">Z3</text><rect fill="#FFF0E8" stroke="#E6B89A" stroke-width="1.1" x="1258" y="506" width="86" height="18" rx="9" ry="9" /><text fill="#A14A1D" font-size="13" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="1301" y="515" text-anchor="middle" dominant-baseline="middle">被拦截</text><line fill="none" stroke="#5A574F" stroke-width="2.3" stroke-linecap="round" marker-end="url(#arrowGray)" x1="330" y1="638" x2="382" y2="638" /><rect fill="#FFF1E8" stroke="#D46A1F" stroke-width="2" x="390" y="574" width="470" height="128" rx="24" ry="24" /><text fill="#93450B" font-size="27" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="438" y="604" text-anchor="start" dominant-baseline="hanging">APDF</text><rect fill="#FFFFFF" stroke="#D46A1F" stroke-width="1.3" x="686" y="592" width="150" height="30" rx="15" ry="15" /><text fill="#93450B" font-size="13.5" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="761" y="607" text-anchor="middle" dominant-baseline="middle">按来源 IP:port 过滤</text><text fill="#A56D3B" font-size="15.2" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="438" y="646" text-anchor="start" dominant-baseline="middle">必须是那个精确的 IP:port 才能回来</text><text fill="#A56D3B" font-size="15.2" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="438" y="670" text-anchor="start" dominant-baseline="middle">来源只要差一点都会被挡住</text><line fill="none" stroke="#5A574F" stroke-width="2.3" stroke-linecap="round" marker-end="url(#arrowGray)" x1="860" y1="638" x2="912" y2="638" /><rect fill="#FFF8F4" stroke="#D46A1F" stroke-width="1.8" x="920" y="574" width="480" height="128" rx="24" ry="24" /><text fill="#93450B" font-size="15" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="948" y="592" text-anchor="start" dominant-baseline="hanging">放行结果</text><rect fill="#FFFFFF" stroke="#DDD7CA" stroke-width="1.2" x="948" y="616" width="410" height="22" rx="11" ry="11" /><text fill="#2E2A23" font-size="14.5" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="962" y="627" text-anchor="start" dominant-baseline="middle">Z1</text><rect fill="#EAF7EF" stroke="#A7D0B7" stroke-width="1.1" x="1258" y="618" width="86" height="18" rx="9" ry="9" /><text fill="#206A43" font-size="13" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="1301" y="627" text-anchor="middle" dominant-baseline="middle">可回包</text><rect fill="#FFFFFF" stroke="#DDD7CA" stroke-width="1.2" x="948" y="644" width="410" height="22" rx="11" ry="11" /><text fill="#2E2A23" font-size="14.5" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="962" y="655" text-anchor="start" dominant-baseline="middle">Z2</text><rect fill="#FFF0E8" stroke="#E6B89A" stroke-width="1.1" x="1258" y="646" width="86" height="18" rx="9" ry="9" /><text fill="#A14A1D" font-size="13" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="1301" y="655" text-anchor="middle" dominant-baseline="middle">被拦截</text><rect fill="#FFFFFF" stroke="#DDD7CA" stroke-width="1.2" x="948" y="672" width="410" height="22" rx="11" ry="11" /><text fill="#2E2A23" font-size="14.5" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="962" y="683" text-anchor="start" dominant-baseline="middle">Z3</text><rect fill="#FFF0E8" stroke="#E6B89A" stroke-width="1.1" x="1258" y="674" width="86" height="18" rx="9" ry="9" /><text fill="#A14A1D" font-size="13" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="1301" y="683" text-anchor="middle" dominant-baseline="middle">被拦截</text><rect fill="#FAEEDA" stroke="#C27A18" stroke-width="1.8" x="90" y="790" width="1320" height="96" rx="22" ry="22" /><text fill="#6C4207" font-size="18" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="750" y="828" text-anchor="middle" dominant-baseline="middle">安全性主要由 filtering 决定，不是由 mapping 决定。</text><text fill="#8B642B" font-size="16" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="750" y="860" text-anchor="middle" dominant-baseline="middle">过滤越严格，双方就越需要“先互相发过包”，这也是打洞常强调几乎同时发 PUNCH 的原因。</text></svg>