<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <defs>
    <marker id="arrow-dark" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1 L8 5 L1 9" fill="none" stroke="#534b3f" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="820" fill="rgb(245, 244, 237)"/>

  <g font-family="Microsoft YaHei, Segoe UI, sans-serif">
    <text x="700" y="42" text-anchor="middle" font-size="28" font-weight="700" fill="#3d3a34">经典 TCP 远控主链静态架构</text>
    <text x="700" y="72" text-anchor="middle" font-size="14" fill="#6a655d">这条链路承载了当前项目里最完整的功能实现：目录、下载、截图、鼠标、锁机、删除与连接测试</text>

    <rect x="60" y="110" width="520" height="630" rx="22" fill="#e7f1fb" stroke="#2f6f9f" stroke-width="2.2"/>
    <text x="320" y="148" text-anchor="middle" font-size="25" font-weight="700" fill="#134f7c">控制端：RemoteClient</text>

    <rect x="110" y="182" width="420" height="108" rx="16" fill="#f6fbff" stroke="#6fa3cc" stroke-width="1.4"/>
    <text x="320" y="216" text-anchor="middle" font-size="22" font-weight="700" fill="#11486f">CRemoteClientDlg</text>
    <text x="320" y="246" text-anchor="middle" font-size="14" fill="#2f6f9f">IP/Port、目录树、列表、右键菜单、入口按钮</text>

    <rect x="110" y="324" width="198" height="102" rx="16" fill="#f6fbff" stroke="#6fa3cc" stroke-width="1.4"/>
    <text x="209" y="358" text-anchor="middle" font-size="20" font-weight="700" fill="#11486f">CWatchDialog</text>
    <text x="209" y="388" text-anchor="middle" font-size="13" fill="#2f6f9f">截图显示、坐标映射、锁机/解锁按钮</text>

    <rect x="332" y="324" width="198" height="102" rx="16" fill="#f6fbff" stroke="#6fa3cc" stroke-width="1.4"/>
    <text x="431" y="358" text-anchor="middle" font-size="20" font-weight="700" fill="#11486f">CStatusDlg</text>
    <text x="431" y="388" text-anchor="middle" font-size="13" fill="#2f6f9f">下载状态、操作提示、等待反馈</text>

    <rect x="110" y="470" width="420" height="92" rx="16" fill="#f6fbff" stroke="#6fa3cc" stroke-width="1.4"/>
    <text x="320" y="504" text-anchor="middle" font-size="22" font-weight="700" fill="#11486f">CClientController</text>
    <text x="320" y="534" text-anchor="middle" font-size="14" fill="#2f6f9f">统一发送入口、下载流程编排、监视线程管理</text>

    <rect x="110" y="596" width="420" height="104" rx="16" fill="#f6fbff" stroke="#6fa3cc" stroke-width="1.4"/>
    <text x="320" y="630" text-anchor="middle" font-size="20" font-weight="700" fill="#11486f">CClientSocket + duplicated CPacket</text>
    <text x="320" y="660" text-anchor="middle" font-size="13" fill="#2f6f9f">PostThreadMessage、SendPack、WM_SEND_PACK_ACK、4MB 缓冲</text>

    <rect x="620" y="286" width="160" height="188" rx="22" fill="#fff1df" stroke="#c26a13" stroke-width="2.2"/>
    <text x="700" y="332" text-anchor="middle" font-size="24" font-weight="700" fill="#8f4c08">TCP 9527</text>
    <text x="700" y="372" text-anchor="middle" font-size="15" font-weight="600" fill="#c26a13">短连接命令</text>
    <text x="700" y="404" text-anchor="middle" font-size="14" fill="#c26a13">目录遍历 / 下载</text>
    <text x="700" y="432" text-anchor="middle" font-size="13" fill="#c26a13">用 bAutoClose=false</text>

    <rect x="820" y="110" width="520" height="630" rx="22" fill="#e5f7f0" stroke="#1a7d63" stroke-width="2.2"/>
    <text x="1080" y="148" text-anchor="middle" font-size="25" font-weight="700" fill="#0d5d49">被控端：RemoteCtrl</text>

    <rect x="870" y="178" width="420" height="92" rx="16" fill="#f6fffb" stroke="#6db89f" stroke-width="1.4"/>
    <text x="1080" y="212" text-anchor="middle" font-size="22" font-weight="700" fill="#0d5d49">CServerSocket</text>
    <text x="1080" y="242" text-anchor="middle" font-size="14" fill="#1a7d63">bind / listen / accept / recv / send / CloseClient</text>

    <rect x="870" y="300" width="420" height="82" rx="16" fill="#f6fffb" stroke="#6db89f" stroke-width="1.4"/>
    <text x="1080" y="332" text-anchor="middle" font-size="22" font-weight="700" fill="#0d5d49">CPacket</text>
    <text x="1080" y="360" text-anchor="middle" font-size="14" fill="#1a7d63">FEFF 头 + 长度 + 命令 + 数据 + 校验和</text>

    <rect x="870" y="412" width="420" height="92" rx="16" fill="#f6fffb" stroke="#6db89f" stroke-width="1.4"/>
    <text x="1080" y="446" text-anchor="middle" font-size="22" font-weight="700" fill="#0d5d49">CCommand</text>
    <text x="1080" y="476" text-anchor="middle" font-size="14" fill="#1a7d63">map&lt;int, CMDFUNC&gt; 按命令分发到功能处理函数</text>

    <rect x="870" y="540" width="194" height="70" rx="16" fill="#eefaf5" stroke="#6db89f" stroke-width="1.2"/>
    <text x="967" y="568" text-anchor="middle" font-size="18" font-weight="700" fill="#0d5d49">文件链</text>
    <text x="967" y="594" text-anchor="middle" font-size="12" fill="#1a7d63">磁盘 / 目录 / 打开 / 下载 / 删除</text>

    <rect x="1096" y="540" width="194" height="70" rx="16" fill="#eefaf5" stroke="#6db89f" stroke-width="1.2"/>
    <text x="1193" y="568" text-anchor="middle" font-size="18" font-weight="700" fill="#0d5d49">交互链</text>
    <text x="1193" y="594" text-anchor="middle" font-size="12" fill="#1a7d63">截图 / 鼠标 / ACK 回执</text>

    <rect x="870" y="628" width="194" height="70" rx="16" fill="#eefaf5" stroke="#6db89f" stroke-width="1.2"/>
    <text x="967" y="656" text-anchor="middle" font-size="18" font-weight="700" fill="#0d5d49">锁机链</text>
    <text x="967" y="682" text-anchor="middle" font-size="12" fill="#1a7d63">LockInfoDialog / 线程消息 / 任务栏控制</text>

    <rect x="1096" y="628" width="194" height="70" rx="16" fill="#eefaf5" stroke="#6db89f" stroke-width="1.2"/>
    <text x="1193" y="656" text-anchor="middle" font-size="18" font-weight="700" fill="#0d5d49">测试链</text>
    <text x="1193" y="682" text-anchor="middle" font-size="12" fill="#1a7d63">1981 TestConnect / 基础状态确认</text>

    <path d="M320 290 L320 324" fill="none" stroke="#534b3f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-dark)"/>
    <path d="M320 426 L320 470" fill="none" stroke="#534b3f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-dark)"/>
    <path d="M320 562 L320 596" fill="none" stroke="#534b3f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-dark)"/>
    <path d="M530 648 L620 648 L620 380" fill="none" stroke="#534b3f" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-dark)"/>
    <path d="M780 380 L870 380 L870 224" fill="none" stroke="#534b3f" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-dark)"/>
    <path d="M1080 270 L1080 300" fill="none" stroke="#534b3f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-dark)"/>
    <path d="M1080 382 L1080 412" fill="none" stroke="#534b3f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-dark)"/>
    <path d="M1080 504 L967 540" fill="none" stroke="#534b3f" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-dark)"/>
    <path d="M1080 504 L1193 540" fill="none" stroke="#534b3f" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-dark)"/>
    <path d="M1080 504 L967 628" fill="none" stroke="#534b3f" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-dark)"/>
    <path d="M1080 504 L1193 628" fill="none" stroke="#534b3f" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-dark)"/>

    <rect x="150" y="760" width="1100" height="34" rx="14" fill="#efe7d8" stroke="#8c7a58" stroke-width="1.2"/>
    <text x="700" y="782" text-anchor="middle" font-size="14" font-weight="500" fill="#5a5348">关键特点：多数命令走短连接；目录遍历与下载通过 bAutoClose=false 在同一连接上连续收包</text>
  </g>
</svg>
