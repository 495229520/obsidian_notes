<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="820" viewBox="0 0 1360 820">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1 L8 5 L1 9" fill="none" stroke="#2f6f9f" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1 L8 5 L1 9" fill="none" stroke="#1a7d63" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1 L8 5 L1 9" fill="none" stroke="#c26a13" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1360" height="820" fill="rgb(245, 244, 237)"/>

  <g font-family="Microsoft YaHei, Segoe UI, sans-serif">
    <text x="680" y="42" text-anchor="middle" font-size="28" font-weight="700" fill="#3d3a34">RemoteCtrl 最终版全景：主项目、重构实验与 UDP 演示三条线</text>
    <text x="680" y="72" text-anchor="middle" font-size="14" fill="#6a655d">当前仓库不是三套并列成品，而是一套经典 TCP 远控主线，加上 IOCP 与 UDP 两条学习型实验支线</text>

    <rect x="480" y="100" width="400" height="74" rx="18" fill="#f2ece1" stroke="#7b6f59" stroke-width="1.8"/>
    <text x="680" y="132" text-anchor="middle" font-size="22" font-weight="700" fill="#4b463f">统一观察入口：RemoteCtrl.cpp / main()</text>
    <text x="680" y="156" text-anchor="middle" font-size="13" fill="#6a655d">最新提交 91e9798；默认入口已经切到 argc 驱动的 UDP 演示流程</text>

    <rect x="40" y="220" width="400" height="470" rx="22" fill="#e7f1fb" stroke="#2f6f9f" stroke-width="2.2"/>
    <text x="240" y="258" text-anchor="middle" font-size="24" font-weight="700" fill="#134f7c">A. 经典 TCP 远控主线</text>
    <text x="240" y="286" text-anchor="middle" font-size="14" fill="#2f6f9f">功能最完整，也是最适合教学复盘的一条线</text>
    <rect x="74" y="318" width="332" height="78" rx="16" fill="#f6fbff" stroke="#6fa3cc" stroke-width="1.4"/>
    <text x="240" y="348" text-anchor="middle" font-size="20" font-weight="700" fill="#11486f">RemoteClient.exe</text>
    <text x="240" y="374" text-anchor="middle" font-size="13" fill="#2f6f9f">RemoteClientDlg / CWatchDialog / CStatusDlg</text>
    <rect x="74" y="418" width="332" height="84" rx="16" fill="#f6fbff" stroke="#6fa3cc" stroke-width="1.4"/>
    <text x="240" y="450" text-anchor="middle" font-size="19" font-weight="700" fill="#11486f">CClientController + CClientSocket</text>
    <text x="240" y="476" text-anchor="middle" font-size="13" fill="#2f6f9f">WM_SEND_PACK / WM_SEND_PACK_ACK / duplicated CPacket</text>
    <rect x="74" y="524" width="332" height="84" rx="16" fill="#f6fbff" stroke="#6fa3cc" stroke-width="1.4"/>
    <text x="240" y="556" text-anchor="middle" font-size="18" font-weight="700" fill="#11486f">RemoteCtrl.exe / CServerSocket / CCommand</text>
    <text x="240" y="582" text-anchor="middle" font-size="13" fill="#2f6f9f">阻塞 accept + recv；map&lt;int, CMDFUNC&gt; 命令分发</text>
    <rect x="74" y="628" width="332" height="38" rx="14" fill="#d9ebfb" stroke="#2f6f9f" stroke-width="1.2"/>
    <text x="240" y="652" text-anchor="middle" font-size="12" font-weight="600" fill="#134f7c">已实现：目录树、下载、截图、鼠标、锁机、删除、测试连接</text>

    <rect x="480" y="220" width="400" height="470" rx="22" fill="#e5f7f0" stroke="#1a7d63" stroke-width="2.2"/>
    <text x="680" y="258" text-anchor="middle" font-size="24" font-weight="700" fill="#0d5d49">B. IOCP 重构实验线</text>
    <text x="680" y="286" text-anchor="middle" font-size="14" fill="#1a7d63">重点在完成端口、重叠 I/O、工作线程调度与所有权实验</text>
    <rect x="514" y="318" width="332" height="78" rx="16" fill="#f6fffb" stroke="#6db89f" stroke-width="1.4"/>
    <text x="680" y="348" text-anchor="middle" font-size="20" font-weight="700" fill="#0d5d49">EdoyunServer</text>
    <text x="680" y="374" text-anchor="middle" font-size="13" fill="#1a7d63">CreateIoCompletionPort / StartService / NewAccept</text>
    <rect x="514" y="418" width="332" height="84" rx="16" fill="#f6fffb" stroke="#6db89f" stroke-width="1.4"/>
    <text x="680" y="450" text-anchor="middle" font-size="19" font-weight="700" fill="#0d5d49">AcceptEx / WSARecv / WSASend</text>
    <text x="680" y="476" text-anchor="middle" font-size="13" fill="#1a7d63">AcceptOverlapped / RecvOverlapped / SendOverlapped</text>
    <rect x="514" y="524" width="332" height="84" rx="16" fill="#f6fffb" stroke="#6db89f" stroke-width="1.4"/>
    <text x="680" y="556" text-anchor="middle" font-size="18" font-weight="700" fill="#0d5d49">EdoyunThread / ThreadPool / CEdoyunQueue</text>
    <text x="680" y="582" text-anchor="middle" font-size="13" fill="#1a7d63">任务派发、发送队列、实验性生命周期收口</text>
    <rect x="514" y="628" width="332" height="38" rx="14" fill="#d8f1e7" stroke="#1a7d63" stroke-width="1.2"/>
    <text x="680" y="652" text-anchor="middle" font-size="12" font-weight="600" fill="#0d5d49">现状：能学设计思想，但还没有替代经典 TCP 主链</text>

    <rect x="920" y="220" width="400" height="470" rx="22" fill="#fff1df" stroke="#c26a13" stroke-width="2.2"/>
    <text x="1120" y="258" text-anchor="middle" font-size="24" font-weight="700" fill="#8f4c08">C. UDP 穿透演示线</text>
    <text x="1120" y="286" text-anchor="middle" font-size="14" fill="#c26a13">最新入口所在分支，重点在多进程角色编排与后续 NAT 打洞实验</text>
    <rect x="954" y="318" width="332" height="78" rx="16" fill="#fffaf1" stroke="#d8a15f" stroke-width="1.4"/>
    <text x="1120" y="348" text-anchor="middle" font-size="20" font-weight="700" fill="#8f4c08">main(argc, argv)</text>
    <text x="1120" y="374" text-anchor="middle" font-size="13" fill="#c26a13">argc==1 父进程；argc==2 host；argc&gt;2 peer</text>
    <rect x="954" y="418" width="332" height="84" rx="16" fill="#fffaf1" stroke="#d8a15f" stroke-width="1.4"/>
    <text x="1120" y="450" text-anchor="middle" font-size="19" font-weight="700" fill="#8f4c08">CreateProcessA 拉起多角色</text>
    <text x="1120" y="476" text-anchor="middle" font-size="13" fill="#c26a13">父进程 + host client + peer client 的本地实验骨架</text>
    <rect x="954" y="524" width="332" height="84" rx="16" fill="#fffaf1" stroke="#d8a15f" stroke-width="1.4"/>
    <text x="1120" y="556" text-anchor="middle" font-size="18" font-weight="700" fill="#8f4c08">udp_server / udp_client</text>
    <text x="1120" y="582" text-anchor="middle" font-size="13" fill="#c26a13">已能演示角色切换；真实 NAT 洞穿与信令仍待实现</text>
    <rect x="954" y="628" width="332" height="38" rx="14" fill="#ffe6c8" stroke="#c26a13" stroke-width="1.2"/>
    <text x="1120" y="652" text-anchor="middle" font-size="12" font-weight="600" fill="#8f4c08">当前默认入口就在这里，所以最终版现状必须把它单独讲清楚</text>

    <path d="M640 170 L240 170 L240 220" fill="none" stroke="#2f6f9f" stroke-width="2" stroke-dasharray="6 5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-blue)"/>
    <text x="308" y="188" font-size="12" font-weight="600" fill="#2f6f9f">保留的完整功能链</text>

    <path d="M680 170 L680 220" fill="none" stroke="#1a7d63" stroke-width="2" stroke-dasharray="6 5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-green)"/>
    <text x="698" y="194" font-size="12" font-weight="600" fill="#1a7d63">保留的重构实验线</text>

    <path d="M720 170 L1120 170 L1120 220" fill="none" stroke="#c26a13" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-orange)"/>
    <text x="988" y="188" font-size="12" font-weight="700" fill="#c26a13">当前默认入口</text>

    <rect x="170" y="730" width="1020" height="54" rx="18" fill="#efe7d8" stroke="#8c7a58" stroke-width="1.2"/>
    <text x="680" y="762" text-anchor="middle" font-size="14" font-weight="500" fill="#5a5348">推荐阅读顺序：先吃透经典 TCP 主线，再看 IOCP 实验如何尝试升级并发模型，最后回看 UDP 分支理解项目为何在最终阶段切换研究方向</text>
  </g>
</svg>
