<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" width="900" height="260" shape-rendering="geometricPrecision" font-family="Microsoft YaHei UI, Consolas, monospace" font-size="13">
  <rect width="100%" height="100%" fill="rgb(245, 244, 237)"/>
  <defs>
    <marker id="arr2" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M1 1 L7 4 L1 7" fill="none" stroke="#0f172a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <text font-family="Microsoft YaHei UI, Consolas, monospace" x="450" y="25" text-anchor="middle" font-size="15" font-weight="bold">CPacket — 小端序，#pragma pack(1)</text>

  <g>
    <rect x="30"  y="60" width="110" height="60" fill="#fde68a" stroke="#b45309"/>
    <rect x="140" y="60" width="140" height="60" fill="#bbf7d0" stroke="#166534"/>
    <rect x="280" y="60" width="110" height="60" fill="#bfdbfe" stroke="#1d4ed8"/>
    <rect x="390" y="60" width="350" height="60" fill="#e9d5ff" stroke="#6b21a8"/>
    <rect x="740" y="60" width="110" height="60" fill="#fecaca" stroke="#991b1b"/>

    <text font-family="Microsoft YaHei UI, Consolas, monospace" x="85"  y="95" text-anchor="middle">sHead 2B</text>
    <text font-family="Microsoft YaHei UI, Consolas, monospace" x="210" y="95" text-anchor="middle">nLength 4B</text>
    <text font-family="Microsoft YaHei UI, Consolas, monospace" x="335" y="95" text-anchor="middle">sCmd 2B</text>
    <text font-family="Microsoft YaHei UI, Consolas, monospace" x="565" y="95" text-anchor="middle">strData (nLength-4) B</text>
    <text font-family="Microsoft YaHei UI, Consolas, monospace" x="795" y="95" text-anchor="middle">sSum 2B</text>

    <text font-family="Microsoft YaHei UI, Consolas, monospace" x="85"  y="140" text-anchor="middle" fill="#78350f">0xFEFF</text>
    <text font-family="Microsoft YaHei UI, Consolas, monospace" x="210" y="140" text-anchor="middle" fill="#14532d">payload+2(cmd)+2(sum)</text>
    <text font-family="Microsoft YaHei UI, Consolas, monospace" x="335" y="140" text-anchor="middle" fill="#1e3a8a">命令 ID</text>
    <text font-family="Microsoft YaHei UI, Consolas, monospace" x="565" y="140" text-anchor="middle" fill="#581c87">任意字节</text>
    <text font-family="Microsoft YaHei UI, Consolas, monospace" x="795" y="140" text-anchor="middle" fill="#7f1d1d">Σ(byte) &amp; 0xFFFF</text>
  </g>

  <line x1="140" y1="190" x2="850" y2="190" stroke="#0f172a" marker-end="url(#arr2)" marker-start="url(#arr2)"/>
  <text font-family="Microsoft YaHei UI, Consolas, monospace" x="495" y="182" text-anchor="middle" fill="#0f172a" font-size="12">nLength 覆盖 [sCmd + strData + sSum]</text>

  <text font-family="Microsoft YaHei UI, Consolas, monospace" x="30" y="225" font-size="11" fill="#334155">
    线上总长度 = nLength + 6（= 2B 头 + 4B 长度前缀 + payload）。校验和只是对数据字节做普通 WORD 累加（简单、非加密）。
  </text>
  <text font-family="Microsoft YaHei UI, Consolas, monospace" x="30" y="245" font-size="11" fill="#334155">
    解析器行为：如果缓冲区里还没有完整包，nSize 会被置为 0，由调用者继续读取。
  </text>
</svg>
