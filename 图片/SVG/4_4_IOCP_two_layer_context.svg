<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 440" role="img" aria-labelledby="title desc">
  <title id="title">IOCP 的两层上下文</title>
  <desc id="desc">展示完成包返回后，CompletionKey 用于定位连接级上下文，OVERLAPPED 指针用于定位单次 I/O 请求级上下文。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1180" height="440" fill="rgb(245, 244, 237)"/>
  <rect x="24" y="20" width="1132" height="400" rx="24" fill="#FCFBF7" stroke="#D6D3D1" stroke-width="1.2"/>

  <g font-family="system-ui, sans-serif">
    <text x="590" y="58" font-size="24" font-weight="700" fill="#1F2937" text-anchor="middle">IOCP 的两层上下文</text>
    <text x="590" y="84" font-size="13" fill="#57534E" text-anchor="middle">完成包回来后，不是直接“知道一切”，而是靠两个入口分别找到连接和本次 I/O</text>

    <rect x="312" y="108" width="356" height="50" rx="25" fill="#EEE9E1" stroke="#C9C2B7" stroke-width="1"/>
    <text x="490" y="130" font-size="15" font-weight="600" fill="#44403C" text-anchor="middle">GetQueuedCompletionStatus</text>
    <text x="490" y="150" font-size="12.5" font-weight="600" fill="#57534E" text-anchor="middle">-&gt; bytes + CompletionKey + OVERLAPPED*</text>

    <rect x="60" y="166" width="214" height="74" rx="18" fill="#ECEBFF" stroke="#5B5BD6" stroke-width="1.6"/>
    <text x="167" y="195" font-size="18" font-weight="700" fill="#1F2937" text-anchor="middle">CompletionKey</text>
    <text x="167" y="221" font-size="13" fill="#4B5563" text-anchor="middle">句柄级 / 连接级入口</text>

    <rect x="60" y="278" width="214" height="74" rx="18" fill="#FBE8C8" stroke="#C17817" stroke-width="1.6"/>
    <text x="167" y="307" font-size="18" font-weight="700" fill="#1F2937" text-anchor="middle">OVERLAPPED*</text>
    <text x="167" y="333" font-size="13" fill="#4B5563" text-anchor="middle">单次 I/O 请求级入口</text>

    <rect x="690" y="152" width="420" height="98" rx="20" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1.4"/>
    <text x="720" y="185" font-size="19" font-weight="700" fill="#1F2937">ConnCtx</text>
    <text x="720" y="212" font-size="14" fill="#4B5563">SOCKET s</text>
    <text x="720" y="235" font-size="14" fill="#4B5563">连接状态 / 协议状态 / 统计信息</text>

    <rect x="690" y="266" width="420" height="118" rx="20" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1.4"/>
    <text x="720" y="301" font-size="19" font-weight="700" fill="#1F2937">IoCtx</text>
    <text x="720" y="327" font-size="14" fill="#4B5563">OVERLAPPED ol</text>
    <text x="720" y="349" font-size="14" fill="#4B5563">WSABUF wsabuf / buffer</text>
    <text x="720" y="371" font-size="14" fill="#4B5563">IoType = Recv / Send / Accept</text>

    <line x1="274" y1="203" x2="690" y2="201" stroke="#5B5BD6" stroke-width="2.4" marker-end="url(#arrow)"/>
    <line x1="274" y1="315" x2="690" y2="325" stroke="#C17817" stroke-width="2.4" marker-end="url(#arrow)"/>

    <text x="450" y="187" font-size="13" font-weight="600" fill="#4C51BF" text-anchor="middle">定位连接</text>
    <text x="470" y="300" font-size="13" font-weight="600" fill="#9A6700" text-anchor="middle">定位本次完成的是哪一个请求</text>

    <rect x="282" y="392" width="616" height="24" rx="12" fill="#E7F0EA" stroke="#9CB7A5" stroke-width="1"/>
    <text x="590" y="408" font-size="13" fill="#365246" text-anchor="middle">处理顺序：先根据 CompletionKey 找连接，再根据 OVERLAPPED* 找到具体的 Recv / Send / Accept 上下文</text>
  </g>
</svg>
