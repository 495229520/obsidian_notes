<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760">
  <rect x="0" y="0" width="1180" height="760" fill="rgb(245, 244, 237)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="40" y="40" text-anchor="start" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="22" font-weight="500" fill="#0C447C">LRU Cache：哈希表 + 双向链表</text>
  <text x="40" y="76" text-anchor="start" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="13" font-weight="400" fill="#0C447C">头部表示最近使用 MRU，尾部表示最久未使用 LRU；哈希表保存 key 到链表节点的迭代器。</text>

  <text x="40" y="130" text-anchor="start" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="15" font-weight="500" fill="#3C3489">一、结构：链表负责顺序，哈希表负责 O(1) 定位</text>
  <rect x="60" y="170" width="80" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="100" y="192" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#085041">head</text>
  <rect x="200" y="170" width="80" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="240" y="184" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#3C3489">A</text>
  <text x="240" y="202" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#3C3489">MRU</text>
  <rect x="340" y="170" width="80" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="380" y="192" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#3C3489">C</text>
  <rect x="480" y="170" width="80" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="520" y="184" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#633806">B</text>
  <text x="520" y="202" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#633806">LRU</text>
  <rect x="620" y="170" width="80" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="660" y="192" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#085041">tail</text>

  <path d="M140 184H200" fill="none" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M200 202H140" fill="none" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M280 184H340" fill="none" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M340 202H280" fill="none" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M420 184H480" fill="none" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M480 202H420" fill="none" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M560 184H620" fill="none" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M620 202H560" fill="none" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M204 238H520" fill="none" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="362" y="258" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#0C447C">越靠左越新，越靠右越旧</text>

  <rect x="880" y="170" width="120" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="940" y="192" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#0C447C">map[A]</text>
  <rect x="880" y="274" width="120" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="940" y="296" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#0C447C">map[B]</text>
  <rect x="880" y="378" width="120" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="940" y="400" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#0C447C">map[C]</text>
  <text x="1054" y="158" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#0C447C">指向链表节点</text>
  <path d="M1000 192C1048 172 1088 172 1120 190" fill="none" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M1000 296C1048 296 1088 296 1120 296" fill="none" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M1000 400C1048 420 1088 420 1120 402" fill="none" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="40" y="456" text-anchor="start" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="15" font-weight="500" fill="#0C447C">二、get(A)：命中后删除原节点，再插入头部</text>
  <rect x="60" y="496" width="80" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="100" y="518" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#085041">head</text>
  <rect x="200" y="496" width="80" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="240" y="518" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#3C3489">A</text>
  <rect x="340" y="496" width="80" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="380" y="518" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#633806">C</text>
  <rect x="480" y="496" width="80" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="520" y="518" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#085041">tail</text>
  <path d="M140 518H200" fill="none" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M280 518H340" fill="none" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M420 518H480" fill="none" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M370 474C330 430 250 430 226 484" fill="none" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="300" y="436" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#633806">访问过的 key 变成最新</text>

  <text x="640" y="456" text-anchor="start" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="15" font-weight="500" fill="#633806">三、put(E)：容量满时淘汰尾部，再插入头部</text>
  <rect x="640" y="620" width="80" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="680" y="642" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#085041">head</text>
  <rect x="780" y="620" width="80" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="820" y="642" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#3C3489">E</text>
  <rect x="920" y="620" width="80" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="960" y="642" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#3C3489">A</text>
  <rect x="1060" y="620" width="80" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="1100" y="642" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#085041">tail</text>
  <path d="M720 642H780" fill="none" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M860 642H920" fill="none" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M1000 642H1060" fill="none" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M966 584C1006 540 1086 540 1110 598" fill="none" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="1038" y="548" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#633806">先删除旧 LRU，再记录新 key</text>
</svg>
