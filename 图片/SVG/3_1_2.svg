<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1520px" height="580px" viewBox="0 0 1520 580" version="1.1">
  <title>static 桥接：让 C 回调重新接上 C++ 对象</title>
  <desc>注册时把 this 放进 arg，回调时先进入 static 桥接，再还原 this 调用成员函数。</desc>
  <rect x="0" y="0" width="1520" height="580" fill="rgb(245, 244, 237)"/>

  <defs>
    <marker id="arrowTeal" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" viewBox="0 0 10 10">
      <path d="M0 0 L10 5 L0 10 Z" fill="#0F766E"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" viewBox="0 0 10 10">
      <path d="M0 0 L10 5 L0 10 Z" fill="#2F855A"/>
    </marker>
    <marker id="arrowOlive" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" viewBox="0 0 8 8">
      <path d="M0 0 L8 4 L0 8 Z" fill="#8B6B3F"/>
    </marker>
  </defs>

  <text x="760" y="44" text-anchor="middle" dominant-baseline="middle" fill="#2E2A23" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" font-size="25" font-weight="700">
    static 桥接：让 C 回调重新接上 C++ 对象
  </text>
  <text x="760" y="78" text-anchor="middle" dominant-baseline="middle" fill="#6C665A" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" font-size="14.5" font-weight="500">
    注册时把 this 放进 arg；回调时先进入 static，再转回成员函数
  </text>

  <rect x="40" y="150" width="340" height="280" rx="24" ry="24" fill="#F4F8FC" stroke="#2B6CB0" stroke-width="2"/>
  <text x="210" y="192" text-anchor="middle" dominant-baseline="middle" fill="#17446F" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" font-size="25" font-weight="700">
    C++ 对象世界
  </text>
  <rect x="92" y="234" width="236" height="126" rx="18" ry="18" fill="#E6F0FB" stroke="#7AA5D6" stroke-width="1.8"/>
  <text x="210" y="272" text-anchor="middle" dominant-baseline="middle" fill="#173A5B" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" font-size="21" font-weight="700">
    Controller 对象
  </text>
  <text x="210" y="304" text-anchor="middle" dominant-baseline="middle" fill="#23496E" font-family="Consolas, Menlo, monospace" font-size="17.5" font-weight="600">
    m_data = 42
  </text>
  <text x="210" y="336" text-anchor="middle" dominant-baseline="middle" fill="#23496E" font-family="Consolas, Menlo, monospace" font-size="18.5" font-weight="700">
    threadFunc()
  </text>
  <rect x="118" y="382" width="184" height="36" rx="18" ry="18" fill="#FFFFFF" stroke="#7AA5D6" stroke-width="1.5"/>
  <text x="210" y="400" text-anchor="middle" dominant-baseline="middle" fill="#1E4F7E" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" font-size="14" font-weight="700">
    成员函数依赖 this
  </text>

  <rect x="450" y="112" width="390" height="350" rx="24" ry="24" fill="#EEF8F1" stroke="#2F855A" stroke-width="2"/>
  <text x="645" y="156" text-anchor="middle" dominant-baseline="middle" fill="#20553B" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" font-size="25" font-weight="700">
    static 桥接
  </text>
  <rect x="525" y="220" width="240" height="154" rx="18" ry="18" fill="#F9FDFC" stroke="#5AA879" stroke-width="1.8"/>
  <text x="645" y="258" text-anchor="middle" dominant-baseline="middle" fill="#215238" font-family="Consolas, Menlo, monospace" font-size="20" font-weight="700">
    threadEntry
  </text>
  <rect x="570" y="278" width="150" height="30" rx="15" ry="15" fill="#E6F6EC" stroke="#7CC191" stroke-width="1.2"/>
  <text x="645" y="293" text-anchor="middle" dominant-baseline="middle" fill="#356A4C" font-family="Consolas, Menlo, monospace" font-size="13.5" font-weight="700">
    (static)
  </text>
  <text x="645" y="330" text-anchor="middle" dominant-baseline="middle" fill="#244E36" font-family="Consolas, Menlo, monospace" font-size="15.5" font-weight="700">
    arg -&gt; thiz
  </text>
  <text x="645" y="360" text-anchor="middle" dominant-baseline="middle" fill="#244E36" font-family="Consolas, Menlo, monospace" font-size="15.5" font-weight="700">
    thiz-&gt;threadFunc()
  </text>
  <rect x="515" y="392" width="260" height="40" rx="20" ry="20" fill="#FFFFFF" stroke="#7CC191" stroke-width="1.5"/>
  <text x="645" y="412" text-anchor="middle" dominant-baseline="middle" fill="#2E6B47" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" font-size="14" font-weight="700">
    C 认函数，C++ 认类作用域
  </text>

  <rect x="930" y="150" width="550" height="280" rx="24" ry="24" fill="#FFF6E8" stroke="#C27A18" stroke-width="2"/>
  <text x="1205" y="192" text-anchor="middle" dominant-baseline="middle" fill="#73470C" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" font-size="25" font-weight="700">
    C 库的回调接口
  </text>
  <rect x="1006" y="230" width="398" height="148" rx="18" ry="18" fill="#FFFDF9" stroke="#D9A34D" stroke-width="1.8"/>
  <text x="1040" y="262" fill="#6B4B1C" font-family="Consolas, Menlo, monospace" font-size="17.5" font-weight="600">
    _beginthreadex(
    <tspan x="1040" dy="21.5">  ...,</tspan>
    <tspan x="1040" dy="21.5">  func_ptr = threadEntry,</tspan>
    <tspan x="1040" dy="21.5">  arg = this</tspan>
    <tspan x="1040" dy="21.5">)</tspan>
  </text>
  <rect x="1030" y="394" width="350" height="34" rx="17" ry="17" fill="#FFFFFF" stroke="#D9A34D" stroke-width="1.5"/>
  <text x="1205" y="411" text-anchor="middle" dominant-baseline="middle" fill="#8B5B19" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" font-size="14" font-weight="700">
    func_ptr 负责调用，arg 负责带回对象指针
  </text>

  <path d="M1006 294 L775 294" fill="none" stroke="#0F766E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowTeal)"/>
  <rect x="815" y="248" width="150" height="34" rx="17" ry="17" fill="#E6FFFB" stroke="#5AB0A8" stroke-width="1.3"/>
  <text x="890" y="265" text-anchor="middle" dominant-baseline="middle" fill="#0E5F58" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" font-size="12.8" font-weight="700">
    2. 先回调 static
  </text>

  <path d="M525 294 L340 294" fill="none" stroke="#2F855A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowGreen)"/>
  <rect x="352" y="248" width="170" height="34" rx="17" ry="17" fill="#E9F7EE" stroke="#7CC191" stroke-width="1.3"/>
  <text x="437" y="265" text-anchor="middle" dominant-baseline="middle" fill="#2E6B47" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" font-size="12.8" font-weight="700">
    3. 还原 this 后调用
  </text>

  <path d="M210 418 L210 516 L1205 516 L1205 430" fill="none" stroke="#8B6B3F" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 7" marker-end="url(#arrowOlive)"/>
  <rect x="630" y="478" width="260" height="36" rx="18" ry="18" fill="#FAF1E2" stroke="#C8A26A" stroke-width="1.2"/>
  <text x="760" y="496" text-anchor="middle" dominant-baseline="middle" fill="#7B5B2D" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" font-size="12.8" font-weight="700">
    1. 创建线程时：arg = this
  </text>
</svg>
