<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="'Segoe UI', 'PingFang SC', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#555"/>
    </marker>
    <linearGradient id="dupGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ee5a24;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="normGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2ecc71;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">暴力递归 fib(5) — 重复子问题示意图</text>

  <!-- Level 0: fib(5) -->
  <circle cx="360" cy="70" r="24" fill="url(#normGrad)" stroke="#2c3e50" stroke-width="1.5"/>
  <text x="360" y="76" text-anchor="middle" font-size="13" fill="white" font-weight="bold">f(5)</text>

  <!-- Level 1 -->
  <line x1="340" y1="90" x2="220" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="90" x2="500" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <circle cx="210" cy="155" r="24" fill="url(#normGrad)" stroke="#2c3e50" stroke-width="1.5"/>
  <text x="210" y="161" text-anchor="middle" font-size="13" fill="white" font-weight="bold">f(4)</text>

  <circle cx="510" cy="155" r="24" fill="url(#dupGrad)" stroke="#c0392b" stroke-width="2"/>
  <text x="510" y="161" text-anchor="middle" font-size="13" fill="white" font-weight="bold">f(3)</text>

  <!-- Level 2 from f(4) -->
  <line x1="192" y1="175" x2="125" y2="220" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="228" y1="175" x2="295" y2="220" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <circle cx="115" cy="237" r="24" fill="url(#dupGrad)" stroke="#c0392b" stroke-width="2"/>
  <text x="115" y="243" text-anchor="middle" font-size="13" fill="white" font-weight="bold">f(3)</text>

  <circle cx="305" cy="237" r="24" fill="url(#dupGrad)" stroke="#c0392b" stroke-width="2"/>
  <text x="305" y="243" text-anchor="middle" font-size="13" fill="white" font-weight="bold">f(2)</text>

  <!-- Level 2 from f(3) right -->
  <line x1="492" y1="175" x2="440" y2="220" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="528" y1="175" x2="590" y2="220" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <circle cx="430" cy="237" r="24" fill="url(#dupGrad)" stroke="#c0392b" stroke-width="2"/>
  <text x="430" y="243" text-anchor="middle" font-size="13" fill="white" font-weight="bold">f(2)</text>

  <circle cx="600" cy="237" r="24" fill="url(#normGrad)" stroke="#2c3e50" stroke-width="1.5"/>
  <text x="600" y="243" text-anchor="middle" font-size="13" fill="white" font-weight="bold">f(1)</text>

  <!-- Level 3 from f(3) left -->
  <line x1="97" y1="257" x2="55" y2="300" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="133" y1="257" x2="175" y2="300" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <circle cx="45" cy="317" r="24" fill="url(#dupGrad)" stroke="#c0392b" stroke-width="2"/>
  <text x="45" y="323" text-anchor="middle" font-size="13" fill="white" font-weight="bold">f(2)</text>

  <circle cx="185" cy="317" r="24" fill="url(#normGrad)" stroke="#2c3e50" stroke-width="1.5"/>
  <text x="185" y="323" text-anchor="middle" font-size="13" fill="white" font-weight="bold">f(1)</text>

  <!-- Level 4 from f(2) leftmost -->
  <line x1="28" y1="337" x2="10" y2="365" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="62" y1="337" x2="80" y2="365" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <circle cx="10" cy="382" r="18" fill="url(#normGrad)" stroke="#2c3e50" stroke-width="1"/>
  <text x="10" y="387" text-anchor="middle" font-size="11" fill="white" font-weight="bold">f(1)</text>

  <circle cx="80" cy="382" r="18" fill="url(#normGrad)" stroke="#2c3e50" stroke-width="1"/>
  <text x="80" y="387" text-anchor="middle" font-size="11" fill="white" font-weight="bold">f(0)</text>

  <!-- Legend -->
  <rect x="510" y="310" width="200" height="90" rx="8" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
  <circle cx="535" cy="335" r="10" fill="url(#normGrad)"/>
  <text x="555" y="340" font-size="12" fill="#2c3e50">仅计算一次</text>
  <circle cx="535" cy="365" r="10" fill="url(#dupGrad)" stroke="#c0392b" stroke-width="1.5"/>
  <text x="555" y="370" font-size="12" fill="#2c3e50">重复计算（浪费）</text>
  <text x="535" y="393" font-size="11" fill="#7f8c8d">f(3) 计算了 2 次</text>
</svg>