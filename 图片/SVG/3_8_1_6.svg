<svg xmlns="http://www.w3.org/2000/svg" width="980" height="640" viewBox="0 0 980 640">
  <defs>
    <style>
      .title { font: 700 28px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #1f2937; }
      .subtitle { font: 500 16px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #475569; }
      .host { font: 700 22px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #111827; }
      .label { font: 700 17px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #1d4ed8; }
      .ack-label { font: 700 17px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #166534; }
      .warn-title { font: 700 17px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #b91c1c; }
      .warn-text { font: 500 15px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #7f1d1d; }
      .text { font: 500 15px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #334155; }
      .mono { font: 700 14px 'Consolas', monospace; fill: #0f172a; }
      .box { fill: #fffdf7; stroke: #475569; stroke-width: 2; rx: 20; }
      .seg { fill: #dbeafe; stroke: #2563eb; stroke-width: 2.2; rx: 16; }
      .ack { fill: #dcfce7; stroke: #16a34a; stroke-width: 2.2; rx: 16; }
      .warn { fill: #fee2e2; stroke: #dc2626; stroke-width: 2.2; rx: 18; }
      .send-line { stroke: #2563eb; stroke-width: 4; fill: none; marker-end: url(#arrow-send); }
      .ack-line { stroke: #16a34a; stroke-width: 4; fill: none; marker-end: url(#arrow-ack); }
      .lost-line { stroke: #dc2626; stroke-width: 4; stroke-dasharray: 10 8; fill: none; marker-end: url(#arrow-lost); }
    </style>
    <marker id="arrow-send" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-ack" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 12 0 L 0 6 L 12 12 z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-lost" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="980" height="640" fill="rgb(245, 244, 237)"/>

  <text x="40" y="48" class="title">数据传输 3：丢包后会自动重传</text>
  <text x="40" y="78" class="subtitle">如果一个报文段发出去后迟迟收不到 ACK，发送方就会认为它可能丢了，并在超时后重新发送。</text>

  <path d="M 246 205 L 734 205" class="send-line"/>
  <path d="M 734 285 L 246 285" class="ack-line"/>
  <path d="M 246 355 L 734 355" class="lost-line"/>
  <path d="M 246 505 L 734 505" class="send-line"/>
  <path d="M 734 575 L 246 575" class="ack-line"/>

  <rect x="70" y="132" width="160" height="300" class="box"/>
  <rect x="750" y="132" width="160" height="300" class="box"/>
  <text x="123" y="185" class="host">发送方</text>
  <text x="803" y="185" class="host">接收方</text>

  <rect x="340" y="176" width="210" height="58" class="seg"/>
  <text x="406" y="198" class="label">报文段 1</text>
  <text x="374" y="220" class="mono">seq=1000, len=5</text>

  <rect x="430" y="256" width="160" height="58" class="ack"/>
  <text x="471" y="278" class="ack-label">ACK=1005</text>
  <text x="455" y="300" class="text">前 5 字节已收到</text>

  <rect x="340" y="326" width="210" height="58" class="seg"/>
  <text x="406" y="348" class="label">报文段 2</text>
  <text x="374" y="370" class="mono">seq=1005, len=5</text>

  <text x="675" y="336" class="warn-title">丢失</text>
  <line x1="666" y1="326" x2="716" y2="384" stroke="#dc2626" stroke-width="6"/>
  <line x1="716" y1="326" x2="666" y2="384" stroke="#dc2626" stroke-width="6"/>

  <rect x="320" y="396" width="340" height="72" class="warn"/>
  <text x="432" y="424" class="warn-title">超时仍未收到 ACK</text>
  <text x="352" y="448" class="warn-text">发送方判断该报文段可能丢失，于是触发自动重传。</text>

  <rect x="336" y="476" width="230" height="58" class="seg"/>
  <text x="384" y="498" class="label">重新发送报文段 2</text>
  <text x="382" y="520" class="mono">seq=1005, len=5</text>

  <rect x="430" y="546" width="160" height="58" class="ack"/>
  <text x="471" y="568" class="ack-label">ACK=1010</text>
  <text x="433" y="591" class="text">累计确认恢复正常</text>
</svg>
