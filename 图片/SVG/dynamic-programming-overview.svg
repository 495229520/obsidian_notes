<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200px" height="720px" viewBox="0 0 1200 720" version="1.1"><title>动态规划核心框架</title><desc>展示动态规划从状态定义、边界初始化、状态转移到答案提取的流程，并用一维和二维 DP 表格说明填表顺序。</desc><rect x="0" y="0" width="1200" height="720" fill="rgb(245, 244, 237)" /><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#2f4f4f" /></marker><marker id="smallArrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#8b6b3f" /></marker></defs><rect fill="rgb(245, 244, 237)" x="0" y="0" width="1200" height="720" /><text fill="#1f2933" font-size="30" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif" x="600" y="48" text-anchor="middle" dominant-baseline="middle">动态规划：把重复子问题存进状态表</text><text fill="#52616b" font-size="18" font-family="PingFang SC, Microsoft YaHei, sans-serif" x="600" y="82" text-anchor="middle" dominant-baseline="middle">先定义状态，再确定转移；边界保证起点，表格记录中间结果</text><g id="flow"><rect fill="#ffffff" stroke="#2f4f4f" stroke-width="2" x="70" y="130" width="180" height="86" rx="16" ry="16" /><text fill="#16302b" font-size="20" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif" x="160" y="160" text-anchor="middle" dominant-baseline="middle">1. 状态定义</text><text fill="#52616b" font-size="15" font-family="PingFang SC, Microsoft YaHei, sans-serif" x="160" y="190" text-anchor="middle" dominant-baseline="middle">dp[i] 表示什么</text><line stroke="#2f4f4f" stroke-width="2.5" marker-end="url(#arrow)" x1="255" y1="173" x2="335" y2="173" /><rect fill="#ffffff" stroke="#2f4f4f" stroke-width="2" x="340" y="130" width="180" height="86" rx="16" ry="16" /><text fill="#16302b" font-size="20" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif" x="430" y="160" text-anchor="middle" dominant-baseline="middle">2. 边界初始化</text><text fill="#52616b" font-size="15" font-family="PingFang SC, Microsoft YaHei, sans-serif" x="430" y="190" text-anchor="middle" dominant-baseline="middle">dp[0] / 第一行</text><line stroke="#2f4f4f" stroke-width="2.5" marker-end="url(#arrow)" x1="525" y1="173" x2="605" y2="173" /><rect fill="#ffffff" stroke="#2f4f4f" stroke-width="2" x="610" y="130" width="180" height="86" rx="16" ry="16" /><text fill="#16302b" font-size="20" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif" x="700" y="160" text-anchor="middle" dominant-baseline="middle">3. 状态转移</text><text fill="#52616b" font-size="15" font-family="PingFang SC, Microsoft YaHei, sans-serif" x="700" y="190" text-anchor="middle" dominant-baseline="middle">从旧状态推新状态</text><line stroke="#2f4f4f" stroke-width="2.5" marker-end="url(#arrow)" x1="795" y1="173" x2="875" y2="173" /><rect fill="#ffffff" stroke="#2f4f4f" stroke-width="2" x="880" y="130" width="180" height="86" rx="16" ry="16" /><text fill="#16302b" font-size="20" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif" x="970" y="160" text-anchor="middle" dominant-baseline="middle">4. 提取答案</text><text fill="#52616b" font-size="15" font-family="PingFang SC, Microsoft YaHei, sans-serif" x="970" y="190" text-anchor="middle" dominant-baseline="middle">dp[n] 或最优值</text></g><rect fill="#fffdf7" stroke="#d1c7b7" stroke-width="2" x="70" y="270" width="500" height="360" rx="18" ry="18" /><text fill="#1f2933" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif" x="320" y="308" text-anchor="middle" dominant-baseline="middle">一维 DP：按依赖方向扫描</text><text fill="#52616b" font-size="16" font-family="PingFang SC, Microsoft YaHei, sans-serif" x="320" y="338" text-anchor="middle" dominant-baseline="middle">例：爬楼梯 dp[i] = dp[i-1] + dp[i-2]</text><rect fill="#dff3e3" stroke="#7aa874" stroke-width="2" x="120" y="400" width="62" height="56" /><rect fill="#dff3e3" stroke="#7aa874" stroke-width="2" x="182" y="400" width="62" height="56" /><rect fill="#fff7d6" stroke="#d6a94d" stroke-width="2" x="244" y="400" width="62" height="56" /><rect fill="#ffffff" stroke="#c7c7c7" stroke-width="2" x="306" y="400" width="62" height="56" /><rect fill="#ffffff" stroke="#c7c7c7" stroke-width="2" x="368" y="400" width="62" height="56" /><rect fill="#ffffff" stroke="#c7c7c7" stroke-width="2" x="430" y="400" width="62" height="56" /><text fill="#2f4f4f" font-size="14" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif" x="151" y="428" text-anchor="middle" dominant-baseline="middle">dp[i-2]</text><text fill="#2f4f4f" font-size="14" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif" x="213" y="428" text-anchor="middle" dominant-baseline="middle">dp[i-1]</text><text fill="#7a5600" font-size="15" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif" x="275" y="428" text-anchor="middle" dominant-baseline="middle">dp[i]</text><text fill="#7b8794" font-size="18" font-family="PingFang SC, Microsoft YaHei, sans-serif" x="337" y="428" text-anchor="middle" dominant-baseline="middle">...</text><text fill="#7b8794" font-size="13" font-family="PingFang SC, Microsoft YaHei, sans-serif" x="399" y="428" text-anchor="middle" dominant-baseline="middle">dp[n-1]</text><text fill="#7b8794" font-size="14" font-family="PingFang SC, Microsoft YaHei, sans-serif" x="461" y="428" text-anchor="middle" dominant-baseline="middle">dp[n]</text><path fill="none" stroke="#8b6b3f" stroke-width="2" marker-end="url(#smallArrow)" d="M150 386 C170 354 246 354 270 388" /><path fill="none" stroke="#8b6b3f" stroke-width="2" marker-end="url(#smallArrow)" d="M213 386 C226 368 248 368 270 388" /><text fill="#52616b" font-size="16" font-family="PingFang SC, Microsoft YaHei, sans-serif" x="275" y="498" text-anchor="middle" dominant-baseline="middle">填表顺序：从左到右</text><line stroke="#2f4f4f" stroke-width="3" marker-end="url(#arrow)" x1="152" y1="530" x2="456" y2="530" /><rect fill="#fffdf7" stroke="#d1c7b7" stroke-width="2" x="630" y="270" width="500" height="360" rx="18" ry="18" /><text fill="#1f2933" font-size="22" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif" x="880" y="308" text-anchor="middle" dominant-baseline="middle">二维 DP：格子依赖相邻子问题</text><text fill="#52616b" font-size="16" font-family="PingFang SC, Microsoft YaHei, sans-serif" x="880" y="338" text-anchor="middle" dominant-baseline="middle">例：背包、路径、编辑距离、最长公共子序列</text><g id="grid" stroke="#c7c7c7" stroke-width="2"><rect fill="#dff3e3" x="745" y="385" width="60" height="48" /><rect fill="#dff3e3" x="805" y="385" width="60" height="48" /><rect fill="#dff3e3" x="865" y="385" width="60" height="48" /><rect fill="#dff3e3" x="745" y="433" width="60" height="48" /><rect fill="#dff3e3" x="805" y="433" width="60" height="48" /><rect fill="#dff3e3" x="865" y="433" width="60" height="48" /><rect fill="#dff3e3" x="745" y="481" width="60" height="48" /><rect fill="#fff7d6" stroke="#d6a94d" x="805" y="481" width="60" height="48" /><rect fill="#ffffff" x="865" y="481" width="60" height="48" /><rect fill="#ffffff" x="925" y="385" width="60" height="48" /><rect fill="#ffffff" x="925" y="433" width="60" height="48" /><rect fill="#ffffff" x="925" y="481" width="60" height="48" /></g><text fill="#7a5600" font-size="15" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif" x="835" y="506" text-anchor="middle" dominant-baseline="middle">dp[i][j]</text><text fill="#2f4f4f" font-size="16" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif" x="775" y="459" text-anchor="middle" dominant-baseline="middle">上</text><text fill="#2f4f4f" font-size="16" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif" x="835" y="459" text-anchor="middle" dominant-baseline="middle">左上</text><text fill="#2f4f4f" font-size="16" font-weight="700" font-family="PingFang SC, Microsoft YaHei, sans-serif" x="775" y="506" text-anchor="middle" dominant-baseline="middle">左</text><path fill="none" stroke="#8b6b3f" stroke-width="2" marker-end="url(#smallArrow)" d="M775 476 L813 493" /><path fill="none" stroke="#8b6b3f" stroke-width="2" marker-end="url(#smallArrow)" d="M835 476 L835 490" /><path fill="none" stroke="#8b6b3f" stroke-width="2" marker-end="url(#smallArrow)" d="M805 506 L813 506" /><text fill="#52616b" font-size="16" font-family="PingFang SC, Microsoft YaHei, sans-serif" x="880" y="572" text-anchor="middle" dominant-baseline="middle">常见依赖：dp[i-1][j]、dp[i][j-1]、dp[i-1][j-1]</text></svg>