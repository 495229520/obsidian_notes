<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 430" fill="none">
  <defs>
    <marker id="arr-r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#E74C3C"/>
    </marker>
    <marker id="arr-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#27AE60"/>
    </marker>
    <marker id="arr-o" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#E67E22"/>
    </marker>
    <marker id="arr-p" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#9B59B6"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="rgb(245, 244, 237)"/>

  <!-- 左侧：8.1 的旧 AcceptWorker -->
  <rect x="10" y="10" width="430" height="410" rx="8" stroke="#E74C3C" stroke-width="2" fill="#FFF5F5"/>
  <text x="225" y="33" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#E74C3C">旧方案：AcceptWorker（8.1，提交 00bdf97）</text>

  <rect x="40" y="52" width="370" height="36" rx="5" stroke="#3498DB" stroke-width="1.5" fill="#EAF4FC"/>
  <text x="225" y="74" text-anchor="middle" font-family="Consolas, monospace" font-size="12" fill="#1A5276">GetAcceptExSockaddrs()：提取地址</text>
  <line x1="225" y1="88" x2="225" y2="108" stroke="#E74C3C" stroke-width="1.5" marker-end="url(#arr-r)"/>

  <rect x="40" y="108" width="370" height="36" rx="5" stroke="#3498DB" stroke-width="1.5" fill="#EAF4FC"/>
  <text x="225" y="130" text-anchor="middle" font-family="Consolas, monospace" font-size="12" fill="#1A5276">m_server-&gt;NewAccept()：重新挂起 AcceptEx</text>
  <line x1="225" y1="144" x2="225" y2="164" stroke="#E74C3C" stroke-width="1.5" marker-end="url(#arr-r)"/>

  <rect x="40" y="164" width="370" height="36" rx="5" stroke="#BDC3C7" stroke-width="1.5" fill="#F8F9FA"/>
  <text x="225" y="186" text-anchor="middle" font-family="Consolas, monospace" font-size="12" fill="#7F8C8D">return −1</text>

  <rect x="40" y="220" width="370" height="50" rx="5" stroke="#E74C3C" stroke-width="1" stroke-dasharray="5 3" fill="#FFF0F0"/>
  <text x="225" y="242" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#922B21">客户端套接字：接受连接后处于空闲</text>
  <text x="225" y="260" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#922B21">没有投递 WSARecv，服务端听不到入站数据</text>

  <rect x="18" y="348" width="414" height="62" rx="4" fill="#FADBD8"/>
  <text x="225" y="371" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#922B21">连接已接受，但客户端套接字被直接闲置。</text>
  <text x="225" y="390" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#922B21">服务端无法接收已连接客户端发来的任何数据。</text>

  <!-- 右侧：9ffe8b0 的新 AcceptWorker -->
  <rect x="455" y="10" width="455" height="410" rx="8" stroke="#27AE60" stroke-width="2" fill="#F0FFF4"/>
  <text x="682" y="33" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#27AE60">新方案：AcceptWorker（提交 9ffe8b0）</text>

  <rect x="465" y="52" width="255" height="36" rx="5" stroke="#3498DB" stroke-width="1.5" fill="#EAF4FC"/>
  <text x="592" y="74" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#1A5276">GetAcceptExSockaddrs()</text>
  <line x1="592" y1="88" x2="592" y2="108" stroke="#27AE60" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <rect x="465" y="108" width="255" height="36" rx="5" stroke="#27AE60" stroke-width="2.5" fill="#E8F8EE"/>
  <text x="592" y="126" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#1E8449">WSARecv(sock, RecvWSABuf, …)</text>
  <line x1="720" y1="126" x2="738" y2="126" stroke="#E67E22" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr-o)"/>
  <line x1="592" y1="144" x2="592" y2="164" stroke="#27AE60" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <rect x="465" y="164" width="255" height="36" rx="5" stroke="#3498DB" stroke-width="1.5" fill="#EAF4FC"/>
  <text x="592" y="186" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#1A5276">m_server-&gt;NewAccept()</text>
  <line x1="592" y1="200" x2="592" y2="220" stroke="#27AE60" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <rect x="465" y="220" width="255" height="36" rx="5" stroke="#BDC3C7" stroke-width="1.5" fill="#F8F9FA"/>
  <text x="592" y="242" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#7F8C8D">return −1</text>

  <rect x="740" y="95" width="158" height="212" rx="6" stroke="#E67E22" stroke-width="1.5" stroke-dasharray="5 3" fill="#FEF9F0"/>
  <text x="819" y="113" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" font-style="italic" fill="#E67E22">异步：数据到达</text>

  <rect x="752" y="120" width="134" height="28" rx="4" stroke="#E67E22" stroke-width="1" fill="#FDEBD0"/>
  <text x="819" y="138" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#784212">IOCP 的 ERecv 被触发</text>
  <line x1="819" y1="148" x2="819" y2="163" stroke="#E67E22" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arr-o)"/>

  <rect x="752" y="163" width="134" height="28" rx="4" stroke="#E67E22" stroke-width="1" fill="#FDEBD0"/>
  <text x="819" y="181" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#784212">threadIocp 分发</text>
  <line x1="819" y1="191" x2="819" y2="206" stroke="#9B59B6" stroke-width="1.5" marker-end="url(#arr-p)"/>

  <rect x="752" y="206" width="134" height="28" rx="4" stroke="#9B59B6" stroke-width="1.5" fill="#F4ECF7"/>
  <text x="819" y="224" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#6C3483">RecvWorker()</text>
  <line x1="819" y1="234" x2="819" y2="249" stroke="#9B59B6" stroke-width="1.5" marker-end="url(#arr-p)"/>

  <rect x="752" y="249" width="134" height="28" rx="4" stroke="#9B59B6" stroke-width="1.5" fill="#F4ECF7"/>
  <text x="819" y="267" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#6C3483">EdoyunClient::Recv()</text>

  <rect x="463" y="348" width="439" height="62" rx="4" fill="#D5F5E3"/>
  <text x="682" y="371" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#1E8449">接受连接后立刻挂起 WSARecv。</text>
  <text x="682" y="390" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#1E8449">每个客户端有两次异步完成：EAccept → ERecv 链。</text>
</svg>
