<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 890 350" fill="none">
  <defs>
    <marker id="arr-r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#E74C3C"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="rgb(245, 244, 237)"/>
  <!-- 左侧：旧的内联写法 -->
  <rect x="10" y="10" width="420" height="330" rx="8" stroke="#E74C3C" stroke-width="2" fill="#FFF5F5"/>
  <text x="220" y="35" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#E74C3C">旧方案：内联 iocp() 函数（提交 23a26763）</text>
  <rect x="40" y="50" width="350" height="34" rx="5" stroke="#E74C3C" stroke-width="1.5" fill="#FFE5E5"/>
  <text x="215" y="72" text-anchor="middle" font-family="Consolas, monospace" font-size="12" fill="#641E16">WSASocket(WSA_FLAG_OVERLAPPED)</text>
  <line x1="215" y1="84" x2="215" y2="100" stroke="#E74C3C" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <rect x="40" y="100" width="350" height="34" rx="5" stroke="#E74C3C" stroke-width="1.5" fill="#FFE5E5"/>
  <text x="215" y="122" text-anchor="middle" font-family="Consolas, monospace" font-size="12" fill="#641E16">CreateIoCompletionPort 调两次</text>
  <line x1="215" y1="134" x2="215" y2="150" stroke="#E74C3C" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <rect x="40" y="150" width="350" height="34" rx="5" stroke="#E74C3C" stroke-width="1.5" fill="#FFE5E5"/>
  <text x="215" y="172" text-anchor="middle" font-family="Consolas, monospace" font-size="12" fill="#641E16">AcceptEx()：硬编码缓冲区</text>
  <line x1="215" y1="184" x2="215" y2="200" stroke="#E74C3C" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <rect x="40" y="200" width="350" height="34" rx="5" stroke="#E74C3C" stroke-width="1.5" fill="#FFE5E5"/>
  <text x="215" y="222" text-anchor="middle" font-family="Consolas, monospace" font-size="12" fill="#641E16">while(GetQueuedCompletionStatus)</text>
  <line x1="215" y1="234" x2="215" y2="250" stroke="#E74C3C" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <rect x="40" y="250" width="350" height="34" rx="5" stroke="#E74C3C" stroke-width="1.5" fill="#FFE5E5"/>
  <text x="215" y="272" text-anchor="middle" font-family="Consolas, monospace" font-size="12" fill="#641E16">CONTAINING_RECORD + switch(m_operator)</text>
  <rect x="18" y="294" width="404" height="46" rx="4" fill="#FADBD8"/>
  <text x="220" y="313" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#922B21">所有逻辑塞在一个函数里 · 没有类抽象 · 没有线程池</text>
  <text x="220" y="330" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#922B21">现在这套写法已被注释掉，由 EdoyunServer 取代</text>
  <!-- 右侧：新的 EdoyunServer 类 -->
  <rect x="460" y="10" width="420" height="330" rx="8" stroke="#27AE60" stroke-width="2" fill="#F0FFF4"/>
  <text x="670" y="35" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#27AE60">新方案：EdoyunServer 类（提交 00bdf97）</text>
  <rect x="470" y="48" width="400" height="232" rx="6" stroke="#27AE60" stroke-width="1.5" stroke-dasharray="5 3" fill="#E8F8EE"/>
  <text x="475" y="62" font-family="Segoe UI, sans-serif" font-size="10" fill="#1E8449">EdoyunServer</text>
  <rect x="479" y="66" width="178" height="52" rx="5" stroke="#3498DB" stroke-width="1.5" fill="#EAF4FC"/>
  <text x="568" y="88" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#1A5276">EdoyunThreadPool</text>
  <text x="568" y="106" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#1A5276">10 个 EdoyunThread</text>
  <rect x="663" y="66" width="198" height="52" rx="5" stroke="#9B59B6" stroke-width="1.5" fill="#F4ECF7"/>
  <text x="762" y="88" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#6C3483">AcceptOverlapped</text>
  <text x="762" y="106" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#6C3483">&lt;EAccept&gt; + AcceptWorker</text>
  <rect x="479" y="132" width="178" height="38" rx="5" stroke="#3498DB" stroke-width="1.5" fill="#EAF4FC"/>
  <text x="568" y="156" text-anchor="middle" font-family="Consolas, monospace" font-size="12" fill="#1A5276">HANDLE m_hIOCP</text>
  <rect x="663" y="132" width="198" height="38" rx="5" stroke="#E67E22" stroke-width="1.5" stroke-dasharray="4 2" fill="#FEF5E7"/>
  <text x="762" y="156" text-anchor="middle" font-family="Consolas, monospace" font-size="12" fill="#784212">threadIocp()</text>
  <rect x="479" y="184" width="382" height="38" rx="5" stroke="#9B59B6" stroke-width="1.5" fill="#F4ECF7"/>
  <text x="670" y="208" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#6C3483">map&lt;SOCKET, PCLIENT&gt; m_client</text>
  <rect x="479" y="236" width="382" height="30" rx="5" stroke="#BDC3C7" stroke-width="1" stroke-dasharray="3 2" fill="#F8F9FA"/>
  <text x="670" y="256" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#7F8C8D">RecvOverlapped · SendOverlapped · ErrorOverlapped（//TODO）</text>
  <rect x="468" y="294" width="404" height="46" rx="4" fill="#D5F5E3"/>
  <text x="670" y="313" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#1E8449">类抽象 · 线程池分发 · 每种操作都有独立 overlapped</text>
  <text x="670" y="330" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#1E8449">可自续的 AcceptEx 链 · Recv/Send/Error 仍待实现</text>
</svg>
