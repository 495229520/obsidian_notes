<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="1720px" height="1090px" viewBox="0 0 1720 1090" version="1.1">
  <title>Commit 9ffe8b0 recv analysis</title>
  <desc>Roomier three-panel diagram for commit 9ffe8b0, with clearer flow arrows and more breathing room around the recv chain.</desc>
  <rect x="0" y="0" width="1720" height="1090" fill="rgb(245, 244, 237)" />
  <defs>
    <marker id="arrowDark" markerWidth="9" markerHeight="9" refX="8.2" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 Z" fill="#59626F" />
    </marker>
    <marker id="arrowGold" markerWidth="9" markerHeight="9" refX="8.2" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 Z" fill="#B7812F" />
    </marker>
    <marker id="arrowWarn" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#C86E76" />
    </marker>
  </defs>

  <text x="60" y="58" fill="#2A2118" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="30" font-weight="700" letter-spacing="0.3">Commit 9ffe8b0: IOCP recv chain is finally wired in</text>
  <text x="60" y="92" fill="#65564A" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16">核心变化：AcceptWorker 在 AcceptEx 完成后补投 WSARecv，并让 ERecv 第一次拥有明确处理入口。</text>

  <rect x="60" y="112" width="330" height="36" rx="18" ry="18" fill="#EFE7DA" stroke="#D0C1AD" stroke-width="1.5" />
  <text x="225" y="130" fill="#4C4137" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="13" font-weight="600" text-anchor="middle" dominant-baseline="middle">仓库: remote_ctl1 / latest = 9ffe8b0</text>
  <rect x="410" y="112" width="270" height="36" rx="18" ry="18" fill="#E6F3EC" stroke="#9BC6AB" stroke-width="1.5" />
  <text x="545" y="130" fill="#315B43" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="13" font-weight="600" text-anchor="middle" dominant-baseline="middle">源码重点: EdoyunServer.cpp / EdoyunServer.h</text>
  <rect x="700" y="112" width="210" height="36" rx="18" ry="18" fill="#FFF0D9" stroke="#DDB46D" stroke-width="1.5" />
  <text x="805" y="130" fill="#6F4B13" font-family="Consolas, Segoe UI, monospace" font-size="13" font-weight="700" text-anchor="middle" dominant-baseline="middle">diff: +172 / -98</text>

  <rect x="40" y="170" width="430" height="850" rx="26" ry="26" fill="#FFF8EA" stroke="#D4B06A" stroke-width="2" />
  <rect x="500" y="170" width="600" height="850" rx="26" ry="26" fill="#EEF8F2" stroke="#66A07A" stroke-width="2" />
  <rect x="1140" y="170" width="540" height="850" rx="26" ry="26" fill="#FFF2F2" stroke="#C76A72" stroke-width="2" />

  <text x="70" y="206" fill="#6D4C05" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="24" font-weight="700">提交前 47efc80</text>
  <text x="70" y="236" fill="#7A6851" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="14">Accept 完成后，链路停在 AcceptWorker。</text>

  <text x="540" y="206" fill="#256B48" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="24" font-weight="700">9ffe8b0 做了什么</text>
  <text x="540" y="236" fill="#4E6A59" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="14">把 Accept 之后的 recv 主链第一次真正接上。</text>

  <text x="1170" y="206" fill="#A03941" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="24" font-weight="700">为什么还不算稳定</text>
  <text x="1170" y="236" fill="#80636A" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="14">这次是机制推进，不是 recv 闭环完成。</text>

  <rect x="88" y="300" width="334" height="80" rx="16" ry="16" fill="#FFFDF8" stroke="#D8B36D" stroke-width="2" />
  <text x="255" y="324" fill="#433422" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16" font-weight="600" text-anchor="middle" dominant-baseline="hanging">AcceptEx completion<tspan x="255" dy="21">lpOverlapped = accept</tspan></text>
  <line x1="255" y1="380" x2="255" y2="425" stroke="#5B6470" stroke-width="2.2" stroke-linecap="round" />

  <rect x="88" y="425" width="334" height="98" rx="16" ry="16" fill="#FFFDF8" stroke="#D8B36D" stroke-width="2" />
  <text x="255" y="450" fill="#433422" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16" font-weight="600" text-anchor="middle" dominant-baseline="hanging">AcceptWorker()<tspan x="255" dy="20">GetAcceptExSockaddrs</tspan><tspan x="255" dy="20">拿到本地 / 远端地址</tspan></text>
  <line x1="255" y1="523" x2="255" y2="570" stroke="#5B6470" stroke-width="2.2" stroke-linecap="round" />

  <rect x="88" y="570" width="334" height="80" rx="16" ry="16" fill="#FFFDF8" stroke="#D8B36D" stroke-width="2" />
  <text x="255" y="594" fill="#433422" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16" font-weight="600" text-anchor="middle" dominant-baseline="hanging">NewAccept()<tspan x="255" dy="21">继续挂下一个 AcceptEx</tspan></text>
  <line x1="255" y1="650" x2="255" y2="705" stroke="#B78535" stroke-width="2" stroke-dasharray="10 9" stroke-linecap="round" />

  <rect x="78" y="705" width="354" height="142" rx="18" ry="18" fill="#FFF3E0" stroke="#D5922A" stroke-width="2.2" stroke-dasharray="10 8" />
  <text x="255" y="734" fill="#6A4311" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" text-anchor="middle" dominant-baseline="hanging">缺口<tspan x="255" dy="24">没有补投 WSARecv</tspan><tspan x="255" dy="24">ERecv 分支拿不到真实完成事件</tspan></text>
  <text x="255" y="818" fill="#7A6851" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="14" text-anchor="middle" dominant-baseline="middle">8.1 的骨架只能 accept，<tspan x="255" dy="18">还没有真正进入 recv 生命周期。</tspan></text>

  <rect x="540" y="260" width="240" height="84" rx="14" ry="14" fill="#FBFFFC" stroke="#7DB792" stroke-width="1.8" />
  <text x="558" y="280" fill="#284F3A" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="13" font-weight="600" dominant-baseline="hanging">EdoyunServer.cpp<tspan x="558" dy="16">AcceptWorker 内补投 WSARecv</tspan><tspan x="558" dy="16">StartService / threadIocp 挪到 .cpp</tspan></text>

  <rect x="810" y="260" width="250" height="84" rx="14" ry="14" fill="#FBFFFC" stroke="#7DB792" stroke-width="1.8" />
  <text x="828" y="280" fill="#284F3A" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="13" font-weight="600" dominant-baseline="hanging">EdoyunServer.h<tspan x="828" dy="16">EdoyunClient 增加 m_recv / m_send</tspan><tspan x="828" dy="16">新增 flags / m_used / m_wsabuffer</tspan></text>

  <rect x="560" y="362" width="500" height="32" rx="16" ry="16" fill="#DDEFE4" stroke="#A4C7B0" stroke-width="1.2" />
  <text x="810" y="378" fill="#355745" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="12.5" font-weight="600" text-anchor="middle" dominant-baseline="middle">新增状态承载: m_client / m_wsabuffer / m_recv / m_send / m_flags / m_used</text>

  <rect x="560" y="430" width="240" height="102" rx="16" ry="16" fill="#FFFFFF" stroke="#4F9A73" stroke-width="2.2" />
  <text x="680" y="456" fill="#234434" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16" font-weight="600" text-anchor="middle" dominant-baseline="hanging">AcceptWorker()<tspan x="680" dy="20">取地址后立刻补投 WSARecv</tspan><tspan x="680" dy="20">并继续 NewAccept()</tspan></text>

  <rect x="820" y="430" width="240" height="102" rx="16" ry="16" fill="#FFFFFF" stroke="#4F9A73" stroke-width="2.2" />
  <text x="940" y="456" fill="#234434" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16" font-weight="600" text-anchor="middle" dominant-baseline="hanging">NewAccept()<tspan x="940" dy="20">下一个 accept</tspan><tspan x="940" dy="20">继续挂起</tspan></text>

  <line x1="800" y1="481" x2="820" y2="481" stroke="#5B6470" stroke-width="2.8" marker-end="url(#arrowDark)" />
  <line x1="680" y1="532" x2="680" y2="585" stroke="#5B6470" stroke-width="2.2" stroke-linecap="round" />

  <rect x="630" y="585" width="310" height="128" rx="16" ry="16" fill="#FFFFFF" stroke="#4F9A73" stroke-width="2.2" />
  <text x="785" y="607" fill="#234434" font-family="Consolas, Segoe UI, monospace" font-size="15" font-weight="600" text-anchor="middle" dominant-baseline="hanging">WSARecv(<tspan x="785" dy="18">sock = client</tspan><tspan x="785" dy="18">lpBuffers = RecvWSABuffer()</tspan><tspan x="785" dy="18">lpOverlapped = *m_client</tspan><tspan x="785" dy="18">)</tspan></text>

  <line x1="785" y1="713" x2="785" y2="755" stroke="#5B6470" stroke-width="2.2" stroke-linecap="round" />
  <rect x="630" y="755" width="310" height="86" rx="16" ry="16" fill="#FFFFFF" stroke="#4F9A73" stroke-width="2.2" />
  <text x="785" y="780" fill="#234434" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16" font-weight="600" text-anchor="middle" dominant-baseline="hanging">threadIocp()<tspan x="785" dy="21">GQCS -&gt; switch(m_operator)</tspan></text>

  <line x1="785" y1="841" x2="785" y2="875" stroke="#5B6470" stroke-width="2.2" stroke-linecap="round" />
  <rect x="630" y="875" width="310" height="86" rx="16" ry="16" fill="#FFFFFF" stroke="#4F9A73" stroke-width="2.2" />
  <text x="785" y="900" fill="#234434" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16" font-weight="600" text-anchor="middle" dominant-baseline="hanging">ERecv -&gt; RecvWorker()<tspan x="785" dy="21">recv 完成事件第一次有入口</tspan></text>

  <line x1="785" y1="961" x2="785" y2="975" stroke="#5B6470" stroke-width="2" stroke-linecap="round" />
  <rect x="630" y="975" width="310" height="42" rx="16" ry="16" fill="#E8F5EC" stroke="#4F9A73" stroke-width="2" />
  <text x="785" y="996" fill="#234434" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="14.5" font-weight="700" text-anchor="middle" dominant-baseline="middle">EdoyunClient::Recv() 当前仍回落到同步 recv()</text>

  <rect x="1178" y="290" width="464" height="100" rx="16" ry="16" fill="#FFF9F9" stroke="#D67272" stroke-width="2.2" />
  <text x="1200" y="313" fill="#5E2B2E" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="15" font-weight="600" dominant-baseline="hanging">1. lpOverlapped 用错对象<tspan x="1200" dy="19">*m_client 仍会转成 accept overlapped</tspan><tspan x="1200" dy="19">完成事件可能再次按 EAccept 路由</tspan></text>

  <rect x="1178" y="415" width="464" height="98" rx="16" ry="16" fill="#FFF9F9" stroke="#D67272" stroke-width="2.2" />
  <text x="1200" y="438" fill="#5E2B2E" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="15" font-weight="600" dominant-baseline="hanging">2. WSABUF 未见初始化<tspan x="1200" dy="19">m_wsabuffer.buf / len 没有明确赋值</tspan><tspan x="1200" dy="19">WSARecv 读写范围不可靠</tspan></text>

  <rect x="1178" y="538" width="464" height="104" rx="16" ry="16" fill="#FFF9F9" stroke="#D67272" stroke-width="2.2" />
  <text x="1200" y="561" fill="#5E2B2E" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="15" font-weight="600" dominant-baseline="hanging">3. accept 后置步骤缺失<tspan x="1200" dy="19">没看到 SO_UPDATE_ACCEPT_CONTEXT</tspan><tspan x="1200" dy="19">也没看到 client socket 重新关联 IOCP</tspan></text>

  <rect x="1178" y="673" width="464" height="104" rx="16" ry="16" fill="#FFF9F9" stroke="#D67272" stroke-width="2.2" />
  <text x="1200" y="696" fill="#5E2B2E" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="15" font-weight="600" dominant-baseline="hanging">4. RecvWorker 仍同步 recv()<tspan x="1200" dy="19">没有直接消费 IOCP 返回的 transferred bytes</tspan><tspan x="1200" dy="19">可能阻塞线程并模糊异步语义</tspan></text>

  <rect x="1178" y="835" width="464" height="126" rx="18" ry="18" fill="#FCECEE" stroke="#B8424B" stroke-width="2.5" />
  <text x="1410" y="861" fill="#782B31" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" text-anchor="middle" dominant-baseline="hanging">结论<tspan x="1410" dy="24">9ffe8b0 让 recv 链路第一次接上线，</tspan><tspan x="1410" dy="24">但真正稳定还要把上面四个缺口补齐。</tspan></text>

  <circle cx="940" cy="621" r="4" fill="#C86E76" />
  <path d="M940 621 L1035 621 L1035 340 L1178 340" fill="none" stroke="#C86E76" stroke-width="2.2" stroke-dasharray="9 8" marker-end="url(#arrowWarn)" />

  <circle cx="940" cy="653" r="4" fill="#C86E76" />
  <path d="M940 653 L1060 653 L1060 464 L1178 464" fill="none" stroke="#C86E76" stroke-width="2.2" stroke-dasharray="9 8" marker-end="url(#arrowWarn)" />

  <circle cx="1060" cy="505" r="4" fill="#C86E76" />
  <path d="M1060 505 L1095 505 L1095 590 L1178 590" fill="none" stroke="#C86E76" stroke-width="2.2" stroke-dasharray="9 8" marker-end="url(#arrowWarn)" />

  <circle cx="940" cy="918" r="4" fill="#C86E76" />
  <path d="M940 918 L1045 918 L1045 725 L1178 725" fill="none" stroke="#C86E76" stroke-width="2.2" stroke-dasharray="9 8" marker-end="url(#arrowWarn)" />

  <text x="60" y="1055" fill="#6A6257" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="12.5">验证基础：直接阅读 commit 9ffe8b0a62e1b7cdc20efb1871c1933451acf3a3 的 diff；图中右栏为代码级风险，不是运行时验证结果。</text>
</svg>
