<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1600px" height="980px" viewBox="0 0 1600 980" version="1.1"><title>Commit 9ffe8b0 recv analysis</title><desc>Three-panel diagram showing the pre-commit gap, the recv chain added by commit 9ffe8b0, and the structural risks that remain.</desc><rect x="0" y="0" width="1600" height="980" fill="rgb(245, 244, 237)" /><defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto"><path d="M0 0 L12 6 L0 12 Z" fill="#5B6470" /></marker></defs><text fill="#2A2118" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="30" font-weight="700" letter-spacing="0.3" x="60" y="58">Commit 9ffe8b0: IOCP recv chain is finally wired in</text><text fill="#65564A" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16" x="60" y="92">核心变化：AcceptWorker 在 AcceptEx 完成后补投 WSARecv，并让 ERecv 第一次拥有明确处理入口。</text><rect fill="#EFE7DA" stroke="#D0C1AD" stroke-width="1.5" x="60" y="112" width="330" height="36" rx="18" ry="18" /><text fill="#4C4137" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="13" font-weight="600" x="225" y="130" text-anchor="middle" dominant-baseline="middle">仓库: remote_ctl1 / latest = 9ffe8b0</text><rect fill="#E6F3EC" stroke="#9BC6AB" stroke-width="1.5" x="410" y="112" width="270" height="36" rx="18" ry="18" /><text fill="#315B43" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="13" font-weight="600" x="545" y="130" text-anchor="middle" dominant-baseline="middle">源码重点: EdoyunServer.cpp / EdoyunServer.h</text><rect fill="#FFF0D9" stroke="#DDB46D" stroke-width="1.5" x="700" y="112" width="210" height="36" rx="18" ry="18" /><text fill="#6F4B13" font-family="Consolas, Segoe UI, monospace" font-size="13" font-weight="700" x="805" y="130" text-anchor="middle" dominant-baseline="middle">diff: +172 / -98</text><rect fill="#FFF8EA" stroke="#D4B06A" stroke-width="2" shape-rendering="geometricPrecision" x="40" y="160" width="460" height="760" rx="26" ry="26" /><rect fill="#EEF8F2" stroke="#66A07A" stroke-width="2" shape-rendering="geometricPrecision" x="520" y="160" width="560" height="760" rx="26" ry="26" /><rect fill="#FFF2F2" stroke="#C76A72" stroke-width="2" shape-rendering="geometricPrecision" x="1100" y="160" width="460" height="760" rx="26" ry="26" /><text fill="#6D4C05" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="24" font-weight="700" x="70" y="194">提交前 47efc80</text><text fill="#7A6851" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="14" x="70" y="224">Accept 完成后，链路停在 AcceptWorker</text><text fill="#256B48" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="24" font-weight="700" x="550" y="194">9ffe8b0 做了什么</text><text fill="#4E6A59" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="14" x="550" y="224">把 recv 起点接到了 Accept 之后</text><text fill="#A03941" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="24" font-weight="700" x="1130" y="194">为什么还不算稳定</text><text fill="#80636A" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="14" x="1130" y="224">这是机制推进，不是 recv 闭环完成</text><rect fill="#FFFDF8" stroke="#D8B36D" stroke-width="2" x="100" y="280" width="340" height="74" rx="16" ry="16" /><text fill="#433422" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16" font-weight="600" x="270" y="302" text-anchor="middle" dominant-baseline="hanging">AcceptEx completion<tspan x="270" dy="20.8">lpOverlapped = accept</tspan></text><rect fill="#FFFDF8" stroke="#D8B36D" stroke-width="2" x="100" y="395" width="340" height="92" rx="16" ry="16" /><text fill="#433422" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16" font-weight="600" x="270" y="417" text-anchor="middle" dominant-baseline="hanging">AcceptWorker()<tspan x="270" dy="20.48">GetAcceptExSockaddrs</tspan><tspan x="270" dy="20.48">拿到本地 / 远端地址</tspan></text><rect fill="#FFFDF8" stroke="#D8B36D" stroke-width="2" x="100" y="530" width="340" height="74" rx="16" ry="16" /><text fill="#433422" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16" font-weight="600" x="270" y="552" text-anchor="middle" dominant-baseline="hanging">NewAccept()<tspan x="270" dy="20.8">继续挂下一个 AcceptEx</tspan></text><rect fill="#FFF3E0" stroke="#D5922A" stroke-width="2" stroke-dasharray="10 8" x="90" y="665" width="360" height="155" rx="18" ry="18" /><text fill="#6A4311" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" x="270" y="689" text-anchor="middle" dominant-baseline="hanging">缺口<tspan x="270" dy="24.3">没有补投 WSARecv</tspan><tspan x="270" dy="24.3">ERecv 分支拿不到真实完成事件</tspan></text><text fill="#7A6851" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="14" x="270" y="793" text-anchor="middle" dominant-baseline="middle">8.1 的骨架只能 accept，<tspan x="270" dy="17.5">还没有真正进入 recv 生命周期</tspan></text><line stroke="#5B6470" stroke-width="3" marker-end="url(#arrow)" x1="270" y1="354" x2="270" y2="395" /><line stroke="#5B6470" stroke-width="3" marker-end="url(#arrow)" x1="270" y1="487" x2="270" y2="530" /><line stroke="#B78535" stroke-width="2.5" stroke-dasharray="8 8" marker-end="url(#arrow)" x1="270" y1="487" x2="270" y2="665" /><rect fill="#FBFFFC" stroke="#7DB792" stroke-width="1.8" x="550" y="260" width="230" height="76" rx="14" ry="14" /><text fill="#284F3A" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="13" font-weight="600" x="565" y="278" dominant-baseline="hanging">EdoyunServer.cpp<tspan x="565" dy="15.86">AcceptWorker 内补投 WSARecv</tspan><tspan x="565" dy="15.86">StartService / threadIocp 挪到 .cpp</tspan></text><rect fill="#FBFFFC" stroke="#7DB792" stroke-width="1.8" x="820" y="260" width="230" height="76" rx="14" ry="14" /><text fill="#284F3A" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="13" font-weight="600" x="835" y="278" dominant-baseline="hanging">EdoyunServer.h<tspan x="835" dy="15.86">EdoyunClient 增加 m_recv / m_send</tspan><tspan x="835" dy="15.86">新增 flags / m_used / WSABUF</tspan></text><rect fill="#DDEFE4" stroke="#A4C7B0" stroke-width="1.2" x="590" y="346" width="420" height="28" rx="14" ry="14" /><text fill="#355745" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="12.5" font-weight="600" x="800" y="360" text-anchor="middle" dominant-baseline="middle">新增状态承载: m_client / m_wsabuffer / m_recv / m_send / m_flags / m_used</text><rect fill="#FFFFFF" stroke="#4F9A73" stroke-width="2" x="570" y="390" width="230" height="88" rx="16" ry="16" /><text fill="#234434" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16" font-weight="600" x="685" y="412" text-anchor="middle" dominant-baseline="hanging">AcceptWorker()<tspan x="685" dy="20.48">先解析地址</tspan><tspan x="685" dy="20.48">再为 client 发起 recv</tspan></text><rect fill="#FFFFFF" stroke="#4F9A73" stroke-width="2" x="820" y="390" width="220" height="88" rx="16" ry="16" /><text fill="#234434" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16" font-weight="600" x="930" y="412" text-anchor="middle" dominant-baseline="hanging">NewAccept()<tspan x="930" dy="20.48">下一个 accept</tspan><tspan x="930" dy="20.48">继续挂起</tspan></text><rect fill="#FFFFFF" stroke="#4F9A73" stroke-width="2" x="650" y="500" width="310" height="104" rx="16" ry="16" /><text fill="#234434" font-family="Consolas, Segoe UI, monospace" font-size="15" font-weight="600" x="805" y="519" text-anchor="middle" dominant-baseline="hanging">WSARecv(<tspan x="805" dy="17.4">sock = client</tspan><tspan x="805" dy="17.4">lpBuffers = RecvWSABuffer()</tspan><tspan x="805" dy="17.4">lpOverlapped = *m_client</tspan><tspan x="805" dy="17.4">)</tspan></text><rect fill="#FFFFFF" stroke="#4F9A73" stroke-width="2" x="650" y="645" width="310" height="80" rx="16" ry="16" /><text fill="#234434" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16" font-weight="600" x="805" y="668" text-anchor="middle" dominant-baseline="hanging">threadIocp()<tspan x="805" dy="20.48">GQCS -&gt; switch(m_operator)</tspan></text><rect fill="#FFFFFF" stroke="#4F9A73" stroke-width="2" x="650" y="755" width="310" height="80" rx="16" ry="16" /><text fill="#234434" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16" font-weight="600" x="805" y="778" text-anchor="middle" dominant-baseline="hanging">ERecv -&gt; RecvWorker()<tspan x="805" dy="20.48">recv 完成事件第一次有入口</tspan></text><rect fill="#E8F5EC" stroke="#4F9A73" stroke-width="2" x="650" y="850" width="310" height="56" rx="16" ry="16" /><text fill="#234434" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="15" font-weight="700" x="805" y="869" text-anchor="middle" dominant-baseline="hanging">EdoyunClient::Recv()<tspan x="805" dy="18.3">当前实现仍回落到同步 recv()</tspan></text><line stroke="#5B6470" stroke-width="3" marker-end="url(#arrow)" x1="800" y1="434" x2="820" y2="434" /><path fill="none" stroke="#5B6470" stroke-width="3" marker-end="url(#arrow)" d="M685 478 L685 489 L805 489 L805 500" /><line stroke="#5B6470" stroke-width="3" marker-end="url(#arrow)" x1="805" y1="604" x2="805" y2="645" /><line stroke="#5B6470" stroke-width="3" marker-end="url(#arrow)" x1="805" y1="725" x2="805" y2="755" /><line stroke="#5B6470" stroke-width="3" marker-end="url(#arrow)" x1="805" y1="835" x2="805" y2="850" /><rect fill="#FFF9F9" stroke="#D67272" stroke-width="2" x="1140" y="270" width="380" height="104" rx="16" ry="16" /><text fill="#5E2B2E" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="15" font-weight="600" x="1160" y="290" dominant-baseline="hanging">1. lpOverlapped 用错对象<tspan x="1160" dy="18.3">*m_client 仍会转成 accept overlapped</tspan><tspan x="1160" dy="18.3">完成事件可能再次按 EAccept 路由</tspan></text><rect fill="#FFF9F9" stroke="#D67272" stroke-width="2" x="1140" y="395" width="380" height="94" rx="16" ry="16" /><text fill="#5E2B2E" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="15" font-weight="600" x="1160" y="415" dominant-baseline="hanging">2. WSABUF 未见初始化<tspan x="1160" dy="18.3">m_wsabuffer.buf / len 没有明确赋值</tspan><tspan x="1160" dy="18.3">WSARecv 读写范围不可靠</tspan></text><rect fill="#FFF9F9" stroke="#D67272" stroke-width="2" x="1140" y="510" width="380" height="104" rx="16" ry="16" /><text fill="#5E2B2E" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="15" font-weight="600" x="1160" y="530" dominant-baseline="hanging">3. accept 后置步骤缺失<tspan x="1160" dy="18.3">没看到 SO_UPDATE_ACCEPT_CONTEXT</tspan><tspan x="1160" dy="18.3">也没看到 client socket 重新关联 IOCP</tspan></text><rect fill="#FFF9F9" stroke="#D67272" stroke-width="2" x="1140" y="635" width="380" height="104" rx="16" ry="16" /><text fill="#5E2B2E" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="15" font-weight="600" x="1160" y="655" dominant-baseline="hanging">4. RecvWorker 仍同步 recv()<tspan x="1160" dy="18.3">没有直接消费 IOCP 返回的 transferred bytes</tspan><tspan x="1160" dy="18.3">可能阻塞线程并模糊异步语义</tspan></text><rect fill="#FCECEE" stroke="#B8424B" stroke-width="2.4" x="1140" y="775" width="380" height="120" rx="18" ry="18" /><text fill="#782B31" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="17" font-weight="700" x="1330" y="798" text-anchor="middle" dominant-baseline="hanging">结论<tspan x="1330" dy="22.1">9ffe8b0 让 recv 链路第一次接上线</tspan><tspan x="1330" dy="22.1">但真正稳定还要把上面四个缺口补齐</tspan></text><path fill="none" stroke="#C86E73" stroke-width="2.5" stroke-dasharray="8 8" marker-end="url(#arrow)" d="M960 552 L1080 552 L1080 322 L1140 322" /><path fill="none" stroke="#C86E73" stroke-width="2.5" stroke-dasharray="8 8" marker-end="url(#arrow)" d="M960 878 L1080 878 L1080 687 L1140 687" /><text fill="#6A6257" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="12.5" x="60" y="954">验证基础：直接阅读 commit 9ffe8b0a62e1b7cdc20efb1871c1933451acf3a3 的 diff；图中右栏为代码级风险，不是运行时验证结果。</text></svg>