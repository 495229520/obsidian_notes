<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" font-family="'Segoe UI', 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="stairGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dfe6e9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#b2bec3;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="labelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0984e3;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#74b9ff;stop-opacity:1"/>
    </linearGradient>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#e17055"/>
    </marker>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#00b894"/>
    </marker>
  </defs>

  <text x="340" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">爬楼梯问题 — 状态转移示意</text>
  <text x="340" y="45" text-anchor="middle" font-size="12" fill="#7f8c8d">每次可以爬 1 阶或 2 阶，到达第 n 阶有多少种方法？</text>

  <!-- Stairs -->
  <g fill="url(#stairGrad)" stroke="#636e72" stroke-width="1">
    <rect x="50" y="260" width="80" height="30"/>
    <rect x="130" y="230" width="80" height="60"/>
    <rect x="210" y="200" width="80" height="90"/>
    <rect x="290" y="170" width="80" height="120"/>
    <rect x="370" y="140" width="80" height="150"/>
    <rect x="450" y="110" width="80" height="180"/>
  </g>

  <!-- Stair labels -->
  <g font-size="14" font-weight="bold" fill="#2c3e50" text-anchor="middle">
    <text x="90" y="280">0</text>
    <text x="170" y="250">1</text>
    <text x="250" y="220">2</text>
    <text x="330" y="190">3</text>
    <text x="410" y="160">4</text>
    <text x="490" y="130">5</text>
  </g>

  <!-- dp values -->
  <g text-anchor="middle">
    <rect x="65" y="232" width="50" height="22" rx="4" fill="url(#labelGrad)"/>
    <text x="90" y="248" font-size="11" fill="white" font-weight="bold">dp=1</text>

    <rect x="145" y="202" width="50" height="22" rx="4" fill="url(#labelGrad)"/>
    <text x="170" y="218" font-size="11" fill="white" font-weight="bold">dp=1</text>

    <rect x="225" y="172" width="50" height="22" rx="4" fill="url(#labelGrad)"/>
    <text x="250" y="188" font-size="11" fill="white" font-weight="bold">dp=2</text>

    <rect x="305" y="142" width="50" height="22" rx="4" fill="url(#labelGrad)"/>
    <text x="330" y="158" font-size="11" fill="white" font-weight="bold">dp=3</text>

    <rect x="385" y="112" width="50" height="22" rx="4" fill="url(#labelGrad)"/>
    <text x="410" y="128" font-size="11" fill="white" font-weight="bold">dp=5</text>

    <rect x="465" y="82" width="50" height="22" rx="4" fill="url(#labelGrad)"/>
    <text x="490" y="98" font-size="11" fill="white" font-weight="bold">dp=8</text>
  </g>

  <!-- Arrow: dp[4] depends on dp[3] and dp[2] -->
  <path d="M 340,150 C 360,120 380,125 395,122" fill="none" stroke="#e17055" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowR)"/>
  <text x="375" y="115" font-size="10" fill="#e17055">+1阶</text>

  <path d="M 260,180 C 300,140 360,140 393,125" fill="none" stroke="#00b894" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowG)"/>
  <text x="310" y="130" font-size="10" fill="#00b894">+2阶</text>

  <!-- Formula box -->
  <rect x="530" y="65" width="145" height="105" rx="10" fill="#f8f9fa" stroke="#dfe6e9" stroke-width="1.5"/>
  <text x="602" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">状态转移方程</text>
  <text x="602" y="118" text-anchor="middle" font-size="13" fill="#0984e3" font-weight="bold">dp[i] =</text>
  <text x="602" y="140" text-anchor="middle" font-size="13" fill="#0984e3" font-weight="bold">dp[i-1] + dp[i-2]</text>
  <text x="602" y="162" text-anchor="middle" font-size="10" fill="#636e72">和斐波那契数列相同!</text>
</svg>