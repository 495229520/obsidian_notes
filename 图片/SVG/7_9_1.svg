<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" width="960" height="640">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="960" height="640" fill="rgb(245, 244, 237)"/>

  <!-- 左侧 -->
  <rect x="20" y="20" width="440" height="600" rx="12" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="240" y="44" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#444441">旧：IOCP 作为应用层队列</text>

  <rect x="150" y="80" width="180" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="240" y="102" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#0C447C">调用线程</text>

  <path d="M240,124 L240,186" stroke="#185FA5" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="252" y="156" text-anchor="start" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="10" fill="#185FA5">PostQueuedCompletionStatus</text>

  <rect x="115" y="186" width="250" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="240" y="208" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#0C447C">内核 IOCP 队列</text>

  <path d="M240,230 L240,300" stroke="#534AB7" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <rect x="95" y="300" width="290" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="240" y="322" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#3C3489">工作线程</text>
  <text x="240" y="341" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="11" font-weight="400" fill="#534AB7">GetQueuedCompletionStatus</text>

  <path d="M240,356 L240,425" stroke="#0F6E56" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <rect x="120" y="425" width="240" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="240" y="447" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#085041">DealParam 参数分发</text>

  <rect x="45" y="530" width="390" height="58" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="240" y="551" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#633806">IOCP 负责串行化应用层请求</text>
  <text x="240" y="570" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="11" font-weight="400" fill="#633806">没有真实 socket 完成事件</text>

  <!-- 右侧 -->
  <rect x="500" y="20" width="440" height="600" rx="12" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="720" y="44" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#444441">新：IOCP 作为网络 I/O 完成端口</text>

  <rect x="660" y="80" width="120" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="720" y="102" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#0C447C">客户端</text>

  <path d="M720,124 L720,186" stroke="#854F0B" stroke-width="1.5" fill="none" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="732" y="156" text-anchor="start" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="10" fill="#633806">TCP 连接请求</text>

  <rect x="585" y="186" width="270" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="720" y="208" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#3C3489">重叠 socket + AcceptEx</text>
  <text x="720" y="227" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="11" font-weight="400" fill="#534AB7">真实网络 I/O 请求已经发出</text>

  <path d="M720,242 L720,312" stroke="#854F0B" stroke-width="1.5" fill="none" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="732" y="278" text-anchor="start" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="10" fill="#633806">完成事件投递</text>

  <rect x="610" y="312" width="220" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="720" y="334" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#0C447C">内核 IOCP 端口</text>

  <path d="M720,356 L720,425" stroke="#0F6E56" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <rect x="560" y="425" width="320" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="720" y="447" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#085041">完成分发线程</text>
  <text x="720" y="466" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="11" font-weight="400" fill="#0F6E56">GQCS + CONTAINING_RECORD</text>

  <rect x="525" y="530" width="390" height="58" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="720" y="551" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#633806">IOCP 负责接收真实网络完成事件</text>
  <text x="720" y="570" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="11" font-weight="400" fill="#633806">socket 已经成为完成端口的事件来源</text>
</svg>