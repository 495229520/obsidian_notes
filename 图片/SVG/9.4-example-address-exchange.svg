<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="100%" height="100%">
  <defs>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888" />
    </marker>
    <marker id="arrow-brown" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B07C4A" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0A7A59" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3563C1" />
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7030A0" />
    </marker>
  </defs>

  <rect width="1200" height="720" fill="rgb(245, 244, 237)" />

  <g font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, 'Microsoft YaHei', sans-serif">

    <text x="600" y="45" font-size="28" font-weight="bold" fill="#333" text-anchor="middle">9.4 UDPHole example: 本地三进程地址交换演示</text>
    <text x="600" y="80" font-size="14" fill="#666" text-anchor="middle">协调端只负责登记和转发地址，最终数据包从子客户端直接发给主客户端</text>

    <g fill="none" stroke-width="2">
      <path d="M 330 220 L 390 220" stroke="#888888" marker-end="url(#arrow-gray)" />

      <path d="M 760 220 L 820 220" stroke="#B07C4A" stroke-dasharray="6,4" marker-end="url(#arrow-brown)" />

      <path d="M 260 420 L 260 375 Q 260 365 270 365 L 490 365 Q 500 365 500 355 L 500 320" stroke="#0A7A59" marker-end="url(#arrow-green)" />

      <path d="M 450 310 L 450 315 Q 450 325 440 325 L 50 325 Q 40 325 40 335 L 40 500 Q 40 510 50 510 L 70 510" stroke="#3563C1" marker-end="url(#arrow-blue)" />

      <path d="M 930 420 L 930 375 Q 930 365 920 365 L 670 365 Q 660 365 660 355 L 660 320" stroke="#7030A0" marker-end="url(#arrow-purple)" />

      <path d="M 710 310 L 710 315 Q 710 325 720 325 L 1150 325 Q 1160 325 1160 335 L 1160 500 Q 1160 510 1150 510 L 1120 510" stroke="#3563C1" marker-end="url(#arrow-blue)" />

      <path d="M 930 600 Q 930 680 595 680 Q 260 680 260 610" stroke="#0A7A59" marker-end="url(#arrow-green)" />
    </g>

    <g>
      <rect x="50" y="130" width="280" height="180" rx="10" fill="#F4F4F4" stroke="#8A8A8A" stroke-width="1.5" />
      <text x="190" y="165" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">父进程 argc==1</text>
      <text x="190" y="205" font-size="13" fill="#333" text-anchor="middle">CEdoyunTool::Init()</text>
      <text x="190" y="235" font-size="13" fill="#333" text-anchor="middle">initsock() 初始化 Winsock</text>
      <text x="190" y="265" font-size="13" fill="#333" text-anchor="middle">CreateProcessA 启动参数 "1" 和 "12"</text>
      <text x="190" y="295" font-size="13" fill="#333" text-anchor="middle">随后自己进入 udp_server()</text>

      <rect x="400" y="130" width="360" height="180" rx="10" fill="#E6F0FA" stroke="#4A86E8" stroke-width="1.5" />
      <text x="580" y="165" font-size="18" font-weight="bold" fill="#0B5394" text-anchor="middle">协调端 udp_server()</text>
      <text x="580" y="205" font-size="13" fill="#0B5394" text-anchor="middle">socket(PF_INET, SOCK_DGRAM, 0)</text>
      <text x="580" y="235" font-size="13" fill="#0B5394" text-anchor="middle">bind 127.0.0.1:20000</text>
      <text x="580" y="265" font-size="13" fill="#0B5394" text-anchor="middle">第一次收到注册包时，保存主客户端 sockaddr_in</text>
      <text x="580" y="295" font-size="13" fill="#0B5394" text-anchor="middle">第二次收到注册包时，把 A 地址回发给子客户端</text>

      <rect x="830" y="130" width="320" height="180" rx="10" fill="#FCE5CD" stroke="#B45F06" stroke-width="1.5" />
      <text x="990" y="165" font-size="18" font-weight="bold" fill="#B45F06" text-anchor="middle">当前边界</text>
      <text x="990" y="220" font-size="13" fill="#B45F06" text-anchor="middle">只跑 127.0.0.1 本地演示</text>
      <text x="990" y="250" font-size="13" fill="#B45F06" text-anchor="middle">未验证公网 NAT 穿透</text>
      <text x="990" y="280" font-size="13" fill="#B45F06" text-anchor="middle">地址包仍是原始结构体内存</text>

      <rect x="80" y="420" width="360" height="180" rx="10" fill="#E2F0D9" stroke="#38761D" stroke-width="1.5" />
      <text x="260" y="455" font-size="18" font-weight="bold" fill="#274E13" text-anchor="middle">主客户端 udp_client(true)</text>
      <text x="260" y="495" font-size="13" fill="#274E13" text-anchor="middle">由 CreateProcessA(argv[0] + " 1") 启动</text>
      <text x="260" y="525" font-size="13" fill="#274E13" text-anchor="middle">sendto "hello world" 注册到协调端</text>
      <text x="260" y="555" font-size="13" fill="#274E13" text-anchor="middle">第一次 recvfrom 接收回显</text>
      <text x="260" y="585" font-size="13" fill="#274E13" text-anchor="middle">第二次 recvfrom 等待对端直连包</text>

      <rect x="750" y="420" width="360" height="180" rx="10" fill="#EAE1F5" stroke="#674EA7" stroke-width="1.5" />
      <text x="930" y="455" font-size="18" font-weight="bold" fill="#351C75" text-anchor="middle">子客户端 udp_client(false)</text>
      <text x="930" y="495" font-size="13" fill="#351C75" text-anchor="middle">由 CreateProcessA(argv[0] + " 12") 启动</text>
      <text x="930" y="525" font-size="13" fill="#351C75" text-anchor="middle">sendto "hello world" 注册到协调端</text>
      <text x="930" y="555" font-size="13" fill="#351C75" text-anchor="middle">recvfrom 取得主客户端 sockaddr_in</text>
      <text x="930" y="585" font-size="13" fill="#351C75" text-anchor="middle">sendto 直发 "hello,i am client"</text>
    </g>

    <g font-size="12">
      <rect x="325" y="208" width="70" height="24" rx="12" fill="#FFFFFF" stroke="#888888" stroke-width="1" />
      <text x="360" y="224" fill="#666" text-anchor="middle" dominant-baseline="middle">同进程调用</text>

      <rect x="765" y="208" width="50" height="24" rx="12" fill="#FFFFFF" stroke="#B07C4A" stroke-width="1" />
      <text x="790" y="224" fill="#B07C4A" text-anchor="middle" dominant-baseline="middle">限制</text>

      <rect x="340" y="353" width="80" height="24" rx="12" fill="#FFFFFF" stroke="#0A7A59" stroke-width="1.5" />
      <text x="380" y="369" fill="#0A7A59" text-anchor="middle" dominant-baseline="middle">1 注册</text>

      <rect x="205" y="313" width="80" height="24" rx="12" fill="#FFFFFF" stroke="#3563C1" stroke-width="1.5" />
      <text x="245" y="329" fill="#3563C1" text-anchor="middle" dominant-baseline="middle">2 回显</text>

      <rect x="750" y="353" width="80" height="24" rx="12" fill="#FFFFFF" stroke="#7030A0" stroke-width="1.5" />
      <text x="790" y="369" fill="#7030A0" text-anchor="middle" dominant-baseline="middle">3 注册</text>

      <rect x="875" y="313" width="120" height="24" rx="12" fill="#FFFFFF" stroke="#3563C1" stroke-width="1.5" />
      <text x="935" y="329" fill="#3563C1" text-anchor="middle" dominant-baseline="middle">4 返回 A 地址</text>

      <rect x="425" y="668" width="340" height="24" rx="12" fill="#FFFFFF" stroke="#0A7A59" stroke-width="1.5" />
      <text x="595" y="684" fill="#0A7A59" text-anchor="middle" dominant-baseline="middle">5 子客户端绕过协调端，直接发给主客户端</text>
    </g>

  </g>
</svg>
