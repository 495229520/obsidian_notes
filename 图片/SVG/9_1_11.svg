<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%" style="background-color: #fafafa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  
  <ellipse cx="400" cy="70" rx="70" ry="25" fill="none" stroke="#b0b0b0" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="400" y="75" font-size="14" font-weight="600" fill="#444" text-anchor="middle">互联网</text>
  
  <line x1="400" y1="95" x2="400" y2="160" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="4,4"/>

  <text x="120" y="275" font-size="14" fill="#666" text-anchor="middle">私有网络 A</text>
  <text x="680" y="275" font-size="14" fill="#666" text-anchor="middle">私有网络 B</text>

  <rect x="50" y="180" width="140" height="60" rx="6" fill="#e4f4ec" stroke="#a3d1c0" stroke-width="1.5"/>
  <text x="120" y="205" font-size="15" font-weight="bold" fill="#185c45" text-anchor="middle">节点 A</text>
  <text x="120" y="225" font-size="13" fill="#185c45" text-anchor="middle">192.168.1.5:4000</text>

  <line x1="190" y1="210" x2="225" y2="210" stroke="#888" stroke-width="2"/>
  <polyline points="218,205 226,210 218,215" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M 243 160 H 400 V 270 H 243 A 8 8 0 0 1 235 262 V 168 A 8 8 0 0 1 243 160 Z" fill="#edeaff" stroke="#bcb3f0" stroke-width="1.5"/>
  <text x="317.5" y="188" font-size="15" font-weight="bold" fill="#3a2f78" text-anchor="middle">NAT A (路由器)</text>
  <text x="317.5" y="210" font-size="13" fill="#3a2f78" text-anchor="middle">公网: 1.2.3.4</text>
  <text x="317.5" y="230" font-size="13" fill="#3a2f78" text-anchor="middle">映射表: 1.2.3.4:50001</text>
  <text x="317.5" y="250" font-size="13" fill="#3a2f78" text-anchor="middle">➔ 192.168.1.5:4000</text>

  <path d="M 400 160 H 557 A 8 8 0 0 1 565 168 V 262 A 8 8 0 0 1 557 270 H 400 V 160 Z" fill="#edeaff" stroke="#bcb3f0" stroke-width="1.5"/>
  <text x="482.5" y="188" font-size="15" font-weight="bold" fill="#3a2f78" text-anchor="middle">NAT B (路由器)</text>
  <text x="482.5" y="210" font-size="13" fill="#3a2f78" text-anchor="middle">公网: 5.6.7.8</text>
  <text x="482.5" y="230" font-size="13" fill="#3a2f78" text-anchor="middle">没有针对 1.2.3.4</text>
  <text x="482.5" y="250" font-size="13" fill="#3a2f78" text-anchor="middle">的映射 ➔ 丢弃</text>

  <rect x="610" y="180" width="140" height="60" rx="6" fill="#e4f4ec" stroke="#a3d1c0" stroke-width="1.5"/>
  <text x="680" y="205" font-size="15" font-weight="bold" fill="#185c45" text-anchor="middle">节点 B</text>
  <text x="680" y="225" font-size="13" fill="#185c45" text-anchor="middle">192.168.2.7:4000</text>

  <line x1="610" y1="300" x2="415" y2="300" stroke="#df5a5a" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polyline points="423,295 415,300 423,305" fill="none" stroke="#df5a5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <line x1="385" y1="293" x2="399" y2="307" stroke="#df5a5a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="385" y1="307" x2="399" y2="293" stroke="#df5a5a" stroke-width="1.5" stroke-linecap="round"/>
  
  <text x="512" y="320" font-size="13" fill="#555" text-anchor="middle">未经请求的入站流量 ➔ 被拦截</text>

  <rect x="50" y="360" width="700" height="90" rx="8" fill="#fdfdfd" stroke="#e0e0e0" stroke-width="1"/>
  <text x="400" y="390" font-size="14" fill="#444" text-anchor="middle" font-weight="500">问题：NAT A 没有针对从 5.6.7.8（节点 B 的 NAT）到达的流量的映射。</text>
  <text x="400" y="415" font-size="14" fill="#444" text-anchor="middle">它会丢弃所有未经请求的数据包。节点 B 无法直接向节点 A 发起连接。</text>
  <text x="400" y="440" font-size="14" fill="#444" text-anchor="middle">两个节点都面临同样的障碍——在没有帮助的情况下，谁也无法触达对方。</text>

</svg>
