<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720" version="1.1">
  <title>小根堆维护第 K 大元素</title>
  <desc>使用大小为 k 的小根堆，只保留当前见过的最大 k 个数，堆顶就是第 k 大。</desc>
  <rect x="0" y="0" width="1100" height="720" fill="rgb(245, 244, 237)"/>

  <defs>
    <marker id="heap-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" viewBox="0 0 12 12">
      <path d="M1 1 L11 6 L1 11 Z" fill="#2563eb"/>
    </marker>
    <marker id="heap-arrow-soft" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" viewBox="0 0 10 10">
      <path d="M1 1 L9 5 L1 9" fill="none" stroke="#0f766e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <g font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="48" y="58" font-size="30" font-weight="700" fill="#1f2937">小根堆：只保留当前最大的 k 个数</text>
    <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="48" y="94" font-size="16" fill="#4b5563">示例 nums = [3,2,1,5,6,4]，k = 2。堆超过 2 个元素时，弹出堆顶最小值。</text>

    <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="70" y="152" font-size="18" font-weight="700" fill="#334155">输入顺序</text>
    <g transform="translate(190 118)">
      <rect x="0" y="0" width="68" height="52" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
      <rect x="78" y="0" width="68" height="52" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
      <rect x="156" y="0" width="68" height="52" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
      <rect x="234" y="0" width="68" height="52" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
      <rect x="312" y="0" width="68" height="52" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
      <rect x="390" y="0" width="68" height="52" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="34" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#334155">3</text>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="112" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#334155">2</text>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="190" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#334155">1</text>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="268" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#334155">5</text>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="346" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#334155">6</text>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="424" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#334155">4</text>
    </g>

    <path d="M 430 190 L 430 240" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#heap-arrow)"/>
    <rect x="286" y="203" width="288" height="40" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="430" y="229" text-anchor="middle" font-family="'SFMono-Regular', Consolas, monospace" font-size="15" fill="#1d4ed8">push(x); if size &gt; k then pop()</text>

    <g transform="translate(62 275)">
      <rect x="0" y="0" width="976" height="260" rx="12" fill="#ffffff" stroke="#d6d3d1" stroke-width="2"/>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="24" y="38" font-size="18" font-weight="700" fill="#1f2937">遍历过程</text>

      <g transform="translate(40 70)">
        <rect x="0" y="0" width="156" height="150" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
        <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="78" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">读入 3, 2</text>
        <circle cx="78" cy="70" r="25" fill="#ccfbf1" stroke="#5eead4" stroke-width="2"/>
        <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="78" y="77" text-anchor="middle" font-size="20" font-weight="700" fill="#0f766e">2</text>
        <circle cx="78" cy="120" r="25" fill="#ecfeff" stroke="#67e8f9" stroke-width="2"/>
        <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="78" y="127" text-anchor="middle" font-size="20" font-weight="700" fill="#155e75">3</text>
        <line x1="78" y1="95" x2="78" y2="103" stroke="#64748b" stroke-width="2"/>
      </g>

      <g transform="translate(226 70)">
        <rect x="0" y="0" width="156" height="150" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
        <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="78" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">读入 1</text>
        <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="78" y="62" text-anchor="middle" font-size="14" fill="#b45309">push 后超出</text>
        <rect x="36" y="80" width="84" height="32" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
        <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="78" y="101" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">pop 1</text>
        <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="78" y="136" text-anchor="middle" font-size="14" fill="#0f766e">仍保留 [2, 3]</text>
      </g>

      <g transform="translate(412 70)">
        <rect x="0" y="0" width="156" height="150" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
        <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="78" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">读入 5</text>
        <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="78" y="62" text-anchor="middle" font-size="14" fill="#b45309">候选 [2,3,5]</text>
        <rect x="36" y="80" width="84" height="32" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
        <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="78" y="101" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">pop 2</text>
        <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="78" y="136" text-anchor="middle" font-size="14" fill="#0f766e">保留 [3, 5]</text>
      </g>

      <g transform="translate(598 70)">
        <rect x="0" y="0" width="156" height="150" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
        <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="78" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">读入 6</text>
        <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="78" y="62" text-anchor="middle" font-size="14" fill="#b45309">候选 [3,5,6]</text>
        <rect x="36" y="80" width="84" height="32" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
        <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="78" y="101" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">pop 3</text>
        <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="78" y="136" text-anchor="middle" font-size="14" fill="#0f766e">保留 [5, 6]</text>
      </g>

      <g transform="translate(784 70)">
        <rect x="0" y="0" width="156" height="150" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
        <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="78" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">读入 4</text>
        <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="78" y="62" text-anchor="middle" font-size="14" fill="#b45309">候选 [4,5,6]</text>
        <rect x="36" y="80" width="84" height="32" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
        <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="78" y="101" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">pop 4</text>
        <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="78" y="136" text-anchor="middle" font-size="14" fill="#0f766e">保留 [5, 6]</text>
      </g>

      <path d="M 196 145 L 226 145" fill="none" stroke="#0f766e" stroke-width="2" marker-end="url(#heap-arrow-soft)"/>
      <path d="M 382 145 L 412 145" fill="none" stroke="#0f766e" stroke-width="2" marker-end="url(#heap-arrow-soft)"/>
      <path d="M 568 145 L 598 145" fill="none" stroke="#0f766e" stroke-width="2" marker-end="url(#heap-arrow-soft)"/>
      <path d="M 754 145 L 784 145" fill="none" stroke="#0f766e" stroke-width="2" marker-end="url(#heap-arrow-soft)"/>
    </g>

    <g transform="translate(116 575)">
      <rect x="0" y="0" width="360" height="92" rx="12" fill="#ecfdf5" stroke="#5eead4" stroke-width="2"/>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="24" y="34" font-size="17" font-weight="700" fill="#0f766e">不变式</text>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="24" y="65" font-size="15" fill="#115e59">任意时刻，堆里最多 k 个元素，并且它们是当前最大的 k 个数。</text>
    </g>

    <g transform="translate(575 560)">
      <rect x="0" y="0" width="408" height="122" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="24" y="34" font-size="17" font-weight="700" fill="#92400e">最终小根堆</text>
      <circle cx="210" cy="54" r="25" fill="#fde68a" stroke="#f59e0b" stroke-width="3"/>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="210" y="61" text-anchor="middle" font-size="22" font-weight="700" fill="#92400e">5</text>
      <circle cx="268" cy="94" r="22" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="268" y="101" text-anchor="middle" font-size="20" font-weight="700" fill="#9a3412">6</text>
      <line x1="229" y1="67" x2="250" y2="81" stroke="#92400e" stroke-width="2"/>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="24" y="76" font-size="15" fill="#78350f">堆顶是 5。</text>
      <text font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" x="24" y="103" font-size="15" fill="#78350f">最大的 2 个数是 5 和 6，所以第 2 大是 5。</text>
    </g>
  </g>
</svg>
