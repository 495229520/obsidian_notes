  <rect x="40" y="340" width="720" height="65" rx="8" fill="#fdfdfd" stroke="#e0e0e0" stroke-width="1"/>
  <text x="400" y="370" font-size="14" fill="#444" text-anchor="middle">两个节点分别位于不同的 NAT 后面。谁也无法直接触达对方。NAT 映射表是空的。</text>
  <text x="400" y="392" font-size="14" fill="#444" text-anchor="middle">信令服务器已经告诉双方：“你的伙伴在 X —— 开始！”</text>
