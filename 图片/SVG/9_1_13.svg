  <text x="110" y="175" font-size="13" fill="#185c45" text-anchor="middle">192.168.1.5</text>

  <rect x="210" y="110" width="130" height="100" rx="8" fill="#edeaff" stroke="#bcb3f0" stroke-width="1.5"/>
  <text x="275" y="135" font-size="15" font-weight="bold" fill="#3a2f78" text-anchor="middle">NAT A</text>
