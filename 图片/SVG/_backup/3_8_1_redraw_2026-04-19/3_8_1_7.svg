<svg xmlns="http://www.w3.org/2000/svg" width="980" height="460" viewBox="0 0 980 460">
  <defs>
    <style>
      .title { font: 700 28px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #1f2937; }
      .subtitle { font: 500 16px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #475569; }
      .label { font: 700 17px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #111827; }
      .text { font: 500 15px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #334155; }
      .mono { font: 700 14px 'Consolas', monospace; fill: #0f172a; }
      .legend { font: 600 14px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #1f2937; }
      .note { fill: #eff6ff; stroke: #60a5fa; stroke-width: 2; rx: 16; }
      .bar { stroke: #475569; stroke-width: 2; rx: 16; }
      .done { fill: #dcfce7; }
      .flying { fill: #fde68a; }
      .ready { fill: #dbeafe; }
      .blocked { fill: #e5e7eb; }
      .arrow { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect width="980" height="460" fill="rgb(245, 244, 237)"/>

  <text x="40" y="46" class="title">数据传输 4：滑动窗口限制在途数据量</text>
  <text x="40" y="74" class="subtitle">接收方会告诉发送方自己还能接多少数据。发送方不能无限制地“狂发”，只能在窗口允许的范围内推进。</text>

  <rect x="74" y="110" width="832" height="76" class="note"/>
  <text x="102" y="142" class="label">接收方通告窗口：rwnd = 12 KB</text>
  <text x="102" y="168" class="text">含义：最多允许 12 KB 数据处于“已发送但尚未确认”的状态，否则接收缓存可能被淹没。</text>

  <rect x="90" y="238" width="760" height="78" class="bar done"/>
  <rect x="90" y="238" width="180" height="78" class="done"/>
  <rect x="270" y="238" width="200" height="78" class="flying"/>
  <rect x="470" y="238" width="180" height="78" class="ready"/>
  <rect x="650" y="238" width="200" height="78" class="blocked"/>

  <text x="134" y="268" class="label">已确认</text>
  <text x="116" y="291" class="mono">ACK 之前的数据</text>

  <text x="310" y="268" class="label">已发送未确认</text>
  <text x="302" y="291" class="mono">正在“飞行”中</text>

  <text x="516" y="268" class="label">可立即发送</text>
  <text x="498" y="291" class="mono">仍在窗口范围内</text>

  <text x="688" y="268" class="label">暂不可发送</text>
  <text x="688" y="291" class="mono">超出接收窗口</text>

  <path d="M 250 352 L 340 352" class="arrow"/>
  <text x="354" y="358" class="text">当新的 ACK 到来后，窗口整体向右滑动，发送方才能继续推进。</text>

  <text x="92" y="402" class="text">这就是“滑动窗口”的直观含义：既保证吞吐量，又避免把接收端压垮。</text>
</svg>
