<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 680" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
    <filter id="light-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.04"/>
    </filter>
  </defs>

  <style>
    /* 基础背景与排版字体 */
    .bg { fill: #F6F6F2; }
    text { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    
    .title { font-size: 28px; font-weight: bold; fill: #1A2B3C; }
    .subtitle { font-size: 15px; fill: #555555; }
    
    /* 节点样式 (胶囊形状) */
    .node-box { fill: #FFFFFF; stroke: #3C4B5E; stroke-width: 2.5; filter: url(#shadow); }
    .node-text { font-size: 22px; font-weight: bold; fill: #1A2B3C; text-anchor: middle; }
    
    /* 生命线 (红色垂直线) */
    .lifeline { stroke: #EA4335; stroke-width: 2.5; }
    
    /* 核心结论侧边框 */
    .conclusion-box { fill: #FFFFFF; stroke: #F9AB00; stroke-width: 2.5; filter: url(#shadow); }
    .conclusion-title { font-size: 18px; font-weight: bold; fill: #1A56A9; text-anchor: middle; }
    .conclusion-text { font-size: 14px; fill: #333333; text-anchor: middle; }
    
    /* 半关闭阶段中央提示框 */
    .stage-box { fill: #EEF3FB; stroke: #8AB4F8; stroke-width: 2; filter: url(#light-shadow); }
    .stage-title { font-size: 18px; font-weight: bold; fill: #1A56A9; text-anchor: middle; }
    .stage-text { font-size: 14px; fill: #555555; text-anchor: middle; }
    
    /* 通信箭头与文本 (蓝色：客户端 -> 服务器) */
    .line-blue { stroke: #1A73E8; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; }
    .text-blue-title { font-size: 18px; font-weight: bold; fill: #1A73E8; text-anchor: middle; }
    
    /* 通信箭头与文本 (青绿色：服务器 -> 客户端) */
    .line-teal { stroke: #0D8568; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; }
    .text-teal-title { font-size: 18px; font-weight: bold; fill: #0D8568; text-anchor: middle; }
    
    /* 步骤说明文字 */
    .step-desc { font-size: 14px; fill: #555555; text-anchor: middle; }
  </style>

  <rect class="bg" width="1000" height="680" />

  <g transform="translate(45, 55)">
    <text class="title" x="0" y="0">为什么断开连接通常需要四次挥手</text>
    <text class="subtitle" x="0" y="32">TCP 是全双工的。客户端和服务器的“发送方向”要分别关闭，所以经常会看到 FIN / ACK / FIN / ACK 四个动作。</text>
  </g>

  <line class="lifeline" x1="250" y1="190" x2="250" y2="650" />
  <line class="lifeline" x1="750" y1="190" x2="750" y2="650" />

  <g transform="translate(0, 130)">
    <rect class="node-box" x="150" y="0" width="200" height="60" rx="30" ry="30" />
    <text class="node-text" x="250" y="38">客户端</text>
    
    <rect class="node-box" x="650" y="0" width="200" height="60" rx="30" ry="30" />
    <text class="node-text" x="750" y="38">服务器</text>
  </g>

  <g transform="translate(50, 460)">
    <rect class="conclusion-box" x="0" y="0" width="160" height="135" rx="15" ry="15" />
    <text class="conclusion-title" x="80" y="35">核心结论</text>
    <text class="conclusion-text" x="80" y="65">建立连接时要证明</text>
    <text class="conclusion-text" x="80" y="87">“双向能通信”；</text>
    <text class="conclusion-text" x="80" y="109">断开时则要分别关闭</text>
    <text class="conclusion-text" x="80" y="131">两个发送方向。</text>
  </g>

  <g transform="translate(0, 240)">
    <line class="line-blue" x1="270" y1="0" x2="730" y2="0" />
    <polyline class="line-blue" fill="none" points="715,-10 730,0 715,10" />
    <text class="text-blue-title" x="500" y="-12">1. FIN</text>
    <text class="step-desc" x="500" y="22">客户端：我这边已经没有数据要发了</text>
  </g>

  <g transform="translate(0, 310)">
    <line class="line-teal" x1="730" y1="0" x2="270" y2="0" />
    <polyline class="line-teal" fill="none" points="285,-10 270,0 285,10" />
    <text class="text-teal-title" x="500" y="-12">2. ACK</text>
    <text class="step-desc" x="500" y="22">服务器：收到，你这边的发送方向可以先关闭</text>
  </g>

  <g transform="translate(265, 370)">
    <rect class="stage-box" x="0" y="0" width="470" height="75" rx="15" ry="15" />
    <text class="stage-title" x="235" y="30">半关闭阶段</text>
    <text class="stage-text" x="235" y="55">此时客户端不能再发，但仍然可以接收；服务器也可能还有剩余数据没有发送完。</text>
  </g>

  <g transform="translate(0, 500)">
    <line class="line-teal" x1="730" y1="0" x2="270" y2="0" />
    <polyline class="line-teal" fill="none" points="285,-10 270,0 285,10" />
    <text class="text-teal-title" x="500" y="-12">3. FIN</text>
    <text class="step-desc" x="500" y="22">服务器：我这边也发完了，准备彻底断开</text>
  </g>

  <g transform="translate(0, 570)">
    <line class="line-blue" x1="270" y1="0" x2="730" y2="0" />
    <polyline class="line-blue" fill="none" points="715,-10 730,0 715,10" />
    <text class="text-blue-title" x="500" y="-12">4. ACK</text>
    <text class="step-desc" x="500" y="22">客户端确认后进入 TIME_WAIT，一段时间后连接才完全回收</text>
  </g>

</svg>
