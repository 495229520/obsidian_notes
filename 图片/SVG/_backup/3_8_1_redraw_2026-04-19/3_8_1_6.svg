<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
    <filter id="light-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.04"/>
    </filter>
    <filter id="red-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#EA4335" flood-opacity="0.15"/>
    </filter>
  </defs>

  <style>
    .bg { fill: #F6F6F2; }
    .title { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 26px; font-weight: bold; fill: #1A2B3C; }
    .subtitle { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 15px; fill: #555555; }
    
    .node-box { fill: #FFFFFF; stroke: #3C4B5E; stroke-width: 2.5; filter: url(#shadow); }
    .node-text { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 22px; font-weight: bold; fill: #222222; text-anchor: middle; }
    
    /* 蓝色样式 (正常发送) */
    .arrow-blue { stroke: #4285F4; stroke-width: 3.5; }
    .arrow-head-blue { fill: #4285F4; }
    .packet-blue { fill: #E8F0FE; stroke: #4285F4; stroke-width: 2; filter: url(#light-shadow); }
    .text-blue-title { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 16px; font-weight: bold; fill: #1A73E8; text-anchor: middle; }
    
    /* 绿色样式 (正常接收 ACK) */
    .arrow-green { stroke: #34A853; stroke-width: 3.5; }
    .arrow-head-green { fill: #34A853; }
    .packet-green { fill: #E6F4EA; stroke: #34A853; stroke-width: 2; filter: url(#light-shadow); }
    .text-green-title { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 16px; font-weight: bold; fill: #188038; text-anchor: middle; }
    
    /* 红色样式 (丢失/超时警示) */
    .arrow-red-dashed { stroke: #EA4335; stroke-width: 3.5; stroke-dasharray: 8, 8; }
    .arrow-head-red { fill: #EA4335; }
    .packet-red { fill: #FCE8E6; stroke: #EA4335; stroke-width: 2; filter: url(#red-shadow); }
    .text-red-title { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 16px; font-weight: bold; fill: #C5221F; text-anchor: middle; }
    .text-red-alert { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 18px; font-weight: bold; fill: #EA4335; text-anchor: middle; }
    
    .code-text { font-family: "Courier New", Courier, monospace; font-size: 14px; font-weight: bold; fill: #1A2B3C; text-anchor: middle; }
    .desc-text { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #555555; text-anchor: middle; }
  </style>

  <rect class="bg" width="1000" height="700" />

  <g transform="translate(45, 55)">
    <text class="title" x="0" y="0">数据传输 3：超时重传机制</text>
    <text class="subtitle" x="0" y="35">如果发送方在规定的超时时间内未收到预期的 ACK 确认，就会认为报文丢失，并重新发送该报文段。</text>
  </g>

  <g transform="translate(0, 130)">
    <rect class="node-box" x="80" y="0" width="150" height="520" rx="20" ry="20" />
    <text class="node-text" x="155" y="268">发送方</text>
    
    <rect class="node-box" x="780" y="0" width="150" height="520" rx="20" ry="20" />
    <text class="node-text" x="855" y="268">接收方</text>
  </g>

  <g transform="translate(0, 190)">
    <line class="arrow-blue" x1="240" y1="0" x2="740" y2="0" />
    <polygon class="arrow-head-blue" points="740,-15 775,0 740,15" />
    
    <rect class="packet-blue" x="390" y="-30" width="220" height="60" rx="15" ry="15" />
    <text class="text-blue-title" x="500" y="-8">报文段 1</text>
    <text class="code-text" x="500" y="14">seq=1000, len=5</text>
  </g>

  <g transform="translate(0, 270)">
    <line class="arrow-green" x1="770" y1="0" x2="270" y2="0" />
    <polygon class="arrow-head-green" points="270,-15 235,0 270,15" />
    
    <rect class="packet-green" x="425" y="-30" width="150" height="60" rx="15" ry="15" />
    <text class="text-green-title" x="500" y="-8">ACK=1005</text>
    <text class="desc-text" x="500" y="14">确认收到</text>
  </g>

  <g transform="translate(0, 360)">
    <line class="arrow-blue" x1="240" y1="0" x2="390" y2="0" />
    <line class="arrow-red-dashed" x1="610" y1="0" x2="730" y2="0" />
    <rect class="packet-blue" x="390" y="-30" width="220" height="60" rx="15" ry="15" />
    <text class="text-blue-title" x="500" y="-8">报文段 2</text>
    <text class="code-text" x="500" y="14">seq=1005, len=5</text>
    
    <g transform="translate(730, 0)">
      <line x1="-18" y1="-18" x2="18" y2="18" stroke="#EA4335" stroke-width="6" stroke-linecap="round"/>
      <line x1="18" y1="-18" x2="-18" y2="18" stroke="#EA4335" stroke-width="6" stroke-linecap="round"/>
      <text class="text-red-alert" x="0" y="-30">报文丢失</text>
    </g>
  </g>

  <g transform="translate(0, 450)">
    <rect class="packet-red" x="350" y="-35" width="300" height="70" rx="12" ry="12" />
    <text class="text-red-title" x="500" y="-5">等待超时，未收到 ACK</text>
    <text class="desc-text" style="fill:#C5221F;" x="500" y="18">触发超时重传机制，重新发送该报文</text>
  </g>

  <g transform="translate(0, 550)">
    <line class="arrow-blue" x1="240" y1="0" x2="740" y2="0" />
    <polygon class="arrow-head-blue" points="740,-15 775,0 740,15" />
    
    <rect class="packet-blue" x="390" y="-30" width="220" height="60" rx="15" ry="15" />
    <text class="text-blue-title" x="500" y="-8">重传报文段 2</text>
    <text class="code-text" x="500" y="14">seq=1005, len=5</text>
  </g>

  <g transform="translate(0, 630)">
    <line class="arrow-green" x1="770" y1="0" x2="270" y2="0" />
    <polygon class="arrow-head-green" points="270,-15 235,0 270,15" />
    
    <rect class="packet-green" x="425" y="-30" width="150" height="60" rx="15" ry="15" />
    <text class="text-green-title" x="500" y="-8">ACK=1010</text>
    <text class="desc-text" x="500" y="14">确认重传成功</text>
  </g>

</svg>
