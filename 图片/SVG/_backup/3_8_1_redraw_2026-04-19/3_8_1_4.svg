<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 420">
    <style>
        .title { font-size: 24px; font-weight: bold; fill: #111; font-family: system-ui, -apple-system, sans-serif; }
        .desc { font-size: 14px; fill: #555; font-family: system-ui, -apple-system, sans-serif; }
        .main-box { fill: #ffffff; stroke: #34495e; stroke-width: 2px; rx: 12px; }
        .box-title { font-size: 20px; font-weight: bold; fill: #111; font-family: system-ui, -apple-system, sans-serif; text-anchor: middle; }
        .text-sm { font-size: 14px; fill: #333; font-family: system-ui, -apple-system, sans-serif; text-anchor: middle; }
        .text-code { font-size: 15px; font-family: 'Courier New', Courier, monospace; fill: #111; text-anchor: middle; font-weight: bold; }
        
        .app-box { fill: #f3e8ff; stroke: #9333ea; stroke-width: 2px; rx: 10px; }
        .seg-a-box { fill: #e0f2fe; stroke: #2563eb; stroke-width: 2px; rx: 10px; }
        .seg-b-box { fill: #dcfce7; stroke: #16a34a; stroke-width: 2px; rx: 10px; }

        .bold-blue { fill: #2563eb; font-weight: bold; font-size: 16px; }
        .bold-green { fill: #16a34a; font-weight: bold; font-size: 16px; }
        .bold-purple { fill: #9333ea; font-weight: bold; font-size: 16px; }

        .footer { font-size: 15px; fill: #333; font-family: system-ui, -apple-system, sans-serif; text-anchor: middle; }
    </style>
    <rect width="100%" height="100%" fill="#f4f3ed"/>

    <text x="40" y="50" class="title">数据传输 1：TCP 按字节编号</text>
    <text x="40" y="80" class="desc">TCP 不是按“消息条数”编号，而是按字节流编号。每个报文段都标记自己携带的第一个字节号。</text>

    <rect x="40" y="120" width="160" height="180" class="main-box" />
    <text x="120" y="155" class="box-title">发送方</text>
    <text x="120" y="190" class="text-sm">应用写入字节流</text>
    <text x="120" y="220" class="text-code">H E L L O</text>
    <text x="120" y="250" class="text-code">1000 1001 1002</text>
    <text x="120" y="275" class="text-code">1003 1004</text>

    <rect x="760" y="120" width="160" height="180" class="main-box" />
    <text x="840" y="155" class="box-title">接收方</text>
    <text x="840" y="190" class="text-sm">按序重组字节流</text>
    <text x="840" y="220" class="text-code">1000 1001 1002</text>
    <text x="840" y="245" class="text-code">1003 1004</text>
    <text x="840" y="270" class="text-sm" fill="#777">最后还原成完整</text>
    <text x="840" y="290" class="text-sm" fill="#777">应用数据</text>

    <rect x="250" y="110" width="460" height="70" class="app-box" />
    <text x="480" y="138" class="text-sm bold-purple">应用层字节流</text>
    <text x="480" y="165" class="text-code">[1000:H] [1001:E] [1002:L] [1003:L] [1004:O]</text>

    <rect x="280" y="210" width="200" height="80" class="seg-a-box" />
    <text x="380" y="240" class="text-sm bold-blue">报文段 A</text>
    <text x="380" y="262" class="text-sm">seq=1000, len=3</text>
    <text x="380" y="282" class="text-code">HEL</text>

    <rect x="510" y="210" width="180" height="80" class="seg-b-box" />
    <text x="600" y="240" class="text-sm bold-green">报文段 B</text>
    <text x="600" y="262" class="text-sm">seq=1003, len=2</text>
    <text x="600" y="282" class="text-code">LO</text>

    <defs>
        <marker id="arrowDark" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#34495e" />
        </marker>
    </defs>
    <path d="M 200 250 L 265 250" stroke="#34495e" stroke-width="4" marker-end="url(#arrowDark)" />
    <path d="M 690 250 L 745 250" stroke="#34495e" stroke-width="4" marker-end="url(#arrowDark)" />

    <text x="480" y="350" class="footer">关键点：Seq 指向本报文段携带的“<tspan font-weight="bold" fill="#111">第一个字节</tspan>”，所以 TCP 才能处理拆包、乱序和重传。</text>
</svg>
