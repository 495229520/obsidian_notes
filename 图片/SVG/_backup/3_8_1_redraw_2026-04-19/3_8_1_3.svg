<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460">
    <style>
        .title { font-size: 24px; font-weight: bold; fill: #111; font-family: system-ui, -apple-system, sans-serif; }
        .desc { font-size: 14px; fill: #555; font-family: system-ui, -apple-system, sans-serif; }
        .box { fill: #fff; stroke: #34495e; stroke-width: 2px; rx: 12px; }
        .box-text { font-size: 20px; font-weight: bold; fill: #111; font-family: system-ui, -apple-system, sans-serif; text-anchor: middle; }
        .lifeline { stroke: #94a3b8; stroke-width: 2px; stroke-dasharray: 6, 4; } /* 新增生命线样式 */
        .arrow-line { stroke-width: 3px; fill: none; }
        .arrow-blue { stroke: #3b82f6; }
        .arrow-green { stroke: #10b981; }
        .msg-title { font-size: 18px; font-weight: bold; font-family: system-ui, -apple-system, sans-serif; text-anchor: middle; }
        .msg-desc { font-size: 14px; fill: #555; font-family: system-ui, -apple-system, sans-serif; text-anchor: middle; }
        .circle { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2px; }
        .circle-text { font-size: 18px; font-weight: bold; fill: #3b82f6; font-family: system-ui, -apple-system, sans-serif; text-anchor: middle; dominant-baseline: central; }
        .bottom-box { fill: #e0f2fe; stroke: #3b82f6; stroke-width: 2px; rx: 12px; }
        .bottom-title { font-size: 16px; font-weight: bold; fill: #111; font-family: system-ui, -apple-system, sans-serif; }
        .bottom-text { font-size: 15px; fill: #333; font-family: system-ui, -apple-system, sans-serif; }
    </style>
    <rect width="100%" height="100%" fill="#f4f3ed"/>

    <text x="40" y="50" class="title">为什么必须三次握手</text>
    <text x="40" y="80" class="desc">三次握手不是“形式主义”，而是为了确认双方都具备双向收发能力，并同步各自的初始序列号。</text>

    <line x1="190" y1="166" x2="190" y2="395" class="lifeline" />
    <line x1="710" y1="166" x2="710" y2="395" class="lifeline" />

    <rect x="80" y="110" width="220" height="56" class="box"/>
    <text x="190" y="146" class="box-text">客户端</text>

    <rect x="600" y="110" width="220" height="56" class="box"/>
    <text x="710" y="146" class="box-text">服务器</text>

    <defs>
        <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
        </marker>
        <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981" />
        </marker>
    </defs>

    <path d="M 190 200 L 700 200" class="arrow-line arrow-blue" marker-end="url(#arrowBlue)" />
    <circle cx="230" cy="200" r="18" class="circle" />
    <text x="230" y="200" class="circle-text">1</text>
    <text x="450" y="180" class="msg-title" fill="#3b82f6">SYN</text>
    <text x="450" y="225" class="msg-desc">我想建立连接，初始序列号从 100 开始</text>

    <path d="M 710 275 L 200 275" class="arrow-line arrow-green" marker-end="url(#arrowGreen)" />
    <circle cx="670" cy="275" r="18" class="circle" stroke="#10b981" fill="#ecfdf5"/>
    <text x="670" y="275" class="circle-text" fill="#10b981">2</text>
    <text x="450" y="255" class="msg-title" fill="#10b981">SYN + ACK</text>
    <text x="450" y="300" class="msg-desc">我收到了你的 SYN；我也能发，我的序列号从 300 开始</text>

    <path d="M 190 350 L 700 350" class="arrow-line arrow-blue" marker-end="url(#arrowBlue)" />
    <circle cx="230" cy="350" r="18" class="circle" />
    <text x="230" y="350" class="circle-text">3</text>
    <text x="450" y="330" class="msg-title" fill="#3b82f6">ACK</text>
    <text x="450" y="375" class="msg-desc">我也收到了你的 SYN，双向通信条件确认完毕</text>

    <rect x="80" y="405" width="740" height="65" class="bottom-box" />
    <text x="100" y="432" class="bottom-title">三次之后，双方都确认了三件事：</text>
    <text x="100" y="455" class="bottom-text">1. 客户端能发，服务器能收。 2. 服务器能发，客户端能收。 3. 双方的初始序列号已经同步。</text>
</svg>
