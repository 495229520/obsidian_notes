<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 440" role="img" aria-label="UDP 服务端工程结构图">
  <defs>
    <marker id="arrow-b" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#34495e"/>
    </marker>
  </defs>
  <rect width="1100" height="440" fill="rgb(245, 244, 238)"/>

  <text x="550" y="34" text-anchor="middle" font-size="24" font-family="Arial, PingFang SC, sans-serif" fill="#1f2933">典型 UDP 服务端工程结构</text>

  <rect x="40" y="170" width="170" height="82" rx="12" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="125" y="202" text-anchor="middle" font-size="18" font-family="Arial, PingFang SC, sans-serif" fill="#102a43">UDP Socket</text>
  <text x="125" y="226" text-anchor="middle" font-size="14" font-family="Arial, PingFang SC, sans-serif" fill="#486581">bind 固定端口</text>

  <rect x="270" y="76" width="190" height="78" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="365" y="108" text-anchor="middle" font-size="18" font-family="Arial, PingFang SC, sans-serif" fill="#102a43">RX Thread</text>
  <text x="365" y="132" text-anchor="middle" font-size="14" font-family="Arial, PingFang SC, sans-serif" fill="#486581">recvfrom / 解析来源地址</text>

  <rect x="270" y="286" width="190" height="78" rx="12" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="365" y="318" text-anchor="middle" font-size="18" font-family="Arial, PingFang SC, sans-serif" fill="#102a43">TX Thread</text>
  <text x="365" y="342" text-anchor="middle" font-size="14" font-family="Arial, PingFang SC, sans-serif" fill="#486581">sendto / 批量发包</text>

  <rect x="530" y="76" width="190" height="78" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="625" y="108" text-anchor="middle" font-size="18" font-family="Arial, PingFang SC, sans-serif" fill="#102a43">接收队列</text>
  <text x="625" y="132" text-anchor="middle" font-size="14" font-family="Arial, PingFang SC, sans-serif" fill="#486581">消息体 + 来源端点</text>

  <rect x="530" y="286" width="190" height="78" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="625" y="318" text-anchor="middle" font-size="18" font-family="Arial, PingFang SC, sans-serif" fill="#102a43">发送队列</text>
  <text x="625" y="342" text-anchor="middle" font-size="14" font-family="Arial, PingFang SC, sans-serif" fill="#486581">目标端点 + 响应体</text>

  <rect x="790" y="62" width="270" height="108" rx="14" fill="#fffdf8" stroke="#94a3b8" stroke-width="2"/>
  <text x="925" y="94" text-anchor="middle" font-size="18" font-family="Arial, PingFang SC, sans-serif" fill="#102a43">Worker Pool</text>
  <text x="925" y="122" text-anchor="middle" font-size="14" font-family="Arial, PingFang SC, sans-serif" fill="#486581">业务处理 / 校验 / 去重 / 顺序控制</text>
  <text x="925" y="146" text-anchor="middle" font-size="14" font-family="Arial, PingFang SC, sans-serif" fill="#486581">必要时补 ACK / 超时重传</text>

  <rect x="790" y="272" width="270" height="108" rx="14" fill="#fffdf8" stroke="#94a3b8" stroke-width="2"/>
  <text x="925" y="304" text-anchor="middle" font-size="18" font-family="Arial, PingFang SC, sans-serif" fill="#102a43">会话表 / 状态表</text>
  <text x="925" y="332" text-anchor="middle" font-size="14" font-family="Arial, PingFang SC, sans-serif" fill="#486581">client_ip:port</text>
  <text x="925" y="356" text-anchor="middle" font-size="14" font-family="Arial, PingFang SC, sans-serif" fill="#486581">最近序号 / 时间戳 / 心跳状态</text>

  <line x1="210" y1="188" x2="270" y2="124" stroke="#34495e" stroke-width="2.5" marker-end="url(#arrow-b)"/>
  <line x1="210" y1="234" x2="270" y2="326" stroke="#34495e" stroke-width="2.5" marker-end="url(#arrow-b)"/>
  <line x1="460" y1="115" x2="530" y2="115" stroke="#34495e" stroke-width="2.5" marker-end="url(#arrow-b)"/>
  <line x1="720" y1="115" x2="790" y2="115" stroke="#34495e" stroke-width="2.5" marker-end="url(#arrow-b)"/>
  <line x1="925" y1="170" x2="925" y2="272" stroke="#34495e" stroke-width="2.5" marker-end="url(#arrow-b)"/>
  <line x1="790" y1="325" x2="720" y2="325" stroke="#34495e" stroke-width="2.5" marker-end="url(#arrow-b)"/>
  <line x1="530" y1="325" x2="460" y2="325" stroke="#34495e" stroke-width="2.5" marker-end="url(#arrow-b)"/>

  <text x="232" y="167" font-size="13" font-family="Arial, PingFang SC, sans-serif" fill="#334e68">收包</text>
  <text x="232" y="270" font-size="13" font-family="Arial, PingFang SC, sans-serif" fill="#334e68">发包</text>

  <rect x="120" y="386" width="860" height="34" rx="10" fill="#fffdf8" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="550" y="408" text-anchor="middle" font-size="14" font-family="Arial, PingFang SC, sans-serif" fill="#486581">工程重点通常不在“能发包”，而在“如何补可靠性、顺序、保活和流控”。</text>
</svg>
