<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1560px" height="940px" viewBox="0 0 1560 940" version="1.1"><title>Commit 9ffe8b0 recv analysis v2</title><desc>A cleaner three-column SVG diagram for commit 9ffe8b0, emphasizing the recv chain added and the risks that remain.</desc><rect x="0" y="0" width="1560" height="940" fill="rgb(245, 244, 237)" /><defs><marker id="arrowSmall" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#626B76" /></marker></defs><text fill="#2A2118" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="31" font-weight="700" x="56" y="56">Commit 9ffe8b0: recv chain wiring, cleaner view</text><text fill="#675A4C" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16" x="56" y="90">核心判断：它让 AcceptEx 之后第一次接上 recv 起点，但还没有把 IOCP 收包闭环做稳。</text><rect fill="#EFE7DA" stroke="#D2C2AF" stroke-width="1.4" x="56" y="112" width="250" height="34" rx="17" ry="17" /><text fill="#4B4035" font-family="Consolas, Segoe UI, monospace" font-size="13" font-weight="600" x="181" y="129" text-anchor="middle" dominant-baseline="middle">repo: remote_ctl1</text><rect fill="#E7F4ED" stroke="#9EC6AE" stroke-width="1.4" x="324" y="112" width="200" height="34" rx="17" ry="17" /><text fill="#345A46" font-family="Consolas, Segoe UI, monospace" font-size="13" font-weight="600" x="424" y="129" text-anchor="middle" dominant-baseline="middle">latest: 9ffe8b0</text><rect fill="#FFF1DB" stroke="#DDB56E" stroke-width="1.4" x="542" y="112" width="304" height="34" rx="17" ry="17" /><text fill="#6C4A16" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="13" font-weight="600" x="694" y="129" text-anchor="middle" dominant-baseline="middle">focus: EdoyunServer.cpp / EdoyunServer.h</text><rect fill="#FFF8EA" stroke="#D6B06A" stroke-width="2" x="40" y="166" width="440" height="724" rx="24" ry="24" /><rect fill="#EFF8F3" stroke="#6AA27D" stroke-width="2" x="510" y="166" width="540" height="724" rx="24" ry="24" /><rect fill="#FFF3F3" stroke="#C96E76" stroke-width="2" x="1080" y="166" width="440" height="724" rx="24" ry="24" /><text fill="#6B4A08" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="23" font-weight="700" x="68" y="200">提交前 47efc80</text><text fill="#7B6A53" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="14" x="68" y="230">Accept 能完成，但 recv 入口还没有接上。</text><text fill="#246846" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="23" font-weight="700" x="540" y="200">9ffe8b0 做了什么</text><text fill="#536A5D" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="14" x="540" y="230">把 Accept 后的 recv 主链第一次接了起来。</text><text fill="#A03A43" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="23" font-weight="700" x="1110" y="200">为什么还不算稳</text><text fill="#82656C" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="14" x="1110" y="230">这次是机制推进，不是完整收包闭环。</text><rect fill="#FFFEFB" stroke="#D8B36E" stroke-width="2" x="96" y="290" width="328" height="76" rx="16" ry="16" /><text fill="#433422" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16" font-weight="600" x="260" y="314" text-anchor="middle" dominant-baseline="hanging">AcceptEx completion<tspan x="260" dy="20.48">lpOverlapped = accept</tspan></text><rect fill="#FFFEFB" stroke="#D8B36E" stroke-width="2" x="96" y="406" width="328" height="94" rx="16" ry="16" /><text fill="#433422" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16" font-weight="600" x="260" y="430" text-anchor="middle" dominant-baseline="hanging">AcceptWorker()<tspan x="260" dy="20">GetAcceptExSockaddrs</tspan><tspan x="260" dy="20">拿到本地 / 远端地址</tspan></text><rect fill="#FFFEFB" stroke="#D8B36E" stroke-width="2" x="96" y="540" width="328" height="76" rx="16" ry="16" /><text fill="#433422" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16" font-weight="600" x="260" y="564" text-anchor="middle" dominant-baseline="hanging">NewAccept()<tspan x="260" dy="20.48">继续挂下一个 AcceptEx</tspan></text><rect fill="#FFF6E7" stroke="#D7922C" stroke-width="2" stroke-dasharray="9 7" x="86" y="678" width="348" height="126" rx="18" ry="18" /><text fill="#69410F" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" x="260" y="704" text-anchor="middle" dominant-baseline="hanging">缺口<tspan x="260" dy="23.76">没有补投 WSARecv</tspan><tspan x="260" dy="23.76">ERecv 分支拿不到真实完成事件</tspan></text><text fill="#7B6A53" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="14" x="260" y="782" text-anchor="middle" dominant-baseline="middle">8.1 的框架只做到 accept，<tspan x="260" dy="17.36">还没有真正进入 recv 生命周期。</tspan></text><line stroke="#626B76" stroke-width="2.2" marker-end="url(#arrowSmall)" x1="260" y1="366" x2="260" y2="406" /><line stroke="#626B76" stroke-width="2.2" marker-end="url(#arrowSmall)" x1="260" y1="500" x2="260" y2="540" /><line stroke="#C08834" stroke-width="2" stroke-dasharray="7 7" marker-end="url(#arrowSmall)" x1="260" y1="616" x2="260" y2="678" /><rect fill="#FBFFFC" stroke="#7CB592" stroke-width="1.8" x="540" y="258" width="214" height="74" rx="14" ry="14" /><text fill="#2C4F3C" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="13" font-weight="600" x="556" y="278" dominant-baseline="hanging">EdoyunServer.cpp<tspan x="556" dy="15.6">AcceptWorker 内补投 WSARecv</tspan><tspan x="556" dy="15.6">StartService / threadIocp 下沉到 .cpp</tspan></text><rect fill="#FBFFFC" stroke="#7CB592" stroke-width="1.8" x="796" y="258" width="214" height="74" rx="14" ry="14" /><text fill="#2C4F3C" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="13" font-weight="600" x="812" y="278" dominant-baseline="hanging">EdoyunServer.h<tspan x="812" dy="15.6">EdoyunClient 新增 m_recv / m_send</tspan><tspan x="812" dy="15.6">新增 flags / m_used / m_wsabuffer</tspan></text><rect fill="#DCEFE3" stroke="#A5CAB2" stroke-width="1.1" x="594" y="348" width="372" height="30" rx="15" ry="15" /><text fill="#385848" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="12.5" font-weight="600" x="780" y="363" text-anchor="middle" dominant-baseline="middle">新增状态承载: m_client / m_recv / m_send / m_flags / m_used / WSABUF</text><rect fill="#FFFFFF" stroke="#529D75" stroke-width="2" x="640" y="404" width="280" height="92" rx="16" ry="16" /><text fill="#234434" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16" font-weight="600" x="780" y="426" text-anchor="middle" dominant-baseline="hanging">AcceptWorker()<tspan x="780" dy="20.16">取地址后立刻补投 WSARecv</tspan><tspan x="780" dy="20.16">并继续 NewAccept()</tspan></text><rect fill="#FFFFFF" stroke="#529D75" stroke-width="2" x="640" y="536" width="280" height="108" rx="16" ry="16" /><text fill="#234434" font-family="Consolas, Segoe UI, monospace" font-size="15" font-weight="600" x="780" y="556" text-anchor="middle" dominant-baseline="hanging">WSARecv(<tspan x="780" dy="17.4">sock = client</tspan><tspan x="780" dy="17.4">lpBuffers = RecvWSABuffer()</tspan><tspan x="780" dy="17.4">lpOverlapped = *m_client</tspan><tspan x="780" dy="17.4">)</tspan></text><rect fill="#FFFFFF" stroke="#529D75" stroke-width="2" x="640" y="682" width="280" height="78" rx="16" ry="16" /><text fill="#234434" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16" font-weight="600" x="780" y="705" text-anchor="middle" dominant-baseline="hanging">threadIocp()<tspan x="780" dy="20.48">GQCS -&gt; switch(m_operator)</tspan></text><rect fill="#FFFFFF" stroke="#529D75" stroke-width="2" x="640" y="790" width="280" height="78" rx="16" ry="16" /><text fill="#234434" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16" font-weight="600" x="780" y="813" text-anchor="middle" dominant-baseline="hanging">ERecv -&gt; RecvWorker()<tspan x="780" dy="20.48">recv 完成事件第一次有入口</tspan></text><rect fill="#E7F5EC" stroke="#529D75" stroke-width="1.8" x="640" y="874" width="280" height="42" rx="16" ry="16" /><text fill="#244736" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="14.5" font-weight="700" x="780" y="895" text-anchor="middle" dominant-baseline="middle">EdoyunClient::Recv() 仍回落到同步 recv()</text><line stroke="#626B76" stroke-width="2.2" marker-end="url(#arrowSmall)" x1="780" y1="496" x2="780" y2="536" /><line stroke="#626B76" stroke-width="2.2" marker-end="url(#arrowSmall)" x1="780" y1="644" x2="780" y2="682" /><line stroke="#626B76" stroke-width="2.2" marker-end="url(#arrowSmall)" x1="780" y1="760" x2="780" y2="790" /><line stroke="#626B76" stroke-width="2" marker-end="url(#arrowSmall)" x1="780" y1="868" x2="780" y2="874" /><rect fill="#FFF9F9" stroke="#D87272" stroke-width="2" x="1120" y="280" width="360" height="92" rx="16" ry="16" /><text fill="#5D2C2F" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="15" font-weight="600" x="1140" y="300" dominant-baseline="hanging">1. lpOverlapped 用错对象<tspan x="1140" dy="18.3">*m_client 仍会转成 accept overlapped</tspan><tspan x="1140" dy="18.3">完成事件可能再次按 EAccept 路由</tspan></text><rect fill="#FFF9F9" stroke="#D87272" stroke-width="2" x="1120" y="394" width="360" height="92" rx="16" ry="16" /><text fill="#5D2C2F" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="15" font-weight="600" x="1140" y="414" dominant-baseline="hanging">2. WSABUF 未见初始化<tspan x="1140" dy="18.3">m_wsabuffer.buf / len 没有明确赋值</tspan><tspan x="1140" dy="18.3">WSARecv 读写范围不可靠</tspan></text><rect fill="#FFF9F9" stroke="#D87272" stroke-width="2" x="1120" y="510" width="360" height="92" rx="16" ry="16" /><text fill="#5D2C2F" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="15" font-weight="600" x="1140" y="530" dominant-baseline="hanging">3. accept 后置步骤缺失<tspan x="1140" dy="18.3">没看到 SO_UPDATE_ACCEPT_CONTEXT</tspan><tspan x="1140" dy="18.3">也没看到 accepted socket 重新关联 IOCP</tspan></text><rect fill="#FFF9F9" stroke="#D87272" stroke-width="2" x="1120" y="624" width="360" height="92" rx="16" ry="16" /><text fill="#5D2C2F" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="15" font-weight="600" x="1140" y="644" dominant-baseline="hanging">4. RecvWorker 仍同步 recv()<tspan x="1140" dy="18.3">没有直接消费 IOCP 返回的 transferred bytes</tspan><tspan x="1140" dy="18.3">异步语义仍然不干净</tspan></text><rect fill="#FCECED" stroke="#BB4750" stroke-width="2.2" x="1120" y="774" width="360" height="98" rx="18" ry="18" /><text fill="#7A2D33" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" x="1300" y="798" text-anchor="middle" dominant-baseline="hanging">结论<tspan x="1300" dy="23.04">9ffe8b0 让 recv 第一次接上线，</tspan><tspan x="1300" dy="23.04">但要稳定还得把这四个缺口补齐。</tspan></text><line stroke="#D07A80" stroke-width="2" stroke-dasharray="7 7" x1="920" y1="590" x2="1120" y2="590" /><line stroke="#D07A80" stroke-width="2" stroke-dasharray="7 7" x1="920" y1="450" x2="1120" y2="440" /><line stroke="#D07A80" stroke-width="2" stroke-dasharray="7 7" x1="920" y1="730" x2="1120" y2="670" /><line stroke="#E5B8BC" stroke-width="1.4" stroke-dasharray="5 7" x1="920" y1="895" x2="1120" y2="670" /><text fill="#6C6459" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="12.5" x="56" y="918">注：右栏是代码级风险判断，不代表已做运行时验证；本图目标是把“推进点”和“未完成点”分开。</text></svg>