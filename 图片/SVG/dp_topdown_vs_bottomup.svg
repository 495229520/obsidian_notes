<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 340" font-family="'Segoe UI', 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="topDown" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#a29bfe;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bottomUp" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#00b894;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#55efc4;stop-opacity:1"/>
    </linearGradient>
    <marker id="arrowDown" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6c5ce7"/>
    </marker>
    <marker id="arrowUp" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#00b894"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="390" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">自顶向下（记忆化） vs 自底向上（递推）</text>

  <!-- Left: Top-down -->
  <rect x="20" y="50" width="350" height="270" rx="12" fill="#f8f7ff" stroke="#6c5ce7" stroke-width="2"/>
  <text x="195" y="78" text-anchor="middle" font-size="15" font-weight="bold" fill="#6c5ce7">自顶向下（Top-Down）</text>
  <text x="195" y="98" text-anchor="middle" font-size="12" fill="#7f8c8d">递归 + 备忘录</text>

  <!-- Top-down boxes -->
  <rect x="140" y="115" width="110" height="36" rx="6" fill="url(#topDown)"/>
  <text x="195" y="138" text-anchor="middle" font-size="13" fill="white" font-weight="bold">fib(5) = ?</text>

  <line x1="165" y1="151" x2="110" y2="168" stroke="#6c5ce7" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <line x1="225" y1="151" x2="280" y2="168" stroke="#6c5ce7" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <rect x="55" y="170" width="110" height="32" rx="6" fill="url(#topDown)" opacity="0.85"/>
  <text x="110" y="191" text-anchor="middle" font-size="12" fill="white" font-weight="bold">fib(4) = ?</text>

  <rect x="225" y="170" width="110" height="32" rx="6" fill="url(#topDown)" opacity="0.85"/>
  <text x="280" y="191" text-anchor="middle" font-size="12" fill="white" font-weight="bold">fib(3) = ?</text>

  <line x1="82" y1="202" x2="60" y2="218" stroke="#6c5ce7" stroke-width="1.2" marker-end="url(#arrowDown)"/>
  <line x1="138" y1="202" x2="160" y2="218" stroke="#6c5ce7" stroke-width="1.2" marker-end="url(#arrowDown)"/>

  <rect x="30" y="220" width="75" height="28" rx="5" fill="url(#topDown)" opacity="0.7"/>
  <text x="67" y="239" text-anchor="middle" font-size="11" fill="white">fib(3)=?</text>

  <rect x="135" y="220" width="75" height="28" rx="5" fill="url(#topDown)" opacity="0.7"/>
  <text x="172" y="239" text-anchor="middle" font-size="11" fill="white">fib(2)=?</text>

  <text x="195" y="275" text-anchor="middle" font-size="12" fill="#6c5ce7">从大问题出发，按需向下分解</text>
  <text x="195" y="295" text-anchor="middle" font-size="12" fill="#6c5ce7">遇到已计算过的子问题 → 查表返回</text>
  <text x="195" y="312" text-anchor="middle" font-size="11" fill="#b2bec3">memo[3] 已有值？直接返回!</text>

  <!-- Right: Bottom-up -->
  <rect x="410" y="50" width="350" height="270" rx="12" fill="#f0fff4" stroke="#00b894" stroke-width="2"/>
  <text x="585" y="78" text-anchor="middle" font-size="15" font-weight="bold" fill="#00b894">自底向上（Bottom-Up）</text>
  <text x="585" y="98" text-anchor="middle" font-size="12" fill="#7f8c8d">迭代 + dp 数组</text>

  <!-- Bottom-up boxes -->
  <rect x="430" y="220" width="55" height="32" rx="5" fill="url(#bottomUp)"/>
  <text x="457" y="241" text-anchor="middle" font-size="12" fill="white" font-weight="bold">dp[0]</text>
  <text x="457" y="265" text-anchor="middle" font-size="11" fill="#636e72">= 0</text>

  <rect x="500" y="220" width="55" height="32" rx="5" fill="url(#bottomUp)"/>
  <text x="527" y="241" text-anchor="middle" font-size="12" fill="white" font-weight="bold">dp[1]</text>
  <text x="527" y="265" text-anchor="middle" font-size="11" fill="#636e72">= 1</text>

  <rect x="570" y="220" width="55" height="32" rx="5" fill="url(#bottomUp)"/>
  <text x="597" y="241" text-anchor="middle" font-size="12" fill="white" font-weight="bold">dp[2]</text>
  <text x="597" y="265" text-anchor="middle" font-size="11" fill="#636e72">= 1</text>

  <rect x="640" y="220" width="55" height="32" rx="5" fill="url(#bottomUp)"/>
  <text x="667" y="241" text-anchor="middle" font-size="12" fill="white" font-weight="bold">dp[3]</text>
  <text x="667" y="265" text-anchor="middle" font-size="11" fill="#636e72">= 2</text>

  <rect x="710" y="220" width="55" height="32" rx="5" fill="url(#bottomUp)" opacity="0.6"/>
  <text x="737" y="241" text-anchor="middle" font-size="12" fill="white">...</text>

  <!-- Arrows going up -->
  <line x1="527" y1="218" x2="560" y2="188" stroke="#00b894" stroke-width="1.5" marker-end="url(#arrowUp)"/>
  <line x1="457" y1="218" x2="540" y2="188" stroke="#00b894" stroke-width="1.5" marker-end="url(#arrowUp)"/>
  <rect x="525" y="170" width="70" height="28" rx="5" fill="url(#bottomUp)" opacity="0.85"/>
  <text x="560" y="189" text-anchor="middle" font-size="11" fill="white">dp[2]=1</text>

  <line x1="560" y1="168" x2="593" y2="148" stroke="#00b894" stroke-width="1.5" marker-end="url(#arrowUp)"/>
  <line x1="597" y1="218" x2="615" y2="148" stroke="#00b894" stroke-width="1.5" marker-end="url(#arrowUp)"/>
  <rect x="578" y="130" width="70" height="28" rx="5" fill="url(#bottomUp)" opacity="0.9"/>
  <text x="613" y="149" text-anchor="middle" font-size="11" fill="white">dp[3]=2</text>

  <text x="585" y="295" text-anchor="middle" font-size="12" fill="#00b894">从最小子问题开始，逐步构建</text>
  <text x="585" y="312" text-anchor="middle" font-size="12" fill="#00b894">dp[i] = dp[i-1] + dp[i-2]</text>
</svg>