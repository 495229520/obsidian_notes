<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 900" width="1240" height="900">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="1240" height="900" fill="rgb(245, 244, 237)"/>

  <text x="620" y="28" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#444441">8.3 对象 / 所有权 / 借用关系结构图</text>

  <!-- 顶部服务器 -->
  <rect x="420" y="60" width="400" height="60" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="620" y="90" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="15" font-weight="500" fill="#0C447C">EdoyunServer</text>

  <!-- 第二层 -->
  <rect x="90" y="200" width="320" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="250" y="222" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#3C3489">m_client : map&lt;SOCKET, PCLIENT&gt;</text>
  <text x="250" y="241" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#534AB7">真正持有客户端 shared_ptr</text>

  <rect x="830" y="200" width="320" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="990" y="222" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#633806">m_pool : EdoyunThreadPool</text>
  <text x="990" y="241" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#854F0B">负责派发 IOCP worker</text>

  <path d="M540,120 L310,200" stroke="#185FA5" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M700,120 L930,200" stroke="#185FA5" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- 中央客户端 -->
  <rect x="370" y="320" width="500" height="92" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="620" y="348" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="15" font-weight="500" fill="#085041">EdoyunClient</text>
  <text x="620" y="372" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#0F6E56">拥有 m_overlapped / m_recv / m_send / m_vecSend / m_buffer</text>
  <text x="620" y="394" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#0F6E56">在 8.3 中成为发送队列回调的真正宿主</text>

  <path d="M250,256 L540,320" stroke="#534AB7" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="402" y="277" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="11" font-weight="400" fill="#534AB7">shared_ptr 指向真实客户端对象</text>

  <!-- 左下 overlapped 组 -->
  <rect x="70" y="510" width="450" height="250" rx="12" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.0"/>
  <text x="295" y="536" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#444441">Overlapped 对象组</text>

  <rect x="110" y="580" width="370" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="295" y="602" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#0C447C">AcceptOverlapped / RecvOverlapped / SendOverlapped</text>
  <text x="295" y="621" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#185FA5">由 EdoyunClient 的 shared_ptr 成员持有</text>

  <rect x="110" y="676" width="370" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="295" y="698" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#3C3489">m_client : EdoyunClient*</text>
  <text x="295" y="717" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#534AB7">8.3 从 PCLIENT 改成原始指针，只借用，不拥有</text>

  <path d="M520,412 L360,510" stroke="#0F6E56" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="436" y="460" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="11" font-weight="400" fill="#0F6E56">EdoyunClient 拥有 overlapped 成员</text>

  <path d="M520,412 C470,470 430,520 390,676" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow)"/>
  <text x="470" y="548" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="11" font-weight="400" fill="#534AB7">反向只保存借用指针</text>

  <!-- 右下发送队列组 -->
  <rect x="720" y="510" width="450" height="290" rx="12" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.0"/>
  <text x="945" y="536" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#444441">EdoyunSendQueue&lt;std::vector&lt;char&gt;&gt;</text>

  <rect x="760" y="580" width="370" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="945" y="602" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#085041">继承 CEdoyunQueue&lt;T&gt;</text>
  <text x="945" y="621" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#0F6E56">内部还有 m_hCompletionPort / m_hThread / m_lstData</text>

  <rect x="760" y="676" width="370" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="945" y="698" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#633806">m_thread : EdoyunThread</text>
  <text x="945" y="717" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#854F0B">额外轮询 threadTick()，检测队列非空后发起 EQPop</text>

  <rect x="760" y="772" width="370" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="945" y="794" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#3C3489">m_base / m_callback</text>
  <text x="945" y="813" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#534AB7">回调最终落到 EdoyunClient::SendData()</text>

  <path d="M720,412 L880,510" stroke="#0F6E56" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="806" y="460" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="11" font-weight="400" fill="#0F6E56">EdoyunClient 直接拥有发送队列成员</text>

  <path d="M860,772 C830,700 800,520 720,412" stroke="#854F0B" stroke-width="1.5" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow)"/>
  <text x="826" y="620" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="11" font-weight="400" fill="#854F0B">通过回调再借用回 EdoyunClient</text>

  <!-- 图例 -->
  <rect x="70" y="820" width="1100" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="620" y="842" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#444441">实线 = 拥有 / 持有关系　　虚线 = 借用 / 回调回指关系　　8.3 的核心改动就是把“谁拥有对象、谁只是借用对象”重新分清</text>
</svg>