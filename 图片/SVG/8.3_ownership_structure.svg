<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1240px" height="1080px" viewBox="0 0 1240 1080" version="1.1">
  <title>8.3 对象 / 所有权 / 借用关系结构图</title>
  <desc>展示 EdoyunServer、m_client、EdoyunClient、overlapped 对象组与发送队列之间的拥有关系和借用关系。</desc>
  <rect x="0" y="0" width="1240" height="1080" fill="rgb(245, 244, 237)"/>
  <defs>
    <marker id="arrow-own" markerWidth="8" markerHeight="8" refX="7.2" refY="5" orient="auto" viewBox="0 0 10 10">
      <path d="M1.5 1.7 L7.4 5 L1.5 8.3" fill="none" stroke="#156C58" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-borrow" markerWidth="8" markerHeight="8" refX="7.2" refY="5" orient="auto" viewBox="0 0 10 10">
      <path d="M1.5 1.7 L7.4 5 L1.5 8.3" fill="none" stroke="#9A5A12" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <g id="scene" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, system-ui, sans-serif" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
    <text fill="#3A3731" font-size="18" font-weight="700" letter-spacing="0.2" x="620" y="34" text-anchor="middle" dominant-baseline="middle">8.3 对象 / 所有权 / 借用关系结构图</text>
    <rect fill="#ECE7DD" stroke="#D7D0C2" stroke-width="1" x="250" y="52" width="740" height="32" rx="16" ry="16"/>
    <text fill="#5D574E" font-size="13" font-weight="500" x="620" y="68" text-anchor="middle" dominant-baseline="middle">核心变化：真正拥有者收口到 EdoyunServer::m_client，其余对象只保留借用或回调引用</text>
    <g id="server">
      <rect fill="#E2EFFB" stroke="#1D639D" stroke-width="1.4" x="390" y="110" width="460" height="76" rx="18" ry="18"/>
      <text fill="#0D4779" font-size="19" font-weight="700" x="620" y="138" text-anchor="middle" dominant-baseline="middle">EdoyunServer</text>
      <text fill="#1D639D" font-size="12.5" font-weight="500" x="620" y="159" text-anchor="middle" dominant-baseline="middle">服务端根对象，统一管理客户端索引与线程调度入口</text>
    </g>
    <g id="map-node">
      <rect fill="#EFEAFE" stroke="#5B48B8" stroke-width="1.2" x="60" y="245" width="380" height="80" rx="16" ry="16"/>
      <text fill="#41368C" font-size="14.5" font-weight="700" x="250" y="274" text-anchor="middle" dominant-baseline="middle">m_client : map&lt;SOCKET, PCLIENT&gt;</text>
      <text fill="#5B48B8" font-size="12.2" font-weight="500" x="250" y="298" text-anchor="middle" dominant-baseline="middle">真正持有客户端 shared_ptr，是 8.3 的所有权收口点</text>
    </g>
    <g id="pool-node">
      <rect fill="#FCEEDB" stroke="#8C560F" stroke-width="1.2" x="800" y="245" width="380" height="80" rx="16" ry="16"/>
      <text fill="#69400A" font-size="14.5" font-weight="700" x="990" y="274" text-anchor="middle" dominant-baseline="middle">m_pool : EdoyunThreadPool</text>
      <text fill="#8C560F" font-size="12.2" font-weight="500" x="990" y="298" text-anchor="middle" dominant-baseline="middle">负责派发 IOCP worker，把完成端口事件转到执行线程</text>
    </g>
    <path fill="none" stroke="#156C58" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke" marker-end="url(#arrow-own)" d="M540 186 L540 218 L250 218 L250 245"/>
    <path fill="none" stroke="#156C58" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke" marker-end="url(#arrow-own)" d="M700 186 L700 218 L990 218 L990 245"/>
    <g id="client-node">
      <rect fill="#E3F6EF" stroke="#0E7058" stroke-width="1.5" x="300" y="368" width="640" height="134" rx="20" ry="20"/>
      <text fill="#0A5342" font-size="20" font-weight="700" x="620" y="401" text-anchor="middle" dominant-baseline="middle">EdoyunClient</text>
      <text fill="#0E7058" font-size="13" font-weight="500" x="620" y="433" text-anchor="middle" dominant-baseline="middle">拥有 m_overlapped / m_recv / m_send / m_vecSend / m_buffer</text>
      <text fill="#0E7058" font-size="13" font-weight="500" x="620" y="462" text-anchor="middle" dominant-baseline="middle">在 8.3 中成为发送队列回调的真正宿主，承接所有成员生命周期</text>
    </g>
    <path fill="none" stroke="#156C58" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke" marker-end="url(#arrow-own)" d="M250 325 L250 350 L430 350 L430 368"/>
    <rect fill="#EEF7F3" stroke="#CFE6DC" stroke-width="1" x="300" y="327" width="260" height="28" rx="14" ry="14"/>
    <text fill="#156C58" font-size="12.2" font-weight="600" x="430" y="341" text-anchor="middle" dominant-baseline="middle">shared_ptr 持有真实客户端对象</text>
    <g id="overlapped-panel">
      <rect fill="#F2EFE7" stroke="#8F887D" stroke-width="1.3" x="40" y="625" width="540" height="310" rx="22" ry="22"/>
      <text fill="#454039" font-size="16" font-weight="700" x="310" y="655" text-anchor="middle" dominant-baseline="middle">Overlapped 对象组</text>
      <text fill="#6A645B" font-size="12" font-weight="500" x="310" y="678" text-anchor="middle" dominant-baseline="middle">生命周期跟随 EdoyunClient，反向只保留借用指针</text>
      <rect fill="#E2EFFB" stroke="#1D639D" stroke-width="1.1" x="90" y="720" width="440" height="70" rx="14" ry="14"/>
      <text fill="#0D4779" font-size="14" font-weight="700" x="310" y="747" text-anchor="middle" dominant-baseline="middle">AcceptOverlapped / RecvOverlapped / SendOverlapped</text>
      <text fill="#1D639D" font-size="12" font-weight="500" x="310" y="770" text-anchor="middle" dominant-baseline="middle">作为 EdoyunClient 的 shared_ptr 成员存在，不再单独扩散所有权</text>
      <rect fill="#EFEAFE" stroke="#5B48B8" stroke-width="1.1" x="90" y="818" width="440" height="70" rx="14" ry="14"/>
      <text fill="#41368C" font-size="14" font-weight="700" x="310" y="845" text-anchor="middle" dominant-baseline="middle">m_client : EdoyunClient*</text>
      <text fill="#5B48B8" font-size="12" font-weight="500" x="310" y="868" text-anchor="middle" dominant-baseline="middle">8.3 从 PCLIENT 改成原始指针，只借用，不拥有</text>
    </g>
    <g id="sendqueue-panel">
      <rect fill="#F2EFE7" stroke="#8F887D" stroke-width="1.3" x="660" y="625" width="540" height="350" rx="22" ry="22"/>
      <text fill="#454039" font-size="16" font-weight="700" x="930" y="655" text-anchor="middle" dominant-baseline="middle">EdoyunSendQueue&lt;std::vector&lt;char&gt;&gt;</text>
      <text fill="#6A645B" font-size="12" font-weight="500" x="930" y="678" text-anchor="middle" dominant-baseline="middle">发送结构挂在 Client 之下，工作线程与回调形成独立环路</text>
      <rect fill="#E3F6EF" stroke="#0E7058" stroke-width="1.1" x="710" y="720" width="440" height="62" rx="14" ry="14"/>
      <text fill="#0A5342" font-size="14" font-weight="700" x="930" y="744" text-anchor="middle" dominant-baseline="middle">继承 CEdoyunQueue&lt;T&gt;</text>
      <text fill="#0E7058" font-size="12" font-weight="500" x="930" y="764" text-anchor="middle" dominant-baseline="middle">内部还维护 m_hCompletionPort / m_hThread / m_lstData 等队列状态</text>
      <rect fill="#FCEEDB" stroke="#8C560F" stroke-width="1.1" x="710" y="804" width="440" height="62" rx="14" ry="14"/>
      <text fill="#69400A" font-size="14" font-weight="700" x="930" y="828" text-anchor="middle" dominant-baseline="middle">m_thread : EdoyunThread</text>
      <text fill="#8C560F" font-size="12" font-weight="500" x="930" y="848" text-anchor="middle" dominant-baseline="middle">额外轮询 threadTick()，检测队列非空后再发起 EQPop</text>
      <rect fill="#EFEAFE" stroke="#5B48B8" stroke-width="1.1" x="710" y="888" width="440" height="62" rx="14" ry="14"/>
      <text fill="#41368C" font-size="14" font-weight="700" x="930" y="912" text-anchor="middle" dominant-baseline="middle">m_base / m_callback</text>
      <text fill="#5B48B8" font-size="12" font-weight="500" x="930" y="932" text-anchor="middle" dominant-baseline="middle">回调最终落到 EdoyunClient::SendData()，再次借用回真实宿主</text>
    </g>
    <path fill="none" stroke="#156C58" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke" marker-end="url(#arrow-own)" d="M360 502 L360 548 L260 548 L260 625"/>
    <path fill="none" stroke="#156C58" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke" marker-end="url(#arrow-own)" d="M880 502 L880 548 L980 548 L980 625"/>
    <path fill="none" stroke="#9A5A12" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 6" vector-effect="non-scaling-stroke" marker-end="url(#arrow-borrow)" d="M535 502 L535 540 L595 540 L595 853 L530 853"/>
    <path fill="none" stroke="#9A5A12" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 6" vector-effect="non-scaling-stroke" marker-end="url(#arrow-borrow)" d="M705 502 L705 540 L645 540 L645 919 L710 919"/>
    <rect fill="#FFF4E7" stroke="#E8D1B1" stroke-width="1" x="350" y="582" width="210" height="30" rx="15" ry="15"/>
    <text fill="#9A5A12" font-size="12.2" font-weight="600" x="455" y="597" text-anchor="middle" dominant-baseline="middle">只借用 EdoyunClient*</text>
    <rect fill="#FFF4E7" stroke="#E8D1B1" stroke-width="1" x="690" y="582" width="250" height="30" rx="15" ry="15"/>
    <text fill="#9A5A12" font-size="12.2" font-weight="600" x="815" y="597" text-anchor="middle" dominant-baseline="middle">通过回调再次借用回 Client</text>
    <g id="legend">
      <rect fill="#F2EFE7" stroke="#8F887D" stroke-width="1" x="70" y="1010" width="1100" height="42" rx="14" ry="14"/>
      <line stroke="#156C58" stroke-width="2.2" stroke-linecap="round" vector-effect="non-scaling-stroke" marker-end="url(#arrow-own)" x1="106" y1="1031" x2="180" y2="1031"/>
      <text fill="#3F3A34" font-size="12.2" font-weight="600" x="197" y="1031" text-anchor="start" dominant-baseline="middle">实线：拥有 / 持有关系</text>
      <line stroke="#9A5A12" stroke-width="2.1" stroke-linecap="round" stroke-dasharray="8 6" vector-effect="non-scaling-stroke" marker-end="url(#arrow-borrow)" x1="406" y1="1031" x2="480" y2="1031"/>
      <text fill="#3F3A34" font-size="12.2" font-weight="600" x="497" y="1031" text-anchor="start" dominant-baseline="middle">虚线：借用 / 回调回指关系</text>
      <text fill="#5D574E" font-size="12" font-weight="500" x="1128" y="1031" text-anchor="end" dominant-baseline="middle">8.3 的重点不是增加对象，而是把“谁拥有、谁借用”重新分清</text>
    </g>
  </g>
</svg>
