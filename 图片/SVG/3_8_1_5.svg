<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 580" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
    <filter id="light-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.04"/>
    </filter>
  </defs>

  <style>
    .bg { fill: #F6F6F2; }
    .title { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 26px; font-weight: bold; fill: #1A2B3C; }
    .subtitle { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 15px; fill: #555555; }
    .node-box { fill: #FFFFFF; stroke: #3C4B5E; stroke-width: 2.5; filter: url(#shadow); }
    .node-text { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 22px; font-weight: bold; fill: #222222; text-anchor: middle; }
    
    .callout-box { fill: #F4F8FF; stroke: #8AB4F8; stroke-width: 2; filter: url(#light-shadow); }
    .callout-text { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 14px; fill: #333333; }
    
    .arrow-blue { stroke: #4285F4; stroke-width: 3.5; }
    .arrow-head-blue { fill: #4285F4; }
    .packet-blue { fill: #E8F0FE; stroke: #4285F4; stroke-width: 2; filter: url(#light-shadow); }
    .text-blue-title { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 16px; font-weight: bold; fill: #1A73E8; text-anchor: middle; }
    
    .arrow-green { stroke: #34A853; stroke-width: 3.5; }
    .arrow-head-green { fill: #34A853; }
    .packet-green { fill: #E6F4EA; stroke: #34A853; stroke-width: 2; filter: url(#light-shadow); }
    .text-green-title { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 16px; font-weight: bold; fill: #188038; text-anchor: middle; }
    
    .code-text { font-family: "Courier New", Courier, monospace; font-size: 14px; font-weight: bold; fill: #1A2B3C; text-anchor: middle; }
  </style>

  <rect class="bg" width="1000" height="580" />

  <g transform="translate(45, 55)">
    <text class="title" x="0" y="0">数据传输 2：ACK 是累计确认</text>
    <text class="subtitle" x="0" y="35">ACK 表示“我下一步希望收到哪个字节”，所以它确认的是一段连续区间，而不是单独确认某一个包。</text>
  </g>

  <g transform="translate(290, 115)">
    <rect class="callout-box" x="0" y="0" width="460" height="70" rx="15" ry="15" />
    <text class="callout-text" x="20" y="28">接收方已经连续收到 1000~1004 这 5 个字节，</text>
    <text class="callout-text" x="20" y="52">因此回复 <tspan font-family="'Courier New', Courier, monospace" font-weight="bold">ACK=1005</tspan>，表示“下一字节请从 1005 开始发送”。</text>
  </g>

  <g transform="translate(0, 160)">
    <rect class="node-box" x="80" y="0" width="150" height="360" rx="20" ry="20" />
    <text class="node-text" x="155" y="188">发送方</text>
    
    <rect class="node-box" x="780" y="0" width="150" height="360" rx="20" ry="20" />
    <text class="node-text" x="855" y="188">接收方</text>
  </g>

  <g transform="translate(0, 240)">
    <line class="arrow-blue" x1="240" y1="0" x2="740" y2="0" />
    <polygon class="arrow-head-blue" points="740,-15 775,0 740,15" />
    <rect class="packet-blue" x="375" y="-30" width="230" height="60" rx="15" ry="15" />
    <text class="text-blue-title" x="490" y="-8">报文段 1</text>
    <text class="code-text" x="490" y="14">seq=1000, len=5</text>
  </g>

  <g transform="translate(0, 320)">
    <line class="arrow-green" x1="770" y1="0" x2="270" y2="0" />
    <polygon class="arrow-head-green" points="270,-15 235,0 270,15" />
    <rect class="packet-green" x="450" y="-30" width="160" height="60" rx="15" ry="15" />
    <text class="text-green-title" x="530" y="-8">ACK 1</text>
    <text class="code-text" x="530" y="14">ack=1005</text>
  </g>

  <g transform="translate(0, 400)">
    <line class="arrow-blue" x1="240" y1="0" x2="740" y2="0" />
    <polygon class="arrow-head-blue" points="740,-15 775,0 740,15" />
    <rect class="packet-blue" x="375" y="-30" width="230" height="60" rx="15" ry="15" />
    <text class="text-blue-title" x="490" y="-8">报文段 2</text>
    <text class="code-text" x="490" y="14">seq=1005, len=5</text>
  </g>

  <g transform="translate(0, 480)">
    <line class="arrow-green" x1="770" y1="0" x2="270" y2="0" />
    <polygon class="arrow-head-green" points="270,-15 235,0 270,15" />
    <rect class="packet-green" x="450" y="-30" width="160" height="60" rx="15" ry="15" />
    <text class="text-green-title" x="530" y="-8">ACK 2</text>
    <text class="code-text" x="530" y="14">ack=1010</text>
  </g>

</svg>
