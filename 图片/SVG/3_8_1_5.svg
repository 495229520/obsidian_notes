<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500">
  <defs>
    <style>
      .title { font: 700 28px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #1f2937; }
      .subtitle { font: 500 16px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #475569; }
      .host { font: 700 22px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #111827; }
      .label { font: 700 17px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #1d4ed8; }
      .ack-label { font: 700 17px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #166534; }
      .text { font: 500 15px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #334155; }
      .mono { font: 700 14px 'Consolas', monospace; fill: #0f172a; }
      .box { fill: #fffdf7; stroke: #475569; stroke-width: 2; rx: 20; }
      .seg { fill: #dbeafe; stroke: #2563eb; stroke-width: 2.2; rx: 16; }
      .ack { fill: #dcfce7; stroke: #16a34a; stroke-width: 2.2; rx: 16; }
      .note { fill: #eff6ff; stroke: #60a5fa; stroke-width: 2.2; rx: 18; }
      .send-line { stroke: #2563eb; stroke-width: 4; fill: none; marker-end: url(#arrow-send); }
      .ack-line { stroke: #16a34a; stroke-width: 4; fill: none; marker-end: url(#arrow-ack); }
    </style>
    <marker id="arrow-send" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-ack" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 12 0 L 0 6 L 12 12 z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="980" height="500" fill="rgb(245, 244, 237)"/>

  <text x="40" y="48" class="title">数据传输 2：ACK 是累计确认</text>
  <text x="40" y="78" class="subtitle">ACK 表示“我下一步希望收到哪个字节”，所以它确认的是一段连续区间，而不是单独确认某一个包。</text>

  <path d="M 246 205 L 734 205" class="send-line"/>
  <path d="M 734 285 L 246 285" class="ack-line"/>
  <path d="M 246 365 L 734 365" class="send-line"/>
  <path d="M 734 445 L 246 445" class="ack-line"/>

  <rect x="70" y="132" width="160" height="270" class="box"/>
  <rect x="750" y="132" width="160" height="270" class="box"/>
  <text x="123" y="185" class="host">发送方</text>
  <text x="803" y="185" class="host">接收方</text>

  <rect x="270" y="110" width="440" height="64" class="note"/>
  <text x="296" y="138" class="text">接收方已经连续收到 1000~1004 这 5 个字节，</text>
  <text x="296" y="160" class="text">因此回复 ACK=1005，表示“下一字节请从 1005 开始发送”。</text>

  <rect x="342" y="176" width="210" height="58" class="seg"/>
  <text x="408" y="198" class="label">报文段 1</text>
  <text x="376" y="220" class="mono">seq=1000, len=5</text>

  <rect x="430" y="256" width="150" height="58" class="ack"/>
  <text x="483" y="278" class="ack-label">ACK 1</text>
  <text x="466" y="301" class="mono">ack=1005</text>

  <rect x="342" y="336" width="210" height="58" class="seg"/>
  <text x="408" y="358" class="label">报文段 2</text>
  <text x="376" y="380" class="mono">seq=1005, len=5</text>

  <rect x="430" y="416" width="150" height="58" class="ack"/>
  <text x="483" y="438" class="ack-label">ACK 2</text>
  <text x="466" y="461" class="mono">ack=1010</text>
</svg>
