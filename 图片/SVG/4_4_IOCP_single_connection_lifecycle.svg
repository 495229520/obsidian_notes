<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 450" role="img" aria-labelledby="title desc">
  <title id="title">IOCP 单连接生命周期</title>
  <desc id="desc">展示一个已连接 socket 如何进入 IOCP，完成一次接收和发送后，再次投递新的接收请求。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1440" height="450" fill="rgb(245, 244, 237)"/>
  <rect x="24" y="24" width="1392" height="402" rx="24" fill="#FCFBF7" stroke="#D6D3D1" stroke-width="1.2"/>

  <g font-family="system-ui, sans-serif">
    <text x="720" y="58" font-size="24" font-weight="700" fill="#1F2937" text-anchor="middle">IOCP 单连接生命周期</text>
    <text x="720" y="84" font-size="13" fill="#57534E" text-anchor="middle">关键不是“注册一次就自动永远触发”，而是每完成一次，都要主动决定下一次投什么 I/O</text>

    <text x="74" y="112" font-size="13" font-weight="700" fill="#4C51BF">接收链路</text>
    <text x="74" y="272" font-size="13" font-weight="700" fill="#0F766E">发送与续投</text>

    <rect x="60" y="126" width="170" height="68" rx="18" fill="#ECEBFF" stroke="#5B5BD6" stroke-width="1.6"/>
    <text x="145" y="154" font-size="18" font-weight="700" fill="#1F2937" text-anchor="middle">已连接 socket</text>
    <text x="145" y="178" font-size="13" fill="#4B5563" text-anchor="middle">连接已经建立</text>

    <rect x="290" y="126" width="210" height="68" rx="18" fill="#F7F4EE" stroke="#8F8B84" stroke-width="1.6"/>
    <text x="395" y="154" font-size="18" font-weight="700" fill="#1F2937" text-anchor="middle">关联到 IOCP</text>
    <text x="395" y="178" font-size="13" fill="#4B5563" text-anchor="middle">CreateIoCompletionPort</text>

    <rect x="555" y="126" width="220" height="68" rx="18" fill="#E3F4F6" stroke="#157A8A" stroke-width="1.6"/>
    <text x="665" y="154" font-size="18" font-weight="700" fill="#1F2937" text-anchor="middle">投递 WSARecv</text>
    <text x="665" y="178" font-size="13" fill="#4B5563" text-anchor="middle">先把接收请求挂进内核</text>

    <rect x="830" y="126" width="200" height="68" rx="18" fill="#FBEAD8" stroke="#B56A1B" stroke-width="1.6"/>
    <text x="930" y="154" font-size="18" font-weight="700" fill="#1F2937" text-anchor="middle">Recv 完成包</text>
    <text x="930" y="178" font-size="13" fill="#4B5563" text-anchor="middle">数据到了，完成结果入队</text>

    <rect x="1080" y="118" width="300" height="86" rx="18" fill="#E4F3EA" stroke="#177245" stroke-width="1.6"/>
    <text x="1230" y="149" font-size="18" font-weight="700" fill="#1F2937" text-anchor="middle">Worker 取包处理</text>
    <text x="1230" y="174" font-size="12.5" fill="#4B5563" text-anchor="middle">GetQueuedCompletionStatus</text>
    <text x="1230" y="194" font-size="12.5" fill="#4B5563" text-anchor="middle">+ 解析协议 / 执行业务</text>

    <line x1="230" y1="160" x2="290" y2="160" stroke="#5B5BD6" stroke-width="2.4" marker-end="url(#arrow)"/>
    <line x1="500" y1="160" x2="555" y2="160" stroke="#8F8B84" stroke-width="2.4" marker-end="url(#arrow)"/>
    <line x1="775" y1="160" x2="830" y2="160" stroke="#157A8A" stroke-width="2.4" marker-end="url(#arrow)"/>
    <line x1="1030" y1="160" x2="1080" y2="160" stroke="#B56A1B" stroke-width="2.4" marker-end="url(#arrow)"/>

    <rect x="52" y="276" width="452" height="130" rx="20" fill="#FFF7DD" stroke="#A66B00" stroke-width="1.4"/>
    <text x="84" y="316" font-size="18" font-weight="700" fill="#7C4A03">关键心智模型</text>
    <text x="84" y="346" font-size="14" fill="#6B4F2A">IOCP 不会自动续投下一次接收。</text>
    <text x="84" y="374" font-size="14" fill="#6B4F2A">每完成一次，都要由业务线程决定</text>
    <text x="84" y="400" font-size="14" fill="#6B4F2A">下一步继续投 Recv 还是 Send。</text>

    <rect x="555" y="286" width="220" height="68" rx="18" fill="#E3F4F6" stroke="#157A8A" stroke-width="1.6"/>
    <text x="665" y="314" font-size="18" font-weight="700" fill="#1F2937" text-anchor="middle">再次投递 WSARecv</text>
    <text x="665" y="338" font-size="13" fill="#4B5563" text-anchor="middle">继续等待下一批数据</text>

    <rect x="830" y="286" width="230" height="68" rx="18" fill="#FBEAD8" stroke="#B56A1B" stroke-width="1.6"/>
    <text x="945" y="314" font-size="18" font-weight="700" fill="#1F2937" text-anchor="middle">Send 完成包</text>
    <text x="945" y="338" font-size="13" fill="#4B5563" text-anchor="middle">发送完成后再次回到队列</text>

    <rect x="1120" y="286" width="220" height="68" rx="18" fill="#E3F4F6" stroke="#157A8A" stroke-width="1.6"/>
    <text x="1230" y="314" font-size="18" font-weight="700" fill="#1F2937" text-anchor="middle">投递 WSASend</text>
    <text x="1230" y="338" font-size="13" fill="#4B5563" text-anchor="middle">把响应异步发出去</text>

    <line x1="1230" y1="204" x2="1230" y2="286" stroke="#177245" stroke-width="2.4" marker-end="url(#arrow)"/>
    <line x1="1120" y1="320" x2="1060" y2="320" stroke="#157A8A" stroke-width="2.4" marker-end="url(#arrow)"/>
    <line x1="830" y1="320" x2="775" y2="320" stroke="#B56A1B" stroke-width="2.4" marker-end="url(#arrow)"/>
    <line x1="665" y1="286" x2="665" y2="194" stroke="#157A8A" stroke-width="2.4" marker-end="url(#arrow)"/>

    <text x="1230" y="250" font-size="13" font-weight="600" fill="#166534" text-anchor="middle">需要回包时，先投递 Send</text>
    <text x="945" y="272" font-size="13" font-weight="600" fill="#9A6700" text-anchor="middle">Send 完成后，还会再回到 worker</text>
    <text x="665" y="268" font-size="13" font-weight="600" fill="#0F766E" text-anchor="middle">完成一次，就补下一次 Recv</text>
  </g>
</svg>
