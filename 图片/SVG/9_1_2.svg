<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1480px" height="1040px" viewBox="0 0 1480 1040" version="1.1">
<title>UDP 打洞完整流程图</title>
<desc>以泳道方式展示双方注册、服务器交换公网端点、双方同时发 PUNCH，以及最终建立直连的过程。</desc>
<rect x="0" y="0" width="1480" height="1040" fill="rgb(245, 244, 237)" />
<defs>
<marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="7.2" refY="4" orient="auto-start-reverse" viewBox="0 0 8 8">
<path d="M0 0 L8 4 L0 8 Z" fill="#C27A18" />
</marker>
<marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="7.2" refY="4" orient="auto-start-reverse" viewBox="0 0 8 8">
<path d="M0 0 L8 4 L0 8 Z" fill="#0E7490" />
</marker>
<marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="7.2" refY="4" orient="auto-start-reverse" viewBox="0 0 8 8">
<path d="M0 0 L8 4 L0 8 Z" fill="#23824A" />
</marker>
</defs>
<text fill="#2E2A23" font-size="29" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="740" y="50" text-anchor="middle" dominant-baseline="middle">UDP 打洞：注册、交换地址、同时发 PUNCH、建立直连</text>
<text fill="#6C665A" font-size="16" font-weight="500" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="740" y="86" text-anchor="middle" dominant-baseline="middle">服务器只负责引介；真正打通，靠双方从同一个 socket 几乎同时向对端公网端点发包</text>
<rect fill="#F8F6EF" stroke="#D7D0C6" stroke-width="1.6" x="90" y="120" width="1300" height="900" rx="24" ry="24" />
<rect fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5" x="110" y="140" width="220" height="46" rx="14" ry="14" />
<rect fill="#EEEDFE" stroke="#5B47B7" stroke-width="1.5" x="360" y="140" width="220" height="46" rx="14" ry="14" />
<rect fill="#EAF6FC" stroke="#0E7490" stroke-width="1.5" x="610" y="140" width="220" height="46" rx="14" ry="14" />
<rect fill="#EEEDFE" stroke="#5B47B7" stroke-width="1.5" x="860" y="140" width="220" height="46" rx="14" ry="14" />
<rect fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5" x="1110" y="140" width="220" height="46" rx="14" ry="14" />
<text fill="#0C447C" font-size="18" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="220" y="163" text-anchor="middle" dominant-baseline="middle">Peer A</text>
<text fill="#3C3489" font-size="18" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="470" y="163" text-anchor="middle" dominant-baseline="middle">NAT A</text>
<text fill="#0F5367" font-size="18" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="720" y="163" text-anchor="middle" dominant-baseline="middle">引介服务器 S</text>
<text fill="#3C3489" font-size="18" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="970" y="163" text-anchor="middle" dominant-baseline="middle">NAT B</text>
<text fill="#0C447C" font-size="18" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="1220" y="163" text-anchor="middle" dominant-baseline="middle">Peer B</text>
<line stroke="#D8D2C7" stroke-width="1" x1="340" y1="198" x2="340" y2="1000" />
<line stroke="#D8D2C7" stroke-width="1" x1="590" y1="198" x2="590" y2="1000" />
<line stroke="#D8D2C7" stroke-width="1" x1="840" y1="198" x2="840" y2="1000" />
<line stroke="#D8D2C7" stroke-width="1" x1="1090" y1="198" x2="1090" y2="1000" />
<rect fill="#FBFAF6" stroke="#E7E0D6" stroke-width="1" x="90" y="208" width="1300" height="192" rx="18" ry="18" />
<rect fill="#FAEEDA" stroke="#C27A18" stroke-width="1.4" x="18" y="287" width="76" height="34" rx="12" ry="12" />
<text fill="#7C4A03" font-size="14" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="56" y="304" text-anchor="middle" dominant-baseline="middle">1. 注册</text>
<rect fill="#FFF4E4" stroke="#E1C79B" stroke-width="1.1" x="514" y="220" width="452" height="28" rx="12" ry="12" />
<text fill="#8D6730" font-size="13" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="740" y="234" text-anchor="middle" dominant-baseline="middle">两端都先向 S 注册，S 才知道各自公网端点</text>
<rect fill="#E6F1FB" stroke="#185FA5" stroke-width="1.3" x="116" y="264" width="214" height="50" rx="14" ry="14" />
<text fill="#0C447C" font-size="14" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="223" y="289" text-anchor="middle" dominant-baseline="middle">A 用同一个 socket 发 REG</text>
<rect fill="#EEEDFE" stroke="#5B47B7" stroke-width="1.3" x="380" y="254" width="236" height="70" rx="14" ry="14" />
<text fill="#3C3489" font-size="14" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="498" y="289" text-anchor="middle" dominant-baseline="middle">A_public =<tspan x="498" dy="17.36">198.51.100.1:62000</tspan>
</text>
<rect fill="#EAF6FC" stroke="#0E7490" stroke-width="1.3" x="680" y="264" width="236" height="50" rx="14" ry="14" />
<text fill="#0F5367" font-size="15" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="798" y="289" text-anchor="middle" dominant-baseline="middle">记录 A_public</text>
<line fill="none" stroke="#C27A18" stroke-width="2.8" stroke-linecap="round" marker-end="url(#arrowOrange)" x1="330" y1="289" x2="380" y2="289" />
<text fill="#7C4A03" font-size="12" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="355" y="260" text-anchor="middle" dominant-baseline="middle">REG</text>
<line fill="none" stroke="#C27A18" stroke-width="2.8" stroke-linecap="round" marker-end="url(#arrowOrange)" x1="616" y1="289" x2="680" y2="289" />
<rect fill="#EAF6FC" stroke="#0E7490" stroke-width="1.3" x="620" y="344" width="236" height="50" rx="14" ry="14" />
<text fill="#0F5367" font-size="15" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="738" y="369" text-anchor="middle" dominant-baseline="middle">记录 B_public</text>
<rect fill="#EEEDFE" stroke="#5B47B7" stroke-width="1.3" x="910" y="336" width="220" height="66" rx="14" ry="14" />
<text fill="#3C3489" font-size="14" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="1020" y="369" text-anchor="middle" dominant-baseline="middle">B_public =<tspan x="1020" dy="17.36">203.0.113.9:31000</tspan>
</text>
<rect fill="#E6F1FB" stroke="#185FA5" stroke-width="1.3" x="1160" y="344" width="214" height="50" rx="14" ry="14" />
<text fill="#0C447C" font-size="14" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="1267" y="369" text-anchor="middle" dominant-baseline="middle">B 用同一个 socket 发 REG</text>
<line fill="none" stroke="#C27A18" stroke-width="2.8" stroke-linecap="round" marker-end="url(#arrowOrange)" x1="1160" y1="369" x2="1130" y2="369" />
<text fill="#7C4A03" font-size="12" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="1145" y="340" text-anchor="middle" dominant-baseline="middle">REG</text>
<line fill="none" stroke="#C27A18" stroke-width="2.8" stroke-linecap="round" marker-end="url(#arrowOrange)" x1="910" y1="369" x2="856" y2="369" />
<rect fill="#FFFDF8" stroke="#E7E0D6" stroke-width="1" x="90" y="418" width="1300" height="122" rx="18" ry="18" />
<rect fill="#FAEEDA" stroke="#C27A18" stroke-width="1.4" x="18" y="463" width="78" height="34" rx="12" ry="12" />
<text fill="#7C4A03" font-size="14" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="57" y="480" text-anchor="middle" dominant-baseline="middle">2. 交换</text>
<rect fill="#E6F1FB" stroke="#185FA5" stroke-width="1.3" x="116" y="445" width="210" height="58" rx="14" ry="14" />
<text fill="#0C447C" font-size="14" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="221" y="474" text-anchor="middle" dominant-baseline="middle">A 收到 B_public<tspan x="221" dy="17.08">203.0.113.9:31000</tspan>
</text>
<rect fill="#EAF6FC" stroke="#0E7490" stroke-width="1.3" x="630" y="445" width="220" height="58" rx="14" ry="14" />
<text fill="#0F5367" font-size="15" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="740" y="474" text-anchor="middle" dominant-baseline="middle">S 交换公网端点</text>
<rect fill="#E6F1FB" stroke="#185FA5" stroke-width="1.3" x="1154" y="445" width="210" height="58" rx="14" ry="14" />
<text fill="#0C447C" font-size="14" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="1259" y="474" text-anchor="middle" dominant-baseline="middle">B 收到 A_public<tspan x="1259" dy="17.08">198.51.100.1:62000</tspan>
</text>
<line fill="none" stroke="#0E7490" stroke-width="2.8" stroke-linecap="round" marker-end="url(#arrowBlue)" x1="630" y1="474" x2="326" y2="474" />
<line fill="none" stroke="#0E7490" stroke-width="2.8" stroke-linecap="round" marker-end="url(#arrowBlue)" x1="850" y1="474" x2="1154" y2="474" />
<text fill="#0F5367" font-size="13" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="478" y="452" text-anchor="middle" dominant-baseline="middle">告知 B_public</text>
<text fill="#0F5367" font-size="13" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="1002" y="452" text-anchor="middle" dominant-baseline="middle">告知 A_public</text>
<rect fill="#FFF9F2" stroke="#E9DCC8" stroke-width="1" x="90" y="556" width="1300" height="248" rx="18" ry="18" />
<rect fill="#FAEEDA" stroke="#C27A18" stroke-width="1.4" x="12" y="603" width="90" height="34" rx="12" ry="12" />
<text fill="#7C4A03" font-size="14" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="57" y="620" text-anchor="middle" dominant-baseline="middle">3. PUNCH</text>
<rect fill="#FAEEDA" stroke="#C27A18" stroke-width="1.2" x="500" y="574" width="480" height="38" rx="14" ry="14" />
<text fill="#7C4A03" font-size="16" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="740" y="593" text-anchor="middle" dominant-baseline="middle">关键：双方几乎同时从同一个 socket 连续发 PUNCH</text>
<rect fill="#FFF1DE" stroke="#C27A18" stroke-width="1.3" x="128" y="630" width="250" height="104" rx="14" ry="14" />
<text fill="#7C4A03" font-size="14" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="253" y="661" text-anchor="middle" dominant-baseline="middle">A 用同一个 socket<tspan x="253" dy="17.92">向 B_public 连续发 PUNCH</tspan><tspan x="253" dy="17.92">目标 203.0.113.9:31000</tspan>
</text>
<rect fill="#FFF1DE" stroke="#C27A18" stroke-width="1.3" x="1102" y="630" width="250" height="104" rx="14" ry="14" />
<text fill="#7C4A03" font-size="14" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="1227" y="661" text-anchor="middle" dominant-baseline="middle">B 用同一个 socket<tspan x="1227" dy="17.92">向 A_public 连续发 PUNCH</tspan><tspan x="1227" dy="17.92">目标 198.51.100.1:62000</tspan>
</text>
<text fill="#7C4A03" font-size="14" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="740" y="632" text-anchor="middle" dominant-baseline="middle">A -&gt; B_public（直接打向对端公网端点）</text>
<line fill="none" stroke="#C27A18" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowOrange)" x1="378" y1="656" x2="1102" y2="656" />
<rect fill="#FFF4E4" stroke="#E1C79B" stroke-width="1.2" x="558" y="672" width="364" height="44" rx="14" ry="14" />
<text fill="#9B7C45" font-size="13" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="740" y="694" text-anchor="middle" dominant-baseline="middle">双方都必须主动出站发包<tspan x="740" dy="15.34">这样两侧 NAT 才会允许对端回包</tspan>
</text>
<line fill="none" stroke="#C27A18" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowOrange)" x1="1102" y1="726" x2="378" y2="726" />
<text fill="#7C4A03" font-size="14" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="740" y="752" text-anchor="middle" dominant-baseline="middle">B -&gt; A_public（同样不再经过 S）</text>
<rect fill="#F7FCF8" stroke="#D7E7D7" stroke-width="1" x="90" y="820" width="1300" height="180" rx="18" ry="18" />
<rect fill="#E6F6EA" stroke="#23824A" stroke-width="1.4" x="18" y="870" width="76" height="34" rx="12" ry="12" />
<text fill="#11643A" font-size="14" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="56" y="887" text-anchor="middle" dominant-baseline="middle">4. 直连</text>
<rect fill="#E6F6EA" stroke="#23824A" stroke-width="1.3" x="128" y="846" width="272" height="74" rx="14" ry="14" />
<text fill="#11643A" font-size="14" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="264" y="871" text-anchor="middle" dominant-baseline="middle">A 继续复用同一 socket<tspan x="264" dy="17.36">收发 PUNCH_ACK / DATA / keepalive</tspan>
</text>
<rect fill="#EFF8F1" stroke="#23824A" stroke-width="1.3" x="436" y="862" width="168" height="40" rx="12" ry="12" />
<text fill="#11643A" font-size="13" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="520" y="882" text-anchor="middle" dominant-baseline="middle">A 侧映射 / 过滤已建立</text>
<rect fill="#F1F1EF" stroke="#A6A39C" stroke-width="1.2" x="630" y="846" width="220" height="60" rx="14" ry="14" />
<text fill="#77736B" font-size="14" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="740" y="876" text-anchor="middle" dominant-baseline="middle">S 不在数据路径上<tspan x="740" dy="16.8">不再转发后续数据</tspan>
</text>
<rect fill="#EFF8F1" stroke="#23824A" stroke-width="1.3" x="876" y="862" width="168" height="40" rx="12" ry="12" />
<text fill="#11643A" font-size="13" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="960" y="882" text-anchor="middle" dominant-baseline="middle">B 侧映射 / 过滤已建立</text>
<rect fill="#E6F6EA" stroke="#23824A" stroke-width="1.3" x="1080" y="846" width="272" height="74" rx="14" ry="14" />
<text fill="#11643A" font-size="14" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="1216" y="871" text-anchor="middle" dominant-baseline="middle">B 继续复用同一 socket<tspan x="1216" dy="17.36">收发 PUNCH_ACK / DATA / keepalive</tspan>
</text>
<text fill="#11643A" font-size="16" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="740" y="934" text-anchor="middle" dominant-baseline="middle">后续 A &lt;-&gt; B 直接 UDP 直连</text>
<line fill="none" stroke="#23824A" stroke-width="3.2" stroke-linecap="round" marker-start="url(#arrowGreen)" marker-end="url(#arrowGreen)" x1="400" y1="952" x2="1080" y2="952" />
<rect fill="#E6F6EA" stroke="#23824A" stroke-width="1.3" x="598" y="962" width="284" height="34" rx="14" ry="14" />
<text fill="#11643A" font-size="14" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="740" y="979" text-anchor="middle" dominant-baseline="middle">PUNCH_ACK / DATA / keepalive</text>
</svg>
