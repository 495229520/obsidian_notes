<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <rect width="960" height="440" fill="rgb(245, 244, 237)"/>

  <defs>
    <linearGradient id="step1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ea6a54"/>
      <stop offset="100%" stop-color="#d9433a"/>
    </linearGradient>
    <linearGradient id="step2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffca67"/>
      <stop offset="100%" stop-color="#f39a16"/>
    </linearGradient>
    <linearGradient id="step3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#19c6c3"/>
      <stop offset="100%" stop-color="#118bd6"/>
    </linearGradient>
    <linearGradient id="step4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7366e8"/>
      <stop offset="100%" stop-color="#9287f4"/>
    </linearGradient>
    <linearGradient id="step5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#13bd94"/>
      <stop offset="100%" stop-color="#40d6b9"/>
    </linearGradient>
    <filter id="cardShadow" x="-12%" y="-12%" width="124%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#1d2b36" flood-opacity="0.13"/>
    </filter>
  </defs>

  <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="480" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#243746">动态规划解题五步法</text>
  <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="480" y="58" text-anchor="middle" font-size="12" fill="#6b7780">把递归思路整理成状态、转移、边界、顺序和验证</text>

  <!-- Main flow -->
  <g filter="url(#cardShadow)">
    <rect x="32" y="78" width="160" height="128" rx="14" fill="url(#step1)"/>
    <rect x="216" y="78" width="160" height="128" rx="14" fill="url(#step2)"/>
    <rect x="400" y="78" width="160" height="128" rx="14" fill="url(#step3)"/>
    <rect x="584" y="78" width="160" height="128" rx="14" fill="url(#step4)"/>
    <rect x="768" y="78" width="160" height="128" rx="14" fill="url(#step5)"/>
  </g>

  <g fill="#fff" text-anchor="middle">
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="112" y="116" font-size="34" font-weight="800">1</text>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="112" y="145" font-size="15" font-weight="700">定义状态</text>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="112" y="169" font-size="12" opacity="0.9">dp[i] 代表什么</text>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="112" y="187" font-size="12" opacity="0.9">明确下标含义</text>

    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="296" y="116" font-size="34" font-weight="800">2</text>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="296" y="145" font-size="15" font-weight="700">状态转移</text>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="296" y="169" font-size="12" opacity="0.9">当前状态</text>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="296" y="187" font-size="12" opacity="0.9">由谁推来</text>

    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="480" y="116" font-size="34" font-weight="800">3</text>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="480" y="145" font-size="15" font-weight="700">初始化</text>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="480" y="169" font-size="12" opacity="0.9">base case</text>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="480" y="187" font-size="12" opacity="0.9">边界条件</text>

    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="664" y="116" font-size="34" font-weight="800">4</text>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="664" y="145" font-size="15" font-weight="700">遍历顺序</text>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="664" y="169" font-size="12" opacity="0.9">先算依赖项</text>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="664" y="187" font-size="12" opacity="0.9">再算当前值</text>

    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="848" y="116" font-size="34" font-weight="800">5</text>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="848" y="145" font-size="15" font-weight="700">验证推演</text>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="848" y="169" font-size="12" opacity="0.9">小样例填表</text>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="848" y="187" font-size="12" opacity="0.9">检查答案位置</text>
  </g>

  <g fill="#c5c9c5">
    <rect x="197" y="140" width="13" height="4" rx="2"/>
    <path d="M210 132 L224 142 L210 152 Z"/>
    <rect x="381" y="140" width="13" height="4" rx="2"/>
    <path d="M394 132 L408 142 L394 152 Z"/>
    <rect x="565" y="140" width="13" height="4" rx="2"/>
    <path d="M578 132 L592 142 L578 152 Z"/>
    <rect x="749" y="140" width="13" height="4" rx="2"/>
    <path d="M762 132 L776 142 L762 152 Z"/>
  </g>

  <!-- Checklist -->
  <line x1="32" y1="232" x2="928" y2="232" stroke="#dde0da" stroke-width="1"/>
  <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="480" y="238" text-anchor="middle" font-size="13" font-weight="700" fill="#40515d">每一步都要留下一个可检查的结果</text>

  <g font-size="11" fill="#56636b">
    <rect x="32" y="258" width="160" height="150" rx="12" fill="#fffdf8" stroke="#e0ded5"/>
    <rect x="32" y="258" width="160" height="5" rx="2.5" fill="url(#step1)"/>
    <circle cx="52" cy="287" r="6" fill="url(#step1)"/>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="68" y="292" font-size="13" font-weight="700" fill="#2f3e49">定义状态</text>
    <rect x="48" y="310" width="128" height="25" rx="7" fill="#f8ece8"/>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="112" y="327" text-anchor="middle" font-size="12" font-weight="700" fill="#c9483f">产物：状态含义</text>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="50" y="356">dp[i] 表示什么</text>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="50" y="378">i 的取值范围</text>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="50" y="400">答案落在哪里</text>

    <rect x="216" y="258" width="160" height="150" rx="12" fill="#fffdf8" stroke="#e0ded5"/>
    <rect x="216" y="258" width="160" height="5" rx="2.5" fill="url(#step2)"/>
    <circle cx="236" cy="287" r="6" fill="url(#step2)"/>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="252" y="292" font-size="13" font-weight="700" fill="#2f3e49">状态转移</text>
    <rect x="232" y="310" width="128" height="25" rx="7" fill="#fff3d8"/>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="296" y="327" text-anchor="middle" font-size="12" font-weight="700" fill="#c9790d">产物：递推方程</text>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="234" y="356">从最后一步推</text>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="234" y="378">写出 dp 关系</text>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="234" y="400">确认依赖状态</text>

    <rect x="400" y="258" width="160" height="150" rx="12" fill="#fffdf8" stroke="#e0ded5"/>
    <rect x="400" y="258" width="160" height="5" rx="2.5" fill="url(#step3)"/>
    <circle cx="420" cy="287" r="6" fill="url(#step3)"/>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="436" y="292" font-size="13" font-weight="700" fill="#2f3e49">初始化</text>
    <rect x="416" y="310" width="128" height="25" rx="7" fill="#e5f7f8"/>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="480" y="327" text-anchor="middle" font-size="12" font-weight="700" fill="#0f879b">产物：起点边界</text>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="418" y="356">写出 base case</text>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="418" y="378">处理最小输入</text>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="418" y="400">数组大小别越界</text>

    <rect x="584" y="258" width="160" height="150" rx="12" fill="#fffdf8" stroke="#e0ded5"/>
    <rect x="584" y="258" width="160" height="5" rx="2.5" fill="url(#step4)"/>
    <circle cx="604" cy="287" r="6" fill="url(#step4)"/>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="620" y="292" font-size="13" font-weight="700" fill="#2f3e49">遍历顺序</text>
    <rect x="600" y="310" width="128" height="25" rx="7" fill="#eeeafd"/>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="664" y="327" text-anchor="middle" font-size="12" font-weight="700" fill="#6556d4">产物：循环方向</text>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="602" y="356">先计算依赖项</text>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="602" y="378">正序或逆序</text>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="602" y="400">二维注意行列</text>

    <rect x="768" y="258" width="160" height="150" rx="12" fill="#fffdf8" stroke="#e0ded5"/>
    <rect x="768" y="258" width="160" height="5" rx="2.5" fill="url(#step5)"/>
    <circle cx="788" cy="287" r="6" fill="url(#step5)"/>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="804" y="292" font-size="13" font-weight="700" fill="#2f3e49">验证推演</text>
    <rect x="784" y="310" width="128" height="25" rx="7" fill="#e5f8f2"/>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="848" y="327" text-anchor="middle" font-size="12" font-weight="700" fill="#129477">产物：小表验证</text>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="786" y="356">手填 3~5 项</text>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="786" y="378">检查转移结果</text>
    <text font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" x="786" y="400">确认返回位置</text>
  </g>
</svg>
