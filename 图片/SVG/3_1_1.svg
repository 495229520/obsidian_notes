<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1260px" height="420px" viewBox="0 0 1260 420" version="1.1"><title>C++ 成员函数不能直接作为 C 回调</title><desc>展示 C++ 非静态成员函数带有 this 指针，而 C 回调接口只接受纯函数指针，因此二者不能直接对接。</desc><rect x="0" y="0" width="1260" height="420" fill="rgb(245, 244, 237)" /><defs><marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#D94A45" /></marker></defs><text fill="#2E2A23" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" font-size="28" font-weight="700" x="630" y="38" text-anchor="middle" dominant-baseline="middle">成员函数不能直接塞进 C 回调接口</text><text fill="#6C665A" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" font-size="15" font-weight="500" x="630" y="72" text-anchor="middle" dominant-baseline="middle">C 只会回调一个纯函数指针，不会自动补上 this</text><rect fill="#F4F8FC" stroke="#2B6CB0" stroke-width="2" x="40" y="108" width="480" height="240" rx="24" ry="24" /><text fill="#17446F" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" font-size="24" font-weight="700" x="280" y="142" text-anchor="middle" dominant-baseline="middle">C++ 对象世界</text><rect fill="#E6F0FB" stroke="#7AA5D6" stroke-width="1.8" x="98" y="182" width="364" height="102" rx="18" ry="18" /><text fill="#173A5B" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" font-size="22" font-weight="700" x="280" y="212" text-anchor="middle" dominant-baseline="middle">Controller 对象</text><text fill="#23496E" font-family="Consolas, Menlo, monospace" font-size="18" font-weight="600" x="280" y="242" text-anchor="middle" dominant-baseline="middle">m_data = 42</text><text fill="#23496E" font-family="Consolas, Menlo, monospace" font-size="19" font-weight="700" x="280" y="270" text-anchor="middle" dominant-baseline="middle">threadFunc()</text><rect fill="#FFFFFF" stroke="#7AA5D6" stroke-width="1.5" x="154" y="302" width="252" height="34" rx="17" ry="17" /><text fill="#1E4F7E" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" font-size="14" font-weight="700" x="280" y="319" text-anchor="middle" dominant-baseline="middle">成员函数隐含 this 指针</text><rect fill="#FFF6E8" stroke="#C27A18" stroke-width="2" x="740" y="108" width="480" height="240" rx="24" ry="24" /><text fill="#73470C" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" font-size="24" font-weight="700" x="980" y="142" text-anchor="middle" dominant-baseline="middle">C 库的回调接口</text><rect fill="#FFFDF9" stroke="#D9A34D" stroke-width="1.8" x="824" y="178" width="312" height="120" rx="18" ry="18" /><text fill="#6B4B1C" font-family="Consolas, Menlo, monospace" font-size="18" font-weight="600" x="854" y="208">_beginthreadex(<tspan x="854" dy="21.96">  ...,</tspan><tspan x="854" dy="21.96">  func_ptr,</tspan><tspan x="854" dy="21.96">  arg</tspan><tspan x="854" dy="21.96">)</tspan></text><rect fill="#FDE7C3" stroke="#D89B3A" stroke-width="1.4" x="1004" y="232" width="116" height="28" rx="14" ry="14" /><text fill="#85510A" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" font-size="12.5" font-weight="700" x="1062" y="246" text-anchor="middle" dominant-baseline="middle">要纯 C 函数</text><rect fill="#FFFFFF" stroke="#D9A34D" stroke-width="1.5" x="830" y="304" width="300" height="32" rx="16" ry="16" /><text fill="#8B5B19" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" font-size="14" font-weight="700" x="980" y="320" text-anchor="middle" dominant-baseline="middle">回调时不会额外传入 this</text><path fill="none" stroke="#D94A45" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="11 10" marker-end="url(#arrowRed)" d="M462 236 L560 236 L740 236" /><circle fill="#FFF4F3" stroke="#D94A45" stroke-width="2" cx="640" cy="236" r="28" /><text fill="#C23833" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" font-size="34" font-weight="700" x="640" y="236" text-anchor="middle" dominant-baseline="middle">×</text><text fill="#9A3B38" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" font-size="14" font-weight="600" x="640" y="288" text-anchor="middle" dominant-baseline="middle">成员函数不是纯 C 函数指针<tspan x="640" dy="18.9">C 回调也不知道 this 在哪</tspan></text><text fill="#5E6B79" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" font-size="14" font-weight="500" x="280" y="380" text-anchor="middle" dominant-baseline="middle">对象内部方法依赖 this 才能访问成员状态</text><text fill="#7D6B53" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" font-size="14" font-weight="500" x="980" y="380" text-anchor="middle" dominant-baseline="middle">C 接口只保存 func_ptr + arg，不理解对象语义</text></svg>