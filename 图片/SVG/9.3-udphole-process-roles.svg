<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="700" viewBox="0 0 1040 700" role="img" aria-label="UDPHole 当前进程角色拆分与旧 IOCP 入口对比">
  <rect x="0" y="0" width="1040" height="700" fill="rgb(245, 244, 237)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="520" y="36" fill="#444441" font-family="system-ui,sans-serif" font-size="16" font-weight="500" text-anchor="middle" dominant-baseline="central">9.3 UDPHole：默认入口从 IOCP 服务端切到 UDP 穿透进程骨架</text>
  <text x="520" y="62" fill="#444441" font-family="system-ui,sans-serif" font-size="12" font-weight="400" text-anchor="middle" dominant-baseline="central">当前版本只完成进程角色拆分与占位函数；真实 UDP socket / NAT 打洞尚未实现</text>

  <rect x="40" y="80" width="440" height="580" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <rect x="560" y="80" width="440" height="580" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>

  <text x="260" y="100" fill="#444441" font-family="system-ui,sans-serif" font-size="14" font-weight="500" text-anchor="middle" dominant-baseline="central">旧默认链路</text>
  <text x="780" y="100" fill="#444441" font-family="system-ui,sans-serif" font-size="14" font-weight="500" text-anchor="middle" dominant-baseline="central">新默认链路</text>

  <rect x="110" y="125" width="300" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="260" y="145" fill="#0C447C" font-family="system-ui,sans-serif" font-size="14" font-weight="500" text-anchor="middle" dominant-baseline="central">旧 main()</text>
  <text x="260" y="165" fill="#0C447C" font-family="system-ui,sans-serif" font-size="12" font-weight="400" text-anchor="middle" dominant-baseline="central">启动后直接调用 iocp()</text>

  <rect x="110" y="241" width="300" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="260" y="261" fill="#3C3489" font-family="system-ui,sans-serif" font-size="14" font-weight="500" text-anchor="middle" dominant-baseline="central">iocp()</text>
  <text x="260" y="281" fill="#3C3489" font-family="system-ui,sans-serif" font-size="12" font-weight="400" text-anchor="middle" dominant-baseline="central">EdoyunServer::StartService()</text>

  <rect x="110" y="357" width="300" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="260" y="377" fill="#085041" font-family="system-ui,sans-serif" font-size="14" font-weight="500" text-anchor="middle" dominant-baseline="central">IOCP 服务端</text>
  <text x="260" y="397" fill="#085041" font-family="system-ui,sans-serif" font-size="12" font-weight="400" text-anchor="middle" dominant-baseline="central">AcceptEx / WSARecv 链路</text>

  <rect x="110" y="473" width="300" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="260" y="493" fill="#633806" font-family="system-ui,sans-serif" font-size="14" font-weight="500" text-anchor="middle" dominant-baseline="central">远控 TCP 服务阶段</text>
  <text x="260" y="513" fill="#633806" font-family="system-ui,sans-serif" font-size="12" font-weight="400" text-anchor="middle" dominant-baseline="central">默认运行服务端框架</text>

  <path d="M260 181L260 237" fill="none" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M260 297L260 353" fill="none" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M260 413L260 469" fill="none" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="620" y="125" width="320" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="780" y="145" fill="#0C447C" font-family="system-ui,sans-serif" font-size="14" font-weight="500" text-anchor="middle" dominant-baseline="central">main(argc, argv)</text>
  <text x="780" y="165" fill="#0C447C" font-family="system-ui,sans-serif" font-size="12" font-weight="400" text-anchor="middle" dominant-baseline="central">按参数数量决定角色</text>

  <rect x="620" y="241" width="320" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="780" y="261" fill="#3C3489" font-family="system-ui,sans-serif" font-size="14" font-weight="500" text-anchor="middle" dominant-baseline="central">父进程 argc == 1</text>
  <text x="780" y="281" fill="#3C3489" font-family="system-ui,sans-serif" font-size="12" font-weight="400" text-anchor="middle" dominant-baseline="central">负责 CreateProcessA 拉起子进程</text>

  <rect x="620" y="357" width="320" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="780" y="377" fill="#085041" font-family="system-ui,sans-serif" font-size="14" font-weight="500" text-anchor="middle" dominant-baseline="central">子进程 A</text>
  <text x="780" y="397" fill="#085041" font-family="system-ui,sans-serif" font-size="12" font-weight="400" text-anchor="middle" dominant-baseline="central">argv0 1 → udp_client(true)</text>

  <rect x="620" y="473" width="320" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="780" y="493" fill="#633806" font-family="system-ui,sans-serif" font-size="14" font-weight="500" text-anchor="middle" dominant-baseline="central">子进程 B（当前缺陷）</text>
  <text x="780" y="513" fill="#633806" font-family="system-ui,sans-serif" font-size="12" font-weight="400" text-anchor="middle" dominant-baseline="central">argv0 12 仍可能进入 argc == 2</text>

  <rect x="620" y="589" width="320" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="780" y="609" fill="#444441" font-family="system-ui,sans-serif" font-size="14" font-weight="500" text-anchor="middle" dominant-baseline="central">父进程 udp_server()</text>
  <text x="780" y="629" fill="#444441" font-family="system-ui,sans-serif" font-size="12" font-weight="400" text-anchor="middle" dominant-baseline="central">只打印函数名并 getchar()</text>

  <path d="M780 181L780 237" fill="none" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M780 297L780 353" fill="none" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M780 413L780 469" fill="none" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M780 529L780 585" fill="none" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="520" y="360" fill="#444441" font-family="system-ui,sans-serif" font-size="12" font-weight="400" text-anchor="middle" dominant-baseline="central">默认入口切换</text>
  <path d="M425 355L600 355" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-dasharray="6 6" marker-end="url(#arrow)"/>
</svg>
