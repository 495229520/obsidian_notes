<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620">
  <defs>
    <style>
      .title { font: 700 28px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #1f2937; }
      .subtitle { font: 500 16px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #475569; }
      .cell-title { font: 700 18px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #111827; }
      .cell-text { font: 500 14px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #334155; }
      .note-title { font: 700 18px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #7c2d12; }
      .note-text { font: 500 14px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #431407; }
      .field { stroke: #475569; stroke-width: 2; rx: 14; }
      .blue { fill: #dbeafe; }
      .green { fill: #dcfce7; }
      .orange { fill: #ffedd5; }
      .purple { fill: #ede9fe; }
      .yellow { fill: #fef3c7; }
      .note-box { fill: #fff7ed; stroke: #fb923c; stroke-width: 2; rx: 16; }
    </style>
  </defs>

  <rect width="1100" height="620" fill="rgb(245, 244, 237)"/>

  <text x="50" y="52" class="title">TCP 报文段结构（简化示意）</text>
  <text x="50" y="80" class="subtitle">真正上线传输的是“TCP 报文段”。头部里的这些字段决定了连接建立、确认、重传、流量控制等行为。</text>

  <rect x="50" y="110" width="170" height="62" class="field blue"/>
  <rect x="220" y="110" width="170" height="62" class="field blue"/>
  <rect x="390" y="110" width="370" height="62" class="field blue"/>
  <text x="90" y="146" class="cell-title">源端口</text>
  <text x="255" y="146" class="cell-title">目标端口</text>
  <text x="520" y="146" class="cell-title">序列号 Seq</text>

  <rect x="50" y="182" width="430" height="62" class="field green"/>
  <rect x="480" y="182" width="120" height="62" class="field green"/>
  <rect x="600" y="182" width="160" height="62" class="field green"/>
  <text x="198" y="218" class="cell-title">确认号 Ack</text>
  <text x="500" y="218" class="cell-title">首部长度</text>
  <text x="646" y="206" class="cell-title">标志位</text>
  <text x="628" y="228" class="cell-text">SYN / ACK / FIN / RST ...</text>

  <rect x="50" y="254" width="240" height="62" class="field orange"/>
  <rect x="290" y="254" width="230" height="62" class="field orange"/>
  <rect x="520" y="254" width="240" height="62" class="field orange"/>
  <text x="120" y="290" class="cell-title">窗口大小</text>
  <text x="344" y="290" class="cell-title">校验和</text>
  <text x="587" y="290" class="cell-title">紧急指针</text>

  <rect x="50" y="326" width="710" height="48" class="field purple"/>
  <text x="338" y="356" class="cell-title">可选项（MSS、窗口扩大、时间戳等）</text>

  <rect x="50" y="386" width="710" height="170" class="field yellow"/>
  <text x="332" y="480" class="cell-title">数据载荷 Payload</text>
  <text x="200" y="510" class="cell-text">真正交给应用的数据内容在这里，TCP 把它看成连续的字节流。</text>

  <rect x="800" y="126" width="252" height="120" class="note-box"/>
  <text x="824" y="158" class="note-title">序列号 Seq</text>
  <text x="824" y="186" class="note-text">标记本报文段中“第一个字节”的编号，</text>
  <text x="824" y="208" class="note-text">接收端据此判断顺序与是否缺失。</text>

  <rect x="800" y="264" width="252" height="120" class="note-box"/>
  <text x="824" y="296" class="note-title">确认号 Ack</text>
  <text x="824" y="324" class="note-text">告诉对方“我下一步期待收到的字节号”。</text>
  <text x="824" y="346" class="note-text">它本质上是累计确认，而不是逐包确认。</text>

  <rect x="800" y="402" width="252" height="138" class="note-box"/>
  <text x="824" y="434" class="note-title">窗口 + 标志位</text>
  <text x="824" y="462" class="note-text">窗口大小负责流量控制，避免发太快。</text>
  <text x="824" y="484" class="note-text">SYN 建连、ACK 确认、FIN 挥手，</text>
  <text x="824" y="506" class="note-text">这些关键动作都靠标志位触发。</text>
</svg>
