<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900">
    <style>
        /* 基础文本样式 */
        text { font-family: system-ui, -apple-system, sans-serif; }
        
        /* 标题和阶段标题 */
        .header { font-size: 18px; font-weight: 700; fill: #334155; }
        .phase-title { font-size: 15px; font-style: italic; fill: #64748b; font-weight: 500; }
        
        /* 左右两侧的状态文本 */
        .state-text { font-size: 14px; font-weight: 600; fill: #475569; }
        .client-state { text-anchor: end; }
        .server-state { text-anchor: start; }
        
        /* 垂直生命线 */
        .lifeline { stroke: #e2e8f0; stroke-width: 2px; }
        
        /* 箭头连接线 */
        .arrow { stroke-width: 2px; fill: none; }
        .arrow-blue { stroke: #2563eb; }
        .arrow-green { stroke: #059669; }
        .arrow-purple { stroke: #7c3aed; }
        .arrow-red { stroke: #ef4444; }
        
        /* 报文信息框 */
        .box { stroke-width: 1.5px; rx: 6px; }
        .box-blue { fill: #eff6ff; stroke: #bfdbfe; }
        .box-green { fill: #ecfdf5; stroke: #a7f3d0; }
        .box-purple { fill: #f5f3ff; stroke: #ddd6fe; }
        .box-red { fill: #fef2f2; stroke: #fecaca; }
        
        /* 报文文本 */
        .box-text { font-size: 14px; font-weight: 600; text-anchor: middle; dominant-baseline: central; }
        .text-blue { fill: #1e40af; }
        .text-green { fill: #065f46; }
        .text-purple { fill: #5b21b6; }
        .text-red { fill: #991b1b; }
    </style>

    <rect width="100%" height="100%" fill="#fafafa"/>

    <defs>
        <marker id="head-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
        </marker>
        <marker id="head-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669" />
        </marker>
        <marker id="head-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed" />
        </marker>
        <marker id="head-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
        </marker>
    </defs>

    <line x1="160" y1="70" x2="160" y2="860" class="lifeline" />
    <line x1="640" y1="70" x2="640" y2="860" class="lifeline" />

    <text x="160" y="50" class="header" text-anchor="middle">Client</text>
    <text x="640" y="50" class="header" text-anchor="middle">Server</text>

    <text x="400" y="100" class="phase-title" text-anchor="middle">— Handshake —</text>
    
    <text x="140" y="130" class="state-text client-state">CLOSED</text>
    <text x="660" y="130" class="state-text server-state">LISTEN</text>
    
    <text x="140" y="165" class="state-text client-state">SYN_SENT</text>
    <line x1="160" y1="130" x2="640" y2="170" class="arrow arrow-blue" marker-end="url(#head-blue)"/>
    <rect x="330" y="135" width="140" height="30" class="box box-blue"/>
    <text x="400" y="150" class="box-text text-blue">SYN seq=x</text>

    <text x="660" y="200" class="state-text server-state">SYN_RCVD</text>
    <line x1="640" y1="190" x2="160" y2="230" class="arrow arrow-green" marker-end="url(#head-green)"/>
    <rect x="290" y="195" width="220" height="30" class="box box-green"/>
    <text x="400" y="210" class="box-text text-green">SYN-ACK seq=y, ack=x+1</text>

    <text x="140" y="265" class="state-text client-state">ESTABLISHED</text>
    <line x1="160" y1="260" x2="640" y2="300" class="arrow arrow-blue" marker-end="url(#head-blue)"/>
    <rect x="330" y="265" width="140" height="30" class="box box-blue"/>
    <text x="400" y="280" class="box-text text-blue">ACK ack=y+1</text>
    <text x="660" y="315" class="state-text server-state">ESTABLISHED</text>


    <text x="400" y="380" class="phase-title" text-anchor="middle">— Data Transfer —</text>

    <line x1="160" y1="410" x2="640" y2="450" class="arrow arrow-purple" marker-end="url(#head-purple)"/>
    <rect x="310" y="415" width="180" height="30" class="box box-purple"/>
    <text x="400" y="430" class="box-text text-purple">DATA segments</text>

    <line x1="640" y1="480" x2="160" y2="520" class="arrow arrow-green" marker-end="url(#head-green)"/>
    <rect x="350" y="485" width="100" height="30" class="box box-green"/>
    <text x="400" y="500" class="box-text text-green">ACK</text>


    <text x="400" y="580" class="phase-title" text-anchor="middle">— Teardown —</text>

    <text x="140" y="615" class="state-text client-state">FIN_WAIT_1</text>
    <line x1="160" y1="610" x2="640" y2="650" class="arrow arrow-red" marker-end="url(#head-red)"/>
    <rect x="350" y="615" width="100" height="30" class="box box-red"/>
    <text x="400" y="630" class="box-text text-red">FIN</text>

    <text x="140" y="715" class="state-text client-state">FIN_WAIT_2</text>
    <line x1="640" y1="680" x2="160" y2="720" class="arrow arrow-green" marker-end="url(#head-green)"/>
    <rect x="350" y="685" width="100" height="30" class="box box-green"/>
    <text x="400" y="700" class="box-text text-green">ACK</text>

    <text x="660" y="735" class="state-text server-state">FIN_WAIT</text>

    <line x1="640" y1="750" x2="160" y2="790" class="arrow arrow-red" marker-end="url(#head-red)"/>
    <rect x="350" y="755" width="100" height="30" class="box box-red"/>
    <text x="400" y="770" class="box-text text-red">FIN</text>

    <text x="140" y="815" class="state-text client-state">TIME_WAIT</text>
    <line x1="160" y1="810" x2="640" y2="850" class="arrow arrow-blue" marker-end="url(#head-blue)"/>
    <rect x="350" y="815" width="100" height="30" class="box box-blue"/>
    <text x="400" y="830" class="box-text text-blue">ACK</text>

    <text x="660" y="865" class="state-text server-state">CLOSED</text>
    <text x="140" y="880" class="state-text client-state">→ CLOSED</text>

</svg>
