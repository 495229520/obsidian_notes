<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560">
  <defs>
    <style>
      .title { font: 700 28px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #1f2937; }
      .subtitle { font: 500 16px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #475569; }
      .layer { font: 700 20px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #111827; }
      .desc { font: 500 15px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #334155; }
      .note-title { font: 700 18px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #1e3a8a; }
      .note-text { font: 500 15px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #1f2937; }
      .stack { fill: #fffdf7; stroke: #475569; stroke-width: 2; rx: 16; }
      .transport { fill: #dbeafe; stroke: #2563eb; stroke-width: 2.5; rx: 16; }
      .note-box { fill: #eff6ff; stroke: #60a5fa; stroke-width: 2; rx: 18; }
      .arrow { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="900" height="560" fill="rgb(245, 244, 237)"/>

  <text x="48" y="52" class="title">TCP/IP 网络分层与 TCP 所在位置</text>
  <text x="48" y="80" class="subtitle">TCP 位于传输层，向上为应用提供可靠的端到端字节流服务，向下依赖 IP 做路由转发。</text>

  <rect x="56" y="108" width="500" height="62" class="stack"/>
  <text x="88" y="146" class="layer">应用层</text>
  <text x="230" y="146" class="desc">HTTP、SMTP、FTP、DNS、SSH、RDP ...</text>

  <rect x="56" y="184" width="500" height="72" class="transport"/>
  <text x="88" y="226" class="layer">传输层</text>
  <text x="230" y="214" class="desc">TCP：可靠、面向连接、按字节流传输</text>
  <text x="230" y="238" class="desc">UDP：无连接、轻量、按数据报传输</text>

  <rect x="56" y="272" width="500" height="62" class="stack"/>
  <text x="88" y="310" class="layer">网络层</text>
  <text x="230" y="310" class="desc">IP：寻址、路由、跨网络转发</text>

  <rect x="56" y="348" width="500" height="62" class="stack"/>
  <text x="88" y="386" class="layer">链路层</text>
  <text x="230" y="386" class="desc">以太网、Wi-Fi、MAC 帧封装与局域网传输</text>

  <rect x="56" y="424" width="500" height="62" class="stack"/>
  <text x="88" y="462" class="layer">物理层</text>
  <text x="230" y="462" class="desc">双绞线、光纤、无线电信号，比特流真正上路</text>

  <path d="M 590 140 L 590 456" class="arrow"/>
  <text x="610" y="182" class="desc">发送时逐层封装</text>
  <text x="610" y="210" class="desc">接收时逐层解封装</text>

  <rect x="620" y="248" width="232" height="178" class="note-box"/>
  <text x="644" y="282" class="note-title">为什么特别强调 TCP？</text>
  <text x="644" y="316" class="note-text">1. 它不负责选路，而是负责</text>
  <text x="644" y="338" class="note-text">   “两端之间怎样可靠传”。</text>
  <text x="644" y="368" class="note-text">2. 三次握手、确认号、重传、</text>
  <text x="644" y="390" class="note-text">   滑动窗口、拥塞控制都在这一层。</text>
  <text x="644" y="420" class="note-text">3. 应用程序通常通过 Socket</text>
  <text x="644" y="442" class="note-text">   接口来间接使用 TCP。</text>
</svg>
