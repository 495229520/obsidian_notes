<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%" style="background-color: #fafafa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  <defs>
    <marker id="arrowRight" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polyline points="2,2 8,5 2,8" fill="none" stroke="#2d966e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
    <marker id="arrowLeft" markerWidth="10" markerHeight="10" refX="2" refY="5" orient="auto">
      <polyline points="8,2 2,5 8,8" fill="none" stroke="#2d966e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
  </defs>

  <rect x="360" y="40" width="80" height="300" fill="#f7f7f7" />
  <text x="400" y="60" font-size="14" font-weight="600" fill="#555" text-anchor="middle">互联网</text>

  <rect x="50" y="110" width="120" height="60" rx="6" fill="#e4f4ec" stroke="#a3d1c0" stroke-width="1.5"/>
  <text x="110" y="135" font-size="15" font-weight="bold" fill="#185c45" text-anchor="middle">节点 A</text>
  <text x="110" y="155" font-size="13" fill="#185c45" text-anchor="middle">192.168.1.5</text>

  <rect x="210" y="90" width="140" height="120" rx="8" fill="#edeaff" stroke="#bcb3f0" stroke-width="1.5"/>
  <text x="280" y="115" font-size="15" font-weight="bold" fill="#3a2f78" text-anchor="middle">NAT A</text>
  <text x="280" y="135" font-size="13" fill="#3a2f78" text-anchor="middle">1.2.3.4</text>
  <text x="280" y="155" font-size="13" fill="#3a2f78" text-anchor="middle">:50001 ➔ 192.168.1.5</text>
  <text x="280" y="175" font-size="13" fill="#3a2f78" text-anchor="middle">洞已打开 ✓</text>

  <rect x="450" y="90" width="140" height="120" rx="8" fill="#edeaff" stroke="#bcb3f0" stroke-width="1.5"/>
  <text x="520" y="115" font-size="15" font-weight="bold" fill="#3a2f78" text-anchor="middle">NAT B</text>
  <text x="520" y="135" font-size="13" fill="#3a2f78" text-anchor="middle">5.6.7.8</text>
  <text x="520" y="155" font-size="13" fill="#3a2f78" text-anchor="middle">:50002 ➔ 192.168.2.7</text>
  <text x="520" y="175" font-size="13" fill="#3a2f78" text-anchor="middle">洞已打开 ✓</text>

  <rect x="630" y="110" width="120" height="60" rx="6" fill="#e4f4ec" stroke="#a3d1c0" stroke-width="1.5"/>
  <text x="690" y="135" font-size="15" font-weight="bold" fill="#185c45" text-anchor="middle">节点 B</text>
  <text x="690" y="155" font-size="13" fill="#185c45" text-anchor="middle">192.168.2.7</text>

  <line x1="180" y1="260" x2="620" y2="260" stroke="#2d966e" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowRight)" />
  <line x1="620" y1="280" x2="180" y2="280" stroke="#2d966e" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowLeft)" />
  <text x="400" y="315" font-size="13" fill="#555" text-anchor="middle">建立直接的 UDP 通道 —— 无需服务器</text>

  <rect x="40" y="340" width="720" height="65" rx="8" fill="#fdfdfd" stroke="#e0e0e0" stroke-width="1"/>
  <text x="400" y="370" font-size="14" fill="#444" text-anchor="middle">步骤 4：直接的 P2P 通道已建立。未来的 UDP 数据包在两个方向上自由流动。</text>
  <text x="400" y="392" font-size="14" fill="#444" text-anchor="middle">不再需要信令服务器。延迟降低；吞吐量提升。必须使用 keepalives 保持洞处于打开状态。</text>
</svg>
