<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520">
  <defs>
    <style>
      .title { font: 700 28px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #1f2937; }
      .subtitle { font: 500 16px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #475569; }
      .host { font: 700 22px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #111827; }
      .step { font: 700 18px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #1e3a8a; }
      .text { font: 500 15px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #334155; }
      .host-box { fill: #fffdf7; stroke: #475569; stroke-width: 2; rx: 18; }
      .mid-box { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 2; rx: 18; }
      .summary-box { fill: #fffbeb; stroke: #f59e0b; stroke-width: 2; rx: 18; }
      .arrow { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .arrow-back { stroke: #0f766e; stroke-width: 3; fill: none; marker-end: url(#arrow2); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e"/>
    </marker>
  </defs>

  <rect width="980" height="520" fill="rgb(245, 244, 237)"/>

  <text x="40" y="48" class="title">为什么断开连接通常需要四次挥手</text>
  <text x="40" y="76" class="subtitle">TCP 是全双工的。客户端和服务器的“发送方向”要分别关闭，所以经常会看到 FIN / ACK / FIN / ACK 四个动作。</text>

  <rect x="98" y="104" width="220" height="64" class="host-box"/>
  <rect x="662" y="104" width="220" height="64" class="host-box"/>
  <text x="180" y="144" class="host">客户端</text>
  <text x="744" y="144" class="host">服务器</text>

  <path d="M 330 194 L 650 194" class="arrow"/>
  <text x="456" y="182" class="step">1. FIN</text>
  <text x="392" y="215" class="text">客户端：我这边已经没有数据要发了</text>

  <path d="M 650 252 L 330 252" class="arrow-back"/>
  <text x="454" y="240" class="step">2. ACK</text>
  <text x="392" y="273" class="text">服务器：收到，你这边的发送方向可以先关闭</text>

  <rect x="248" y="302" width="484" height="82" class="mid-box"/>
  <text x="436" y="332" class="step">半关闭阶段</text>
  <text x="276" y="358" class="text">此时客户端不能再发，但仍然可以接收；服务器也可能还有剩余数据没有发送完。</text>

  <path d="M 650 414 L 330 414" class="arrow-back"/>
  <text x="454" y="402" class="step">3. FIN</text>
  <text x="400" y="437" class="text">服务器：我这边也发完了，准备彻底断开</text>

  <path d="M 330 470 L 650 470" class="arrow"/>
  <text x="454" y="458" class="step">4. ACK</text>
  <text x="366" y="494" class="text">客户端确认后进入 TIME_WAIT，一段时间后连接才完全回收</text>

  <rect x="60" y="330" width="160" height="98" class="summary-box"/>
  <text x="82" y="362" class="step">核心结论</text>
  <text x="82" y="390" class="text">建立连接时要证明</text>
  <text x="82" y="412" class="text">“双向能通信”；</text>
  <text x="82" y="434" class="text">断开时则要分别关闭</text>
  <text x="82" y="456" class="text">两个发送方向。</text>
</svg>
