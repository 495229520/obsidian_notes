<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 760" width="1240" height="760">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="1240" height="760" fill="rgb(245, 244, 237)"/>

  <!-- 左侧：上一版 -->
  <rect x="30" y="30" width="560" height="680" rx="12" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.2"/>
  <text x="310" y="58" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#444441">上一版：接收链路刚接通，但发送仍是空壳</text>

  <rect x="130" y="100" width="360" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="310" y="122" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#0C447C">EdoyunServer::threadIocp()</text>

  <path d="M310,144 L310,214" stroke="#185FA5" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="324" y="179" text-anchor="start" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="11" font-weight="400" fill="#185FA5">按 m_operator 分派完成事件</text>

  <rect x="110" y="214" width="400" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="310" y="236" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#3C3489">EAccept / ERecv / ESend / EError</text>
  <text x="310" y="255" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#534AB7">由线程池把具体 worker 派发出去</text>

  <path d="M310,270 L310,340" stroke="#534AB7" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="324" y="305" text-anchor="start" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="11" font-weight="400" fill="#534AB7">接收方向已经开始工作</text>

  <rect x="130" y="340" width="360" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="310" y="362" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#085041">AcceptWorker() → WSARecv()</text>
  <text x="310" y="381" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#0F6E56">RecvWorker() 再进入 EdoyunClient::Recv()</text>

  <path d="M310,396 L310,466" stroke="#854F0B" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="324" y="431" text-anchor="start" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="11" font-weight="400" fill="#633806">发送方向仍未闭环</text>

  <rect x="120" y="466" width="380" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="310" y="488" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#633806">SendWorker() // TODO</text>
  <text x="310" y="507" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#854F0B">没有发送队列，也没有稳定的生命周期收口</text>

  <rect x="70" y="590" width="480" height="82" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="310" y="615" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#444441">这一阶段的重点是：Accept / Recv 能跑起来</text>
  <text x="310" y="639" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#5F5E5A">发送链路、对象所有权、线程有效性、泄漏观测都还不稳</text>

  <!-- 右侧：新版本 -->
  <rect x="650" y="30" width="560" height="680" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
  <text x="930" y="58" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#085041">08e2ca6：开始补发送队列、所有权收口与泄漏观测</text>

  <rect x="790" y="100" width="280" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="930" y="122" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#0C447C">业务线程 / 上层命令</text>

  <path d="M930,144 L930,214" stroke="#185FA5" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="944" y="179" text-anchor="start" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="11" font-weight="400" fill="#185FA5">调用 EdoyunClient::Send()</text>

  <rect x="760" y="214" width="340" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="930" y="236" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#3C3489">Send(void*, size_t)</text>
  <text x="930" y="255" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#534AB7">先复制成 std::vector&lt;char&gt;，再 PushBack</text>

  <path d="M930,270 L930,340" stroke="#534AB7" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="944" y="305" text-anchor="start" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="11" font-weight="400" fill="#534AB7">EdoyunSendQueue 接管排队</text>

  <rect x="740" y="340" width="380" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="930" y="362" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#085041">EdoyunSendQueue&lt;vector&lt;char&gt;&gt;</text>
  <text x="930" y="381" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#0F6E56">CEdoyunQueue 基类负责排队，额外 m_thread 负责 tick</text>

  <path d="M930,396 L930,466" stroke="#854F0B" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="944" y="431" text-anchor="start" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="11" font-weight="400" fill="#633806">threadTick() 检测到有数据后发起 EQPop</text>

  <rect x="760" y="466" width="340" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="930" y="488" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#633806">DealParam(EQPop) → SendData() → WSASend</text>
  <text x="930" y="507" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#854F0B">方向已经搭出来，但 payload 绑定与回调闭环仍未完成</text>

  <rect x="690" y="590" width="480" height="82" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="930" y="615" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#444441">这一版真正完成的是“结构收口”</text>
  <text x="930" y="639" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#5F5E5A">发送先排队、overlapped 改借用、线程有效性修正、VLD 开始接入</text>
</svg>