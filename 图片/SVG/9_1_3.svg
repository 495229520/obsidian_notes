<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600px" height="980px" viewBox="0 0 1600 980" version="1.1">
  <title>NAT STUN ICE TURN 关系图</title>
  <desc>展示 NAT、STUN、ICE、TURN 在 UDP 穿透中的角色分工：客户端位于 NAT 后面，STUN 用于发现公网映射，ICE 统筹候选与试路，TURN 只在直连失败时提供中继。</desc>
  <rect x="0" y="0" width="1600" height="980" fill="rgb(245, 244, 237)"/>

  <defs>
    <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="7.2" refY="4" orient="auto" viewBox="0 0 8 8">
      <path d="M0 0 L8 4 L0 8 Z" fill="#5A574F"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="7.2" refY="4" orient="auto" viewBox="0 0 8 8">
      <path d="M0 0 L8 4 L0 8 Z" fill="#0E7490"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="7.2" refY="4" orient="auto" viewBox="0 0 8 8">
      <path d="M0 0 L8 4 L0 8 Z" fill="#23824A"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="7.2" refY="4" orient="auto" viewBox="0 0 8 8">
      <path d="M0 0 L8 4 L0 8 Z" fill="#C27A18"/>
    </marker>
  </defs>

  <text fill="#2E2A23" font-size="32" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="800" y="58" text-anchor="middle" dominant-baseline="middle">NAT、STUN、ICE、TURN 各自负责什么</text>
  <text fill="#6C665A" font-size="16" font-weight="500" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="800" y="98" text-anchor="middle" dominant-baseline="middle">NAT 制造直连难度，STUN 帮你看清公网身份，ICE 组织试路，TURN 只在失败时 relay</text>

  <rect fill="#F8F6EF" stroke="#D6CFC4" stroke-width="1.8" x="60" y="140" width="1480" height="700" rx="30" ry="30"/>

  <rect fill="#FFFFFF" stroke="#D7D0C4" stroke-width="1.4" x="160" y="176" width="104" height="36" rx="18" ry="18"/>
  <text fill="#5A574F" font-size="16" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="212" y="194" text-anchor="middle" dominant-baseline="middle">A 侧</text>

  <rect fill="#FFFFFF" stroke="#D7D0C4" stroke-width="1.4" x="1336" y="176" width="104" height="36" rx="18" ry="18"/>
  <text fill="#5A574F" font-size="16" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="1388" y="194" text-anchor="middle" dominant-baseline="middle">B 侧</text>

  <rect fill="#E6F1FB" stroke="#185FA5" stroke-width="2" x="110" y="360" width="220" height="150" rx="24" ry="24"/>
  <text fill="#0C447C" font-size="26" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="220" y="412" text-anchor="middle" dominant-baseline="middle">客户端 A</text>
  <text fill="#345D82" font-size="16" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="220" y="452" text-anchor="middle" dominant-baseline="middle">内网主机</text>
  <text fill="#345D82" font-size="16" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="220" y="480" text-anchor="middle" dominant-baseline="middle">例如 192.168.1.10</text>

  <rect fill="#F0EDFF" stroke="#5B47B7" stroke-width="2.1" x="400" y="300" width="280" height="240" rx="26" ry="26"/>
  <text fill="#352C75" font-size="28" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="540" y="360" text-anchor="middle" dominant-baseline="middle">NAT A</text>
  <text fill="#564D92" font-size="16" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="540" y="408" text-anchor="middle" dominant-baseline="middle">把内网 socket 改写成</text>
  <text fill="#564D92" font-size="16" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="540" y="434" text-anchor="middle" dominant-baseline="middle">公网可见的 IP:port</text>
  <text fill="#564D92" font-size="16" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="540" y="460" text-anchor="middle" dominant-baseline="middle">并维护映射 / 过滤状态</text>

  <rect fill="#ECFEFF" stroke="#06B6D4" stroke-width="2.1" x="680" y="170" width="240" height="120" rx="24" ry="24"/>
  <text fill="#0E5368" font-size="28" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="800" y="212" text-anchor="middle" dominant-baseline="middle">STUN</text>
  <text fill="#2D6170" font-size="16" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="800" y="248" text-anchor="middle" dominant-baseline="middle">帮端点知道“我从公网看起来是谁”</text>
  <text fill="#2D6170" font-size="15" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="800" y="274" text-anchor="middle" dominant-baseline="middle">给 ICE 一份 reflexive 候选</text>

  <rect fill="#E9F7EC" stroke="#23824A" stroke-width="2.2" x="620" y="490" width="360" height="190" rx="28" ry="28"/>
  <text fill="#145C33" font-size="32" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="800" y="546" text-anchor="middle" dominant-baseline="middle">ICE</text>
  <text fill="#2F6644" font-size="17" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="800" y="596" text-anchor="middle" dominant-baseline="middle">统筹双方候选地址</text>
  <text fill="#2F6644" font-size="17" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="800" y="624" text-anchor="middle" dominant-baseline="middle">做连通性检查</text>
  <text fill="#2F6644" font-size="17" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="800" y="652" text-anchor="middle" dominant-baseline="middle">选出能直连而且更优的路径</text>

  <rect fill="#FFF3E6" stroke="#D98924" stroke-width="2" x="700" y="750" width="200" height="100" rx="24" ry="24"/>
  <text fill="#864E07" font-size="28" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="800" y="790" text-anchor="middle" dominant-baseline="middle">TURN</text>
  <text fill="#976228" font-size="16" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="800" y="822" text-anchor="middle" dominant-baseline="middle">直连失败时提供 relay</text>

  <rect fill="#F0EDFF" stroke="#5B47B7" stroke-width="2.1" x="920" y="300" width="280" height="240" rx="26" ry="26"/>
  <text fill="#352C75" font-size="28" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="1060" y="360" text-anchor="middle" dominant-baseline="middle">NAT B</text>
  <text fill="#564D92" font-size="16" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="1060" y="408" text-anchor="middle" dominant-baseline="middle">另一侧也有自己的 NAT 行为</text>
  <text fill="#564D92" font-size="16" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="1060" y="434" text-anchor="middle" dominant-baseline="middle">决定映射是否稳定</text>
  <text fill="#564D92" font-size="16" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="1060" y="460" text-anchor="middle" dominant-baseline="middle">也决定回包能不能进来</text>

  <rect fill="#E6F1FB" stroke="#185FA5" stroke-width="2" x="1270" y="360" width="220" height="150" rx="24" ry="24"/>
  <text fill="#0C447C" font-size="26" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="1380" y="412" text-anchor="middle" dominant-baseline="middle">客户端 B</text>
  <text fill="#345D82" font-size="16" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="1380" y="452" text-anchor="middle" dominant-baseline="middle">内网主机</text>
  <text fill="#345D82" font-size="16" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="1380" y="480" text-anchor="middle" dominant-baseline="middle">例如 10.0.0.8</text>

  <line fill="none" stroke="#5A574F" stroke-width="2.6" stroke-linecap="round" marker-end="url(#arrowGray)" x1="330" y1="435" x2="400" y2="435"/>
  <line fill="none" stroke="#5A574F" stroke-width="2.6" stroke-linecap="round" marker-end="url(#arrowGray)" x1="1270" y1="435" x2="1200" y2="435"/>

  <path fill="none" stroke="#0E7490" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowBlue)" d="M540 300 L540 230 L680 230"/>
  <path fill="none" stroke="#0E7490" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowBlue)" d="M1060 300 L1060 230 L920 230"/>

  <path fill="none" stroke="#23824A" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowGreen)" d="M540 540 L540 600 L620 600"/>
  <path fill="none" stroke="#23824A" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowGreen)" d="M1060 540 L1060 600 L980 600"/>

  <line fill="none" stroke="#C27A18" stroke-width="2.8" stroke-linecap="round" marker-end="url(#arrowOrange)" x1="800" y1="680" x2="800" y2="750"/>

  <text fill="#0E5368" font-size="14" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="630" y="220" text-anchor="middle" dominant-baseline="middle">发现公网映射</text>
  <text fill="#0E5368" font-size="14" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="970" y="220" text-anchor="middle" dominant-baseline="middle">发现公网映射</text>

  <text fill="#145C33" font-size="14" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="648" y="626" text-anchor="middle" dominant-baseline="middle">候选 / NAT 行为</text>
  <text fill="#145C33" font-size="14" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="952" y="626" text-anchor="middle" dominant-baseline="middle">候选 / NAT 行为</text>

  <text fill="#864E07" font-size="15" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="968" y="716" text-anchor="middle" dominant-baseline="middle">直连始终打不通时才回退到 TURN</text>

  <rect fill="#FAEEDA" stroke="#C27A18" stroke-width="1.8" x="140" y="870" width="1320" height="64" rx="20" ry="20"/>
  <text fill="#6C4207" font-size="18" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="800" y="902" text-anchor="middle" dominant-baseline="middle">记法：NAT 是背景条件，STUN 看公网身份，ICE 负责试路，TURN 只在直连失败时兜底。</text>
</svg>
