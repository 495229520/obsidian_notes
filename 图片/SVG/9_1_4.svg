<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1500px" height="920px" viewBox="0 0 1500 920" version="1.1"><title>NAT 映射行为对比</title><desc>用三条横向泳道对比 EIM、ADM、APDM 的 UDP NAT 映射行为，突出同一个内部 socket 面对不同目标时公网映射是否复用。</desc><rect x="0" y="0" width="1500" height="920" fill="rgb(245, 244, 237)" /><defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="8.2" refY="4.5" orient="auto" viewBox="0 0 9 9"><path d="M0 0 L9 4.5 L0 9 Z" fill="#5A574F" /></marker></defs><text fill="#2E2A23" font-size="28" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="750" y="56" text-anchor="middle" dominant-baseline="middle">映射：同一个内部 socket 去找不同目标时，公网号码牌会不会变化</text><text fill="#6C665A" font-size="16" font-weight="500" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="750" y="94" text-anchor="middle" dominant-baseline="middle">把焦点放在“同一个内网端点，面对不同目标时，NAT 会不会复用同一个公网映射”</text><rect fill="#F7F4EC" stroke="#D8D1C2" stroke-width="1.6" x="390" y="130" width="1010" height="76" rx="22" ry="22" /><text fill="#5B5548" font-size="16" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="426" y="168" text-anchor="start" dominant-baseline="middle">目标样本</text><rect fill="#ECFEFF" stroke="#81CFE0" stroke-width="1.5" x="548" y="144" width="228" height="48" rx="16" ry="16" /><text fill="#155C70" font-size="14" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="662" y="169" text-anchor="middle" dominant-baseline="middle">Y1 = 203.0.113.10:3478</text><rect fill="#ECFEFF" stroke="#81CFE0" stroke-width="1.5" x="796" y="144" width="228" height="48" rx="16" ry="16" /><text fill="#155C70" font-size="14" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="910" y="169" text-anchor="middle" dominant-baseline="middle">Y2 = 203.0.113.10:50000</text><rect fill="#ECFEFF" stroke="#81CFE0" stroke-width="1.5" x="1044" y="144" width="264" height="48" rx="16" ry="16" /><text fill="#155C70" font-size="14" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="1176" y="169" text-anchor="middle" dominant-baseline="middle">Y3 = 198.51.100.20:9000</text><rect fill="#E6F1FB" stroke="#185FA5" stroke-width="2" x="80" y="235" width="250" height="470" rx="28" ry="28" /><text fill="#0C447C" font-size="26" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="205" y="315" text-anchor="middle" dominant-baseline="middle">内部 socket X:x</text><text fill="#1E517F" font-size="18.5" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="205" y="365" text-anchor="middle" dominant-baseline="middle">192.168.1.10:50000<tspan x="205" dy="26.27">同一个内部端点</tspan></text><text fill="#4A6D89" font-size="15" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="205" y="486" text-anchor="middle" dominant-baseline="middle">分别尝试发给<tspan x="205" dy="21.75">Y1 / Y2 / Y3</tspan><tspan x="205" dy="21.75">观察 NAT 是否还能</tspan><tspan x="205" dy="21.75">复用同一个公网映射</tspan></text><line fill="none" stroke="#5A574F" stroke-width="2.3" stroke-linecap="round" marker-end="url(#arrow)" x1="330" y1="302" x2="382" y2="302" /><rect fill="#E9F7EC" stroke="#23824A" stroke-width="2" x="390" y="238" width="470" height="128" rx="24" ry="24" /><text fill="#145C33" font-size="27" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="438" y="268" text-anchor="start" dominant-baseline="hanging">EIM</text><rect fill="#FFFFFF" stroke="#23824A" stroke-width="1.3" x="686" y="256" width="150" height="30" rx="15" ry="15" /><text fill="#145C33" font-size="13.5" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="761" y="271" text-anchor="middle" dominant-baseline="middle">与目标无关</text><text fill="#376A49" font-size="16" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="438" y="324" text-anchor="start" dominant-baseline="middle">不管发给哪个目标，公网映射都尽量保持稳定</text><line fill="none" stroke="#5A574F" stroke-width="2.3" stroke-linecap="round" marker-end="url(#arrow)" x1="860" y1="302" x2="912" y2="302" /><rect fill="#F7FCF8" stroke="#23824A" stroke-width="1.8" x="920" y="238" width="480" height="128" rx="24" ry="24" /><text fill="#145C33" font-size="15" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="948" y="256" text-anchor="start" dominant-baseline="hanging">公网映射结果</text><rect fill="#FFFFFF" stroke="#DDD7CA" stroke-width="1.2" x="948" y="280" width="410" height="22" rx="11" ry="11" /><text fill="#3D382F" font-size="14.5" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="962" y="291" text-anchor="start" dominant-baseline="middle">Y1 -&gt; X':62000</text><rect fill="#FFFFFF" stroke="#DDD7CA" stroke-width="1.2" x="948" y="308" width="410" height="22" rx="11" ry="11" /><text fill="#3D382F" font-size="14.5" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="962" y="319" text-anchor="start" dominant-baseline="middle">Y2 -&gt; X':62000</text><rect fill="#FFFFFF" stroke="#DDD7CA" stroke-width="1.2" x="948" y="336" width="410" height="22" rx="11" ry="11" /><text fill="#3D382F" font-size="14.5" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="962" y="347" text-anchor="start" dominant-baseline="middle">Y3 -&gt; X':62000</text><line fill="none" stroke="#5A574F" stroke-width="2.3" stroke-linecap="round" marker-end="url(#arrow)" x1="330" y1="470" x2="382" y2="470" /><rect fill="#FFF4D8" stroke="#D89B3A" stroke-width="2" x="390" y="406" width="470" height="128" rx="24" ry="24" /><text fill="#7C4A03" font-size="27" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="438" y="436" text-anchor="start" dominant-baseline="hanging">ADM</text><rect fill="#FFFFFF" stroke="#D89B3A" stroke-width="1.3" x="686" y="424" width="150" height="30" rx="15" ry="15" /><text fill="#7C4A03" font-size="13.5" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="761" y="439" text-anchor="middle" dominant-baseline="middle">只看目标 IP</text><text fill="#8B642B" font-size="16" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="438" y="492" text-anchor="start" dominant-baseline="middle">Y1 与 Y2 因为 IP 相同还能复用，换成 Y3 时映射更容易变化</text><line fill="none" stroke="#5A574F" stroke-width="2.3" stroke-linecap="round" marker-end="url(#arrow)" x1="860" y1="470" x2="912" y2="470" /><rect fill="#FFF9EC" stroke="#D89B3A" stroke-width="1.8" x="920" y="406" width="480" height="128" rx="24" ry="24" /><text fill="#7C4A03" font-size="15" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="948" y="424" text-anchor="start" dominant-baseline="hanging">公网映射结果</text><rect fill="#FFFFFF" stroke="#DDD7CA" stroke-width="1.2" x="948" y="448" width="410" height="22" rx="11" ry="11" /><text fill="#3D382F" font-size="14.5" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="962" y="459" text-anchor="start" dominant-baseline="middle">Y1 -&gt; X':62000</text><rect fill="#FFFFFF" stroke="#DDD7CA" stroke-width="1.2" x="948" y="476" width="410" height="22" rx="11" ry="11" /><text fill="#3D382F" font-size="14.5" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="962" y="487" text-anchor="start" dominant-baseline="middle">Y2 -&gt; X':62000</text><rect fill="#FFFFFF" stroke="#DDD7CA" stroke-width="1.2" x="948" y="504" width="410" height="22" rx="11" ry="11" /><text fill="#3D382F" font-size="14.5" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="962" y="515" text-anchor="start" dominant-baseline="middle">Y3 -&gt; X':62001</text><line fill="none" stroke="#5A574F" stroke-width="2.3" stroke-linecap="round" marker-end="url(#arrow)" x1="330" y1="638" x2="382" y2="638" /><rect fill="#FFF1E8" stroke="#D46A1F" stroke-width="2" x="390" y="574" width="470" height="128" rx="24" ry="24" /><text fill="#93450B" font-size="27" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="438" y="604" text-anchor="start" dominant-baseline="hanging">APDM</text><rect fill="#FFFFFF" stroke="#D46A1F" stroke-width="1.3" x="686" y="592" width="150" height="30" rx="15" ry="15" /><text fill="#93450B" font-size="13.5" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="761" y="607" text-anchor="middle" dominant-baseline="middle">目标 IP:port 都相关</text><text fill="#A56D3B" font-size="16" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="438" y="660" text-anchor="start" dominant-baseline="middle">目标只要换了，公网映射就更难复用</text><line fill="none" stroke="#5A574F" stroke-width="2.3" stroke-linecap="round" marker-end="url(#arrow)" x1="860" y1="638" x2="912" y2="638" /><rect fill="#FFF8F4" stroke="#D46A1F" stroke-width="1.8" x="920" y="574" width="480" height="128" rx="24" ry="24" /><text fill="#93450B" font-size="15" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="948" y="592" text-anchor="start" dominant-baseline="hanging">公网映射结果</text><rect fill="#FFFFFF" stroke="#DDD7CA" stroke-width="1.2" x="948" y="616" width="410" height="22" rx="11" ry="11" /><text fill="#3D382F" font-size="14.5" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="962" y="627" text-anchor="start" dominant-baseline="middle">Y1 -&gt; X':62000</text><rect fill="#FFFFFF" stroke="#DDD7CA" stroke-width="1.2" x="948" y="644" width="410" height="22" rx="11" ry="11" /><text fill="#3D382F" font-size="14.5" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="962" y="655" text-anchor="start" dominant-baseline="middle">Y2 -&gt; X':62001</text><rect fill="#FFFFFF" stroke="#DDD7CA" stroke-width="1.2" x="948" y="672" width="410" height="22" rx="11" ry="11" /><text fill="#3D382F" font-size="14.5" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="962" y="683" text-anchor="start" dominant-baseline="middle">Y3 -&gt; X':62002</text><rect fill="#FAEEDA" stroke="#C27A18" stroke-width="1.8" x="90" y="790" width="1320" height="96" rx="22" ry="22" /><text fill="#6C4207" font-size="18" font-weight="700" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="750" y="828" text-anchor="middle" dominant-baseline="middle">打洞最喜欢 EIM：因为对端更容易猜中你真正会从哪个公网端点发出来。</text><text fill="#8B642B" font-size="16" font-weight="600" font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" x="750" y="860" text-anchor="middle" dominant-baseline="middle">如果 NAT 一换目标就顺手换公网端口，对端就更难“打中”真正的映射地址。</text></svg>
