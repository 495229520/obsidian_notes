<svg width="100%" viewBox="0 0 680 560" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>IOCP 架构图</title>
  <desc>展示句柄如何关联到 IOCP，异步 I/O 完成后如何把完成包投递到内核队列，以及工作线程如何取出并处理这些完成包。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="680" height="560" fill="rgb(245, 244, 237)"/>

  <g font-family="system-ui,sans-serif">
    <text x="78" y="36" font-size="12" font-weight="400" fill="#444441" text-anchor="middle" dominant-baseline="central">I/O 句柄</text>

    <path d="M26 46H130Q138 46 138 54V82Q138 90 130 90H26Q18 90 18 82V54Q18 46 26 46Z" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="78" y="65" font-size="14" font-weight="500" fill="#085041" text-anchor="middle" dominant-baseline="central">套接字</text>
    <text x="78" y="82" font-size="12" font-weight="400" fill="#0F6E56" text-anchor="middle" dominant-baseline="central">TCP / UDP</text>

    <path d="M26 110H130Q138 110 138 118V146Q138 154 130 154H26Q18 154 18 146V118Q18 110 26 110Z" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="78" y="129" font-size="14" font-weight="500" fill="#085041" text-anchor="middle" dominant-baseline="central">文件</text>
    <text x="78" y="146" font-size="12" font-weight="400" fill="#0F6E56" text-anchor="middle" dominant-baseline="central">磁盘 / NFS</text>

    <path d="M26 174H130Q138 174 138 182V210Q138 218 130 218H26Q18 218 18 210V182Q18 174 26 174Z" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="78" y="193" font-size="14" font-weight="500" fill="#085041" text-anchor="middle" dominant-baseline="central">命名管道</text>
    <text x="78" y="210" font-size="12" font-weight="400" fill="#0F6E56" text-anchor="middle" dominant-baseline="central">IPC 通道</text>

    <line x1="138" y1="68" x2="224" y2="140" stroke="#5F5E5A" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
    <line x1="138" y1="132" x2="224" y2="154" stroke="#5F5E5A" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
    <line x1="138" y1="196" x2="224" y2="168" stroke="#5F5E5A" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
    <text x="180" y="112" font-size="12" font-weight="400" fill="#444441" text-anchor="middle" dominant-baseline="central">CreateIoCompletionPort</text>
    <text x="180" y="124" font-size="12" font-weight="400" fill="#444441" text-anchor="middle" dominant-baseline="central">关联句柄</text>

    <path d="M232 80H424Q432 80 432 88V280Q432 288 424 288H232Q224 288 224 280V88Q224 80 232 80Z" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text x="328" y="106" font-size="14" font-weight="500" fill="#3C3489" text-anchor="middle" dominant-baseline="central">IOCP</text>
    <text x="328" y="122" font-size="12" font-weight="400" fill="#534AB7" text-anchor="middle" dominant-baseline="central">内核对象</text>
    <text x="328" y="148" font-size="12" font-weight="400" fill="#444441" text-anchor="middle" dominant-baseline="central">完成队列</text>

    <path d="M252 160H404Q412 160 412 168V180Q412 188 404 188H252Q244 188 244 180V168Q244 160 252 160Z" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
    <text x="328" y="174" font-size="12" font-weight="400" fill="#444441" text-anchor="middle" dominant-baseline="central">完成包: 1024 字节, 成功</text>

    <path d="M252 198H404Q412 198 412 206V218Q412 226 404 226H252Q244 226 244 218V206Q244 198 252 198Z" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
    <text x="328" y="212" font-size="12" font-weight="400" fill="#444441" text-anchor="middle" dominant-baseline="central">完成包: 512 字节, 成功</text>

    <path d="M252 236H404Q412 236 412 244V256Q412 264 404 264H252Q244 264 244 256V244Q244 236 252 236Z" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
    <text x="328" y="250" font-size="12" font-weight="400" fill="#444441" text-anchor="middle" dominant-baseline="central">完成包: 0 字节, EOF</text>

    <line x1="252" y1="272" x2="404" y2="272" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="4 3"/>
    <text x="328" y="284" font-size="12" font-weight="400" fill="#444441" opacity="0.6" text-anchor="middle" dominant-baseline="central">更多完成包</text>
    <text x="328" y="304" font-size="12" font-weight="400" fill="#444441" text-anchor="middle" dominant-baseline="central">并发数 = CPU 核心数</text>

    <path d="M256 20H400Q408 20 408 28V56Q408 64 400 64H256Q248 64 248 56V28Q248 20 256 20Z" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
    <text x="328" y="38" font-size="14" font-weight="500" fill="#633806" text-anchor="middle" dominant-baseline="central">ReadFile / WSARecv</text>
    <text x="328" y="55" font-size="12" font-weight="400" fill="#854F0B" text-anchor="middle" dominant-baseline="central">OVERLAPPED，立即返回</text>
    <line x1="328" y1="64" x2="328" y2="80" stroke="#5F5E5A" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
    <text x="420" y="76" font-size="12" font-weight="400" fill="#444441" text-anchor="middle" dominant-baseline="central">操作系统排队 I/O</text>

    <text x="588" y="36" font-size="12" font-weight="400" fill="#444441" text-anchor="middle" dominant-baseline="central">工作线程</text>

    <path d="M522 46H654Q662 46 662 54V82Q662 90 654 90H522Q514 90 514 82V54Q514 46 522 46Z" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
    <text x="588" y="65" font-size="14" font-weight="500" fill="#633806" text-anchor="middle" dominant-baseline="central">线程 1</text>
    <text x="588" y="82" font-size="12" font-weight="400" fill="#854F0B" text-anchor="middle" dominant-baseline="central">阻塞等待 (GQCS)</text>

    <path d="M522 110H654Q662 110 662 118V146Q662 154 654 154H522Q514 154 514 146V118Q514 110 522 110Z" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
    <text x="588" y="129" font-size="14" font-weight="500" fill="#633806" text-anchor="middle" dominant-baseline="central">线程 2</text>
    <text x="588" y="146" font-size="12" font-weight="400" fill="#854F0B" text-anchor="middle" dominant-baseline="central">阻塞等待 (GQCS)</text>

    <path d="M522 174H654Q662 174 662 182V210Q662 218 654 218H522Q514 218 514 210V182Q514 174 522 174Z" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
    <text x="588" y="193" font-size="14" font-weight="500" fill="#633806" text-anchor="middle" dominant-baseline="central">线程 3</text>
    <text x="588" y="210" font-size="12" font-weight="400" fill="#854F0B" text-anchor="middle" dominant-baseline="central">阻塞等待 (GQCS)</text>

    <line x1="432" y1="172" x2="514" y2="172" stroke="#5F5E5A" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
    <text x="473" y="165" font-size="12" font-weight="400" fill="#444441" text-anchor="middle" dominant-baseline="central">取出</text>
    <text x="473" y="179" font-size="12" font-weight="400" fill="#444441" text-anchor="middle" dominant-baseline="central">完成包</text>

    <path d="M522 280H654Q662 280 662 288V328Q662 336 654 336H522Q514 336 514 328V288Q514 280 522 280Z" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="588" y="302" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle" dominant-baseline="central">应用回调</text>
    <text x="588" y="320" font-size="12" font-weight="400" fill="#185FA5" text-anchor="middle" dominant-baseline="central">处理结果并回复</text>

    <line x1="588" y1="218" x2="588" y2="280" stroke="#5F5E5A" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
    <text x="626" y="252" font-size="12" font-weight="400" fill="#444441" text-anchor="start" dominant-baseline="central">线程被唤醒</text>

    <text x="506" y="100" font-size="12" font-weight="400" fill="#444441" opacity="0.6" text-anchor="middle" dominant-baseline="central">GetQueuedCompletionStatus</text>
    <text x="506" y="114" font-size="12" font-weight="400" fill="#444441" opacity="0.6" text-anchor="middle" dominant-baseline="central">(阻塞等待)</text>
    <line x1="514" y1="68" x2="432" y2="160" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.35"/>

    <path d="M28 368H632Q640 368 640 376V432Q640 440 632 440H28Q20 440 20 432V376Q20 368 28 368Z" fill="none" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="5 3" opacity="0.4"/>
    <text x="40" y="390" font-size="12" font-weight="400" fill="#444441" text-anchor="start" dominant-baseline="central">图例</text>

    <path d="M50 402H64V416H50Z" fill="#E1F5EE"/>
    <text x="70" y="413" font-size="12" font-weight="400" fill="#444441" text-anchor="start" dominant-baseline="central">I/O 句柄</text>

    <path d="M170 402H184V416H170Z" fill="#EEEDFE"/>
    <text x="190" y="413" font-size="12" font-weight="400" fill="#444441" text-anchor="start" dominant-baseline="central">IOCP / 内核队列</text>

    <path d="M340 402H354V416H340Z" fill="#FAEEDA"/>
    <text x="360" y="413" font-size="12" font-weight="400" fill="#444441" text-anchor="start" dominant-baseline="central">工作线程</text>

    <path d="M470 402H484V416H470Z" fill="#E6F1FB"/>
    <text x="490" y="413" font-size="12" font-weight="400" fill="#444441" text-anchor="start" dominant-baseline="central">应用回调</text>

    <text x="340" y="472" font-size="12" font-weight="400" fill="#444441" text-anchor="middle" dominant-baseline="central">发起异步 I/O  -&gt;  操作系统完成并投递完成包  -&gt;  线程被唤醒  -&gt;  应用处理结果</text>
    <text x="340" y="492" font-size="12" font-weight="400" fill="#444441" text-anchor="middle" dominant-baseline="central">线程只阻塞在 GetQueuedCompletionStatus，而不是阻塞在具体 I/O 上</text>
  </g>
</svg>
