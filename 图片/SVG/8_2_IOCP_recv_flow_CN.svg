<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1260 760">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1260" height="760" fill="rgb(245, 244, 237)"/>
<rect x="30" y="30" width="560" height="660" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<rect x="670" y="30" width="560" height="660" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="310" y="66" font-family="system-ui,sans-serif" font-size="18" font-weight="600" fill="#0C447C" text-anchor="middle" dominant-baseline="central">8.1：只有 Accept 链路</text>
<text x="950" y="66" font-family="system-ui,sans-serif" font-size="18" font-weight="600" fill="#3C3489" text-anchor="middle" dominant-baseline="central">8.2：Accept 后开始接入 Recv</text>
<text x="310" y="96" font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#444441" text-anchor="middle" dominant-baseline="central">接入完成后立刻补挂下一个 AcceptEx，但接收链路还没真正接上</text>
<text x="950" y="96" font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#444441" text-anchor="middle" dominant-baseline="central">Accept 完成后立即投递 WSARecv，并让 ERecv 拥有独立分发入口</text>
<rect x="110" y="140" width="400" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="310.0" y="160.0" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle" dominant-baseline="central">StartService()</text>
<text x="310.0" y="180.0" font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#0C447C" text-anchor="middle" dominant-baseline="central">建立监听 socket 与 IOCP</text>
<line x1="310.0" y1="196" x2="310.0" y2="248" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="110" y="258" width="400" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="310.0" y="278.0" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle" dominant-baseline="central">NewAccept() → AcceptEx</text>
<text x="310.0" y="298.0" font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#0C447C" text-anchor="middle" dominant-baseline="central">把异步 accept 挂进内核</text>
<line x1="310.0" y1="314" x2="310.0" y2="366" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="110" y="376" width="400" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="310.0" y="396.0" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#3C3489" text-anchor="middle" dominant-baseline="central">threadIocp()</text>
<text x="310.0" y="416.0" font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#3C3489" text-anchor="middle" dominant-baseline="central">只会把 EAccept 事件分发给线程池</text>
<line x1="310.0" y1="432" x2="310.0" y2="484" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="110" y="494" width="400" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="310.0" y="514.0" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#085041" text-anchor="middle" dominant-baseline="central">AcceptWorker()</text>
<text x="310.0" y="534.0" font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#085041" text-anchor="middle" dominant-baseline="central">取地址后重新挂下一个 AcceptEx</text>
<rect x="80" y="566" width="460" height="80" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="310.0" y="598.0" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#633806" text-anchor="middle" dominant-baseline="central">结果：服务器能持续接入新连接</text>
<text x="310.0" y="618.0" font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#633806" text-anchor="middle" dominant-baseline="central"><tspan x="310.0" dy="-8.0">但接收事件还没有真正被投递出来</tspan><tspan x="310.0" dy="16">Recv / Send / Error 仍基本停留在占位阶段</tspan></text>
<rect x="750" y="140" width="400" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="950.0" y="160.0" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#3C3489" text-anchor="middle" dominant-baseline="central">AcceptWorker()</text>
<text x="950.0" y="180.0" font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#3C3489" text-anchor="middle" dominant-baseline="central">AcceptEx 完成后，先处理这次新连接</text>
<line x1="950.0" y1="196" x2="950.0" y2="248" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="750" y="258" width="400" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="950.0" y="278.0" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#085041" text-anchor="middle" dominant-baseline="central">GetAcceptExSockaddrs</text>
<text x="950.0" y="298.0" font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#085041" text-anchor="middle" dominant-baseline="central">从 AcceptEx 缓冲区拆出本地 / 远端地址</text>
<line x1="950.0" y1="314" x2="950.0" y2="366" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="750" y="376" width="400" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="950.0" y="396.0" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#0C447C" text-anchor="middle" dominant-baseline="central">WSARecv(client socket, RecvWSABuffer, overlapped)</text>
<text x="950.0" y="416.0" font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#0C447C" text-anchor="middle" dominant-baseline="central">开始把接收请求投递给内核</text>
<line x1="950.0" y1="432" x2="950.0" y2="484" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="750" y="494" width="400" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="950.0" y="514.0" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#085041" text-anchor="middle" dominant-baseline="central">ERecv → threadIocp() → RecvWorker()</text>
<text x="950.0" y="534.0" font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#085041" text-anchor="middle" dominant-baseline="central">最终转到 EdoyunClient::Recv()</text>
<rect x="700" y="566" width="500" height="80" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="950.0" y="598.0" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#633806" text-anchor="middle" dominant-baseline="central">结果：接收事件已经开始接线</text>
<text x="950.0" y="618.0" font-family="system-ui,sans-serif" font-size="12" font-weight="400" fill="#633806" text-anchor="middle" dominant-baseline="central"><tspan x="950.0" dy="-8.0">但 WSABUF、client-IOCP 关联、纯异步收包</tspan><tspan x="950.0" dy="16">都还没有完全闭环</tspan></text>
<text x="310" y="670" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#444441" text-anchor="middle" dominant-baseline="central">从“只有接入骨架”推进到“接收事件开始接线”</text>
<text x="950" y="670" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#444441" text-anchor="middle" dominant-baseline="central">它说明方向已经对了，但实现仍是半成品</text>
</svg>