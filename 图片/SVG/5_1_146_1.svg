<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 950" width="100%" height="100%" style="background-color: #f8fafc; font-family: system-ui, -apple-system, sans-serif;">
  <defs>
    <marker id="arrow-dark" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#334155" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#0ea5e9" />
    </marker>
    <marker id="arrow-action" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#9a3412" />
    </marker>
  </defs>

  <text x="40" y="60" font-size="32" fill="#1e3a8a" font-weight="700">LRU Cache: 哈希表 + 双向链表</text>
  <text x="40" y="100" font-size="15" fill="#475569">头部表示最近使用 MRU，尾部表示最久未使用 LRU；哈希表保存 key 到链表节点的迭代器。</text>

  <text x="40" y="170" font-size="20" fill="#334155" font-weight="600">一、结构：链表负责顺序，哈希表负责 O(1) 定位</text>

  <g transform="translate(80, 230)">
    <line x1="130" y1="85" x2="480" y2="85" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
    <text x="305" y="110" text-anchor="middle" font-size="13" fill="#0369a1">越靠左越新，越靠右越旧</text>

    <rect x="0" y="0" width="90" height="50" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
    <text x="45" y="30" text-anchor="middle" font-size="16" fill="#166534" font-weight="500">head</text>

    <rect x="150" y="0" width="90" height="50" rx="8" fill="#ede9fe" stroke="#c4b5fd" stroke-width="2"/>
    <text x="195" y="24" text-anchor="middle" font-size="16" fill="#5b21b6" font-weight="600">A</text>
    <text x="195" y="42" text-anchor="middle" font-size="12" fill="#7c3aed">MRU</text>

    <rect x="300" y="0" width="90" height="50" rx="8" fill="#ede9fe" stroke="#c4b5fd" stroke-width="2"/>
    <text x="345" y="30" text-anchor="middle" font-size="16" fill="#5b21b6" font-weight="600">C</text>

    <rect x="450" y="0" width="90" height="50" rx="8" fill="#ffedd5" stroke="#fdba74" stroke-width="2"/>
    <text x="495" y="24" text-anchor="middle" font-size="16" fill="#9a3412" font-weight="600">B</text>
    <text x="495" y="42" text-anchor="middle" font-size="12" fill="#ea580c">LRU</text>

    <rect x="600" y="0" width="90" height="50" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
    <text x="645" y="30" text-anchor="middle" font-size="16" fill="#166534" font-weight="500">tail</text>

    <line x1="95" y1="18" x2="140" y2="18" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow-dark)"/>
    <line x1="145" y1="32" x2="100" y2="32" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow-dark)"/>
    <line x1="245" y1="18" x2="290" y2="18" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow-dark)"/>
    <line x1="295" y1="32" x2="250" y2="32" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow-dark)"/>
    <line x1="395" y1="18" x2="440" y2="18" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow-dark)"/>
    <line x1="445" y1="32" x2="400" y2="32" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow-dark)"/>
    <line x1="545" y1="18" x2="590" y2="18" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow-dark)"/>
    <line x1="595" y1="32" x2="550" y2="32" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow-dark)"/>
  </g>

  <g transform="translate(850, 200)">
    <text x="55" y="-15" text-anchor="middle" font-size="13" fill="#0369a1" font-weight="500">指向链表真实节点</text>
    
    <rect x="0" y="0" width="110" height="40" rx="8" fill="#e0f2fe" stroke="#bae6fd" stroke-width="2"/>
    <text x="55" y="25" text-anchor="middle" font-size="15" fill="#0284c7" font-family="monospace">map[A]</text>

    <rect x="0" y="80" width="110" height="40" rx="8" fill="#e0f2fe" stroke="#bae6fd" stroke-width="2"/>
    <text x="55" y="105" text-anchor="middle" font-size="15" fill="#0284c7" font-family="monospace">map[B]</text>

    <rect x="0" y="160" width="110" height="40" rx="8" fill="#e0f2fe" stroke="#bae6fd" stroke-width="2"/>
    <text x="55" y="185" text-anchor="middle" font-size="15" fill="#0284c7" font-family="monospace">map[C]</text>
  </g>

  <path d="M 845 220 C 750 80, 350 80, 260 225" fill="none" stroke="#0ea5e9" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M 845 300 C 800 160, 620 160, 560 225" fill="none" stroke="#0ea5e9" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M 845 380 C 750 500, 480 500, 410 285" fill="none" stroke="#0ea5e9" stroke-width="2" marker-end="url(#arrow-blue)"/>


  <text x="40" y="500" font-size="20" fill="#334155" font-weight="600">二、get(A): 命中后删除原节点，再插入头部</text>

  <g transform="translate(80, 580)">
    <path d="M 195 -15 Q 145 -60 100 -15" fill="none" stroke="#9a3412" stroke-width="2" marker-end="url(#arrow-action)"/>
    <text x="150" y="-45" text-anchor="middle" font-size="14" fill="#9a3412" font-weight="500">访问过的 key 变成最新</text>

    <rect x="0" y="0" width="90" height="50" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
    <text x="45" y="30" text-anchor="middle" font-size="16" fill="#166534" font-weight="500">head</text>

    <rect x="150" y="0" width="90" height="50" rx="8" fill="#ede9fe" stroke="#c4b5fd" stroke-width="2"/>
    <text x="195" y="30" text-anchor="middle" font-size="16" fill="#5b21b6" font-weight="600">A</text>

    <rect x="300" y="0" width="90" height="50" rx="8" fill="#ffedd5" stroke="#fdba74" stroke-width="2"/>
    <text x="345" y="30" text-anchor="middle" font-size="16" fill="#9a3412" font-weight="600">C</text>

    <rect x="450" y="0" width="90" height="50" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
    <text x="495" y="30" text-anchor="middle" font-size="16" fill="#166534" font-weight="500">tail</text>

    <line x1="95" y1="25" x2="140" y2="25" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-dark)"/>
    <line x1="245" y1="25" x2="290" y2="25" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-dark)"/>
    <line x1="395" y1="25" x2="440" y2="25" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-dark)"/>
  </g>


  <text x="40" y="730" font-size="20" fill="#334155" font-weight="600">三、put(E): 容量满时淘汰尾部，再插入头部</text>

  <g transform="translate(80, 820)">
    <path d="M 340 -40 Q 395 -70 445 -15" fill="none" stroke="#9a3412" stroke-width="2" marker-end="url(#arrow-action)"/>
    <text x="390" y="-60" text-anchor="middle" font-size="14" fill="#9a3412" font-weight="500">先删除旧 LRU，再记录新 key</text>

    <rect x="0" y="0" width="90" height="50" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
    <text x="45" y="30" text-anchor="middle" font-size="16" fill="#166534" font-weight="500">head</text>

    <rect x="150" y="0" width="90" height="50" rx="8" fill="#ede9fe" stroke="#c4b5fd" stroke-width="2"/>
    <text x="195" y="30" text-anchor="middle" font-size="16" fill="#5b21b6" font-weight="600">E</text>

    <rect x="300" y="0" width="90" height="50" rx="8" fill="#ede9fe" stroke="#c4b5fd" stroke-width="2"/>
    <text x="345" y="30" text-anchor="middle" font-size="16" fill="#5b21b6" font-weight="600">A</text>

    <rect x="450" y="0" width="90" height="50" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
    <text x="495" y="30" text-anchor="middle" font-size="16" fill="#166534" font-weight="500">tail</text>

    <line x1="95" y1="25" x2="140" y2="25" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-dark)"/>
    <line x1="245" y1="25" x2="290" y2="25" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-dark)"/>
    <line x1="395" y1="25" x2="440" y2="25" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-dark)"/>
  </g>

</svg>
