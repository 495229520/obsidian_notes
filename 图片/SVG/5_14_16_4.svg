<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200px" height="720px" viewBox="0 0 1200 720" version="1.1">
  <rect width="100%" height="100%" fill="rgb(245, 244, 237)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#3f4f5f"/>
    </marker>
  </defs>
  <text x="600" y="42" text-anchor="middle" dominant-baseline="middle" fill="#1f2933" font-size="30" font-weight="700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">计数排序：用值域下标统计出现次数</text>

  <rect x="64" y="82" width="1072" height="112" rx="14" ry="14" fill="#fbfaf5" stroke="#c5bda8" stroke-width="2"/>
  <text x="600" y="118" text-anchor="middle" dominant-baseline="middle" fill="#43505f" font-size="22" font-weight="700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">1. 扫描原数组</text>
  <text x="600" y="158" text-anchor="middle" dominant-baseline="middle" fill="#1f2933" font-size="27" font-weight="700" font-family="Menlo, Consolas, monospace">[4, 2, 2, 8, 3, 3, 1]</text>

  <line x1="600" y1="204" x2="600" y2="246" stroke="#3f4f5f" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="70" y="264" width="505" height="178" rx="14" ry="14" fill="#e8f3ff" stroke="#6c82aa" stroke-width="2"/>
  <text x="322" y="298" text-anchor="middle" dominant-baseline="middle" fill="#324a82" font-size="22" font-weight="700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">2. 建立计数数组 count[value]</text>

  <g font-family="Menlo, Consolas, monospace" font-weight="700" text-anchor="middle" dominant-baseline="middle">
    <rect x="112" y="330" width="62" height="46" fill="#fbfaf5" stroke="#8fa4c9" stroke-width="2"/>
    <rect x="174" y="330" width="62" height="46" fill="#fbfaf5" stroke="#8fa4c9" stroke-width="2"/>
    <rect x="236" y="330" width="62" height="46" fill="#fbfaf5" stroke="#8fa4c9" stroke-width="2"/>
    <rect x="298" y="330" width="62" height="46" fill="#fbfaf5" stroke="#8fa4c9" stroke-width="2"/>
    <rect x="360" y="330" width="62" height="46" fill="#fbfaf5" stroke="#8fa4c9" stroke-width="2"/>
    <rect x="422" y="330" width="62" height="46" fill="#fbfaf5" stroke="#8fa4c9" stroke-width="2"/>
    <rect x="484" y="330" width="62" height="46" fill="#fbfaf5" stroke="#8fa4c9" stroke-width="2"/>
    <text x="143" y="353" fill="#1f2933" font-size="21">1</text>
    <text x="205" y="353" fill="#1f2933" font-size="21">2</text>
    <text x="267" y="353" fill="#1f2933" font-size="21">2</text>
    <text x="329" y="353" fill="#1f2933" font-size="21">1</text>
    <text x="391" y="353" fill="#1f2933" font-size="21">0</text>
    <text x="453" y="353" fill="#1f2933" font-size="21">0</text>
    <text x="515" y="353" fill="#1f2933" font-size="21">1</text>
    <text x="143" y="405" fill="#56677a" font-size="17">1</text>
    <text x="205" y="405" fill="#56677a" font-size="17">2</text>
    <text x="267" y="405" fill="#56677a" font-size="17">3</text>
    <text x="329" y="405" fill="#56677a" font-size="17">4</text>
    <text x="391" y="405" fill="#56677a" font-size="17">5</text>
    <text x="453" y="405" fill="#56677a" font-size="17">6</text>
    <text x="515" y="405" fill="#56677a" font-size="17">8</text>
  </g>
  <text x="322" y="418" text-anchor="middle" dominant-baseline="middle" fill="#56677a" font-size="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">下方是对应的值，格子里是出现次数</text>

  <rect x="625" y="264" width="505" height="178" rx="14" ry="14" fill="#fff1c7" stroke="#b7872f" stroke-width="2"/>
  <text x="877" y="298" text-anchor="middle" dominant-baseline="middle" fill="#6a4817" font-size="22" font-weight="700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">3. 若需要稳定排序，先转前缀和</text>
  <g font-family="Menlo, Consolas, monospace" font-weight="700" text-anchor="middle" dominant-baseline="middle">
    <rect x="667" y="330" width="62" height="46" fill="#fbfaf5" stroke="#c59b4a" stroke-width="2"/>
    <rect x="729" y="330" width="62" height="46" fill="#fbfaf5" stroke="#c59b4a" stroke-width="2"/>
    <rect x="791" y="330" width="62" height="46" fill="#fbfaf5" stroke="#c59b4a" stroke-width="2"/>
    <rect x="853" y="330" width="62" height="46" fill="#fbfaf5" stroke="#c59b4a" stroke-width="2"/>
    <rect x="915" y="330" width="62" height="46" fill="#fbfaf5" stroke="#c59b4a" stroke-width="2"/>
    <rect x="977" y="330" width="62" height="46" fill="#fbfaf5" stroke="#c59b4a" stroke-width="2"/>
    <rect x="1039" y="330" width="62" height="46" fill="#fbfaf5" stroke="#c59b4a" stroke-width="2"/>
    <text x="698" y="353" fill="#1f2933" font-size="21">1</text>
    <text x="760" y="353" fill="#1f2933" font-size="21">3</text>
    <text x="822" y="353" fill="#1f2933" font-size="21">5</text>
    <text x="884" y="353" fill="#1f2933" font-size="21">6</text>
    <text x="946" y="353" fill="#1f2933" font-size="21">6</text>
    <text x="1008" y="353" fill="#1f2933" font-size="21">6</text>
    <text x="1070" y="353" fill="#1f2933" font-size="21">7</text>
    <text x="698" y="405" fill="#6a4817" font-size="17">1</text>
    <text x="760" y="405" fill="#6a4817" font-size="17">2</text>
    <text x="822" y="405" fill="#6a4817" font-size="17">3</text>
    <text x="884" y="405" fill="#6a4817" font-size="17">4</text>
    <text x="946" y="405" fill="#6a4817" font-size="17">5</text>
    <text x="1008" y="405" fill="#6a4817" font-size="17">6</text>
    <text x="1070" y="405" fill="#6a4817" font-size="17">8</text>
  </g>
  <text x="877" y="418" text-anchor="middle" dominant-baseline="middle" fill="#6a4817" font-size="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">前缀和表示每个值的结束位置</text>

  <line x1="322" y1="454" x2="322" y2="500" stroke="#3f4f5f" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="877" y1="454" x2="877" y2="500" stroke="#3f4f5f" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="150" y="514" width="900" height="118" rx="14" ry="14" fill="#d8f0df" stroke="#598765" stroke-width="2"/>
  <text x="600" y="548" text-anchor="middle" dominant-baseline="middle" fill="#244c2e" font-size="22" font-weight="700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">4. 按值域顺序回填，得到有序结果</text>
  <g font-family="Menlo, Consolas, monospace" font-weight="700" text-anchor="middle" dominant-baseline="middle">
    <rect x="294" y="576" width="72" height="42" fill="#fbfaf5" stroke="#6f9678" stroke-width="2"/>
    <rect x="366" y="576" width="72" height="42" fill="#fbfaf5" stroke="#6f9678" stroke-width="2"/>
    <rect x="438" y="576" width="72" height="42" fill="#fbfaf5" stroke="#6f9678" stroke-width="2"/>
    <rect x="510" y="576" width="72" height="42" fill="#fbfaf5" stroke="#6f9678" stroke-width="2"/>
    <rect x="582" y="576" width="72" height="42" fill="#fbfaf5" stroke="#6f9678" stroke-width="2"/>
    <rect x="654" y="576" width="72" height="42" fill="#fbfaf5" stroke="#6f9678" stroke-width="2"/>
    <rect x="726" y="576" width="72" height="42" fill="#fbfaf5" stroke="#6f9678" stroke-width="2"/>
    <text x="330" y="597" fill="#1f2933" font-size="23">1</text>
    <text x="402" y="597" fill="#1f2933" font-size="23">2</text>
    <text x="474" y="597" fill="#1f2933" font-size="23">2</text>
    <text x="546" y="597" fill="#1f2933" font-size="23">3</text>
    <text x="618" y="597" fill="#1f2933" font-size="23">3</text>
    <text x="690" y="597" fill="#1f2933" font-size="23">4</text>
    <text x="762" y="597" fill="#1f2933" font-size="23">8</text>
  </g>

  <rect x="284" y="654" width="632" height="46" rx="12" ry="12" fill="#fbfaf5" stroke="#c5bda8" stroke-width="2"/>
  <text x="600" y="677" text-anchor="middle" dominant-baseline="middle" fill="#1f2933" font-size="21" font-weight="700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">复杂度：时间 O(n + k)，空间 O(k)，k 是值域大小</text>
</svg>
