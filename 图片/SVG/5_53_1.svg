<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1120px" height="620px" viewBox="0 0 1120 620" version="1.1"><title>Kadane maximum subarray trace</title><desc>Step by step trace of cur and ans for LeetCode 53 example input.</desc><rect x="0" y="0" width="1120" height="620" fill="rgb(245, 244, 237)" /><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#4a5568" /></marker></defs><text fill="#1f2937" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="700" x="560" y="42" text-anchor="middle" dominant-baseline="middle">53. 最大子数组和：cur 表示“必须以当前位置结尾”的最大和</text><text fill="#4b5563" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="18" x="560" y="78" text-anchor="middle" dominant-baseline="middle">转移：cur = max(nums[i], cur + nums[i])，ans = max(ans, cur)</text><rect fill="#ffffff" stroke="#d1d5db" stroke-width="2" x="52" y="112" width="1016" height="92" rx="10" ry="10" /><text fill="#111827" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="700" x="82" y="140">数组 nums</text><g id="array-cells"><rect fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5" x="188" y="132" width="76" height="48" rx="8" ry="8" /><text fill="#374151" font-family="Arial, sans-serif" font-size="18" font-weight="700" x="226" y="156" text-anchor="middle" dominant-baseline="middle">-2</text><text fill="#6b7280" font-family="Arial, sans-serif" font-size="12" x="226" y="194" text-anchor="middle">i=0</text><rect fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5" x="274" y="132" width="76" height="48" rx="8" ry="8" /><text fill="#374151" font-family="Arial, sans-serif" font-size="18" font-weight="700" x="312" y="156" text-anchor="middle" dominant-baseline="middle">1</text><text fill="#6b7280" font-family="Arial, sans-serif" font-size="12" x="312" y="194" text-anchor="middle">i=1</text><rect fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5" x="360" y="132" width="76" height="48" rx="8" ry="8" /><text fill="#374151" font-family="Arial, sans-serif" font-size="18" font-weight="700" x="398" y="156" text-anchor="middle" dominant-baseline="middle">-3</text><text fill="#6b7280" font-family="Arial, sans-serif" font-size="12" x="398" y="194" text-anchor="middle">i=2</text><rect fill="#dcfce7" stroke="#16a34a" stroke-width="2.5" x="446" y="132" width="76" height="48" rx="8" ry="8" /><text fill="#166534" font-family="Arial, sans-serif" font-size="18" font-weight="700" x="484" y="156" text-anchor="middle" dominant-baseline="middle">4</text><text fill="#166534" font-family="Arial, sans-serif" font-size="12" font-weight="700" x="484" y="194" text-anchor="middle">i=3</text><rect fill="#dcfce7" stroke="#16a34a" stroke-width="2.5" x="532" y="132" width="76" height="48" rx="8" ry="8" /><text fill="#166534" font-family="Arial, sans-serif" font-size="18" font-weight="700" x="570" y="156" text-anchor="middle" dominant-baseline="middle">-1</text><text fill="#166534" font-family="Arial, sans-serif" font-size="12" font-weight="700" x="570" y="194" text-anchor="middle">i=4</text><rect fill="#dcfce7" stroke="#16a34a" stroke-width="2.5" x="618" y="132" width="76" height="48" rx="8" ry="8" /><text fill="#166534" font-family="Arial, sans-serif" font-size="18" font-weight="700" x="656" y="156" text-anchor="middle" dominant-baseline="middle">2</text><text fill="#166534" font-family="Arial, sans-serif" font-size="12" font-weight="700" x="656" y="194" text-anchor="middle">i=5</text><rect fill="#dcfce7" stroke="#16a34a" stroke-width="2.5" x="704" y="132" width="76" height="48" rx="8" ry="8" /><text fill="#166534" font-family="Arial, sans-serif" font-size="18" font-weight="700" x="742" y="156" text-anchor="middle" dominant-baseline="middle">1</text><text fill="#166534" font-family="Arial, sans-serif" font-size="12" font-weight="700" x="742" y="194" text-anchor="middle">i=6</text><rect fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5" x="790" y="132" width="76" height="48" rx="8" ry="8" /><text fill="#374151" font-family="Arial, sans-serif" font-size="18" font-weight="700" x="828" y="156" text-anchor="middle" dominant-baseline="middle">-5</text><text fill="#6b7280" font-family="Arial, sans-serif" font-size="12" x="828" y="194" text-anchor="middle">i=7</text><rect fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5" x="876" y="132" width="76" height="48" rx="8" ry="8" /><text fill="#374151" font-family="Arial, sans-serif" font-size="18" font-weight="700" x="914" y="156" text-anchor="middle" dominant-baseline="middle">4</text><text fill="#6b7280" font-family="Arial, sans-serif" font-size="12" x="914" y="194" text-anchor="middle">i=8</text></g><line stroke="#16a34a" stroke-width="4" stroke-linecap="round" x1="484" y1="215" x2="742" y2="215" /><text fill="#166534" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="700" x="613" y="238" text-anchor="middle">最终最优连续子数组：[4, -1, 2, 1]，和为 6</text><g id="trace-table"><rect fill="#ffffff" stroke="#d1d5db" stroke-width="2" x="52" y="270" width="1016" height="260" rx="10" ry="10" /><rect fill="#e0f2fe" stroke="none" x="52" y="270" width="1016" height="42" rx="10" ry="10" /><text fill="#0f172a" font-family="Arial, sans-serif" font-size="15" font-weight="700" x="86" y="297">i</text><text fill="#0f172a" font-family="Arial, sans-serif" font-size="15" font-weight="700" x="172" y="297" text-anchor="middle">nums[i]</text><text fill="#0f172a" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="700" x="330" y="297" text-anchor="middle">cur 选择</text><text fill="#0f172a" font-family="Arial, sans-serif" font-size="15" font-weight="700" x="530" y="297" text-anchor="middle">cur</text><text fill="#0f172a" font-family="Arial, sans-serif" font-size="15" font-weight="700" x="650" y="297" text-anchor="middle">ans</text><text fill="#0f172a" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="700" x="850" y="297" text-anchor="middle">含义</text><line stroke="#cbd5e1" stroke-width="1.5" x1="52" y1="312" x2="1068" y2="312" /><text fill="#374151" font-family="Arial, sans-serif" font-size="15" x="86" y="342">0</text><text fill="#374151" font-family="Arial, sans-serif" font-size="15" x="172" y="342" text-anchor="middle">-2</text><text fill="#374151" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="15" x="330" y="342" text-anchor="middle">初始化</text><text fill="#374151" font-family="Arial, sans-serif" font-size="15" x="530" y="342" text-anchor="middle">-2</text><text fill="#374151" font-family="Arial, sans-serif" font-size="15" x="650" y="342" text-anchor="middle">-2</text><text fill="#374151" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="15" x="850" y="342" text-anchor="middle">先拿第一个数，避免全负数时错误返回 0</text><text fill="#374151" font-family="Arial, sans-serif" font-size="15" x="86" y="382">1</text><text fill="#374151" font-family="Arial, sans-serif" font-size="15" x="172" y="382" text-anchor="middle">1</text><text fill="#0f766e" font-family="Arial, sans-serif" font-size="15" font-weight="700" x="330" y="382" text-anchor="middle">max(1, -2+1) = 1</text><text fill="#0f766e" font-family="Arial, sans-serif" font-size="15" font-weight="700" x="530" y="382" text-anchor="middle">1</text><text fill="#0f766e" font-family="Arial, sans-serif" font-size="15" font-weight="700" x="650" y="382" text-anchor="middle">1</text><text fill="#374151" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="15" x="850" y="382" text-anchor="middle">前缀 -2 拖后腿，丢掉，从 1 重新开始</text><text fill="#374151" font-family="Arial, sans-serif" font-size="15" x="86" y="422">3</text><text fill="#374151" font-family="Arial, sans-serif" font-size="15" x="172" y="422" text-anchor="middle">4</text><text fill="#16a34a" font-family="Arial, sans-serif" font-size="15" font-weight="700" x="330" y="422" text-anchor="middle">max(4, -2+4) = 4</text><text fill="#16a34a" font-family="Arial, sans-serif" font-size="15" font-weight="700" x="530" y="422" text-anchor="middle">4</text><text fill="#16a34a" font-family="Arial, sans-serif" font-size="15" font-weight="700" x="650" y="422" text-anchor="middle">4</text><text fill="#374151" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="15" x="850" y="422" text-anchor="middle">从 4 开始新的连续段</text><text fill="#374151" font-family="Arial, sans-serif" font-size="15" x="86" y="462">4-6</text><text fill="#374151" font-family="Arial, sans-serif" font-size="15" x="172" y="462" text-anchor="middle">-1,2,1</text><text fill="#16a34a" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="700" x="330" y="462" text-anchor="middle">继续接上：3 -&gt; 5 -&gt; 6</text><text fill="#16a34a" font-family="Arial, sans-serif" font-size="15" font-weight="700" x="530" y="462" text-anchor="middle">6</text><text fill="#16a34a" font-family="Arial, sans-serif" font-size="15" font-weight="700" x="650" y="462" text-anchor="middle">6</text><text fill="#374151" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="15" x="850" y="462" text-anchor="middle">到 i=6 时得到当前最优和 6</text><text fill="#374151" font-family="Arial, sans-serif" font-size="15" x="86" y="502">7-8</text><text fill="#374151" font-family="Arial, sans-serif" font-size="15" x="172" y="502" text-anchor="middle">-5,4</text><text fill="#b45309" font-family="Arial, sans-serif" font-size="15" font-weight="700" x="330" y="502" text-anchor="middle">1 -&gt; max(4, 1+4) = 5</text><text fill="#b45309" font-family="Arial, sans-serif" font-size="15" font-weight="700" x="530" y="502" text-anchor="middle">5</text><text fill="#16a34a" font-family="Arial, sans-serif" font-size="15" font-weight="700" x="650" y="502" text-anchor="middle">6</text><text fill="#374151" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="15" x="850" y="502" text-anchor="middle">后面虽能回升到 5，但没有超过 ans=6</text></g><rect fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" x="86" y="552" width="948" height="46" rx="8" ry="8" /><text fill="#78350f" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="700" x="560" y="576" text-anchor="middle" dominant-baseline="middle">核心直觉：如果“前面的连续和”已经让当前更差，就从当前元素重新开一段；否则把当前元素接到前面。</text></svg>