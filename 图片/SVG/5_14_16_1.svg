<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200px" height="680px" viewBox="0 0 1200 680" version="1.1"><rect x="0" y="0" width="1200" height="680" fill="rgb(245, 244, 237)" /><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#3f4f5f" /></marker></defs><text fill="#1f2933" font-size="30" font-weight="700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" x="600" y="42" text-anchor="middle" dominant-baseline="middle">快速排序：一次 partition 把数组切成两边</text><rect fill="#fbfaf5" stroke="#c5bda8" stroke-width="2" x="80" y="86" width="1040" height="108" rx="14" ry="14" /><text fill="#43505f" font-size="22" font-weight="700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" x="600" y="122" text-anchor="middle" dominant-baseline="middle">原数组：选择 pivot = 5</text><text fill="#1f2933" font-size="27" font-weight="700" font-family="Menlo, Consolas, monospace" x="600" y="162" text-anchor="middle" dominant-baseline="middle">[8, 3, 5, 1, 9, 2, 7]</text><line stroke="#3f4f5f" stroke-width="3" marker-end="url(#arrow)" x1="600" y1="202" x2="600" y2="258" /><text fill="#56677a" font-size="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" x="640" y="230" dominant-baseline="middle">扫描 + 交换</text><rect fill="#d8f0df" stroke="#598765" stroke-width="2" x="96" y="275" width="318" height="122" rx="12" ry="12" /><rect fill="#fff1c7" stroke="#b7872f" stroke-width="2" x="442" y="275" width="316" height="122" rx="12" ry="12" /><rect fill="#dfe8ff" stroke="#5a6fa8" stroke-width="2" x="786" y="275" width="318" height="122" rx="12" ry="12" /><text fill="#244c2e" font-size="23" font-weight="700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" x="255" y="311" text-anchor="middle" dominant-baseline="middle">左区间<tspan x="255" dy="31.05">&lt; pivot：3, 1, 2</tspan></text><text fill="#6a4817" font-size="23" font-weight="700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" x="600" y="311" text-anchor="middle" dominant-baseline="middle">基准附近<tspan x="600" dy="31.05">pivot：5</tspan></text><text fill="#324a82" font-size="23" font-weight="700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" x="945" y="311" text-anchor="middle" dominant-baseline="middle">右区间<tspan x="945" dy="31.05">&gt; pivot：9, 8, 7</tspan></text><line stroke="#3f4f5f" stroke-width="3" marker-end="url(#arrow)" x1="255" y1="407" x2="255" y2="462" /><line stroke="#3f4f5f" stroke-width="3" marker-end="url(#arrow)" x1="945" y1="407" x2="945" y2="462" /><text fill="#56677a" font-size="21" font-weight="700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" x="600" y="437" text-anchor="middle" dominant-baseline="middle">左右区间继续递归 partition</text><rect fill="#edf8ef" stroke="#6f9678" stroke-width="2" x="150" y="478" width="210" height="68" rx="10" ry="10" /><rect fill="#edf2ff" stroke="#7284b8" stroke-width="2" x="840" y="478" width="210" height="68" rx="10" ry="10" /><text fill="#1f2933" font-size="25" font-weight="700" font-family="Menlo, Consolas, monospace" x="255" y="512" text-anchor="middle" dominant-baseline="middle">[1, 2, 3]</text><text fill="#1f2933" font-size="25" font-weight="700" font-family="Menlo, Consolas, monospace" x="945" y="512" text-anchor="middle" dominant-baseline="middle">[7, 8, 9]</text><path fill="none" stroke="#3f4f5f" stroke-width="3" marker-end="url(#arrow)" d="M255 555 L255 592 L600 592" /><path fill="none" stroke="#3f4f5f" stroke-width="3" marker-end="url(#arrow)" d="M945 555 L945 592 L600 592" /><rect fill="#fbfaf5" stroke="#c5bda8" stroke-width="2" x="390" y="604" width="420" height="56" rx="12" ry="12" /><text fill="#1f2933" font-size="25" font-weight="700" font-family="Menlo, Consolas, monospace" x="600" y="632" text-anchor="middle" dominant-baseline="middle">[1, 2, 3, 5, 7, 8, 9]</text></svg>