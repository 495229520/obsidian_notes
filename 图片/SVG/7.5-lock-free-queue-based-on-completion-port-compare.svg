<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 475" fill="none">
  <rect width="100%" height="100%" fill="rgb(245, 244, 237)"/>

  <!-- 无背景 — 透明以兼容 Obsidian 主题 -->

  <!-- ===== 标题 ===== -->
  <text x="460" y="26" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="16" font-weight="bold" fill="currentColor">新旧机制对比</text>

  <!-- ==================== 左侧：原始实验 ==================== -->
  <rect x="15" y="40" width="420" height="420" rx="14" stroke="#E74C3C" stroke-width="2.5"/>
  <text x="225" y="66" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#E74C3C">原始实验 (7c646042)</text>

  <!-- main() -->
  <rect x="38" y="90" width="115" height="38" rx="8" stroke="currentColor" stroke-width="1.5"/>
  <text x="95" y="114" text-anchor="middle" font-family="Consolas, monospace" font-size="12" fill="currentColor">main()</text>

  <!-- 箭头: main → PostQueued -->
  <line x1="153" y1="109" x2="200" y2="109" stroke="currentColor" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="176" y="102" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#888">new IOCP_PARAM</text>

  <!-- PostQueuedCompletionStatus (旧) -->
  <rect x="200" y="90" width="198" height="38" rx="8" stroke="#3498DB" stroke-width="1.5"/>
  <text x="299" y="106" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="currentColor">PostQueued</text>
  <text x="299" y="121" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="currentColor">CompletionStatus</text>

  <!-- 箭头: PostQueued → threadmain -->
  <line x1="299" y1="128" x2="299" y2="163" stroke="currentColor" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- threadmain() -->
  <rect x="195" y="163" width="208" height="38" rx="8" stroke="#27AE60" stroke-width="1.5"/>
  <text x="299" y="187" text-anchor="middle" font-family="Consolas, monospace" font-size="12" fill="currentColor">threadmain()</text>

  <!-- 箭头: threadmain → 局部 list (push 分支) -->
  <line x1="240" y1="201" x2="138" y2="252" stroke="currentColor" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="166" y="224" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#888">push_back</text>

  <!-- 局部 std::list -->
  <rect x="38" y="252" width="195" height="38" rx="8" stroke="#9B59B6" stroke-width="1.5"/>
  <text x="135" y="276" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="currentColor">局部 std::list&lt;string&gt;</text>

  <!-- 箭头: threadmain → 回调 (pop 分支) -->
  <line x1="357" y1="201" x2="357" y2="252" stroke="currentColor" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="385" y="231" text-anchor="start" font-family="Segoe UI, sans-serif" font-size="9" fill="#888">cbFunc()</text>

  <!-- 回调 -->
  <rect x="283" y="252" width="130" height="38" rx="8" stroke="#E67E22" stroke-width="1.5"/>
  <text x="348" y="269" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="currentColor">回调函数</text>
  <text x="348" y="284" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#888">(发射后不管)</text>

  <!-- 分隔线 -->
  <line x1="35" y1="325" x2="428" y2="325" stroke="#E74C3C" stroke-width="0.8" stroke-dasharray="4"/>

  <!-- 总结 (旧) -->
  <text x="225" y="345" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#E74C3C">Push: 异步，无确认</text>
  <text x="225" y="365" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#E74C3C">Pop: 回调，发射后不管</text>
  <text x="225" y="385" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#E74C3C">存储: 函数局部 list</text>
  <text x="225" y="405" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#E74C3C">未模板化 (硬编码 std::string)</text>

  <!-- ==================== 右侧：CEdoyunQueue ==================== -->
  <rect x="453" y="40" width="452" height="420" rx="14" stroke="#27AE60" stroke-width="2.5"/>
  <text x="679" y="66" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#27AE60">CEdoyunQueue&lt;T&gt; (c6fa8056)</text>

  <!-- 调用者框 (更高 — 显示 push 行、pop 行和等待注解) -->
  <rect x="468" y="90" width="140" height="90" rx="8" stroke="currentColor" stroke-width="1.5"/>
  <text x="538" y="110" text-anchor="middle" font-family="Consolas, monospace" font-size="12" fill="currentColor">调用者</text>
  <line x1="474" y1="118" x2="602" y2="118" stroke="currentColor" stroke-width="0.8" stroke-dasharray="3"/>
  <!-- push 行 -->
  <text x="538" y="134" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="currentColor">PushBack(data) ──→</text>
  <!-- pop 行 -->
  <text x="538" y="155" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#E67E22">PopFront(data) ──→</text>
  <!-- WaitForSingleObject 注解 — 框内，pop 行下方 -->
  <text x="538" y="172" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" fill="#E67E22" font-style="italic">⟳ 阻塞 · WaitForSingleObject</text>

  <!-- 箭头: PushBack (黑色实线) — 从调用者右侧 push 行 y=129 出发 -->
  <line x1="608" y1="129" x2="658" y2="129" stroke="currentColor" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 箭头: PopFront (橙色实线) — 从调用者右侧 pop 行 y=150 出发 -->
  <line x1="608" y1="150" x2="658" y2="150" stroke="#E67E22" stroke-width="1.5" marker-end="url(#arrO)"/>

  <!-- PostQueuedCompletionStatus (新) -->
  <rect x="658" y="110" width="200" height="52" rx="8" stroke="#3498DB" stroke-width="1.5"/>
  <text x="758" y="132" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="currentColor">PostQueued</text>
  <text x="758" y="149" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="currentColor">CompletionStatus</text>

  <!-- 箭头: PostQueued → threadMain -->
  <line x1="758" y1="162" x2="758" y2="204" stroke="currentColor" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- threadMain() / DealParam -->
  <rect x="658" y="204" width="200" height="50" rx="8" stroke="#27AE60" stroke-width="1.5"/>
  <text x="758" y="226" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="currentColor">threadMain()</text>
  <text x="758" y="244" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="currentColor">DealParam(pParam)</text>

  <!-- 箭头: threadMain → m_lstData (对角线，左下) -->
  <line x1="703" y1="254" x2="600" y2="296" stroke="currentColor" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="644" y="272" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#888">push_back / pop_front</text>

  <!-- m_lstData -->
  <rect x="468" y="296" width="200" height="38" rx="8" stroke="#9B59B6" stroke-width="1.5"/>
  <text x="568" y="320" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="currentColor">m_lstData (成员)</text>

  <!--
    SetEvent 返回路径 — 干净的 L 形，穿过调用者 (右边缘 x=608) 和 PostQueued (左边缘 x=658) 之间的间隙。
    走廊 x=637 是清晰的：在 m_lstData (y=296) 上方，两个框之间。

    路由: threadMain 左边缘 (658,229) → 左至间隙 (637,229)
           → 上穿间隙 (637,150) → 右至调用者右边缘 (608,150)
  -->
  <polyline
    points="658,229 637,229 637,150 608,150"
    stroke="#E67E22" stroke-width="1.5" stroke-dasharray="6"
    marker-end="url(#arrO)"/>
  <!-- SetEvent 标签 — 位于间隙走廊，垂直线段左侧 -->
  <text x="633" y="196" text-anchor="end" font-family="Segoe UI, sans-serif" font-size="9" fill="#E67E22">SetEvent()</text>

  <!-- 分隔线 -->
  <line x1="468" y1="368" x2="888" y2="368" stroke="#27AE60" stroke-width="0.8" stroke-dasharray="4"/>

  <!-- 总结 (新) -->
  <text x="679" y="388" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#27AE60">Push: 异步 (发射后不管)</text>
  <text x="679" y="408" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#27AE60">Pop: 同步，基于事件阻塞</text>
  <text x="679" y="428" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#27AE60">存储: 类成员 list</text>
  <text x="679" y="448" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#27AE60">template&lt;class T&gt; — 任意可拷贝类型</text>

  <!-- 箭头定义 -->
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="currentColor"/>
    </marker>
    <marker id="arrO" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E67E22"/>
    </marker>
  </defs>
</svg>