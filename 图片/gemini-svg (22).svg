<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1220" width="100%" height="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
    
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08" flood-color="#0f172a" />
    </filter>

    <style>
      .bg { fill: #ffffff; }
      .node-q { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2px; rx: 8px; filter: url(#shadow); }
      .node-start { fill: #1e293b; stroke: #0f172a; stroke-width: 2px; rx: 25px; filter: url(#shadow); }
      
      .node-green { fill: #f0fff4; stroke: #276749; stroke-width: 2px; rx: 8px; filter: url(#shadow); }
      .node-blue { fill: #ebf8ff; stroke: #2b6cb0; stroke-width: 2px; rx: 8px; filter: url(#shadow); }
      .node-red { fill: #fff5f5; stroke: #c53030; stroke-width: 2px; rx: 8px; filter: url(#shadow); }

      .text-start { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 16px; font-weight: bold; fill: #ffffff; text-anchor: middle; }
      .text-q { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; font-weight: bold; fill: #334155; text-anchor: middle; }
      
      .text-title-green { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; font-weight: bold; fill: #166534; text-anchor: middle; }
      .text-sub-green { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; fill: #15803d; text-anchor: middle; }
      
      .text-title-blue { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; font-weight: bold; fill: #1e3a8a; text-anchor: middle; }
      .text-sub-blue { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; fill: #1d4ed8; text-anchor: middle; }
      
      .text-title-red { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; font-weight: bold; fill: #991b1b; text-anchor: middle; }
      .text-sub-red { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; fill: #b91c1c; text-anchor: middle; }

      .path-arrow { fill: none; stroke: #64748b; stroke-width: 2px; marker-end: url(#arrow); }
      
      /* 文本描边技巧，确保线条上的文字清晰易读 */
      .label { 
        font-family: 'Segoe UI', system-ui, sans-serif; 
        font-size: 13px; 
        font-weight: bold; 
        fill: #475569; 
        text-anchor: middle; 
        stroke: #ffffff; 
        stroke-width: 4px; 
        stroke-linejoin: round; 
        paint-order: stroke; 
      }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <g id="edges">
    <path class="path-arrow" d="M 600 75 L 600 117" />
    
    <path class="path-arrow" d="M 490 160 L 365 160" />
    <text x="427" y="156" class="label">否</text>
    
    <path class="path-arrow" d="M 600 193 L 600 227" />
    <text x="615" y="215" class="label">是</text>
    
    <path class="path-arrow" d="M 490 270 L 365 270" />
    <text x="427" y="266" class="label">是</text>
    
    <path class="path-arrow" d="M 600 303 L 600 337" />
    <text x="615" y="325" class="label">否</text>
    
    <path class="path-arrow" d="M 490 380 L 365 380" />
    <text x="427" y="376" class="label">是</text>
    
    <path class="path-arrow" d="M 600 413 L 600 447" />
    <text x="615" y="435" class="label">否</text>

    <path class="path-arrow" d="M 600 523 L 600 550 L 400 550 L 400 557" />
    <text x="500" y="550" class="label">是</text>
    
    <path class="path-arrow" d="M 600 523 L 600 550 L 800 550 L 800 557" />
    <text x="700" y="550" class="label">否</text>

    <path class="path-arrow" d="M 290 600 L 265 600" />
    <text x="277" y="596" class="label">是</text>
    
    <path class="path-arrow" d="M 400 633 L 400 667" />
    <text x="415" y="655" class="label">否</text>
    
    <path class="path-arrow" d="M 290 710 L 265 710" />
    <text x="277" y="706" class="label">是</text>
    
    <path class="path-arrow" d="M 400 743 L 400 777" />
    <text x="415" y="765" class="label">否</text>

    <path class="path-arrow" d="M 910 600 L 935 600" />
    <text x="922" y="596" class="label">是</text>
    
    <path class="path-arrow" d="M 800 633 L 800 667" />
    <text x="815" y="655" class="label">否</text>
    
    <path class="path-arrow" d="M 910 710 L 935 710" />
    <text x="922" y="706" class="label">是</text>
    
    <path class="path-arrow" d="M 800 743 L 800 777" />
    <text x="815" y="765" class="label">否</text>
    
    <path class="path-arrow" d="M 910 820 L 935 820" />
    <text x="922" y="816" class="label">是</text>
    
    <path class="path-arrow" d="M 800 853 L 800 887" />
    <text x="815" y="875" class="label">否</text>
    
    <path class="path-arrow" d="M 910 930 L 935 930" />
    <text x="922" y="926" class="label">否</text>
    
    <path class="path-arrow" d="M 800 963 L 800 997" />
    <text x="815" y="985" class="label">是</text>

    <path class="path-arrow" d="M 800 1073 L 800 1100 L 670 1100 L 670 1107" />
    <text x="735" y="1096" class="label">一次性</text>
    
    <path class="path-arrow" d="M 800 1073 L 800 1100 L 930 1100 L 930 1107" />
    <text x="865" y="1096" class="label">多阶段</text>
  </g>

  <g id="nodes">
    <rect x="480" y="25" width="240" height="50" class="node-start" />
    <text x="600" y="55" class="text-start">需要线程同步吗？</text>

    <rect x="490" y="127" width="220" height="66" class="node-q" />
    <text x="600" y="165" class="text-q">线程之间是否共享数据？</text>

    <rect x="125" y="127" width="230" height="66" class="node-green" />
    <text x="240" y="160" class="text-title-green">
      <tspan x="240" dy="-6">✅ thread_local</tspan>
      <tspan x="240" dy="20" class="text-sub-green">零同步开销</tspan>
    </text>

    <rect x="490" y="237" width="220" height="66" class="node-q" />
    <text x="600" y="275" class="text-q">是否只是一次性初始化？</text>

    <rect x="125" y="237" width="230" height="66" class="node-green" />
    <text x="240" y="270" class="text-title-green">
      <tspan x="240" dy="-6">✅ std::call_once</tspan>
      <tspan x="240" dy="20" class="text-sub-green">+ once_flag</tspan>
    </text>

    <rect x="490" y="347" width="220" height="66" class="node-q" />
    <text x="600" y="385" class="text-q">是否只传递一次结果？</text>

    <rect x="125" y="347" width="230" height="66" class="node-green" />
    <text x="240" y="380" class="text-title-green">
      <tspan x="240" dy="-6">✅ future / promise</tspan>
      <tspan x="240" dy="20" class="text-sub-green">+ std::async</tspan>
    </text>

    <rect x="490" y="457" width="220" height="66" class="node-q" />
    <text x="600" y="495" class="text-q">是否极度追求性能？</text>

    <rect x="290" y="567" width="220" height="66" class="node-q" />
    <text x="400" y="605" class="text-q">只是简单变量的读写吗？</text>

    <rect x="25" y="567" width="230" height="66" class="node-blue" />
    <text x="140" y="600" class="text-title-blue">
      <tspan x="140" dy="-6">✅ std::atomic&lt;T&gt;</tspan>
      <tspan x="140" dy="20" class="text-sub-blue">无锁优先</tspan>
    </text>

    <rect x="290" y="677" width="220" height="66" class="node-q" />
    <text x="400" y="715" class="text-q">能否设计无锁算法？</text>

    <rect x="25" y="677" width="230" height="66" class="node-blue" />
    <text x="140" y="710" class="text-title-blue">
      <tspan x="140" dy="-6">⚠️ CAS + memory ordering</tspan>
      <tspan x="140" dy="20" class="text-sub-blue">仅建议专家使用</tspan>
    </text>

    <rect x="290" y="787" width="220" height="66" class="node-red" />
    <text x="400" y="820" class="text-title-red">
      <tspan x="400" dy="-6">✅ mutex + lock_guard</tspan>
      <tspan x="400" dy="20" class="text-sub-red">最稳妥的默认方案</tspan>
    </text>

    <rect x="690" y="567" width="220" height="66" class="node-q" />
    <text x="800" y="605" class="text-q">是否读多写少？</text>

    <rect x="945" y="567" width="230" height="66" class="node-red" />
    <text x="1060" y="600" class="text-title-red">
      <tspan x="1060" dy="-6">✅ shared_mutex</tspan>
      <tspan x="1060" dy="20" class="text-sub-red">+ shared_lock</tspan>
    </text>

    <rect x="690" y="677" width="220" height="66" class="node-q" />
    <text x="800" y="715" class="text-q">是否属于等待 / 通知模式？</text>

    <rect x="945" y="677" width="230" height="66" class="node-red" />
    <text x="1060" y="710" class="text-title-red">
      <tspan x="1060" dy="-6">✅ condition_variable</tspan>
      <tspan x="1060" dy="20" class="text-sub-red">+ predicate</tspan>
    </text>

    <rect x="690" y="787" width="220" height="66" class="node-q" />
    <text x="800" y="825" class="text-q">是否需要资源计数或限流？</text>

    <rect x="945" y="787" width="230" height="66" class="node-red" />
    <text x="1060" y="825" class="text-title-red">✅ counting_semaphore</text>

    <rect x="690" y="897" width="220" height="66" class="node-q" />
    <text x="800" y="935" class="text-q">是否需要阶段同步？</text>

    <rect x="945" y="897" width="230" height="66" class="node-red" />
    <text x="1060" y="930" class="text-title-red">
      <tspan x="1060" dy="-6">✅ std::mutex</tspan>
      <tspan x="1060" dy="20" class="text-sub-red">+ lock_guard</tspan>
    </text>

    <rect x="690" y="1007" width="220" height="66" class="node-q" />
    <text x="800" y="1045" class="text-q">是否需要重复使用？</text>

    <rect x="555" y="1117" width="230" height="66" class="node-red" />
    <text x="670" y="1155" class="text-title-red">✅ std::latch</text>

    <rect x="815" y="1117" width="230" height="66" class="node-red" />
    <text x="930" y="1155" class="text-title-red">✅ std::barrier</text>
  </g>
</svg>
