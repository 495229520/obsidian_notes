<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#757575" />
    </marker>
  </defs>

  <rect width="800" height="520" fill="#fafafa" />

  <text x="400" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" font-size="20" fill="#333333">ICE 候选者选择 (RFC 8445)</text>

  <rect x="40" y="70" width="720" height="80" rx="8" fill="#e8f4ec" stroke="#b5d6c6" stroke-width="2" />
  <text x="200" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" font-size="18" fill="#1b5e3a">① 主机候选者</text>
  <text x="200" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#1b5e3a">直连 LAN IP (同一网络)</text>
  <text x="520" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" font-size="15" fill="#1b5e3a">最高优先级 — 零额外基础设施，最低延迟</text>
  <text x="520" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" font-size="15" fill="#1b5e3a">仅在双方都在同一局域网时有效</text>

  <line x1="400" y1="150" x2="400" y2="185" stroke="#757575" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="415" y="172" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#555555">如果不可达 →</text>

  <rect x="40" y="190" width="720" height="80" rx="8" fill="#efeefb" stroke="#cfc8f0" stroke-width="2" />
  <text x="200" y="225" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" font-size="18" fill="#4b3e99">② 服务器反射 (srflx)</text>
  <text x="200" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#4b3e99">通过 STUN 获取公网 IP:端口</text>
  <text x="520" y="225" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" font-size="15" fill="#6053b5">UDP 打洞 — 跨 NAT 的直接 P2P</text>
  <text x="520" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" font-size="15" fill="#6053b5">对约 85% 的 NAT 组合有效</text>

  <line x1="400" y1="270" x2="400" y2="305" stroke="#757575" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="415" y="292" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#555555">如果是对称 NAT / CGNAT →</text>

  <rect x="40" y="310" width="720" height="80" rx="8" fill="#fdf4e6" stroke="#eed5ad" stroke-width="2" />
  <text x="200" y="345" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" font-size="18" fill="#6e4f1d">③ TURN 中继候选者</text>
  <text x="200" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#6e4f1d">所有流量通过中继服务器</text>
  <text x="520" y="345" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" font-size="15" fill="#8f692a">始终有效 — 保证连接性</text>
  <text x="520" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" font-size="15" fill="#8f692a">较高的延迟，服务器带宽成本</text>

  <rect x="40" y="420" width="720" height="70" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1.5" />
  <text x="400" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#444444">ICE (交互式连接建立) 会系统地并行尝试所有候选者，</text>
  <text x="400" y="475" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#444444">使用成功连通且优先级最高的一个。WebRTC 完全建立在此框架之上。</text>
</svg>
