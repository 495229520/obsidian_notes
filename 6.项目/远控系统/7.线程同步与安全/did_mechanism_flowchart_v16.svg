<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120" role="img" aria-labelledby="title desc">
<title id="title">国家助学贷款政策DID机制流程图</title>
<desc id="desc">采用流程图而非脑图，展示国家助学贷款政策通过缓解信贷约束影响教育结果、个体就业结果与家庭劳动再配置，并结合异质性和识别检验支持机制解释。</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F8FBFF"/>
    <stop offset="100%" stop-color="#F4F7FB"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10"/>
  </filter>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
  </marker>
  <marker id="arrowDash" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#94A3B8"/>
  </marker>
</defs>
<rect x="0" y="0" width="1800" height="1120" fill="url(#bg)"/>
<line x1="120" y1="0" x2="120" y2="1120" stroke="#E2E8F0" stroke-width="1" opacity="0.32"/><line x1="520" y1="0" x2="520" y2="1120" stroke="#E2E8F0" stroke-width="1" opacity="0.32"/><line x1="920" y1="0" x2="920" y2="1120" stroke="#E2E8F0" stroke-width="1" opacity="0.32"/><line x1="1320" y1="0" x2="1320" y2="1120" stroke="#E2E8F0" stroke-width="1" opacity="0.32"/><line x1="1680" y1="0" x2="1680" y2="1120" stroke="#E2E8F0" stroke-width="1" opacity="0.32"/><line x1="0" y1="160" x2="1800" y2="160" stroke="#E2E8F0" stroke-width="1" opacity="0.28"/><line x1="0" y1="420" x2="1800" y2="420" stroke="#E2E8F0" stroke-width="1" opacity="0.28"/><line x1="0" y1="700" x2="1800" y2="700" stroke="#E2E8F0" stroke-width="1" opacity="0.28"/><line x1="0" y1="980" x2="1800" y2="980" stroke="#E2E8F0" stroke-width="1" opacity="0.28"/><text x="900.0" y="52" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="32" fill="#0F172A" font-weight="800" text-anchor="middle"><tspan x="900.0" dy="0">国家助学贷款政策的作用机制流程图（DID）</tspan></text><text x="900.0" y="86" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="17" fill="#475569" font-weight="500" text-anchor="middle"><tspan x="900.0" dy="0">不用脑图，直接按论文叙述顺序展示：政策冲击 → 约束缓解 → 教育结果 → 个体/家庭响应 → 机制判别</tspan></text><g filter="url(#shadow)"><rect x="280" y="108" width="1240" height="82" rx="22" ry="22" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/></g><text x="320" y="145" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="16" fill="#0F172A" font-weight="650" text-anchor="start"><tspan x="320" dy="0">识别锚点：主样本 treat = 1(entry_year18 ≥ policyyear)；家庭层 treat = 1(core child decision year ≥ policyyear)</tspan></text><text x="320" y="170" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="15" fill="#475569" font-weight="500" text-anchor="start"><tspan x="320" dy="0">估计框架：Stacked DID + county×stack FE + birthyear×stack FE；并加入 local hukou、province×cohort、province trend 等稳健性检验</tspan></text><rect x="1535" y="110" width="110" height="34" rx="18" ry="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/><text x="1590.0" y="133.0" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="15" fill="#475569" font-weight="500" text-anchor="middle"><tspan x="1590.0" dy="0">实线：主机制</tspan></text><rect x="1655" y="110" width="110" height="34" rx="18" ry="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/><text x="1710.0" y="133.0" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="15" fill="#475569" font-weight="500" text-anchor="middle"><tspan x="1710.0" dy="0">虚线：辅助支持</tspan></text><g filter="url(#shadow)"><rect x="70" y="250" width="250" height="200" rx="26" ry="26" fill="#EAF2FF" stroke="#93C5FD" stroke-width="2"/><path d="M 96 250 H 294 Q 320 250 320 276 V 308 H 70 V 276 Q 70 250 96 250 Z" fill="#2563EB"/></g><circle cx="104" cy="279.0" r="18" fill="rgba(255,255,255,0.95)"/><text x="104" y="285.0" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="18" fill="#2563EB" font-weight="700" text-anchor="middle"><tspan x="104" dy="0">1</tspan></text><text x="132" y="287.0" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="23" fill="white" font-weight="750" text-anchor="start"><tspan x="132" dy="0">政策冲击</tspan></text><text x="94" y="342" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="16" fill="#334155" font-weight="450" text-anchor="start"><tspan x="94" dy="0">国家助学贷款政策按县分批落地</tspan><tspan x="94" dy="1.55em">county × policyyear 决定政策到达时间</tspan><tspan x="94" dy="1.55em">由此形成不同出生队列在升学决策时点</tspan><tspan x="94" dy="1.55em">是否暴露于政策的差异</tspan></text><g filter="url(#shadow)"><rect x="380" y="250" width="330" height="200" rx="26" ry="26" fill="#FFF4E6" stroke="#FDBA74" stroke-width="2"/><path d="M 406 250 H 684 Q 710 250 710 276 V 308 H 380 V 276 Q 380 250 406 250 Z" fill="#EA580C"/></g><circle cx="414" cy="279.0" r="18" fill="rgba(255,255,255,0.95)"/><text x="414" y="285.0" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="18" fill="#EA580C" font-weight="700" text-anchor="middle"><tspan x="414" dy="0">2</tspan></text><text x="442" y="287.0" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="23" fill="white" font-weight="750" text-anchor="start"><tspan x="442" dy="0">核心机制</tspan></text><text x="404" y="342" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="16" fill="#334155" font-weight="450" text-anchor="start"><tspan x="404" dy="0">缓解教育阶段信贷约束</tspan><tspan x="404" dy="1.55em">降低学费、生活费与机会成本压力</tspan><tspan x="404" dy="1.55em">提高继续升学的可支付性</tspan><tspan x="404" dy="1.55em">改变约 18 岁时的教育选择</tspan></text><g filter="url(#shadow)"><rect x="780" y="110" width="340" height="215" rx="26" ry="26" fill="#ECFDF3" stroke="#86EFAC" stroke-width="2"/><path d="M 806 110 H 1094 Q 1120 110 1120 136 V 168 H 780 V 136 Q 780 110 806 110 Z" fill="#16A34A"/></g><circle cx="814" cy="139.0" r="18" fill="rgba(255,255,255,0.95)"/><text x="814" y="145.0" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="18" fill="#16A34A" font-weight="700" text-anchor="middle"><tspan x="814" dy="0">3A</tspan></text><text x="842" y="147.0" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="22" fill="white" font-weight="750" text-anchor="start"><tspan x="842" dy="0">第一阶段：教育结果</tspan></text><text x="804" y="202" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="16" fill="#334155" font-weight="450" text-anchor="start"><tspan x="804" dy="0">College+ / High school+</tspan><tspan x="804" dy="1.55em">Edu years / In school</tspan><tspan x="804" dy="1.55em">直接检验“融资约束是否被放松”</tspan><tspan x="804" dy="1.55em">也是机制链的首要落点</tspan></text><g filter="url(#shadow)"><rect x="1180" y="110" width="340" height="215" rx="26" ry="26" fill="#EEF4FF" stroke="#93C5FD" stroke-width="2"/><path d="M 1206 110 H 1494 Q 1520 110 1520 136 V 168 H 1180 V 136 Q 1180 110 1206 110 Z" fill="#2563EB"/></g><circle cx="1214" cy="139.0" r="18" fill="rgba(255,255,255,0.95)"/><text x="1214" y="145.0" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="18" fill="#2563EB" font-weight="700" text-anchor="middle"><tspan x="1214" dy="0">4</tspan></text><text x="1242" y="147.0" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="22" fill="white" font-weight="750" text-anchor="start"><tspan x="1242" dy="0">第二阶段：个体结果</tspan></text><text x="1204" y="202" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="16" fill="#334155" font-weight="450" text-anchor="start"><tspan x="1204" dy="0">work_i / job_search / labor income</tspan><tspan x="1204" dy="1.55em">white-collar / migrant_work</tspan><tspan x="1204" dy="1.55em">体现教育积累之后的就业路径</tspan><tspan x="1204" dy="1.55em">与职业结构调整</tspan></text><g filter="url(#shadow)"><rect x="780" y="390" width="740" height="225" rx="26" ry="26" fill="#F5F0FF" stroke="#C4B5FD" stroke-width="2"/><path d="M 806 390 H 1494 Q 1520 390 1520 416 V 448 H 780 V 416 Q 780 390 806 390 Z" fill="#7C3AED"/></g><circle cx="814" cy="419.0" r="18" fill="rgba(255,255,255,0.95)"/><text x="814" y="425.0" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="18" fill="#7C3AED" font-weight="700" text-anchor="middle"><tspan x="814" dy="0">3B</tspan></text><text x="842" y="427.0" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="22" fill="white" font-weight="750" text-anchor="start"><tspan x="842" dy="0">家庭协同渠道：资源与时间再配置</tspan></text><text x="804" y="482" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="16" fill="#334155" font-weight="450" text-anchor="start"><tspan x="804" dy="0">母亲：劳动参与 / 工时 / 家务</tspan><tspan x="804" dy="1.55em">其他成员：女性/男性 LFP、white-collar share、migrant-work share</tspan><tspan x="804" dy="1.55em">用于检验家庭内部是否围绕“核心子女继续升学”发生支持性调整</tspan><tspan x="804" dy="1.55em">它不是主效应本身，而是对“信贷约束缓解 + 家庭协同”机制的补充证据</tspan></text><g filter="url(#shadow)"><rect x="1540" y="240" width="220" height="275" rx="26" ry="26" fill="#FFF8DD" stroke="#FCD34D" stroke-width="2"/><path d="M 1566 240 H 1734 Q 1760 240 1760 266 V 298 H 1540 V 266 Q 1540 240 1566 240 Z" fill="#D97706"/></g><circle cx="1574" cy="269.0" r="18" fill="rgba(255,255,255,0.95)"/><text x="1574" y="275.0" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="18" fill="#D97706" font-weight="700" text-anchor="middle"><tspan x="1574" dy="0">5</tspan></text><text x="1602" y="277.0" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="22" fill="white" font-weight="750" text-anchor="start"><tspan x="1602" dy="0">机制判别</tspan></text><text x="1564" y="332" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="15" fill="#334155" font-weight="450" text-anchor="start"><tspan x="1564" dy="0">若同时观察到：</tspan><tspan x="1564" dy="1.55em">① 教育结果改善；</tspan><tspan x="1564" dy="1.55em">② 家庭劳动响应存在；</tspan><tspan x="1564" dy="1.55em">③ 受约束更强群体效应更大；</tspan><tspan x="1564" dy="1.55em">则更支持“缓解信贷约束”解释，</tspan><tspan x="1564" dy="1.55em">而非纯粹样本构成变化</tspan></text><g filter="url(#shadow)"><rect x="1540" y="540" width="220" height="145" rx="26" ry="26" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2"/><path d="M 1566 540 H 1734 Q 1760 540 1760 566 V 590 H 1540 V 566 Q 1540 540 1566 540 Z" fill="#DC2626"/></g><circle cx="1574" cy="565.0" r="18" fill="rgba(255,255,255,0.95)"/><text x="1574" y="571.0" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="18" fill="#DC2626" font-weight="700" text-anchor="middle"><tspan x="1574" dy="0">6</tspan></text><text x="1602" y="573.0" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="20" fill="white" font-weight="750" text-anchor="start"><tspan x="1602" dy="0">异质性支持</tspan></text><text x="1564" y="624" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="15" fill="#334155" font-weight="450" text-anchor="start"><tspan x="1564" dy="0">农业户口 / 低父母教育 / 贫困省份</tspan><tspan x="1564" dy="1.55em">若效应更强 ⇒ 机制更可信</tspan></text><path d="M 320 350 L 380 350" fill="none" stroke="#475569" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><path d="M 710 320 L 780 220" fill="none" stroke="#475569" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><path d="M 710 380 L 780 500" fill="none" stroke="#475569" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><path d="M 1120 220 L 1180 220" fill="none" stroke="#475569" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><path d="M 1520 220 L 1540 315" fill="none" stroke="#475569" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><path d="M 1520 505 L 1540 435" fill="none" stroke="#475569" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><path d="M 1200 325 L 1200 360 L 1040 360 L 1040 390" fill="none" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="10 8" marker-end="url(#arrowDash)"/><path d="M 1650 540 L 1650 515" fill="none" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="10 8" marker-end="url(#arrowDash)"/><rect x="235" y="302" width="150" height="34" rx="18" ry="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/><text x="310.0" y="325.0" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="15" fill="#475569" font-weight="500" text-anchor="middle"><tspan x="310.0" dy="0">外生时点差异</tspan></text><rect x="640" y="220" width="130" height="34" rx="18" ry="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/><text x="705.0" y="243.0" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="15" fill="#475569" font-weight="500" text-anchor="middle"><tspan x="705.0" dy="0">升学可支付性</tspan></text><rect x="1008" y="335" width="180" height="34" rx="18" ry="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/><text x="1098.0" y="358.0" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="14" fill="#475569" font-weight="500" text-anchor="middle"><tspan x="1098.0" dy="0">家庭支持核心子女升学</tspan></text><rect x="1460" y="180" width="130" height="34" rx="18" ry="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/><text x="1525.0" y="203.0" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="15" fill="#475569" font-weight="500" text-anchor="middle"><tspan x="1525.0" dy="0">第二阶段证据</tspan></text><rect x="1460" y="522" width="130" height="34" rx="18" ry="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/><text x="1525.0" y="545.0" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="15" fill="#475569" font-weight="500" text-anchor="middle"><tspan x="1525.0" dy="0">家庭协同证据</tspan></text><rect x="1500" y="700" width="160" height="34" rx="18" ry="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/><text x="1580.0" y="723.0" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="14" fill="#475569" font-weight="500" text-anchor="middle"><tspan x="1580.0" dy="0">约束更强组效应更大</tspan></text><g filter="url(#shadow)"><rect x="60" y="835" width="1700" height="200" rx="30" ry="30" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/></g><rect x="60" y="835" width="1700" height="68" rx="30" ry="30" fill="#334155"/><text x="105" y="880" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="22" fill="white" font-weight="700" text-anchor="start"><tspan x="105" dy="0">识别有效性与排除解释（不是机制主链，但决定机制结论是否站得住）</tspan></text><rect x="80" y="910" width="230" height="48" rx="18" ry="18" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/><text x="195.0" y="940.0" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="15" fill="#475569" font-weight="500" text-anchor="middle"><tspan x="195.0" dy="0">平行趋势 / lead placebo</tspan></text><rect x="355" y="910" width="210" height="48" rx="18" ry="18" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/><text x="460.0" y="940.0" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="15" fill="#475569" font-weight="500" text-anchor="middle"><tspan x="460.0" dy="0">placebo outcomes</tspan></text><rect x="580" y="910" width="210" height="48" rx="18" ry="18" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/><text x="685.0" y="940.0" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="15" fill="#475569" font-weight="500" text-anchor="middle"><tspan x="685.0" dy="0">covariate balance</tspan></text><rect x="805" y="910" width="190" height="48" rx="18" ry="18" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/><text x="900.0" y="940.0" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="15" fill="#475569" font-weight="500" text-anchor="middle"><tspan x="900.0" dy="0">LOPO 留一省份</tspan></text><rect x="1010" y="910" width="190" height="48" rx="18" ry="18" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/><text x="1105.0" y="940.0" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="15" fill="#475569" font-weight="500" text-anchor="middle"><tspan x="1105.0" dy="0">wild bootstrap</tspan></text><rect x="1220" y="910" width="500" height="48" rx="18" ry="18" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/><text x="1470.0" y="940.0" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="15" fill="#475569" font-weight="500" text-anchor="middle"><tspan x="1470.0" dy="0">额外控制：local hukou / province×cohort / province trend</tspan></text><text x="90" y="985" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="17" fill="#475569" font-weight="500" text-anchor="start"><tspan x="90" dy="0">这些检验共同排除：户籍排序、样本构成跳变、单一省份驱动、以及标准误过于乐观等替代解释。</tspan></text><text x="90" y="1012" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="17" fill="#0F172A" font-weight="650" text-anchor="start"><tspan x="90" dy="0">因此正文可按“教育结果 → 家庭协同响应 → 异质性支持 → 识别检验兜底”的顺序组织机制叙述。</tspan></text><rect x="1335" y="1062" width="425" height="34" rx="18" ry="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/><text x="1547.5" y="1085.0" font-family="'Noto Sans CJK SC', 'Noto Sans CJK JP', sans-serif" font-size="15" fill="#475569" font-weight="500" text-anchor="middle"><tspan x="1547.5" dy="0">适用场景：论文正文机制图 / 答辩PPT总览页 / 附录识别说明页</tspan></text></svg>